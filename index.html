<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambit Budget Pro — Coming Soon</title>
<meta name="description" content="Ambit Budget Pro is coming soon. Privacy-first personal finance tools. Navigate your finance$.">
<meta name="theme-color" content="#0c1445">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="app/icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0C1445;
  --navy-light: #101850;
  --amber: #E8A020;
  --amber-light: #f0c050;
  --blue: #7ec8e3;
  --text: #eef0ff;
  --text2: #9da5d0;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  text-align: center;
  max-width: 420px;
  padding: 48px 32px;
}
.shield { width: 120px; height: 120px; margin-bottom: 24px; object-fit: contain; }
h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
h1 .gold { color: var(--amber-light); }
.tagline {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 8px;
}
.coming {
  display: inline-block;
  background: rgba(126,200,227,0.12);
  color: var(--blue);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 99px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.gate { margin-top: 12px; }
.gate label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}
.gate input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: var(--navy-light);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.gate input:focus { border-color: var(--blue); }
.gate button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: var(--amber);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.gate button:hover { background: #d09018; }
.error {
  color: #e05050;
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.copy {
  margin-top: 40px;
  font-size: 12px;
  color: var(--text2);
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="container">
  <img class="shield" src="app/icons/icon-512.png" alt="Ambit Budget Pro" width="120" height="120">
  <h1>Ambit <span class="gold">Budget Pro</span></h1>
  <p class="tagline">Navigate your finance$.</p>
  <div class="coming">Coming Soon</div>

  <div class="gate">
    <label>Authorized access only</label>
    <input type="password" id="pw" placeholder="Enter password" autocomplete="off" autofocus>
    <button id="go">Enter Site</button>
    <p class="error" id="err">Incorrect password. Try again.</p>
  </div>

  <p class="copy">&copy; 2026 Kifolloy AIR, LLC. All rights reserved.</p>
</div>

<script>
(function(){
  // Simple hash check — not cryptographic security, just a gate
  var h = function(s){ var h=0; for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i); h|=0;} return h; };
  var expect = h('Kifolloy AIR');
  var inp = document.getElementById('pw');
  var btn = document.getElementById('go');
  var err = document.getElementById('err');

  // Check if already authenticated this session
  if(sessionStorage.getItem('ambit_auth')==='1'){
    window.location.replace('index-full.html');
  }

  function attempt(){
    if(h(inp.value)===expect){
      sessionStorage.setItem('ambit_auth','1');
      window.location.replace('index-full.html');
    } else {
      err.style.display='block';
      inp.value='';
      inp.focus();
    }
  }

  btn.addEventListener('click', attempt);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
})();
</script>
</body>
</html>
