<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambit Budget Pro — Coming Soon</title>
<meta name="description" content="Ambit Budget Pro is coming soon. Privacy-first personal finance tools. Navigate your finance$.">
<meta name="theme-color" content="#0c1445">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 115'%3E%3Cdefs%3E%3ClinearGradient id='sg' x1='0' y1='0' x2='0.3' y2='1'%3E%3Cstop offset='0%25' stop-color='%231a2870'/%3E%3Cstop offset='40%25' stop-color='%230c1445'/%3E%3Cstop offset='100%25' stop-color='%23080e30'/%3E%3C/linearGradient%3E%3ClinearGradient id='se' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237ec8e3'/%3E%3Cstop offset='50%25' stop-color='%235ba8c8'/%3E%3Cstop offset='100%25' stop-color='%233a8ab0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M4,12Q4,4 12,4L88,4Q96,4 96,12L96,60Q96,85 50,112Q4,85 4,60Z' fill='url(%23sg)' stroke='url(%23se)' stroke-width='2.5'/%3E%3Ctext x='50' y='20' text-anchor='middle' fill='%23f0c050' font-size='11' font-weight='700' font-family='Arial' letter-spacing='4' opacity='0.9'%3EAMBIT%3C/text%3E%3Cpolygon points='50,26 55,50 50,55 45,50' fill='%23e87820'/%3E%3Cpolygon points='50,88 45,60 50,55 55,60' fill='%23f0c050'/%3E%3Cpolygon points='90,55 55,50 50,55 55,60' fill='%23e87820' opacity='0.85'/%3E%3Cpolygon points='10,55 45,60 50,55 45,50' fill='%23f0c050' opacity='0.85'/%3E%3Ccircle cx='50' cy='55' r='5' fill='%23b05810'/%3E%3Ccircle cx='50' cy='55' r='2.5' fill='%238a4510'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0C1445;
  --navy-light: #101850;
  --amber: #E8A020;
  --amber-light: #f0c050;
  --blue: #7ec8e3;
  --text: #eef0ff;
  --text2: #9da5d0;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  text-align: center;
  max-width: 420px;
  padding: 48px 32px;
}
.shield { height: 100px; margin-bottom: 24px; }
h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
h1 .gold { color: var(--amber-light); }
.tagline {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 8px;
}
.coming {
  display: inline-block;
  background: rgba(126,200,227,0.12);
  color: var(--blue);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 99px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.gate { margin-top: 12px; }
.gate label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 8px;
}
.gate input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: var(--navy-light);
  color: var(--text);
  font-family: inherit;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.gate input:focus { border-color: var(--blue); }
.gate button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: var(--amber);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.gate button:hover { background: #d09018; }
.error {
  color: #e05050;
  font-size: 13px;
  margin-top: 10px;
  display: none;
}
.copy {
  margin-top: 40px;
  font-size: 12px;
  color: var(--text2);
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="container">
  <svg class="shield" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="#1a2870"/><stop offset="40%" stop-color="#0c1445"/><stop offset="100%" stop-color="#080e30"/></linearGradient>
      <linearGradient id="se" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7ec8e3"/><stop offset="50%" stop-color="#5ba8c8"/><stop offset="100%" stop-color="#3a8ab0"/></linearGradient>
      <path id="ba" d="M15,85 Q50,108 85,85" fill="none"/>
    </defs>
    <path d="M4,12Q4,4 12,4L88,4Q96,4 96,12L96,60Q96,85 50,112Q4,85 4,60Z" fill="url(#sg)" stroke="url(#se)" stroke-width="2.5"/>
    <text x="50" y="20" text-anchor="middle" fill="#f0c050" font-size="11" font-weight="700" font-family="Arial" letter-spacing="4" opacity="0.9">AMBIT</text>
    <polygon points="50,26 55,50 50,55 45,50" fill="#e87820"/>
    <polygon points="50,88 45,60 50,55 55,60" fill="#f0c050"/>
    <polygon points="90,55 55,50 50,55 55,60" fill="#e87820" opacity="0.85"/>
    <polygon points="10,55 45,60 50,55 45,50" fill="#f0c050" opacity="0.85"/>
    <circle cx="50" cy="55" r="5" fill="#b05810"/>
    <circle cx="50" cy="55" r="2.5" fill="#8a4510"/>
    <text x="50" y="71" text-anchor="middle" fill="#7ec8e3" font-size="52" font-weight="800" font-family="Arial">A</text>
    <text fill="#7ec8e3" font-size="9" font-weight="600" font-family="Arial" letter-spacing="2" opacity="0.8"><textPath href="#ba" startOffset="50%" text-anchor="middle">BUDGET</textPath></text>
  </svg>
  <h1>Ambit <span class="gold">Budget Pro</span></h1>
  <p class="tagline">Navigate your finance$.</p>
  <div class="coming">Coming Soon</div>

  <div class="gate">
    <label>Authorized access only</label>
    <input type="password" id="pw" placeholder="Enter password" autocomplete="off" autofocus>
    <button id="go">Enter Site</button>
    <p class="error" id="err">Incorrect password. Try again.</p>
  </div>

  <p class="copy">&copy; 2026 Kifolloy AIR, LLC. All rights reserved.</p>
</div>

<script>
(function(){
  // Simple hash check — not cryptographic security, just a gate
  var h = function(s){ var h=0; for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i); h|=0;} return h; };
  var expect = h('Kifolloy AIR');
  var inp = document.getElementById('pw');
  var btn = document.getElementById('go');
  var err = document.getElementById('err');

  // Check if already authenticated this session
  if(sessionStorage.getItem('ambit_auth')==='1'){
    window.location.replace('index-full.html');
  }

  function attempt(){
    if(h(inp.value)===expect){
      sessionStorage.setItem('ambit_auth','1');
      window.location.replace('index-full.html');
    } else {
      err.style.display='block';
      inp.value='';
      inp.focus();
    }
  }

  btn.addEventListener('click', attempt);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
})();
</script>
</body>
</html>
