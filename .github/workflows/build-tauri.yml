name: Build Tauri (Windows)

# Builds the desktop app on a Windows runner.
#
#   - Push to main / PR to main / manual dispatch -> builds + uploads NSIS &
#     MSI as workflow artifacts (for testing).
#   - Push of a v* tag (e.g. v1.0.1)              -> builds, then publishes
#     a GitHub Release with the installers attached as downloadable assets.
#     The landing page links to /releases/latest/ so the new build goes live
#     for end-user direct download as soon as the tag is pushed.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README*'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'app/**'
      - '.github/workflows/build-tauri.yml'
  workflow_dispatch: # allows manual run from the Actions tab

permissions:
  contents: write # needed to create GitHub Releases on tag push

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          tauri --version

      - name: Build Tauri app
        working-directory: src-tauri
        run: tauri build

      - name: Upload NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: ambit-budget-pro-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: ambit-budget-pro-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      # Tag-only step: publish a GitHub Release with both installers attached.
      # The release is named after the tag (v1.0.1 etc.) and uses the auto-generated
      # body from the commits since the previous tag.
      - name: Publish GitHub Release (only on v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
