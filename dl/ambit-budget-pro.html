<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ambit Budget Pro</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1445;
  --surface: #fdf6e3;
  --surface2: #f5ecd0;
  --border: #e8dbb8;
  --text: #eef0ff;
  --text2: #9da5d0;
  --card-text: #2a2520;
  --card-text2: #6b6356;
  --accent: #e8a020;
  --accent2: #f0c050;
  --green: #40c080;
  --red: #e05050;
  --yellow: #e8a020;
  --orange: #e07828;
  --blue: #5090e8;
  --pink: #d060a0;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, select, textarea, button { font-family: inherit; }
code { font-family: 'JetBrains Mono', monospace; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #101850; border-right: 1px solid #2a3580; padding: 20px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; color: var(--text); }
.main { flex: 1; margin-left: 220px; padding: 28px 36px; min-height: 100vh; }

/* Mode tabs (Demo / My Budget) */
.mode-tabs { display: flex; gap: 0; margin-bottom: 0; padding: 0 20px 16px; }
.mode-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: all 0.15s; color: var(--text2); background: transparent; border: 1px solid transparent; }
.mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.mode-tab.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-color: rgba(232,160,32,0.25); }
.mode-tab .mode-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.mode-tab .mode-dot.demo { background: var(--blue); }
.mode-tab .mode-dot.mine { background: var(--green); }
.demo-banner { background: rgba(80,144,232,0.1); border: 1px solid rgba(80,144,232,0.2); border-radius: 8px; padding: 8px 14px; margin-bottom: 16px; font-size: 12px; color: var(--blue); display: flex; align-items: center; gap: 8px; }
.demo-banner .dismiss { cursor: pointer; margin-left: auto; opacity: 0.6; font-size: 14px; }

.logo { padding: 0 20px 24px; font-size: 20px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(232,160,32,0.08); }
.nav-item.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-left-color: var(--accent); font-weight: 600; }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }

.nav-sep { height: 1px; background: var(--border); margin: 12px 20px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--card-text); }
.card h3 .icon { font-size: 16px; }

/* Stat cards */
.stats { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; flex: 1; min-width: 120px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.stat .label { font-size: 10px; color: var(--card-text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.stat .value { font-size: 18px; font-weight: 700; }
.stat .sub { font-size: 10px; color: var(--card-text2); margin-top: 1px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--card-text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #d09018; }
.btn.green { background: #40c080; border-color: #40c080; color: #fff; }
.btn.green:hover { background: #38a870; }
.btn.danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(255,107,107,0.1); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Inputs */
.input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--card-text); font-size: 13px; outline: none; transition: border-color 0.15s; }
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--card-text2); }
textarea.input { resize: vertical; min-height: 100px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
select.input { cursor: pointer; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.disc-tag { font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 600; }
.disc-tag.disc { background: rgba(232,160,32,0.15); color: var(--yellow); }
.disc-tag.fixed { background: rgba(80,144,232,0.15); color: var(--blue); }
.disc-tag.transfer { background: rgba(208,96,160,0.15); color: var(--pink); }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 13px; color: var(--card-text); }
.table th { text-align: left; padding: 10px 12px; color: var(--card-text2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
.table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.table tr:hover { background: rgba(232,160,32,0.05); }
.table .del-btn { border: none; background: none; color: var(--red); cursor: pointer; font-size: 16px; opacity: 0.7; transition: opacity 0.15s; }
.table .del-btn:hover { opacity: 1; }
.table.compact-budget { width: 100%; }
.table.compact-budget th, .table.compact-budget td { padding: 5px 8px; border-right: 1px solid var(--border); white-space: nowrap; }
.table.compact-budget th:first-child, .table.compact-budget td:first-child { white-space: normal; }
.table.compact-budget th:last-child, .table.compact-budget td:last-child { border-right: none; width: 24px; text-align: center; }
.info-tooltip { position:absolute; top:100%; left:0; z-index:100; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:12px; font-weight:400; color:var(--card-text); line-height:1.5; width:280px; margin-top:6px; box-shadow:0 4px 16px rgba(0,0,0,0.15); white-space:normal; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--card-text2); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 13px; max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* Group colors */
.grp-housing { background: rgba(232,160,32,0.15); color: #f0c050; }
.grp-food { background: rgba(64,192,128,0.15); color: #40c080; }
.grp-transport { background: rgba(224,120,40,0.15); color: #e07828; }
.grp-utilities { background: rgba(80,144,232,0.15); color: #5090e8; }
.grp-personal { background: rgba(208,96,160,0.15); color: #d060a0; }
.grp-health { background: rgba(224,80,80,0.15); color: #e05050; }
.grp-entertainment { background: rgba(232,160,32,0.15); color: #e8a020; }
.grp-savings { background: rgba(64,192,128,0.15); color: #40c080; }
.grp-income { background: rgba(80,200,160,0.15); color: #50c8a0; }
.grp-other { background: rgba(157,165,208,0.15); color: #9da5d0; }

/* Badge */
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 99px; font-size: 11px; font-weight: 700; padding: 0 6px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.25s ease-out; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.page-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }

/* Compass watermark behind page content */
.compass-watermark { position: fixed; top: 50%; left: calc(110px + 50vw); transform: translate(-50%, -50%); pointer-events: none; z-index: 0; opacity: 0.07; }

/* ── Splash Screen ── */
.splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.splash-screen .splash-title { font-size: 36px; font-weight: 700; color: var(--accent2); letter-spacing: -1px; margin-top: 12px; }
.splash-screen .splash-sub { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; }
@keyframes splashFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
.splash-fade { animation: splashFadeOut 0.5s ease-out forwards; }

/* ── Onboarding Tour ── */
.tour-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.tour-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.2s; }
.tour-dot.active { background: var(--accent); transform: scale(1.25); }
.tour-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
.tour-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; color: var(--card-text); }
.tour-desc { font-size: 13px; line-height: 1.6; text-align: center; color: var(--card-text2); margin-bottom: 24px; }
.tour-nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.tour-skip { font-size: 12px; color: var(--card-text2); cursor: pointer; opacity: 0.7; }
.tour-skip:hover { opacity: 1; }
[role="button"]:focus, [role="tab"]:focus, [role="menuitem"]:focus, .nav-item:focus, .tab-item:focus, .mode-tab:focus { outline: 2px solid var(--accent2); outline-offset: 2px; border-radius: 4px; }

/* ── Bottom Tab Bar ── */
.bottom-tabs { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: #101850; border-top: 1px solid #2a3580; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.bottom-tabs .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; color: rgba(255,255,255,0.5); cursor: pointer; transition: color 0.15s; }
.bottom-tabs .tab-item.active { color: var(--accent2); }
.bottom-tabs .tab-item .tab-icon { font-size: 20px; }
.more-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; }
.more-menu { position: fixed; bottom: 56px; left: 0; right: 0; background: #101850; border-top: 1px solid #2a3580; border-radius: 16px 16px 0 0; padding: 16px 0 8px; z-index: 61; }
.more-menu .more-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer; }
.more-menu .more-item:hover, .more-menu .more-item.active { color: var(--accent2); background: rgba(232,160,32,0.08); }
.more-menu .more-item .icon { font-size: 18px; }

/* ── Table scroll wrapper ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── Tablet: 1024px ── */
@media (max-width: 1024px) {
  .dash-layout { flex-direction: column !important; }
  .dash-right { width: 100% !important; min-width: 0 !important; flex-shrink: 1 !important; max-height: none !important; }
  .dash-left { min-width: 0 !important; }
  .dash-left .card { min-width: 0 !important; }
  .import-layout { flex-direction: column !important; }
  .import-right { min-width: 0 !important; }
}

/* ── Phone: 768px ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-tabs { display: flex; }
  .main { margin-left: 0; padding: 16px 12px 72px 12px; }
  .stats { flex-direction: row; flex-wrap: wrap; }
  .stats .stat { min-width: calc(50% - 6px); flex: 0 0 calc(50% - 6px); }
  .card { padding: 14px; }
  .page-header h2 { font-size: 18px; }
  .page-header p { font-size: 12px; }
  .info-tooltip { width: calc(100vw - 48px); max-width: 280px; left: auto; right: -8px; }
  .modal { padding: 16px; width: 95%; max-width: none; }
  .toast { left: 12px; right: 12px; bottom: 72px; }
  .compass-watermark { left: 50% !important; }
  .txn-table th:nth-child(5), .txn-table td:nth-child(5) { display: none; }
  .txn-table th:nth-child(8), .txn-table td:nth-child(8) { display: none; }
  .dict-table th:nth-child(4), .dict-table td:nth-child(4) { display: none; }
  .dict-table th:nth-child(6), .dict-table td:nth-child(6) { display: none; }
}

/* ── Small phone: 480px ── */
@media (max-width: 480px) {
  .main { padding: 12px 8px 68px 8px; }
  .stats .stat { min-width: 100%; flex: 0 0 100%; }
  .stat .value { font-size: 16px; }
  .page-header h2 { font-size: 16px; }
  .card { padding: 10px; }
  .btn { padding: 6px 12px; font-size: 12px; }
  .table th, .table td { padding: 6px 8px; font-size: 12px; }
  .compact-budget th, .compact-budget td { font-size: 11px; padding: 4px 6px; }
}

/* ── Print ── */
@media print {
  .sidebar, .bottom-tabs, .more-menu-overlay, .compass-watermark,
  .demo-banner, .mode-tabs, .toast, .splash-screen { display: none !important; }
  .main { margin-left: 0 !important; padding: 20px !important; min-height: auto !important; }
  .app { display: block !important; }
  .card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ccc !important; background: #fff !important; }
  .page-header .btn { display: none !important; }
  body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .stat { border: 1px solid #ccc !important; background: #fff !important; }
  .tag, .disc-tag { border: 1px solid #999 !important; }
}

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.modal h3 { margin-bottom: 16px; font-size: 17px; color: var(--card-text); }

/* Progress bar */
.progress { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; animation: fadeIn 0.2s; box-shadow: var(--shadow); color: var(--card-text); }
</style>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useMemo, useCallback, useRef } = React;
const h = React.createElement;

// ── Budget Helpers ──────────────────────────────────────
function getEffectiveBudget(category, accountId) {
  if (!accountId || accountId === 'all') return category.budget || 0;
  if (category.accountBudgets && category.accountBudgets[accountId] !== undefined) return category.accountBudgets[accountId];
  return category.budget || 0;
}

// Convert per-payment budget to monthly equivalent
function getMonthlyBudget(category, accountId) {
  const amt = getEffectiveBudget(category, accountId);
  const freq = category.frequency || 'monthly';
  if (freq === 'biweekly') return amt * 2;
  if (freq === 'semimonthly') return amt * 2;
  if (freq === 'quarterly') return Math.round(amt / 3 * 100) / 100;
  if (freq === 'annual') return Math.round(amt / 12 * 100) / 100;
  return amt;
}

// Get forecast payment dates for a category in a given month
// Returns array of {day, amount} — could be 1 (monthly), 2 (semimonthly), 2-3 (biweekly)
function getForecastDates(category, accountId, year, month) {
  const amt = getEffectiveBudget(category, accountId);
  if (amt <= 0) return [];
  const freq = category.frequency || 'monthly';
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  if (freq === 'semimonthly') {
    const d1 = category.dueDay || 1;
    const d2 = category.dueDay2 || 15;
    return [
      {day: Math.min(d1, daysInMonth), amount: amt},
      {day: Math.min(d2, daysInMonth), amount: amt}
    ];
  }

  if (freq === 'biweekly') {
    if (!category.refDate) return [];
    const ref = new Date(category.refDate + 'T12:00:00');
    if (isNaN(ref.getTime())) return [];
    const results = [];
    // Walk forward/backward from refDate by 14-day increments to find dates in target month
    const monthStart = new Date(year, month, 1);
    const monthEnd = new Date(year, month + 1, 0);
    // Start from a point before the target month
    let d = new Date(ref);
    // Walk backward to before monthStart
    while (d > monthStart) d.setDate(d.getDate() - 14);
    // Now walk forward collecting dates in the target month
    while (d <= monthEnd) {
      d.setDate(d.getDate() + 14);
      if (d.getFullYear() === year && d.getMonth() === month) {
        results.push({day: d.getDate(), amount: amt});
      }
    }
    return results;
  }

  if (freq === 'quarterly') {
    const dueDay = category.dueDay;
    if (!dueDay) return [];
    // Quarterly: check if this month is a quarter month from refMonth (or default Jan/Apr/Jul/Oct)
    const refMonth = category.refDate ? new Date(category.refDate + 'T12:00:00').getMonth() : 0;
    if ((month - refMonth + 12) % 3 === 0) {
      return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
    }
    return [];
  }

  if (freq === 'annual') {
    const dueDay = category.dueDay;
    if (!dueDay) return [];
    // Annual: only in the reference month (or January by default)
    const refMonth = category.refDate ? new Date(category.refDate + 'T12:00:00').getMonth() : 0;
    if (month === refMonth) {
      return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
    }
    return [];
  }

  // monthly (default)
  const dueDay = category.dueDay;
  if (!dueDay) return [];
  return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
}

// ── Persistence ─────────────────────────────────────────
const STORE_KEY = 'budgetpro_v2';
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveState(state) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Demo Data ───────────────────────────────────────────
const DEMO_DATA = (()=>{
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth(); // 0-indexed
  const id = (()=>{ let n=1; return ()=>'demo-'+n++; })();
  const dt = (mo,day) => {
    const dd = new Date(y, mo, day);
    return dd.toISOString().split('T')[0];
  };

  const accounts = [
    { id:'acct-1', name:'Main Checking', type:'checking', startingBalance:2450.00, reconciledThrough:null, last4:'4821' },
    { id:'acct-2', name:'Savings', type:'savings', startingBalance:12800.00, reconciledThrough:null, last4:'9953' },
    { id:'acct-3', name:'Visa Credit Card', type:'credit_card', startingBalance:-4200.00, interestRate:22.99, minimumPayment:105, creditLimit:8000, reconciledThrough:null, last4:'5432', plannedPayment:200, paymentFrequency:'monthly' },
    { id:'acct-4', name:'Car Loan', type:'loan', startingBalance:-8500.00, interestRate:6.49, minimumPayment:285, reconciledThrough:null, last4:'7788', plannedPayment:350, paymentFrequency:'biweekly' }
  ];

  const categories = [
    { name:'Salary', group:'Income', catType:'fixed', budget:0 },
    { name:'Freelance', group:'Income', catType:'discretionary', budget:0 },
    { name:'Interest', group:'Income', catType:'fixed', budget:0 },
    { name:'Mortgage', group:'Housing', catType:'fixed', budget:1850 },
    { name:'Electric', group:'Utilities', catType:'fixed', budget:150 },
    { name:'Water', group:'Utilities', catType:'fixed', budget:45 },
    { name:'Internet', group:'Utilities', catType:'fixed', budget:75 },
    { name:'Phone', group:'Utilities', catType:'fixed', budget:85 },
    { name:'Car Payment', group:'Transport', catType:'fixed', budget:420 },
    { name:'Car Insurance', group:'Transport', catType:'fixed', budget:135 },
    { name:'Gas', group:'Transport', catType:'discretionary', budget:200 },
    { name:'Groceries', group:'Food', catType:'discretionary', budget:600 },
    { name:'Dining Out', group:'Food', catType:'discretionary', budget:250 },

// ── Format helpers ──────────────────────────────────────
const normalizeForMatch = (s) => s.toUpperCase().replace(/[^A-Z0-9\s]/g,'').replace(/\s+/g,' ').trim();
const _fb = ()=> atob('bWF0dEBtYWxsb3kta2lmb2xvLmNvbQ==');
const fmt = (n) => { const abs = '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); return n < 0 ? '('+abs+')' : abs; };
const fmtDate = (d) => { const dt=new Date(d); return (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear(); };

// Robust date parsing — extracts year/month/day without timezone shift
function parseDateParts(dateStr) {
  if(!dateStr) return null;
  const s = dateStr.trim();
  let m, d, y;
  // YYYY-MM-DD or YYYY/MM/DD
  let match = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(match) { y=+match[1]; m=+match[2]; d=+match[3]; }
  else {
    // MM/DD/YYYY or MM-DD-YYYY or M/D/YY
    match = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(match) { m=+match[1]; d=+match[2]; y=+match[3]; if(y<100) y+=2000; }
  }
  if(m && d && y && m>=1 && m<=12) return {year:y, month:m, day:d};
  return null;
}

// Get YYYY-MM string for grouping by month
function getYearMonth(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return null;
  return p.year+'-'+p.month.toString().padStart(2,'0');
}

// Get a proper local Date object from a date string
function safeDate(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return new Date(dateStr); // fallback
  return new Date(p.year, p.month-1, p.day);
}

  const prevMonthIdx = now.getMonth()===0 ? 11 : now.getMonth()-1;
  const prevYear = now.getMonth()===0 ? now.getFullYear()-1 : now.getFullYear();
  const prevYM = prevYear+'-'+String(prevMonthIdx+1).padStart(2,'0');
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const prevMonthName = monthNames[prevMonthIdx]+' '+prevYear;

  const expenseCats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
  const prevTxns = transactions.filter(t=>getYearMonth(t.date)===prevYM && t.amount<0);

  const reviewData = useMemo(()=>{
    return expenseCats.map(c=>{
      const actual = prevTxns.filter(t=>t.category===c.name).reduce((s,t)=>s+Math.abs(t.amount),0);
      return {name:c.name, group:c.group, catType:c.catType, budget:c.budget||0, actual:Math.round(actual*100)/100};
    }).filter(c=>c.budget>0||c.actual>0);
  },[]);

  const [adjustedBudgets, setAdjustedBudgets] = useState(()=>{
    const m = {};
    reviewData.forEach(c=>{ m[c.name] = c.budget; });
    return m;
  });

  const matchActuals = ()=>{
    const m = {};
    reviewData.forEach(c=>{ m[c.name] = Math.round(c.actual); });
    setAdjustedBudgets(m);
  };

  const totalBudget = reviewData.reduce((s,c)=>s+c.budget,0);
  const totalActual = reviewData.reduce((s,c)=>s+c.actual,0);
  const totalNew = reviewData.reduce((s,c)=>s+(adjustedBudgets[c.name]||0),0);

  return h(Modal,{onClose},
    h('h3',{style:{marginBottom:4}}, '📊 '+prevMonthName+' Budget Review'),
    h('p',{style:{fontSize:12,color:'var(--card-text2)',marginBottom:16}},
      'Compare your budgets against actual spending last month. Adjust if needed.'),

    // Summary row
    h('div',{style:{display:'flex',gap:12,marginBottom:14}},
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:'rgba(232,160,32,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:'var(--accent2)'}},fmt(totalBudget)),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},'Budget')
      ),
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:'rgba(224,80,80,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:'var(--red)'}},fmt(totalActual)),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},'Actual')
      ),
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:totalBudget>=totalActual?'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:totalBudget>=totalActual?'var(--green)':'var(--red)'}},
          (totalBudget>=totalActual?'+':'-')+fmt(Math.abs(totalBudget-totalActual))),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},totalBudget>=totalActual?'Under':'Over')
      )
    ),

    // Category table
    h('div',{style:{maxHeight:350,overflowY:'auto'}},
      h('table',{className:'table',style:{fontSize:12}},
        h('thead',null,h('tr',null,
          h('th',{style:{padding:'4px 6px'}},'Category'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'Budget'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'Actual'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'+/-'),
          h('th',{style:{textAlign:'right',padding:'4px 6px',width:80}},'New Budget')
        )),
        h('tbody',null, reviewData.map(c=>{
          const diff = c.budget - c.actual;
          return h('tr',{key:c.name,style:{background:diff<0?'rgba(224,80,80,0.05)':'transparent'}},
            h('td',{style:{padding:'4px 6px'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:6}},
                h('span',{style:{fontWeight:500}},c.name),
                h(TypeTag,{catType:c.catType})
              )
            ),
            h('td',{style:{textAlign:'right',padding:'4px 6px'}},fmt(c.budget)),
            h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:600}},fmt(c.actual)),
            h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:700,color:diff>=0?'var(--green)':'var(--red)'}},
              (diff>=0?'+':'-')+fmt(Math.abs(diff))),
            h('td',{style:{padding:'4px 6px'}},
              h('input',{className:'input',type:'number',value:adjustedBudgets[c.name]||0,
                onChange:e=>setAdjustedBudgets(prev=>({...prev,[c.name]:Math.max(0,+e.target.value)})),
                style:{width:'100%',padding:'3px 6px',fontSize:12,textAlign:'right'}
              })
            )
          );
        }))
      )
    ),

    // New total
    h('div',{style:{display:'flex',justifyContent:'flex-end',padding:'8px 6px',fontSize:12,fontWeight:600,color:'var(--card-text2)'}},
      'New total: ',h('span',{style:{color:'var(--accent2)',marginLeft:4}},fmt(totalNew))
    ),

    // Action buttons
    h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
      h('button',{className:'btn',onClick:onClose},'Keep Current'),
      h('button',{className:'btn',onClick:matchActuals},'Match Actuals'),
      h('button',{className:'btn primary',onClick:()=>{onUpdateBudgets(adjustedBudgets);onClose();}},'Save Changes')
    )
  );
}

// ── Main App ────────────────────────────────────────────
function App() {
  const saved = useMemo(()=>loadState(),[]);

  // URL mode override (check first — used by tour & mode init)
  const urlMode = useMemo(()=> new URLSearchParams(window.location.search).get('mode'), []);

  // Splash & Tour — tour only auto-starts via ?mode=demo URL (marketing site clicks)
  const [showSplash, setShowSplash] = useState(true);
  const [tourStep, setTourStep] = useState(()=> urlMode === 'demo' ? 0 : null);

  // ── License / Tier system ──
  const TIERS = useMemo(()=>({
    Starter: { limit:1, label:'Starter', forecast:false, dayByDay:false, review:false, yearView:false, debtPlanner:false, perAccountBudgets:false, paymentScheduling:false },
    Plus:    { limit:3, label:'Plus',    forecast:true,  dayByDay:false, review:true,  yearView:true,  debtPlanner:false, perAccountBudgets:true, paymentScheduling:false },
    Pro:     { limit:Infinity, label:'Pro', forecast:true, dayByDay:true, review:true, yearView:true, debtPlanner:true, perAccountBudgets:true, paymentScheduling:true }
  }),[]);
  const [license, setLicense] = useState(()=>{ try { return JSON.parse(localStorage.getItem('ambit_license'))||null; } catch{ return null; } });
  const [showLicenseGate, setShowLicenseGate] = useState(false);
  const [licenseDismissed, setLicenseDismissed] = useState(()=> localStorage.getItem('ambit_license_dismissed')==='1');
  const isLicensed = license && license.valid;
  const tier = isLicensed ? (TIERS[license.tier]||TIERS.Starter) : null;
  const accountLimit = tier ? tier.limit : 0;
  const API_BASE = 'https://ambitbudget.com';

  // Beta test keys — remove before public launch
  const BETA_KEYS = { 'AMBIT-KIFOLLOY-2026':'Pro' };

  const activateLicense = async (key) => {
    // Check for beta keys first (offline, no API call needed)
    const betaTier = BETA_KEYS[key.trim().toUpperCase()];
    if(betaTier) {
      const lic = {valid:true, key:key.trim().toUpperCase(), tier:betaTier, instance_id:'beta', at:new Date().toISOString()};
      localStorage.setItem('ambit_license', JSON.stringify(lic));
      setLicense(lic);
      setShowLicenseGate(false);
      setMode('mine'); setPage('dashboard');
      showToast('✅ Beta activated! Welcome to ' + betaTier + '.');
      return {success:true, tier:betaTier};
    }

    try {
      const res = await fetch(API_BASE+'/api/validate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({license_key:key.trim()})
      });
      const data = await res.json();
      if(data.activated) {
        const pName = (data.meta?.product_name || data.meta?.variant_name || '').toLowerCase();
        const tierName = pName.includes('pro') ? 'Pro' : pName.includes('plus') ? 'Plus' : 'Starter';
        const lic = {valid:true, key:key.trim(), tier:tierName, instance_id:data.instance?.id, at:new Date().toISOString()};
        localStorage.setItem('ambit_license', JSON.stringify(lic));
        setLicense(lic);
        setShowLicenseGate(false);
        setMode('mine'); setPage('dashboard');
        showToast('✅ Licensed! Welcome to ' + tierName + '.');
        return {success:true, tier:tierName};
      }
      return {success:false, error:data.error||'Invalid license key'};
    } catch(e) { return {success:false, error:'Connection failed. Check your internet and try again.'}; }
  };

  const deactivateLicense = () => {
    localStorage.removeItem('ambit_license');
    setLicense(null);
    setMode('demo'); setPage('dashboard');
    showToast('License deactivated.');
  };

  const [demoHidden, setDemoHidden] = useState(()=> urlMode ? false : localStorage.getItem('ambit_demo_hidden')==='1');
  const [mode, setMode] = useState(()=> {
    if(urlMode === 'demo') return 'demo';
    if(!isLicensed) return 'demo';
    return localStorage.getItem('ambit_demo_hidden')==='1' ? 'mine' : 'demo';
  });

  // ── "My Budget" state (persisted to localStorage) ──
  const [myAccounts, setMyAccounts] = useState(()=>{
    return (saved?.accounts || []).map(a => ({...a, startingBalance: a.startingBalance || 0, reconciledThrough: a.reconciledThrough || null, last4: a.last4 || ''}));
  });
  const [myCategories, setMyCategories] = useState(()=>{
    return (saved?.categories || []).map(c => ({...c, catType: normCatType(c)}));
  });
  const [myDictionary, setMyDictionary] = useState(saved?.dictionary || []);
  const [myTransactions, setMyTransactions] = useState(saved?.transactions || []);
  const [myGroups, setMyGroups] = useState(saved?.groups || DEFAULT_GROUPS);

  // ── Demo state (in-memory only, not persisted) ──
  const [demoAccounts, setDemoAccounts] = useState(DEMO_DATA.accounts);
  const [demoCategories, setDemoCategories] = useState(DEMO_DATA.categories);
  const [demoDictionary, setDemoDictionary] = useState(DEMO_DATA.dictionary);
  const [demoTransactions, setDemoTransactions] = useState(DEMO_DATA.transactions);
  const [demoGroups, setDemoGroups] = useState(DEFAULT_GROUPS);

  // ── Active data based on mode ──
  const isDemo = mode === 'demo';
  const accounts = isDemo ? demoAccounts : myAccounts;
  const setAccounts = isDemo ? setDemoAccounts : setMyAccounts;
  const categories = isDemo ? demoCategories : myCategories;
  const setCategories = isDemo ? setDemoCategories : setMyCategories;
  const dictionary = isDemo ? demoDictionary : myDictionary;
  const setDictionary = isDemo ? setDemoDictionary : setMyDictionary;
  const transactions = isDemo ? demoTransactions : myTransactions;
  const setTransactions = isDemo ? setDemoTransactions : setMyTransactions;
  const groups = isDemo ? demoGroups : myGroups;
  const setGroups = isDemo ? setDemoGroups : setMyGroups;

  const groupList = useMemo(()=>groups.map(g=>g.name),[groups]);
  const groupColors = useMemo(()=>{const m={};groups.forEach(g=>{m[g.name]=g.color;});return m;},[groups]);

  const [page, setPage] = useState('dashboard');
  const defaultAcct = localStorage.getItem('ambit_default_account') || 'all';
  const [moreOpen, setMoreOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [showReview, setShowReview] = useState(false);

  // Save "My Budget" data on change (never save demo data)
  useEffect(()=>{
    saveState({accounts: myAccounts, categories: myCategories, dictionary: myDictionary, transactions: myTransactions, groups: myGroups});
  },[myAccounts, myCategories, myDictionary, myTransactions, myGroups]);

  // One-time migration: fix orphaned positive transfer transactions missing their negative counterpart
  useEffect(()=>{
    if(mode !== 'mine' || localStorage.getItem('ambit_transfer_migration_v1')) return;
    const checkingAcct = myAccounts.find(a=>a.type==='checking');
    if(!checkingAcct || myTransactions.length===0) return;
    const catLookup = {};
    myCategories.forEach(c=>{catLookup[c.name]=c;});
    const orphaned = myTransactions.filter(t=>
      (t.catType==='transfer' || (catLookup[t.category] && catLookup[t.category].catType==='transfer'))
      && t.amount > 0 && !t.linkedTxnId && t.accountId !== checkingAcct.id
    );
    if(orphaned.length > 0) {
      const fixes = [];
      const updates = [];
      orphaned.forEach(t=>{
        const pairedId = Date.now()+'_'+Math.random().toString(36).slice(2,8)+'_mig';
        updates.push({...t, linkedTxnId: pairedId});
        fixes.push({
          id: pairedId, linkedTxnId: t.id,
          date: t.date, description: t.description,
          amount: -t.amount,
          cleanName: 'Transfer to ' + (myAccounts.find(a=>a.id===t.accountId)?.name||'Other'),
          category: t.category, group: t.group||'Other', catType:'transfer',
          accountId: checkingAcct.id
        });
      });
      setMyTransactions(prev=>{
        let arr = prev.map(t=>{const u=updates.find(u=>u.id===t.id); return u||t;});
        return [...arr, ...fixes];
      });
    }
    localStorage.setItem('ambit_transfer_migration_v1','done');
  },[mode]);

  // Monthly budget review — trigger once per month on first open in 'mine' mode
  useEffect(()=>{
    if(mode !== 'mine' || !isLicensed || !tier?.review) return;
    const now = new Date();
    const reviewKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    if(localStorage.getItem('ambit_review_month') === reviewKey) return;
    const prevMonth = now.getMonth(); // 0-indexed current getMonth() = previous month number (1-indexed)
    const prevYM = prevMonth===0
      ? (now.getFullYear()-1)+'-12'
      : now.getFullYear()+'-'+String(prevMonth).padStart(2,'0');
    const hasPrevData = myTransactions.some(t=>getYearMonth(t.date)===prevYM);
    if(hasPrevData) setShowReview(true);
  },[mode]);

  const showToast = (msg) => setToast(msg);

  // Derived: category lookup
  const catMap = useMemo(()=>{
    const m = {};
    categories.forEach(c => { m[c.name] = c; });
    return m;
  },[categories]);

  // Live-enriched transactions: always derive group/catType from current category settings
  const liveTxns = useMemo(()=>{
    return transactions.map(t => {
      const cat = catMap[t.category];
      if(cat) {
        return {...t, group: cat.group, catType: cat.catType};
      }
      return {...t, catType: t.catType || normCatType(t)};
    });
  },[transactions, catMap]);

  // Derived: categorize a description (normalize both sides to handle special chars)
  const categorize = useCallback((desc) => {
    const normalized = normalizeForMatch(desc);
    for (const rule of dictionary) {
      if (normalized.includes(normalizeForMatch(rule.keyword))) {
        const cat = catMap[rule.category];
        return { cleanName: rule.cleanName, category: rule.category, group: cat?.group||'Other', catType: cat?.catType||'discretionary' };
      }
    }
    return null;
  },[dictionary, catMap]);

  const navItems = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    { id:'import', icon:'📥', label:'Import' },
    { id:'transactions', icon:'📋', label:'Transactions' },
    { id:'budget', icon:'💰', label:'Budget' },
    { id:'debt', icon:'💳', label:'Debt Planner' },
    { id:'accounts', icon:'🏦', label:'Accounts' },
    { id:'categories', icon:'📂', label:'Categories' },
    { id:'dictionary', icon:'📖', label:'Payee Rules' },
  ];

  // Splash screen on first load
  if(showSplash) return h(SplashScreen, {onDone:()=>setShowSplash(false)});

  // License gate — full-screen on first launch (no license, no URL mode, not previously dismissed)
  if(!isLicensed && !urlMode && !licenseDismissed) {
    return h(LicenseGate, {
      onActivate: activateLicense,
      onCancel: ()=>{ localStorage.setItem('ambit_license_dismissed','1'); setLicenseDismissed(true); setMode('demo'); }
    });
  }

  return h('div',{className:'app'},
    // License gate modal (when triggered from "My Budget" click without license)
    showLicenseGate && !isLicensed && h(LicenseGate, {
      onActivate: activateLicense,
      onCancel: ()=>setShowLicenseGate(false)
    }),

    // Onboarding tour overlay
    tourStep !== null && h(OnboardingTour, {step:tourStep, setStep:setTourStep, onClose:()=>setTourStep(null)}),

    // Monthly budget review modal
    showReview && h(MonthlyReviewModal, {
      categories, transactions: myTransactions,
      onClose:()=>{
        const now = new Date();
        localStorage.setItem('ambit_review_month', now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
        setShowReview(false);
      },
      onUpdateBudgets:(updates)=>{
        setCategories(prev=>prev.map(c=>updates[c.name]!==undefined?{...c,budget:updates[c.name]}:c));
        showToast('✅ Budgets updated from review');
      }
    }),

    // Sidebar
    h('nav',{className:'sidebar'},
      h('div',{className:'logo', style:{display:'flex',alignItems:'center',gap:10}},
        h(ShieldLogo, {size:34}),
        h('div',null, 'Ambit', h('span',{style:{display:'block',fontSize:10,letterSpacing:1,textTransform:'uppercase',color:'var(--text2)',marginTop:1}},'Budget Pro'))
      ),
      // Mode tabs (hidden when demo is dismissed)
      !demoHidden && h('div',{className:'mode-tabs', role:'tablist'},
        h('div',{className:'mode-tab'+(mode==='demo'?' active':''), ...a11yClick(()=>{setMode('demo');setPage('dashboard');}), role:'tab', 'aria-selected':mode==='demo'},
          h('span',{className:'mode-dot demo','aria-hidden':'true'}), 'Demo'
        ),
        h('div',{className:'mode-tab'+(mode==='mine'?' active':''), ...a11yClick(()=>{
          if(!isLicensed){setShowLicenseGate(true);return;}
          setMode('mine');setPage('dashboard');
        }), role:'tab', 'aria-selected':mode==='mine'},
          h('span',{className:'mode-dot mine','aria-hidden':'true'}), 'My Budget'
        )
      ),
      navItems.map(n => h('div',{
        key:n.id, className:'nav-item'+(page===n.id?' active':''),
        ...a11yClick(()=>setPage(n.id)), 'aria-current':page===n.id?'page':undefined
      }, h('span',{className:'icon','aria-hidden':'true'},n.icon), h('span',null,n.label))),
      h('div',{className:'nav-sep'}),
      h('div',{className:'nav-item', ...a11yClick(()=>{
        if(confirm('Export all data as JSON?')) {
          const blob = new Blob([JSON.stringify({accounts,categories,dictionary,transactions},null,2)],{type:'application/json'});
          const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ambit-backup.json'; a.click();
        }
      })}, h('span',{className:'icon','aria-hidden':'true'},'💾'), h('span',null,'Export')),
      h('div',{className:'nav-item', ...a11yClick(()=>{
        const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';

          const f = e.target.files[0]; if(!f) return;
          const r = new FileReader();

              if(d.dictionary) setDictionary(d.dictionary);
              if(d.transactions) setTransactions(d.transactions);
              showToast('✅ Data imported successfully');
            } catch(e) { showToast('❌ Invalid file'); }
          };
          r.readAsText(f);
        };
        inp.click();

      h('div',{className:'nav-item', ...a11yClick(()=>{
        window.location.href='mailto:'+_fb()+'?subject=Ambit Budget Pro Feedback';
      })}, h('span',{className:'icon','aria-hidden':'true'},'💬'), h('span',null,'Feedback')),
      h('div',{className:'nav-sep'}),

            h('div',{style:{display:'flex',alignItems:'center',gap:6}},
              h('span',{style:{color:'var(--green)',fontSize:13}},'✓'),

            ),

              if(confirm('Deactivate your license? You\'ll return to demo mode.')) deactivateLicense();

          )
        : h('div',{className:'nav-item', style:{fontSize:12}, ...a11yClick(()=>setShowLicenseGate(true))},
            h('span',{className:'icon','aria-hidden':'true'},'🔑'), h('span',null,'Activate License')
          ),
      demoHidden && h('div',{className:'nav-sep'}),
      demoHidden && h('div',{className:'nav-item', style:{fontSize:12,opacity:0.5}, ...a11yClick(()=>{
        localStorage.removeItem('ambit_demo_hidden');
        setDemoHidden(false); setMode('demo'); setPage('dashboard');
      })}, h('span',{className:'icon','aria-hidden':'true'},'👁'), h('span',null,'Show Demo'))
    ),

    // Bottom Tab Bar (hidden on desktop via CSS, shown at ≤768px)

       {id:'budget',icon:'💰',label:'Budget'},
       {id:'_more',icon:'⋯',label:'More'}
      ].map(t => h('div',{
        key:t.id,
        className:'tab-item'+(t.id==='_more'? (moreOpen?' active':'') : (page===t.id?' active':'')),
        ...a11yClick(()=>{
          if(t.id==='_more'){ setMoreOpen(!moreOpen); }

        role:'tab', 'aria-selected':t.id==='_more'?moreOpen:page===t.id
      }, h('span',{className:'tab-icon','aria-hidden':'true'},t.icon), t.label))

    // More menu overlay (slides up from bottom tabs)
    moreOpen && h('div',{className:'more-menu-overlay', onClick:()=>setMoreOpen(false)},
      h('div',{className:'more-menu', onClick:e=>e.stopPropagation()},
        h('div',{style:{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,0.3)',margin:'0 auto 12px'}}),
        [{id:'debt',icon:'💳',label:'Debt Planner'},
         {id:'accounts',icon:'🏦',label:'Accounts'},
         {id:'categories',icon:'📂',label:'Categories'},
         {id:'dictionary',icon:'📖',label:'Payee Rules'}
        ].map(t => h('div',{
          key:t.id,
          className:'more-item'+(page===t.id?' active':''),
          ...a11yClick(()=>{ setPage(t.id); setMoreOpen(false); }), role:'menuitem'
        }, h('span',{'aria-hidden':'true'},t.icon), t.label)),
        h('div',{style:{borderTop:'1px solid rgba(255,255,255,0.1)',margin:'8px 0'}}),

// ── Categories Page ─────────────────────────────────────
function CategoriesPage({categories, setCategories, dictionary, showToast, groups, setGroups, groupList, groupColors}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [name, setName] = useState('');
  const [group, setGroup] = useState('Other');
  const [catType, setCatType] = useState('discretionary');
  const [budget, setBudget] = useState(0);

  const startEdit = (idx) => {
    const c = categories[idx];
    setName(c.name); setGroup(c.group); setCatType(c.catType||'discretionary'); setBudget(c.budget||0);
    setEditIdx(idx); setShowAdd(true);
  };

  const resetForm = () => { setName(''); setGroup('Other'); setCatType('discretionary'); setBudget(0); setEditIdx(null); setShowAdd(false); };

  // ── Group management state ──
  const [showGroupMgr, setShowGroupMgr] = useState(false);
  const [newGrpName, setNewGrpName] = useState('');
  const [newGrpColor, setNewGrpColor] = useState('#8b90a5');
  const [editGrpIdx, setEditGrpIdx] = useState(null);
  const [editGrpName, setEditGrpName] = useState('');
  const [editGrpColor, setEditGrpColor] = useState('');

  const addGroup = () => {
    if(!newGrpName.trim()) return;
    if(groups.find(g=>g.name.toLowerCase()===newGrpName.trim().toLowerCase())) { showToast('\u26A0\uFE0F Group already exists'); return; }
    setGroups(prev=>[...prev, {name:newGrpName.trim(), color:newGrpColor}]);
    showToast('\u2705 Group added: '+newGrpName.trim());
    setNewGrpName(''); setNewGrpColor('#8b90a5');
  };
  const startEditGrp = (idx) => { setEditGrpIdx(idx); setEditGrpName(groups[idx].name); setEditGrpColor(groups[idx].color); };
  const saveEditGrp = () => {
    if(editGrpIdx===null) return;
    const oldName = groups[editGrpIdx].name;
    const newName = editGrpName.trim();
    if(!newName) { setEditGrpIdx(null); return; }
    if(oldName!==newName && groups.find((g,i)=>i!==editGrpIdx && g.name.toLowerCase()===newName.toLowerCase())) { showToast('\u26A0\uFE0F Group name already exists'); return; }
    setGroups(prev=>prev.map((g,i)=>i===editGrpIdx?{...g, name:newName, color:editGrpColor}:g));
    if(oldName!==newName) setCategories(prev=>prev.map(c=>c.group===oldName?{...c, group:newName}:c));
    showToast('\u2705 Group updated: '+newName);
    setEditGrpIdx(null);
  };
  const deleteGroup = (idx) => {
    const g = groups[idx];
    if(g.name==='Income'||g.name==='Other') { showToast('\u26A0\uFE0F Cannot delete system group: '+g.name); return; }
    const inUse = categories.filter(c=>c.group===g.name).length;
    if(inUse>0) { showToast('\u26A0\uFE0F Cannot delete: '+inUse+' categories use "'+g.name+'". Reassign them first.'); return; }
    setGroups(prev=>prev.filter((_,i)=>i!==idx));
    showToast('\uD83D\uDDD1\uFE0F Deleted group: '+g.name);
  };

  // ── Bulk category import state ──
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const bulkImportCategories = () => {
    const lines = bulkText.split('\n').map(l=>l.trim()).filter(Boolean);
    const results = [];
    let newGroups = [];
    for(const line of lines) {
      const parts = line.split(/[,\t]+/).map(s=>s.trim());
      if(parts.length<1 || !parts[0]) continue;
      const catName = parts[0];
      const grp = parts[1] || 'Other';
      const typeRaw = (parts[2]||'discretionary').toLowerCase();
      const catType = typeRaw.startsWith('f') ? 'fixed' : typeRaw.startsWith('t') ? 'transfer' : 'discretionary';
      const bgt = parseFloat(parts[3]) || 0;
      if(categories.find(c=>c.name.toLowerCase()===catName.toLowerCase())) continue;
      if(results.find(r=>r.name.toLowerCase()===catName.toLowerCase())) continue;
      if(!groupList.includes(grp) && !newGroups.find(g=>g.name===grp)) newGroups.push({name:grp, color:'#8b90a5'});
      results.push({name:catName, group:grp, catType, budget:bgt});
    }
    if(newGroups.length>0) setGroups(prev=>[...prev, ...newGroups]);
    if(results.length>0) {
      setCategories(prev=>[...prev, ...results]);
      showToast('\u2705 Imported '+results.length+' categories'+(newGroups.length>0?' ('+newGroups.length+' new groups created)':''));
    } else {
      showToast('\u26A0\uFE0F No new categories to import (all duplicates or empty)');
    }
    setBulkText(''); setShowBulkImport(false);
  };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      setCategories(prev => prev.map((c,i) => i===editIdx ? {...c, name:name.trim(), group, catType, budget:+budget} : c));
      showToast('✅ Updated: ' + name.trim());
    } else {
      if(categories.find(c=>c.name.toLowerCase()===name.trim().toLowerCase())) {
        showToast('⚠️ Category already exists'); return;
      }
      setCategories(prev => [...prev, {name:name.trim(), group, catType, budget:+budget}]);
      showToast('✅ Added: ' + name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const c = categories[idx];
    const inUse = dictionary.filter(d=>d.category===c.name).length;
    if(inUse > 0 && !confirm(`"${c.name}" has ${inUse} payee rule(s). Delete anyway?`)) return;
    setCategories(prev => prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: ' + c.name);
  };

  const grouped = useMemo(()=>{
    const m = {};
    categories.forEach((c,i)=>{
      if(!m[c.group]) m[c.group]=[];
      m[c.group].push({...c, _idx:i});
    });
    Object.keys(m).forEach(g=>m[g].sort((a,b)=>a.name.localeCompare(b.name)));
    return m;
  },[categories]);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header', style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📂 Categories', h(InfoPill,{text:'Organize your spending into categories (e.g., Groceries, Rent) and groups (e.g., Food, Housing). Set each as Income, Fixed, Discretionary, or Transfer. Budget amounts are set on the Budget page.'})),
        h('p',null,'Define your spending categories and assign them to groups.')
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
        h('button',{className:'btn primary', onClick:()=>{resetForm();setShowAdd(true);}}, '+ New Category'),
        h('button',{className:'btn', onClick:()=>setShowBulkImport(true)}, '\uD83D\uDCE5 Import'),
        h('button',{className:'btn'+(showGroupMgr?' primary':''), onClick:()=>setShowGroupMgr(!showGroupMgr)}, showGroupMgr?'Hide Groups':'Manage Groups')
      )
    ),

    h('div',{className:'stats'},
      h(Stat, {label:'Categories', value:categories.length, color:'var(--accent2)'}),
      h(Stat, {label:'Groups', value:groups.length, color:'var(--blue)'}),
      h(Stat, {label:'Discretionary', value:categories.filter(c=>c.catType==='discretionary').length, color:'var(--yellow)'}),
      h(Stat, {label:'Fixed', value:categories.filter(c=>c.catType==='fixed').length, color:'var(--blue)'}),
      h(Stat, {label:'Transfer', value:categories.filter(c=>c.catType==='transfer').length, color:'var(--pink)'})
    ),

    // ── Group Management Card ──
    showGroupMgr && h('div',{className:'card',style:{marginBottom:14}},
      h('h3',{style:{marginBottom:12}},'\uD83C\uDFA8 Manage Groups'),
      h('table',{className:'table'},
        h('thead',null, h('tr',null,
          h('th',{style:{width:30}},'Color'), h('th',null,'Name'), h('th',null,'Categories'), h('th',{style:{width:100}},null)
        )),
        h('tbody',null,
          groups.map((g,i)=>
            h('tr',{key:g.name},
              h('td',null,
                editGrpIdx===i
                  ? h('div',{style:{display:'flex',gap:3,flexWrap:'wrap'}},
                      COLOR_PRESETS.map(c=>h('div',{key:c,onClick:()=>setEditGrpColor(c),style:{width:16,height:16,borderRadius:'50%',background:c,cursor:'pointer',border:editGrpColor===c?'2px solid white':'2px solid transparent'}}))
                    )
                  : h('div',{style:{width:16,height:16,borderRadius:'50%',background:g.color}})
              ),
              h('td',null,
                editGrpIdx===i
                  ? h('input',{className:'input',value:editGrpName,onChange:e=>setEditGrpName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')saveEditGrp();if(e.key==='Escape')setEditGrpIdx(null);},style:{fontSize:12,padding:'3px 6px',width:120},autoFocus:true,disabled:g.name==='Income'||g.name==='Other'})
                  : h('span',{style:{fontWeight:500}},g.name, (g.name==='Income'||g.name==='Other') && h('span',{style:{fontSize:10,color:'var(--text2)',marginLeft:6}},'(system)'))
              ),
              h('td',{style:{fontSize:12,color:'var(--text2)'}}, categories.filter(c=>c.group===g.name).length),
              h('td',null,
                editGrpIdx===i
                  ? h('div',{style:{display:'flex',gap:4}},
                      h('button',{className:'btn sm',onClick:saveEditGrp},'\u2713'),
                      h('button',{className:'btn sm',onClick:()=>setEditGrpIdx(null)},'\u2717')
                    )
                  : h('div',{style:{display:'flex',gap:4}},
                      h('button',{className:'btn sm',onClick:()=>startEditGrp(i)},'\u270E'),
                      g.name!=='Income' && g.name!=='Other' && h('button',{className:'table del-btn',onClick:()=>deleteGroup(i)},'\u00D7')

            )
          ),
          // Add new group row
          h('tr',null,
            h('td',null,
              h('div',{style:{display:'flex',gap:3,flexWrap:'wrap'}},
                COLOR_PRESETS.slice(0,7).map(c=>h('div',{key:c,onClick:()=>setNewGrpColor(c),style:{width:14,height:14,borderRadius:'50%',background:c,cursor:'pointer',border:newGrpColor===c?'2px solid white':'2px solid transparent'}}))
              )
            ),
            h('td',null, h('input',{className:'input',value:newGrpName,onChange:e=>setNewGrpName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')addGroup();},placeholder:'New group name...',style:{fontSize:12,padding:'3px 6px',width:140}})),
            h('td',null),
            h('td',null, h('button',{className:'btn sm green',onClick:addGroup,disabled:!newGrpName.trim()},'+'))
          )
        )
      )

    categories.length === 0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'📂'),

        )
      : Object.entries(grouped).map(([grp, cats]) =>

    showAdd && h(Modal, {onClose:resetForm},
      h('h3',null, editIdx!==null ? '✏️ Edit Category' : '➕ New Category'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},

// ── Dictionary (Payee Rules) Page ───────────────────────
function DictionaryPage({dictionary, setDictionary, categories, showToast, groupColors}) {
  const [keyword, setKeyword] = useState('');
  const [cleanName, setCleanName] = useState('');
  const [category, setCategory] = useState('');
  const [dueDay, setDueDay] = useState('');
  const [frequency, setFrequency] = useState('monthly');
  const [editDueDayIdx, setEditDueDayIdx] = useState(null);
  const [editDueDayVal, setEditDueDayVal] = useState('');
  const [filter, setFilter] = useState('');
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const add = () => {
    if(!keyword.trim()||!cleanName.trim()||!category) return;
    if(dictionary.find(d=>d.keyword.toUpperCase()===keyword.trim().toUpperCase())) {
      showToast('⚠️ Keyword already exists'); return;
    }
    const dd = parseInt(dueDay);
    const entry = {keyword:keyword.trim().toUpperCase(), cleanName:cleanName.trim(), category};
    if(dd>=1 && dd<=31) entry.dueDay = dd;
    if(frequency && frequency!=='monthly') entry.frequency = frequency;
    setDictionary(prev=>[...prev, entry]);
    setKeyword(''); setCleanName(''); setDueDay(''); setFrequency('monthly');
    showToast('✅ Rule added');
  };

  const del = (idx) => {
    setDictionary(prev=>prev.filter((_,i)=>i!==idx));
  };

  const bulkImport = () => {
    const lines = bulkText.trim().split('\n').filter(l=>l.trim());
    let added=0, skipped=0;
    const existing = new Set(dictionary.map(d=>d.keyword.toUpperCase()));
    const newRules = [];
    for(const line of lines) {
      const parts = line.split(',').map(s=>s.trim());
      if(parts.length>=3) {
        const kw = parts[0].toUpperCase();
        if(!existing.has(kw)) {
          const rule = {keyword:kw, cleanName:parts[1], category:parts[2]};
          if(parts[3] && parseInt(parts[3])>=1 && parseInt(parts[3])<=31) rule.dueDay = parseInt(parts[3]);
          newRules.push(rule);
          existing.add(kw);
          added++;
        } else { skipped++; }
      } else { skipped++; }
    }
    setDictionary(prev=>[...prev,...newRules]);

// ── Smart CSV/TSV Parser ────────────────────────────────
function parseDelimitedLine(line, delimiter) {
  const result = [];
  let current = '';
  let inQuotes = false;
  let inParens = false;
  for(let i=0; i<line.length; i++) {
    const ch = line[i];
    if(ch==='"') { inQuotes=!inQuotes; }
    else if(ch==='(' && !inQuotes) { inParens=true; current+=ch; }
    else if(ch===')' && !inQuotes && inParens) { inParens=false; current+=ch; }
    else if(ch===delimiter && !inQuotes && !inParens) { result.push(current.trim()); current=''; }
    else { current+=ch; }
  }
  result.push(current.trim());
  return result;
}

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0] || '';
  const tabs = (firstLine.match(/\t/g) || []).length;
  const commas = (firstLine.match(/,/g) || []).length;
  return tabs >= commas && tabs > 0 ? '\t' : ',';
}

function looksLikeDate(val) {
  if(!val) return false;
  const s = val.trim();
  // MM/DD/YYYY, YYYY-MM-DD, MM-DD-YYYY, M/D/YYYY etc
  return /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(s) || /^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(s);
}

function looksLikeAmount(val) {
  if(!val) return false;
  const s = val.trim().replace(/[$,"\s]/g, '');
  return /^-?\d+\.?\d*$/.test(s) || /^\(-?\d+\.?\d*\)$/.test(s);
}

function parseAmount(val) {
  if(!val) return NaN;
  let s = val.trim().replace(/[$,"\s]/g, '');
  // Handle parentheses as negative: (100.00) -> -100.00
  if(/^\((.+)\)$/.test(s)) { s = '-' + s.replace(/[()]/g, ''); }
  return parseFloat(s);
}

// Auto-detect which columns are date, description, amount
function detectColumns(headers, sampleRows) {
  const result = { dateCol: -1, descCol: -1, amountCol: -1, debitCol: -1, creditCol: -1 };
  const numCols = headers.length;
  const headersLower = headers.map(h => h.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim());

  // Pass 1: Find date column first (most specific)
  for(let i=0; i<numCols; i++) {
    const h = headersLower[i];
    if(h.includes('date') || h==='posted' || h==='postdate') { result.dateCol=i; break; }
  }

  // Pass 2: Find amount / debit / credit columns
  for(let i=0; i<numCols; i++) {
    if(i===result.dateCol) continue;
    const h = headersLower[i];
    if(result.amountCol<0 && (h==='amount' || h==='total' || h==='sum')) result.amountCol=i;
    if(result.debitCol<0 && (h==='debit' || h==='withdrawal' || h==='withdrawals' || h==='debits')) result.debitCol=i;
    if(result.creditCol<0 && (h==='credit' || h==='deposit' || h==='deposits' || h==='credits')) result.creditCol=i;
  }

  // Pass 3: Find description column — skip columns already assigned
  const usedCols = new Set([result.dateCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
  for(let i=0; i<numCols; i++) {
    if(usedCols.has(i)) continue;
    const h = headersLower[i];
    if(h.includes('description') || h.includes('payee') || h.includes('memo') || h==='name' ||
       h.includes('merchant') || h.includes('narrative') || h.includes('details')) {
      result.descCol=i; break;
    }
  }

  // Pass 4: If description still not found, pick first unused text-like column
  if(result.descCol<0) {
    for(let i=0; i<numCols; i++) {
      if(usedCols.has(i)) continue;
      // Check sample data — if most values are long text strings, it's likely description
      if(sampleRows.length > 0) {
        const vals = sampleRows.map(r => r[i] || '');
        const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;
        if(textCount >= sampleRows.length * 0.5) { result.descCol=i; break; }
      }
    }
  }

  // Pass 5: Content-based fallback for any still-missing columns
  if(sampleRows.length > 0) {
    const allUsed = new Set([result.dateCol, result.descCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
    for(let col=0; col<numCols; col++) {
      if(allUsed.has(col)) continue;
      const vals = sampleRows.map(r => r[col] || '');
      const dateCount = vals.filter(v => looksLikeDate(v)).length;
      const numCount = vals.filter(v => looksLikeAmount(v)).length;
      const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;

      if(result.dateCol<0 && dateCount >= sampleRows.length * 0.7) { result.dateCol=col; allUsed.add(col); continue; }
      if(result.descCol<0 && textCount >= sampleRows.length * 0.5) { result.descCol=col; allUsed.add(col); continue; }
      if(result.amountCol<0 && result.debitCol<0 && numCount >= sampleRows.length * 0.5) { result.amountCol=col; allUsed.add(col); continue; }
    }
  }

  return result;
}

// ── Unmatched Row Translator ────────────────────────────
function UnmatchedRow({txn, index, categories, setCategories, showToast, onResolve, onSkip, groupList}) {
  const [expanded, setExpanded] = useState(false);
  const [keyword, setKeyword] = useState('');
  const [cleanName, setCleanName] = useState('');
  const [category, setCategory] = useState('');
  const [showNewCat, setShowNewCat] = useState(false);
  const [newCatName, setNewCatName] = useState('');
  const [newCatGroup, setNewCatGroup] = useState('Other');
  const [newCatDisc, setNewCatDisc] = useState('discretionary');

  // Auto-suggest keyword from description
  useEffect(()=>{
    if(!keyword && txn.description) {
      const desc = txn.description.toUpperCase();
      // Check for masked account numbers (e.g. XXXXX3989, ****1234, X1234)
      const acctMatch = desc.match(/[X*]{2,}\d{3,}/i);
      if(acctMatch) {
        // Use the account number pattern as keyword — most specific for transfers
        setKeyword(acctMatch[0]);
        setCleanName('Transfer ' + acctMatch[0].slice(-4));
      } else {
        const words = desc.replace(/[^A-Z0-9\s]/g,'').trim().split(/\s+/);
        const stopWords = new Set(['THE','A','AN','OF','IN','AT','TO','FOR','ON','BY','WITH','AND','OR','FROM','ACH','POS','DEBIT','CREDIT','PURCHASE','CARD','PAYMENT','TRANSACTION','CHECKCARD','ONLINE','TRANSFER','WITHDRAWAL','DEPOSIT']);
        const meaningful = words.filter(w=>!stopWords.has(w) && w.length>1);
        const suggested = meaningful.slice(0,2).join(' ');
        setKeyword(suggested);
        if(suggested) {
          setCleanName(suggested.split(' ').map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' '));
        }
      }
    }
  },[txn.description]);

  const handleCatChange = (val) => {
    if(val==='__new__') { setShowNewCat(true); setCategory(''); }
    else { setCategory(val); setShowNewCat(false); }
  };

  const createCategory = () => {
    if(!newCatName.trim()) return;
    if(categories.find(c=>c.name.toLowerCase()===newCatName.trim().toLowerCase())) {
      showToast('⚠️ Category already exists'); return;
    }
    setCategories(prev=>[...prev, {name:newCatName.trim(), group:newCatGroup, catType:newCatDisc, budget:0}]);
    setCategory(newCatName.trim());
    setShowNewCat(false);
    setNewCatName('');
    showToast('✅ Category created: '+newCatName.trim());
  };

  const canSave = keyword.trim() && cleanName.trim() && category;

  return h('div',{style:{borderTop:index?'1px solid rgba(232,160,32,0.15)':'none'}},
    // Summary row
    h('div',{style:{display:'flex',gap:8,padding:'8px 10px',alignItems:'center',fontSize:12,cursor:'pointer'},onClick:()=>setExpanded(!expanded)},
      h('span',{style:{color:'var(--yellow)',fontSize:14,width:18}}, expanded?'▼':'▶'),
      h('span',{style:{minWidth:75,color:'var(--text2)'}},txn.date),
      h('span',{style:{flex:1,fontWeight:500}},txn.description),
      h('span',{style:{fontWeight:600}}, (txn.amount>=0?'+':'')+fmt(txn.amount)),
      !expanded && h('button',{className:'btn sm primary',onClick:e=>{e.stopPropagation();setExpanded(true);},style:{fontSize:11,padding:'3px 8px'}},'Translate')
    ),

    // Expanded translator form
    expanded && h('div',{style:{padding:'6px 10px 12px 28px',background:'rgba(232,160,32,0.03)'}},
      h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:6}},
        'Raw: ', h('code',{style:{background:'var(--surface2)',padding:'1px 4px',borderRadius:3,fontSize:10}}, txn.description)
      ),
      h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-keyword',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Keyword (for matching)'),
          h('input',{id:'trans-keyword',className:'input',value:keyword,onChange:e=>setKeyword(e.target.value),
            placeholder:'e.g. WALMART',style:{width:'100%',fontSize:12,padding:'5px 8px'}})
        ),
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-cleanname',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Clean Name'),
          h('input',{id:'trans-cleanname',className:'input',value:cleanName,onChange:e=>setCleanName(e.target.value),
            placeholder:'e.g. Walmart',style:{width:'100%',fontSize:12,padding:'5px 8px'}})
        ),
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-category',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Category'),
          h('select',{id:'trans-category',className:'input',value:category,onChange:e=>handleCatChange(e.target.value),
            style:{width:'100%',fontSize:12,padding:'5px 8px'}},
            h('option',{value:''},'Select...'),
            [...categories].sort((a,b)=>a.name.localeCompare(b.name)).map(c=>h('option',{key:c.name,value:c.name},c.name)),
            h('option',{value:'__new__',style:{fontWeight:600,color:'#e8a020'}},'＋ New Category...')
          )
        ),
        h('button',{className:'btn sm green',onClick:()=>onResolve(keyword.trim(), cleanName.trim(), category),
          disabled:!canSave,style:{fontSize:11}},'✓ Save Rule'),
        h('button',{className:'btn sm',onClick:()=>setExpanded(false),style:{fontSize:11}},'Skip')
      ),

      // Inline new category creation
      showNewCat && h('div',{style:{marginTop:8,padding:10,border:'1px dashed var(--accent)',borderRadius:8,background:'rgba(232,160,32,0.04)'}},
        h('div',{style:{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:8}},'➕ Quick Create Category'),
        h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},

          ),
