            h('select',{id:'trans-newcat-group',className:'input',value:newCatGroup,onChange:e=>setNewCatGroup(e.target.value),
              style:{width:'100%',fontSize:12,padding:'5px 8px'}},
              groupList.map(g=>h('option',{key:g,value:g},g))
            )
          ),
          h('label',{style:{fontSize:11,display:'flex',alignItems:'center',gap:4,cursor:'pointer',whiteSpace:'nowrap'}},
            h('select',{className:'input',value:newCatDisc,onChange:e=>setNewCatDisc(e.target.value),style:{fontSize:11,padding:'3px 6px'}},
              h('option',{value:'discretionary'},'Disc'),
              h('option',{value:'fixed'},'Fixed'),
              h('option',{value:'transfer'},'Transfer')
            )
          ),
          h('button',{className:'btn sm primary',onClick:createCategory,disabled:!newCatName.trim(),style:{fontSize:11}},'Create'),
          h('button',{className:'btn sm',onClick:()=>setShowNewCat(false),style:{fontSize:11}},'Cancel')
        )
      )
    )
  );
}

// ── Import Page ─────────────────────────────────────────
function ImportPage({transactions, setTransactions, dictionary, setDictionary, categories, setCategories, catMap, categorize, showToast, accounts, groupList, groups, setGroups, groupColors}) {
  const [csv, setCsv] = useState('');
  const [preview, setPreview] = useState(null);
  const [parsedData, setParsedData] = useState(null);
  const [colMap, setColMap] = useState({dateCol:-1, descCol:-1, amountCol:-1, debitCol:-1, creditCol:-1});
  const [importMode, setImportMode] = useState('paste');
  const [selectedAccount, setSelectedAccount] = useState('');
  const [transferDestAcct, setTransferDestAcct] = useState('');
  const fileRef = useRef(null);

  // Step 1: Parse raw text into headers+rows and auto-detect columns
  const parseRaw = (text) => {
    const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length) { showToast('❌ No data found'); return; }

    const delimiter = detectDelimiter(text);
    const allParsed = lines.map(l => parseDelimitedLine(l, delimiter));

    const firstRow = allParsed[0];
    const isHeader = firstRow.some(v => {
      const vl = v.toLowerCase();
      return vl.includes('date') || vl.includes('description') || vl.includes('amount') ||
             vl.includes('payee') || vl.includes('memo') || vl.includes('debit') || vl.includes('credit') ||
             vl.includes('transaction') || vl.includes('posted') || vl.includes('withdrawal') || vl.includes('deposit');
    });

    const headers = isHeader ? firstRow : firstRow.map((_,i) => 'Column '+(i+1));
    const dataRows = isHeader ? allParsed.slice(1) : allParsed;

    const sampleRows = dataRows.slice(0, Math.min(10, dataRows.length));
    const detected = detectColumns(headers, sampleRows);

    setParsedData({headers, rows:dataRows, delimiter, detected});
    setColMap(detected);
    setPreview(null);
    showToast(`✅ Parsed ${dataRows.length} rows (${delimiter==='\t'?'tab':'comma'}-delimited, ${headers.length} columns)`);
  };

  // Build a map of last4 digits to account for transfer auto-detection
  const last4Map = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{
      if(a.last4 && a.last4.length>=3) m[a.last4] = a;
    });
    return m;
  },[accounts]);

  // Detect if a description looks like a transfer to a known account (by last4 digits)
  const detectTransferDest = useCallback((desc) => {
    const upper = desc.toUpperCase();
    // Look for transfer-like keywords
    if(!/TRANSFER|XFER|TRNSFR|ONLINE.*TO|ACH.*TO/i.test(upper)) return null;
    // Look for masked account number patterns containing a known last4
    for(const [digits, acct] of Object.entries(last4Map)) {
      // Match patterns like XXXXX3989, ****3989, or just the 4 digits at end of a number sequence
      const pattern = new RegExp('[X*]+' + digits + '|\\b\\d*' + digits + '\\b');
      if(pattern.test(upper) || upper.includes(digits)) {
        return acct;
      }
    }
    return null;
  },[last4Map]);

  // Step 2: Build transactions from parsed data + column mapping
  const buildPreview = () => {
    if(!parsedData) return;
    if(!selectedAccount) { showToast('⚠️ Please select an account first'); return; }
    const {rows} = parsedData;
    const {dateCol, descCol, amountCol, debitCol, creditCol} = colMap;

    if(dateCol<0 || descCol<0 || (amountCol<0 && debitCol<0)) {
      showToast('❌ Please map Date, Description, and Amount columns'); return;
    }

    const existingKeys = new Set(transactions.map(t=>t.date+t.description+t.amount));
    let matched=[], unmatched=[], dupes=0, errors=0;
    let autoTransfers = 0;
    let pendingMatched = 0;

    // Build list of pending transactions for matching
    const pendingTxns = transactions.filter(t=>t.pending && t.accountId===selectedAccount);
    const matchedPendingIds = new Set();

    // Find a transfer category to use for auto-detected transfers
    const transferCat = categories.find(c=>c.catType==='transfer');

    for(const row of rows) {
      const dateStr = (row[dateCol]||'').trim();
      const desc = (row[descCol]||'').trim();
      if(!dateStr || !desc) { errors++; continue; }

      let amt;
      if(amountCol >= 0) {
        amt = parseAmount(row[amountCol]);
      } else {
        const debit = debitCol>=0 ? parseAmount(row[debitCol]) : 0;
        const credit = creditCol>=0 ? parseAmount(row[creditCol]) : 0;
        if(!isNaN(debit) && debit > 0) amt = -Math.abs(debit);
        else if(!isNaN(credit) && credit > 0) amt = Math.abs(credit);
        else amt = NaN;
      }
      if(isNaN(amt)) { errors++; continue; }

      const key = dateStr+desc+amt;
      if(existingKeys.has(key)) { dupes++; existingKeys.add(key); continue; }
      existingKeys.add(key);

      // Check if this imported row matches a pending transaction
      const pendingMatch = pendingTxns.find(pt=>{
        if(matchedPendingIds.has(pt.id)) return false;
        // Amount must match exactly (or within $0.01)
        if(Math.abs(pt.amount - amt) > 0.011) return false;
        // Date within 14 days OR description similarity
        const dateDiff = Math.abs(safeDate(pt.date) - safeDate(dateStr));
        const within14Days = dateDiff <= 14*86400000;
        const descMatch = desc.toLowerCase().includes(pt.cleanName.toLowerCase()) || pt.cleanName.toLowerCase().includes(desc.toLowerCase().substring(0,10));
        return within14Days || descMatch;
      });
      if(pendingMatch) {
        matchedPendingIds.add(pendingMatch.id);
        pendingMatched++;
        // This will update the existing pending txn on confirm, skip adding a new one
        matched.push({_matchesPendingId:pendingMatch.id, date:dateStr, description:desc, amount:amt, cleanName:pendingMatch.cleanName, category:pendingMatch.category, group:pendingMatch.group, catType:pendingMatch.catType, accountId:selectedAccount});
        continue;
      }

      const match = categorize(desc);
      let txn;

      if(match) {
        txn = {
          id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
          date: dateStr, description: desc, amount: amt,
          cleanName: match.cleanName, category: match.category,
          group: match.group, catType: match.catType,
          accountId: selectedAccount
        };
        matched.push(txn);
      } else {
        // Check for auto-detectable transfer by last4 match
        const destAcct = detectTransferDest(desc);
        if(destAcct && destAcct.id !== selectedAccount && transferCat) {
          txn = {
            id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
            date: dateStr, description: desc, amount: amt,
            cleanName: 'Transfer to ' + destAcct.name,
            category: transferCat.name,
            group: transferCat.group || 'Other',
            catType: 'transfer',
            accountId: selectedAccount,
            _autoTransferDest: destAcct.id // flag for pairing
          };
          matched.push(txn);
          autoTransfers++;
          // Auto-set the transfer destination if not already set
          if(!transferDestAcct) setTransferDestAcct(destAcct.id);
        } else {
          txn = {
            id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
            date: dateStr, description: desc, amount: amt,
            cleanName: desc, category: 'Uncategorized',
            group: 'Other', catType: 'discretionary',
            accountId: selectedAccount
          };
          unmatched.push(txn);
        }
      }
    }

    if(autoTransfers > 0) {
      showToast(`\u2705 Auto-detected ${autoTransfers} transfer(s) by account number`);
    }
    if(pendingMatched > 0) {
      showToast(`\u23F3 Matched ${pendingMatched} pending transaction(s) with imported data`);
    }
    setPreview({matched, unmatched, dupes, errors, autoTransfers, pendingMatched, total: matched.length+unmatched.length+dupes+errors});
  };

  const confirmImport = () => {
    if(!preview) return;

    // Separate pending matches from new transactions
    const pendingUpdates = preview.matched.filter(t=>t._matchesPendingId);
    const newMatched = preview.matched.filter(t=>!t._matchesPendingId);
    const all = [...newMatched, ...preview.unmatched];

    // Build pending update map for clearing matched pending transactions
    const pendingUpdateMap = {};
    pendingUpdates.forEach(pu=>{ pendingUpdateMap[pu._matchesPendingId] = pu; });

    // For transfer-type transactions, create paired entries on the destination account
    // Use auto-detected destination if available, otherwise fall back to manual selection
    const paired = [];

    for(const txn of all) {
      const cat = catMap[txn.category];
      const isTransfer = txn.catType==='transfer' || (cat && cat.catType==='transfer');
      if(isTransfer) {
        // Only pair if we have a confirmed destination:
        // 1. Auto-detected via last4 match in description (from buildPreview)
        // 2. User explicitly selected a destination in the transfer picker
        // 3. Last4 match found in description as fallback
        let destId = txn._autoTransferDest || null;
        if(!destId) {
          // Scan description for any account's last4 — only pair if we find a match
          for(const acct of accounts) {
            if(acct.id !== selectedAccount && acct.last4 && acct.last4.length >= 3 && txn.description.toUpperCase().includes(acct.last4)) {
              destId = acct.id;
              break;
            }
          }
        }
        // Only fall back to manual selection if description has transfer-like keywords
        if(!destId && transferDestAcct && /TRANSFER|XFER|TRNSFR|ONLINE.*TO/i.test(txn.description)) {
          destId = transferDestAcct;
        }
        const dest = destId ? accounts.find(a=>a.id===destId) : null;
        if(dest) {
          const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
          txn.linkedTxnId = linkedId;
          paired.push({
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount, // reverse: outflow on source = inflow on dest
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===selectedAccount)?.name||'Other')),
          });
        }
        delete txn._autoTransferDest; // clean up temp flag before saving
      }
    }

    // Debug: log transfer handling
    const debugTransfers = all.filter(t=>t.catType==='transfer' || /TRANSFER/i.test(t.description));
    if(debugTransfers.length > 0) {
      console.log('=== TRANSFER DEBUG ===');
      console.log('Transfers in all[]:', debugTransfers.map(t=>({id:t.id, desc:t.description, amt:t.amount, acct:t.accountId, linked:t.linkedTxnId})));
      console.log('Paired[]:', paired.map(t=>({id:t.id, desc:t.description, amt:t.amount, acct:t.accountId, linked:t.linkedTxnId})));
      console.log('Total all:', all.length, 'Total paired:', paired.length);
    }
    setTransactions(prev=>{
      // First, update any matched pending transactions (clear flag, update date/desc from bank)
      let updated = prev;
      if(pendingUpdates.length > 0) {
        updated = updated.map(t=>{
          const upd = pendingUpdateMap[t.id];
          if(upd) return {...t, pending:false, date:upd.date, description:upd.description};
          return t;
        });
      }
      // Then add new transactions
      const result = [...updated,...all,...paired];
      if(debugTransfers.length > 0) console.log('Final transaction count:', result.length, 'Transfer txns in result:', result.filter(t=>t.catType==='transfer'||/TRANSFER/i.test(t.description)).length);
      return result;
    });
    const pairMsg = paired.length > 0 ? ` (${paired.length} paired transfers created)` : '';
    const pendMsg = pendingUpdates.length > 0 ? `, ${pendingUpdates.length} pending cleared` : '';
    showToast(`\u2705 Imported ${all.length} transactions${pairMsg}${pendMsg}`);
    setCsv(''); setPreview(null); setParsedData(null);
  };

  // File upload handler
  const handleFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setCsv(text);
      parseRaw(text);
    };
    reader.readAsText(file);
    // Reset so same file can be re-selected
    e.target.value = '';
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header'},
      h('h2',null,'📥 Import Transactions', h(InfoPill,{text:'Import bank transactions by pasting from Excel/CSV or uploading a file. The system auto-matches payees to your rules and categories.'})),
      h('p',null,'Paste data from Excel or upload a bank CSV file. Columns are auto-detected.')
    ),

    h('div',{className:'import-layout',style:{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}},
      // Left: Main import area
      h('div',{style:{flex:2,minWidth:340}},

        // Mode toggle
        h('div',{style:{display:'flex',gap:8,marginBottom:16}},
          h('button',{className:'btn'+(importMode==='paste'?' primary':''),onClick:()=>setImportMode('paste')},'📋 Paste Data'),
          h('button',{className:'btn'+(importMode==='file'?' primary':''),onClick:()=>setImportMode('file')},'📂 Upload File')
        ),

        // Account selector
        h('div',{className:'card',style:{marginBottom:16,padding:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},
            h('span',{style:{fontSize:13,fontWeight:600}},'🏦 Import to Account:'),
            accounts.length > 0
              ? h('select',{className:'input',value:selectedAccount,onChange:e=>setSelectedAccount(e.target.value),
                  style:{flex:1,maxWidth:220}},
                  h('option',{value:''},'Select account...'),
                  accounts.map(a=>h('option',{key:a.id,value:a.id}, a.name+' ('+a.type+')'))
                )
              : h('span',{style:{fontSize:12,color:'var(--text2)'}},'No accounts yet — create one on the Accounts page first.'),
            !selectedAccount && accounts.length>0 && h('span',{style:{fontSize:11,color:'var(--yellow)'}},'⚠️ Required')
          )
        ),

        // Input card
        h('div',{className:'card'},
          importMode==='paste'
            ? h('div',null,
                h('h3',null, h('span',{className:'icon'},'📋'), 'Paste from Excel or CSV', h(InfoPill,{text:'Copy rows from your bank\'s spreadsheet or CSV export and paste them here. Include columns for date, description, and amount at minimum.'})),
                h('p',{style:{color:'var(--text2)',fontSize:12,marginBottom:10}},'Works with tab-separated (Excel copy) or comma-separated data. Headers are auto-detected.'),
                h('textarea',{className:'input',value:csv,onChange:e=>{setCsv(e.target.value);setParsedData(null);setPreview(null);},
                  placeholder:'Paste data from Excel, or CSV like:\nDate,Description,Amount\n02/01/2026,PAYCHECK DEPOSIT,3500.00\n02/01/2026,MORTGAGE PAYMENT,-1987.00\n02/03/2026,WALMART GROCERY,-87.43',
                  style:{width:'100%',height:200}}),
                h('div',{style:{display:'flex',gap:8,marginTop:12}},
                  h('button',{className:'btn primary',onClick:()=>parseRaw(csv),disabled:!csv.trim()}, '🔍 Parse'),
                  csv && h('button',{className:'btn',onClick:()=>{setCsv('');setParsedData(null);setPreview(null);}},'Clear')
                )
              )
            : h('div',null,
                h('h3',null, h('span',{className:'icon'},'📂'), 'Upload Bank CSV/TSV File', h(InfoPill,{text:'Drag and drop or click to upload a CSV or TSV file from your bank. Most bank export formats are supported.'})),
                h('p',{style:{color:'var(--text2)',fontSize:12,marginBottom:14}},'Select a .csv or .tsv file exported from your bank.'),
                h('input',{ref:fileRef, type:'file', accept:'.csv,.tsv,.txt', onChange:handleFile, style:{display:'none'}}),
                h('div',{
                  onClick:()=>fileRef.current?.click(),
                  style:{
                    border:'2px dashed var(--border)', borderRadius:12, padding:'40px 20px', textAlign:'center',
                    cursor:'pointer', transition:'border-color 0.15s', background:'var(--surface2)'
                  },
                  onDragOver:e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--accent)';},
                  onDragLeave:e=>{e.currentTarget.style.borderColor='var(--border)';},
                  onDrop:e=>{
                    e.preventDefault(); e.currentTarget.style.borderColor='var(--border)';
                    const file = e.dataTransfer.files[0];
                    if(file) { const r=new FileReader(); r.onload=ev=>{setCsv(ev.target.result);parseRaw(ev.target.result);}; r.readAsText(file); }
                  }
                },
                  h('div',{style:{fontSize:32,marginBottom:8}},'📂'),
                  h('div',{style:{fontWeight:500}},'Click to browse or drag & drop'),
                  h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:4}},'.csv, .tsv, or .txt files')
                )
              )
        ),

        // Column mapping (shown after parsing)
        parsedData && h('div',{className:'card animate-in',style:{marginTop:16,border:'1px solid var(--accent)'}},
          h('h3',null, h('span',{className:'icon'},'🔧'), 'Column Mapping', h(InfoPill,{text:'Tell the app which columns contain the date, description, and amount. For files with separate debit/credit columns, map both.'})),
          h('p',{style:{color:'var(--text2)',fontSize:12,marginBottom:12}},
            'Detected ', parsedData.rows.length, ' data rows with ', parsedData.headers.length, ' columns. ',
            'Verify or adjust the column assignments below.'
          ),

          // Sample data preview
          h('div',{style:{overflowX:'auto',marginBottom:14,border:'1px solid var(--border)',borderRadius:8}},
            h('table',{className:'table',style:{fontSize:11}},
              h('thead',null, h('tr',null,
                parsedData.headers.map((hdr,i)=>h('th',{key:i,style:{
                  background: i===colMap.dateCol?'rgba(232,160,32,0.2)' : i===colMap.descCol?'rgba(64,192,128,0.2)' : i===colMap.amountCol?'rgba(224,120,40,0.2)' : i===colMap.debitCol?'rgba(224,80,80,0.2)' : i===colMap.creditCol?'rgba(64,192,128,0.2)' : 'transparent',
                  whiteSpace:'nowrap',fontSize:10
                }}, hdr))
              )),
              h('tbody',null, parsedData.rows.slice(0,5).map((row,ri)=>
                h('tr',{key:ri}, row.map((cell,ci)=>h('td',{key:ci,style:{
                  whiteSpace:'nowrap',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',fontSize:11,
                  background: ci===colMap.dateCol?'rgba(232,160,32,0.06)' : ci===colMap.descCol?'rgba(64,192,128,0.06)' : ci===colMap.amountCol?'rgba(224,120,40,0.06)' : ci===colMap.debitCol?'rgba(224,80,80,0.06)' : ci===colMap.creditCol?'rgba(64,192,128,0.06)' : 'transparent'
                }},cell)))
              ))
            )
          ),

          // Column selectors
          h('div',{style:{display:'flex',gap:12,flexWrap:'wrap',marginBottom:14}},
            h('div',{style:{flex:1,minWidth:130}},
              h('label',{htmlFor:'import-date-col',style:{fontSize:11,color:'var(--accent2)',display:'block',marginBottom:3,fontWeight:600}},'📅 Date Column'),
              h('select',{id:'import-date-col',className:'input',value:colMap.dateCol,onChange:e=>setColMap(p=>({...p,dateCol:+e.target.value})),style:{width:'100%'}},
                h('option',{value:-1},'— Select —'),
                parsedData.headers.map((hdr,i)=>h('option',{key:i,value:i},hdr))
              )
            ),
            h('div',{style:{flex:1,minWidth:130}},
              h('label',{htmlFor:'import-desc-col',style:{fontSize:11,color:'var(--green)',display:'block',marginBottom:3,fontWeight:600}},'📝 Description Column'),
              h('select',{id:'import-desc-col',className:'input',value:colMap.descCol,onChange:e=>setColMap(p=>({...p,descCol:+e.target.value})),style:{width:'100%'}},
                h('option',{value:-1},'— Select —'),
                parsedData.headers.map((hdr,i)=>h('option',{key:i,value:i},hdr))
              )
            ),
            h('div',{style:{flex:1,minWidth:130}},
              h('label',{htmlFor:'import-amt-col',style:{fontSize:11,color:'var(--orange)',display:'block',marginBottom:3,fontWeight:600}},'💲 Amount Column'),
              h('select',{id:'import-amt-col',className:'input',value:colMap.amountCol,onChange:e=>setColMap(p=>({...p,amountCol:+e.target.value})),style:{width:'100%'}},
                h('option',{value:-1},'— none (use debit/credit) —'),
                parsedData.headers.map((hdr,i)=>h('option',{key:i,value:i},hdr))
              )
            )
          ),

          // Optional debit/credit columns
          colMap.amountCol < 0 && h('div',{style:{display:'flex',gap:12,flexWrap:'wrap',marginBottom:14}},
            h('div',{style:{flex:1,minWidth:130}},
              h('label',{htmlFor:'import-debit-col',style:{fontSize:11,color:'var(--red)',display:'block',marginBottom:3,fontWeight:600}},'📉 Debit Column'),
              h('select',{id:'import-debit-col',className:'input',value:colMap.debitCol,onChange:e=>setColMap(p=>({...p,debitCol:+e.target.value})),style:{width:'100%'}},
                h('option',{value:-1},'— Select —'),
                parsedData.headers.map((hdr,i)=>h('option',{key:i,value:i},hdr))
              )
            ),
            h('div',{style:{flex:1,minWidth:130}},
              h('label',{htmlFor:'import-credit-col',style:{fontSize:11,color:'var(--green)',display:'block',marginBottom:3,fontWeight:600}},'📈 Credit Column'),
              h('select',{id:'import-credit-col',className:'input',value:colMap.creditCol,onChange:e=>setColMap(p=>({...p,creditCol:+e.target.value})),style:{width:'100%'}},
                h('option',{value:-1},'— Select —'),
                parsedData.headers.map((hdr,i)=>h('option',{key:i,value:i},hdr))
              )
            )
          ),

          h('button',{className:'btn primary',onClick:buildPreview,
            disabled:colMap.dateCol<0||colMap.descCol<0||(colMap.amountCol<0&&colMap.debitCol<0)
          }, '🔍 Preview Transactions')
        ),

        // Preview results
        preview && h('div',{className:'card animate-in',style:{marginTop:16,border:'2px solid var(--green)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
            h('h3',{style:{margin:0}}, 'Preview — '+(preview.matched.length+preview.unmatched.length)+' ready', h(InfoPill,{text:'Green rows are matched to existing payee rules. Yellow rows are new and need a category assigned. You can set rules here that will auto-match future imports.'})),
            h('div',{style:{display:'flex',gap:8}},
              h('button',{className:'btn',onClick:()=>setPreview(null)},'Cancel'),
              h('button',{className:'btn green',onClick:confirmImport,disabled:preview.matched.length+preview.unmatched.length===0},'✓ Confirm Import')
            )
          ),

          // Transfer destination picker — shown when any transactions are categorized as transfers
          (()=>{
            const allPreviewTxns = [...preview.matched, ...preview.unmatched];
            const transferTxns = allPreviewTxns.filter(t=>t.catType==='transfer' || (catMap[t.category] && catMap[t.category].catType==='transfer'));
            const autoDetected = transferTxns.filter(t=>t._autoTransferDest);
            const manualNeeded = transferTxns.filter(t=>!t._autoTransferDest);
            const otherAccts = accounts.filter(a=>a.id!==selectedAccount);
            if(transferTxns.length===0 || otherAccts.length===0) return null;
            return h('div',{style:{padding:'12px 16px',marginBottom:14,background:'rgba(208,96,160,0.08)',border:'1px solid rgba(208,96,160,0.2)',borderRadius:8}},
              h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
                h('span',{style:{fontSize:13,fontWeight:600,color:'var(--pink)'}},'↔ '+transferTxns.length+' transfer(s) detected'),
                autoDetected.length > 0 && h('div',{style:{fontSize:12,color:'var(--green)'}},
                  '✓ '+autoDetected.length+' auto-matched by account number (last 4 digits)'
                ),
                manualNeeded.length > 0 && h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
                  h('span',{style:{fontSize:12,color:'var(--card-text2)'}}, manualNeeded.length+' need destination:'),
                  h('select',{className:'input',value:transferDestAcct,onChange:e=>setTransferDestAcct(e.target.value),style:{fontSize:12,padding:'5px 8px'}},
                    h('option',{value:''},'— Select destination account —'),
                    otherAccts.map(a=>h('option',{key:a.id,value:a.id},a.name+' ('+a.type+')'+(a.last4?' ••••'+a.last4:'')))
                  ),
                  !transferDestAcct && h('span',{style:{fontSize:11,color:'var(--yellow)'}},'⚠ Select account for paired entries')
                ),
                autoDetected.length > 0 && manualNeeded.length === 0 && transferDestAcct && h('div',{style:{fontSize:12,color:'var(--green)'}},
                  '✓ All transfers paired automatically'
                )
              )
            );
          })(),

          h('div',{style:{display:'flex',gap:12,marginBottom:14,flexWrap:'wrap'}},
            h('div',{style:{flex:1,textAlign:'center',padding:12,background:'rgba(64,192,128,0.1)',borderRadius:8}},
              h('div',{style:{fontSize:24,fontWeight:700,color:'var(--green)'}},preview.matched.length),
              h('div',{style:{fontSize:11,color:'var(--text2)'}},'Matched')
            ),
            h('div',{style:{flex:1,textAlign:'center',padding:12,background:preview.unmatched.length>0?'rgba(232,160,32,0.1)':'rgba(64,192,128,0.1)',borderRadius:8}},
              h('div',{style:{fontSize:24,fontWeight:700,color:preview.unmatched.length>0?'var(--yellow)':'var(--green)'}},preview.unmatched.length),
              h('div',{style:{fontSize:11,color:'var(--text2)'}},'Unmatched')
            ),
            h('div',{style:{flex:1,textAlign:'center',padding:12,background:'var(--surface2)',borderRadius:8}},
              h('div',{style:{fontSize:24,fontWeight:700,color:'var(--text2)'}},preview.dupes),
              h('div',{style:{fontSize:11,color:'var(--text2)'}},'Duplicates')
            ),
            preview.pendingMatched>0 && h('div',{style:{flex:1,textAlign:'center',padding:12,background:'rgba(232,160,32,0.1)',borderRadius:8}},
              h('div',{style:{fontSize:24,fontWeight:700,color:'var(--accent2)'}},preview.pendingMatched),
              h('div',{style:{fontSize:11,color:'var(--text2)'}},'\u23F3 Pending Cleared')
            ),
            preview.errors>0 && h('div',{style:{flex:1,textAlign:'center',padding:12,background:'rgba(224,80,80,0.1)',borderRadius:8}},
              h('div',{style:{fontSize:24,fontWeight:700,color:'var(--red)'}},preview.errors),
              h('div',{style:{fontSize:11,color:'var(--text2)'}},'Skipped')
            )
          ),
          preview.matched.length>0 && h('div',{style:{marginBottom:12}},
            h('div',{style:{fontSize:12,fontWeight:600,color:'var(--green)',marginBottom:6}},'✅ Matched ('+preview.matched.length+')'),
            h('div',{style:{maxHeight:160,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}},
              preview.matched.map((t,i)=>h('div',{key:i,style:{display:'flex',gap:8,padding:'5px 10px',borderTop:i?'1px solid var(--border)':'none',fontSize:12,alignItems:'center'}},
                h('span',{style:{minWidth:75,color:'var(--text2)'}},t.date),
                h('span',{style:{flex:1,color:'var(--text2)'}},t.description.substring(0,25)),
                h('span',{style:{fontWeight:500}},t.cleanName),
                h(Tag,{color:groupColors[t.group]||'#8b90a5'},t.category),
                h('span',{style:{fontWeight:600,color:t.amount>=0?'var(--green)':'var(--text)'}}, (t.amount>=0?'+':'')+fmt(t.amount))
              ))
            )
          ),
          preview.unmatched.length>0 && h('div',null,
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
              h('div',{style:{fontSize:12,fontWeight:600,color:'var(--yellow)'}},'⚠️ Unmatched ('+preview.unmatched.length+') — Translate below to create rules'),
              preview.unmatched.length>1 && h('button',{className:'btn sm',onClick:()=>{
                // Skip all — leave as uncategorized
                showToast('All unmatched will import as "Uncategorized"');
              }},'Skip All')
            ),
            h('div',{style:{border:'1px solid rgba(232,160,32,0.3)',borderRadius:8,background:'rgba(232,160,32,0.05)',overflow:'hidden',maxHeight:350,overflowY:'auto'}},
              preview.unmatched.map((t,i)=>h(UnmatchedRow,{key:t.id, txn:t, index:i, categories, setCategories, showToast, groupList,
                onResolve:(keyword, cleanName, category) => {
                  // Save rule to dictionary
                  const cat = catMap[category];
                  const kw = keyword.toUpperCase();
                  setDictionary(prev=>{
                    if(prev.find(d=>d.keyword.toUpperCase()===kw)) return prev;
                    return [...prev, {keyword:kw, cleanName, category}];
                  });
                  // Apply to ALL unmatched transactions that contain this keyword (normalize both sides)
                  const kwNorm = normalizeForMatch(kw);
                  const matchCount = preview.unmatched.filter(u=>normalizeForMatch(u.description).includes(kwNorm)).length;
                  setPreview(prev=>{
                    const nowMatched = [];
                    const stillUnmatched = [];
                    for(const u of prev.unmatched) {
                      if(normalizeForMatch(u.description).includes(kwNorm)) {
                        nowMatched.push({...u, cleanName, category, group:cat?.group||'Other', catType:cat?.catType||'discretionary'});
                      } else {
                        stillUnmatched.push(u);
                      }
                    }
                    return {
                      ...prev,
                      matched:[...prev.matched, ...nowMatched],
                      unmatched:stillUnmatched
                    };
                  });
                  showToast('\u2705 Rule saved: '+keyword+' \u2192 '+category+' (matched '+matchCount+' transaction'+(matchCount===1?'':'s')+')');
                },
                onSkip:() => {}
              }))
            ),
            h('p',{style:{fontSize:11,color:'var(--yellow)',marginTop:6}},'💡 Translate each payee to auto-create rules, or import as-is and fix later on the Transactions page.')
          )
        )
      ),

      // Right: Info panel
      h('div',{className:'import-right',style:{flex:1,minWidth:260}},
        h('div',{className:'card',style:{marginBottom:16}},
          h('h3',null, h('span',{className:'icon'},'📊'), 'Import Stats', h(InfoPill,{text:'Summary of what was imported: how many transactions matched existing rules vs new ones, and any duplicates that were skipped.'})),
          h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.8}},
            h('div',null,'Total transactions: ',h('strong',{style:{color:'var(--text)'}},transactions.length)),
            h('div',null,'Dictionary rules: ',h('strong',{style:{color:'var(--text)'}},dictionary.length)),
            h('div',null,'Categories: ',h('strong',{style:{color:'var(--text)'}},Object.keys(catMap).length))
          )
        ),
        h('div',{className:'card'},
          h('h3',null, h('span',{className:'icon'},'💡'), 'Supported Formats', h(InfoPill,{text:'Reference for the file formats and column layouts the importer can handle.'})),
          h('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.8}},
            h('p',null,'✅ Copy/paste from Excel (tab-delimited)'),
            h('p',null,'✅ Standard CSV files (comma-delimited)'),
            h('p',null,'✅ Bank exports (.csv, .tsv)'),
            h('p',null,'✅ Single amount column OR separate debit/credit'),
            h('p',null,'✅ Parentheses for negatives: (100.00)'),
            h('p',null,'✅ Headers auto-detected'),
            h('p',null,'✅ Column mapping adjustable'),
            h('p',{style:{marginTop:8,borderTop:'1px solid var(--border)',paddingTop:8}},'Negative amounts = expenses'),
            h('p',null,'Duplicates are auto-skipped')
          )
        )
      )
    )
  );
}

// ── Transactions Page ───────────────────────────────────
function TransactionsPage({transactions, setTransactions, catMap, accounts, setAccounts, defaultAcct}) {
  const [filter, setFilter] = useState('');
  const [acctFilter, setAcctFilterRaw] = useState(defaultAcct||'all');
  const setAcctFilter = (v) => { setAcctFilterRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [sortCol, setSortCol] = useState('date');
  const [sortDir, setSortDir] = useState(-1);
  const [editId, setEditId] = useState(null);
  const [editCat, setEditCat] = useState('');
  const [editPayeeId, setEditPayeeId] = useState(null);
  const [editPayeeName, setEditPayeeName] = useState('');
  const [showReconcile, setShowReconcile] = useState(false);
  const [reconcileDate, setReconcileDate] = useState('');
  const [showAddTxn, setShowAddTxn] = useState(false);
  const [statusFilter, setStatusFilter] = useState('all');
  const [dateFilter, setDateFilter] = useState('current'); // 'all', 'current', or 'YYYY-MM'
  const [newTxn, setNewTxn] = useState({date:'',description:'',amount:'',category:'',accountId:'',pending:false,checkNumber:'',transferDest:''});

  const resetNewTxn = () => { setNewTxn({date:'',description:'',amount:'',category:'',accountId:'',pending:false,checkNumber:'',transferDest:''}); setShowAddTxn(false); };

  const saveNewTxn = () => {
    const {date,description,amount,category,accountId,pending,checkNumber,transferDest} = newTxn;
    if(!date||!description||!amount||!accountId) return;
    const cat = catMap[category];
    const isTransfer = cat && cat.catType === 'transfer';
    if(isTransfer && !transferDest) return; // require destination for transfers
    // Auto-set sign based on category: expenses negative, income positive
    let amt = +amount;
    if(cat && cat.group !== 'Income' && amt > 0) amt = -Math.abs(amt);
    if(cat && cat.group === 'Income' && amt < 0) amt = Math.abs(amt);
    const txnId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const txn = {
      id: txnId,
      date, description: description.trim(),
      amount: amt,
      cleanName: description.trim(),
      category: category || 'Uncategorized',
      group: cat?.group || 'Other',
      catType: cat?.catType || 'discretionary',
      accountId
    };
    if(pending) txn.pending = true;
    if(checkNumber.trim()) txn.checkNumber = checkNumber.trim();
    // Create paired transaction for transfers
    if(isTransfer && transferDest) {
      const pairedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
      txn.linkedTxnId = pairedId;
      const destAcct = accounts.find(a=>a.id===transferDest);
      const paired = {
        id: pairedId, linkedTxnId: txnId,
        date, description: description.trim() + ' (paired)',
        amount: -amt, // reverse: outflow on source = inflow on dest
        cleanName: 'Transfer from ' + (accounts.find(a=>a.id===accountId)?.name||'Other'),
        category: category || 'Uncategorized',
        group: cat?.group || 'Other',
        catType: 'transfer',
        accountId: transferDest
      };
      if(pending) paired.pending = true;
      setTransactions(prev=>[...prev, txn, paired]);
    } else {
      setTransactions(prev=>[...prev, txn]);
    }
    resetNewTxn();
  };

  const acctMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a;}); return m;
  },[accounts]);

  // Check if a transaction is reconciled based on its account's reconciledThrough date
  const isReconciled = useCallback((t)=>{
    const acct = acctMap[t.accountId];
    if(!acct || !acct.reconciledThrough) return false;
    return safeDate(t.date) <= safeDate(acct.reconciledThrough);
  },[acctMap]);

  // Reconcile: set the reconciledThrough date on the selected account
  const doReconcile = ()=>{
    if(!reconcileDate || acctFilter==='all') return;
    setAccounts(prev=>prev.map(a=>a.id===acctFilter?{...a, reconciledThrough:reconcileDate}:a));
    setShowReconcile(false);
    setReconcileDate('');
  };

  // Build a map of starting balances from accounts
  const startBalMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a.startingBalance||0;}); return m;
  },[accounts]);

  // Compute running balance for cleared/reconciled transactions only (excludes pending)
  const runningBalMap = useMemo(()=>{
    const cleared = transactions.filter(t=>!t.pending);
    const dateSorted = [...cleared].sort((a,b)=>safeDate(a.date)-safeDate(b.date));
    const accBal = {};
    const balMap = {};
    dateSorted.forEach(t=>{
      if(!(t.accountId in accBal)) accBal[t.accountId] = startBalMap[t.accountId]||0;
      accBal[t.accountId] += t.amount;
      balMap[t.id] = accBal[t.accountId];
    });
    return balMap;
  },[transactions, startBalMap]);
  const txnOrder = useMemo(()=>{
    const dateSorted = [...transactions].sort((a,b)=>safeDate(a.date)-safeDate(b.date));
    const m = {};
    dateSorted.forEach((t,i)=>{m[t.id]=i;});
    return m;
  },[transactions]);

  const pendingCount = useMemo(()=>transactions.filter(t=>t.pending).length,[transactions]);

  // Build list of available year-months from transaction data
  const availableMonths = useMemo(()=>{
    const months = new Set();
    transactions.forEach(t=>{ const ym = getYearMonth(t.date); if(ym) months.add(ym); });
    return [...months].sort().reverse();
  },[transactions]);

  const currentYM = useMemo(()=>{
    const now = new Date();
    return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  },[]);

  const sorted = useMemo(()=>{
    let arr = [...transactions];
    if(acctFilter!=='all') arr = arr.filter(t=>t.accountId===acctFilter);
    if(dateFilter!=='all') {
      const ym = dateFilter==='current' ? currentYM : dateFilter;
      // Pending transactions always show regardless of date filter
      arr = arr.filter(t=>t.pending || getYearMonth(t.date)===ym);
    }
    if(statusFilter==='pending') arr = arr.filter(t=>t.pending);
    else if(statusFilter==='cleared') arr = arr.filter(t=>!t.pending);
    if(filter) {
      const f = filter.toLowerCase();
      arr = arr.filter(t=>t.cleanName.toLowerCase().includes(f)||t.description.toLowerCase().includes(f)||t.category.toLowerCase().includes(f));
    }
    arr.sort((a,b)=>{
      // Pending transactions always on top (no date)
      if(a.pending && !b.pending) return -1;
      if(!a.pending && b.pending) return 1;
      if(a.pending && b.pending) return (a.cleanName||'').localeCompare(b.cleanName||'');
      if(sortCol==='date') {
        const d = safeDate(a.date)-safeDate(b.date);
        if(d!==0) return d*sortDir;
        // Same date: sort by processing order so the balance column is monotonic
        return ((txnOrder[a.id]||0)-(txnOrder[b.id]||0))*sortDir;
      }
      if(sortCol==='amount') return (a.amount-b.amount)*sortDir;
      return (a[sortCol]||'').localeCompare(b[sortCol]||'')*sortDir;
    });
    return arr;
  },[transactions,filter,acctFilter,dateFilter,currentYM,statusFilter,sortCol,sortDir,txnOrder]);

  const toggleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d*-1);
    else { setSortCol(col); setSortDir(-1); }
  };

  const delTxn = (id) => {
    const txn = transactions.find(t=>t.id===id);
    if(txn && isReconciled(txn)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to delete it?')) return;
    }
    setTransactions(prev=>prev.filter(t=>t.id!==id));
  };

  const togglePending = (id) => setTransactions(prev=>prev.map(t=>t.id===id?{...t, pending:!t.pending}:t));

  const startEditCat = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its category?')) return;
    }
    setEditId(t.id); setEditCat(t.category);
  };

  const saveCat = (id) => {
    if(!editCat) return;
    const cat = catMap[editCat];
    setTransactions(prev=>prev.map(t=>t.id===id?{...t, category:editCat, group:cat?.group||'Other', catType:cat?.catType||'discretionary'}:t));
    setEditId(null); setEditCat('');
  };

  const startEditPayee = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its payee?')) return;
    }
    setEditPayeeId(t.id); setEditPayeeName(t.cleanName);
  };

  const savePayee = (id) => {
    if(!editPayeeName.trim()) return;
    setTransactions(prev=>prev.map(t=>t.id===id?{...t, cleanName:editPayeeName.trim()}:t));
    setEditPayeeId(null); setEditPayeeName('');
  };

  const nonTransfer = transactions.filter(t=>t.catType!=='transfer');
  const expenses = nonTransfer.filter(t=>t.amount<0);
  const income = nonTransfer.filter(t=>t.amount>=0);
  const totalExp = expenses.reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const transfers = transactions.filter(t=>t.catType==='transfer' && t.amount<0);
  const totalXfer = transfers.reduce((s,t)=>s+Math.abs(t.amount),0);

  // Per-account cleared balances
  const acctBalances = useMemo(()=>{
    return accounts.map(a=>{
      const startBal = a.startingBalance||0;
      const clearedSum = transactions.filter(t=>!t.pending && t.accountId===a.id).reduce((s,t)=>s+t.amount,0);
      const pendSum = transactions.filter(t=>t.pending && t.accountId===a.id).reduce((s,t)=>s+t.amount,0);
      const cleared = startBal + clearedSum;
      return { id:a.id, name:a.name, type:a.type, cleared, pending:pendSum, projected:cleared+pendSum };
    });
  },[transactions, accounts]);
  const filteredBals = acctFilter==='all' ? acctBalances : acctBalances.filter(b=>b.id===acctFilter);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📋 Transactions', h(InfoPill,{text:'All imported transactions. Use filters to search by text, category, or date range. Click a payee or category to edit it inline. Use the + button to add manual transactions.'})),
        h('p',null,'View and manage all imported transactions.')
      ),
      h('button',{className:'btn primary',onClick:()=>{
        setNewTxn(prev=>({...prev, accountId: acctFilter!=='all'?acctFilter:(accounts[0]?.id||'')}));
        setShowAddTxn(true);
      }},'+ Add Transaction')
    ),

    h('div',{style:{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}},
      filteredBals.map(b=>{
        const isDebt = b.type==='credit_card'||b.type==='loan';
        const displayBal = isDebt ? -Math.abs(b.cleared) : b.cleared;
        const displayProj = isDebt ? -Math.abs(b.projected) : b.projected;
        return h('div',{key:b.id,style:{
          background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',minWidth:140,color:'var(--card-text)',
          cursor:acctFilter==='all'?'pointer':'default'
        },onClick:()=>{if(acctFilter==='all')setAcctFilter(b.id)}},
          h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:4,fontWeight:600}},b.name),
          h('div',{style:{fontSize:18,fontWeight:700,color:displayBal>=0?'var(--green)':'var(--red)'}},fmt(displayBal)),
          b.pending!==0 && h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:2}},'After pending: '+fmt(displayProj))
        );
      })
    ),

    h('div',{className:'card'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
        h('h3',{style:{margin:0}}, 'All Transactions'),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          accounts.length>0 && h('select',{className:'input',value:acctFilter,onChange:e=>setAcctFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'all'},'All Accounts'),
            accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
          ),
          h('select',{className:'input',value:dateFilter,onChange:e=>setDateFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'current'},'This Month'),
            h('option',{value:'all'},'All Time'),
            availableMonths.filter(ym=>ym!==currentYM).map(ym=>{
              const [y,m] = ym.split('-');
              const label = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m]+' '+y;
              return h('option',{key:ym,value:ym},label);
            })
          ),
          h('select',{className:'input',value:statusFilter,onChange:e=>setStatusFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'all'},'All Status'),
            h('option',{value:'pending'},'🟡 Pending'),
            h('option',{value:'cleared'},'🟢 Cleared')
          ),
          h('input',{className:'input',value:filter,onChange:e=>setFilter(e.target.value),placeholder:'Search...', 'aria-label':'Search transactions', style:{width:180}}),
          acctFilter!=='all'
            ? h('button',{className:'btn green sm',onClick:()=>{
                const acct = acctMap[acctFilter];
                setReconcileDate(acct?.reconciledThrough||'');
                setShowReconcile(true);
              }},'✓ Reconcile')
            : accounts.length>0 && h('span',{style:{fontSize:11,color:'var(--text2)',alignSelf:'center'}},'Select an account to reconcile'),
          h('div',{style:{display:'flex',gap:12,alignItems:'center',fontSize:10,color:'var(--text2)'}},
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#e8a020'}}),'Pending'),
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#40c080'}}),'Cleared'),
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#5090e8'}}),'Reconciled')
          )
        )
      ),
      sorted.length === 0
        ? h('div',{className:'empty'},
            h('div',{className:'icon'},'📋'),
            h('p',null, transactions.length===0 ? 'No transactions yet. Import some on the Import page.' : 'No transactions match your search.')
          )
        : h('div',{className:'table-scroll',style:{maxHeight:500,overflowY:'auto'}},
            h('table',{className:'table txn-table'},
              h('thead',null,h('tr',null,
                h('th',{style:{width:30}},null),
                h('th',{onClick:()=>toggleSort('date'), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSort('date');}}, tabIndex:0, role:'columnheader', 'aria-sort':sortCol==='date'?(sortDir>0?'ascending':'descending'):'none', style:{cursor:'pointer'}},'Date'+(sortCol==='date'?(sortDir>0?' ↑':' ↓'):'')),
                h('th',null,'Payee'),
                h('th',null,'Category'),
                h('th',null,'Type'),
                accounts.length>0 && h('th',null,'Account'),
                h('th',{onClick:()=>toggleSort('amount'), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSort('amount');}}, tabIndex:0, role:'columnheader', 'aria-sort':sortCol==='amount'?(sortDir>0?'ascending':'descending'):'none', style:{cursor:'pointer'}},'Amount'+(sortCol==='amount'?(sortDir>0?' ↑':' ↓'):'')),
                h('th',null,'Balance'),
                h('th',{style:{width:60}},null)
              )),
              h('tbody',null, sorted.slice(0,200).map(t => {
                const rec = isReconciled(t);
                const rowBg = t.pending ? {background:'rgba(232,160,32,0.06)'} : rec ? {background:'rgba(64,192,128,0.06)'} : undefined;
                return h('tr',{key:t.id, style:rowBg},
                  h('td',{onClick:()=>{if(!rec)togglePending(t.id)},style:{textAlign:'center',fontSize:12,cursor:rec?'default':'pointer',userSelect:'none'},title:t.pending?'Pending — click to clear':rec?'Reconciled':'Cleared — click to mark pending'}, h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:t.pending?'#e8a020':rec?'#5090e8':'#40c080'}})),
                  h('td',{style:{color:t.pending?'var(--accent2)':'var(--text2)',fontSize:12,fontStyle:t.pending?'italic':'normal'}},t.pending?'Pending':t.date),
                  h('td',{style:{fontWeight:500}},
                    editPayeeId===t.id
                      ? h('div',{style:{display:'flex',gap:4}},
                          h('input',{className:'input',value:editPayeeName,onChange:e=>setEditPayeeName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')savePayee(t.id);if(e.key==='Escape')setEditPayeeId(null);},style:{fontSize:12,padding:'3px 6px',width:140},autoFocus:true}),
                          h('button',{className:'btn sm',onClick:()=>savePayee(t.id)},'\u2713'),
                          h('button',{className:'btn sm',onClick:()=>setEditPayeeId(null)},'\u2717')
                        )
                      : h('span',{onClick:()=>startEditPayee(t), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startEditPayee(t);}}, tabIndex:0, role:'button', style:{cursor:'pointer'},title:'Click to edit payee'},t.cleanName,
                          t.checkNumber && h('span',{style:{fontSize:10,color:'var(--text2)',marginLeft:6}},'#'+t.checkNumber),
                          t.cleanName!==t.description && h('div',{style:{fontSize:10,color:'var(--text2)',marginTop:1}},t.description.substring(0,30))
                        )
                  ),
                  h('td',null,
                    editId===t.id
                      ? h('div',{style:{display:'flex',gap:4}},
                          h('select',{className:'input',value:editCat,onChange:e=>setEditCat(e.target.value),style:{fontSize:12,padding:'3px 6px'}},
                            h('option',{value:''},'Select...'),
                            Object.keys(catMap).sort((a,b)=>a.localeCompare(b)).map(c=>h('option',{key:c,value:c},c))
                          ),
                          h('button',{className:'btn sm',onClick:()=>saveCat(t.id)},'✓'),
                          h('button',{className:'btn sm',onClick:()=>setEditId(null)},'✗')
                        )
                      : h('span',{onClick:()=>startEditCat(t), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startEditCat(t);}}, tabIndex:0, role:'button', style:{cursor:'pointer'},title:'Click to change'},
                          t.category,
                          t.category==='Uncategorized' && h('span',{style:{color:'var(--yellow)',marginLeft:4,fontSize:11}},'⚠')
                        )
                  ),
                  h('td',null, h(TypeTag,{catType:t.catType})),
                  accounts.length>0 && h('td',{style:{fontSize:11,color:'var(--text2)'}}, acctMap[t.accountId]?.name||'—'),
                  h('td',{style:{fontWeight:600,color:t.catType==='transfer'?'var(--pink)':t.amount>=0?'var(--green)':'var(--text)'}}, (t.amount>=0?'+':'')+fmt(t.amount)),
                  h('td',{style:{fontWeight:600,fontSize:12,color:t.pending?'var(--text2)':(runningBalMap[t.id]||0)>=0?'var(--green)':'var(--red)'}}, t.pending?'—':fmt(runningBalMap[t.id]||0)),
                  h('td',{style:{textAlign:'center'}},
                    h('button',{className:'table del-btn',onClick:()=>delTxn(t.id)},'×')
                  )
                );
              }))
            ),
            sorted.length>200 && h('div',{style:{background:'rgba(80,144,232,0.1)',border:'1px solid rgba(80,144,232,0.2)',borderRadius:8,padding:'8px 14px',margin:'12px 0',fontSize:12,color:'var(--blue)',display:'flex',alignItems:'center',gap:8}},
              h('span',null,'📋'), 'Showing first 200 of '+sorted.length+' transactions. Use the date or account filters to narrow results.'
            )
          )
    ),

    // Reconciled-through info bar
    acctFilter!=='all' && acctMap[acctFilter]?.reconciledThrough && h('div',{style:{
      marginTop:12, padding:'10px 16px', background:'rgba(64,192,128,0.08)', border:'1px solid rgba(64,192,128,0.2)',
      borderRadius:8, display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13
    }},
      h('span',null, '✓ ', h('strong',null,acctMap[acctFilter].name), ' reconciled through ', h('strong',null, fmtDate(acctMap[acctFilter].reconciledThrough))),
      h('button',{className:'btn sm', onClick:()=>{
        if(confirm('Clear reconciliation date for '+acctMap[acctFilter].name+'?')) {
          setAccounts(prev=>prev.map(a=>a.id===acctFilter?{...a, reconciledThrough:null}:a));
        }
      }}, 'Clear')
    ),

    // Add Transaction modal
    showAddTxn && h(Modal, {onClose:resetNewTxn},
      h('h3',null, '➕ Add Transaction'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{display:'flex',gap:10}},
          h('div',{style:{flex:1}},
            h('label',{htmlFor:'txn-date',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Date'),
            h('input',{id:'txn-date',className:'input',type:'date',value:newTxn.date,onChange:e=>setNewTxn(p=>({...p,date:e.target.value})),style:{width:'100%'}})
          ),
          h('div',{style:{flex:1}},
            h('label',{htmlFor:'txn-amount',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Amount'),
            h('input',{id:'txn-amount',className:'input',type:'number',value:newTxn.amount,onChange:e=>setNewTxn(p=>({...p,amount:e.target.value})),placeholder:'e.g. 0.01 or -50.00',style:{width:'100%'},step:'0.01'}),
            h('div',{style:{fontSize:10,color:'var(--card-text2)',marginTop:2}},'Sign auto-set by category (enter as positive)')
          )
        ),
        h('div',null,
          h('label',{htmlFor:'txn-desc',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Description'),
          h('input',{id:'txn-desc',className:'input',value:newTxn.description,onChange:e=>setNewTxn(p=>({...p,description:e.target.value})),placeholder:'e.g. Interest Payment',style:{width:'100%'},autoFocus:true})
        ),
        h('div',{style:{display:'flex',gap:10}},
          h('div',{style:{flex:1}},
            h('label',{htmlFor:'txn-account',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},catMap[newTxn.category]?.catType==='transfer'?'From Account':'Account'),
            h('select',{id:'txn-account',className:'input',value:newTxn.accountId,onChange:e=>setNewTxn(p=>({...p,accountId:e.target.value})),style:{width:'100%'}},
              h('option',{value:''},'Select...'),
              accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
            )
          ),
          h('div',{style:{flex:1}},
            h('label',{htmlFor:'txn-category',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Category'),
            h('select',{id:'txn-category',className:'input',value:newTxn.category,onChange:e=>setNewTxn(p=>({...p,category:e.target.value})),style:{width:'100%'}},
              h('option',{value:''},'Uncategorized'),
              Object.keys(catMap).sort((a,b)=>a.localeCompare(b)).map(c=>h('option',{key:c,value:c},c))
            )
          )
        ),
        catMap[newTxn.category]?.catType==='transfer' && h('div',{style:{padding:'8px 0'}},
          h('label',{htmlFor:'txn-transfer-dest',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Transfer To Account'),
          h('select',{id:'txn-transfer-dest',className:'input',value:newTxn.transferDest,onChange:e=>setNewTxn(p=>({...p,transferDest:e.target.value})),style:{width:'100%'}},
            h('option',{value:''},'Select destination...'),
            accounts.filter(a=>a.id!==newTxn.accountId).map(a=>h('option',{key:a.id,value:a.id},a.name))
          ),
          h('div',{style:{fontSize:10,color:'var(--pink)',marginTop:4}},'Money will be deducted from the account above and added to this account.')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderTop:'1px solid rgba(255,255,255,0.06)',marginTop:4}},
          h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13}},
            h('input',{type:'checkbox',checked:newTxn.pending,onChange:e=>setNewTxn(p=>({...p,pending:e.target.checked})),style:{accentColor:'var(--accent2)'}}),
            '\u23F3 Mark as pending (uncleared)'
          ),
          newTxn.pending && h('input',{className:'input',value:newTxn.checkNumber,onChange:e=>setNewTxn(p=>({...p,checkNumber:e.target.value})),placeholder:'Check # (optional)',style:{width:130,fontSize:12,padding:'4px 8px'}})
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetNewTxn},'Cancel'),
          h('button',{className:'btn primary',onClick:saveNewTxn,disabled:!newTxn.date||!newTxn.description||!newTxn.amount||!newTxn.accountId},'Add Transaction')
        )
      )
    ),

    // Reconcile modal
    showReconcile && h(Modal, {onClose:()=>setShowReconcile(false)},
      h('h3',null, '✓ Reconcile Account'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        h('p',{style:{fontSize:13,color:'var(--card-text2)',margin:0}},
          'Set a date to mark all transactions on or before that date as reconciled for ',
          h('strong',null, acctMap[acctFilter]?.name || 'this account'), '.'
        ),
        acctMap[acctFilter]?.reconciledThrough && h('div',{style:{fontSize:12,color:'var(--green)',padding:'8px 12px',background:'rgba(64,192,128,0.08)',borderRadius:6}},
          'Currently reconciled through: ', h('strong',null, fmtDate(acctMap[acctFilter].reconciledThrough))
        ),
        h('div',null,
          h('label',{htmlFor:'reconcile-date',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}}, 'Reconcile through date'),
          h('input',{id:'reconcile-date',className:'input',type:'date',value:reconcileDate,onChange:e=>setReconcileDate(e.target.value),style:{width:'100%'}})
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}},
          h('button',{className:'btn',onClick:()=>setShowReconcile(false)}, 'Cancel'),
          h('button',{className:'btn green',onClick:doReconcile,disabled:!reconcileDate}, '✓ Reconcile')
        )
      )
    )
  );
}

// ── Budget Page ─────────────────────────────────────────
function BudgetPage({categories, setCategories, transactions, dictionary, groupColors, accounts, defaultAcct}) {
  const [expandedGroup, setExpandedGroup] = useState(null);
  const [selectedMonth, setSelectedMonth] = useState(()=>{const now=new Date();return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');});
  const [drilldown, setDrilldown] = useState(null);
  const [budgetAcct, setBudgetAcctRaw] = useState(defaultAcct||'all');
  const setBudgetAcct = (v) => { setBudgetAcctRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [editingDueDay, setEditingDueDay] = useState(null);
  const [dueDayVal, setDueDayVal] = useState('');
  const [editingSchedule, setEditingSchedule] = useState(null); // category name being edited

  // Build due day lookup: category-level dueDay, then dictionary overrides
  const dueDayByCategory = useMemo(()=>{
    const m = {};
    categories.forEach(c=>{
      if(c.dueDay && c.dueDay>=1 && c.dueDay<=31) m[c.name] = c.dueDay;
    });
    (dictionary||[]).forEach(d=>{
      if(d.dueDay && d.dueDay>=1 && d.dueDay<=31 && d.category){
        m[d.category] = d.dueDay;
      }
    });
    return m;
  },[dictionary, categories]);

  // Get months with data
  const months = useMemo(()=>{
    const m = new Set();
    transactions.forEach(t=>{
      const ym = getYearMonth(t.date);
      if(ym) m.add(ym);
    });
    return [...m].sort();
  },[transactions]);

  const monthIdx = selectedMonth==='all' ? -1 : months.indexOf(selectedMonth);
  const canGoPrev = selectedMonth!=='all' && monthIdx > 0;
  const canGoNext = selectedMonth!=='all' && monthIdx < months.length-1;
  const goPrevMonth = ()=>{ if(canGoPrev) setSelectedMonth(months[monthIdx-1]); };
  const goNextMonth = ()=>{ if(canGoNext) setSelectedMonth(months[monthIdx+1]); };

  // Filter transactions by selected month and account
  const filteredTxns = useMemo(()=>{
    let arr = transactions;
    if(selectedMonth!=='all') arr = arr.filter(t=>getYearMonth(t.date)===selectedMonth);
    if(budgetAcct!=='all') arr = arr.filter(t=>t.accountId===budgetAcct);
    return arr;
  },[transactions, selectedMonth, budgetAcct]);

  const numMonths = selectedMonth==='all' ? Math.max(months.length, 1) : 1;

  const grouped = useMemo(()=>{
    const g = {};
    categories.forEach(c=>{
      if(!g[c.group]) g[c.group]=[];
      g[c.group].push(c);
    });
    return g;
  },[categories]);

  const spendingCats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
  const totalBudget = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
  const discBudget = spendingCats.filter(c=>c.catType==='discretionary').reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
  const fixedBudget = spendingCats.filter(c=>c.catType==='fixed').reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);

  const updateBudget = (catName, val) => {
    const numVal = Math.max(0,+val);
    if(budgetAcct==='all') {
      setCategories(prev=>prev.map(c=>c.name===catName?{...c,budget:numVal}:c));
    } else {
      setCategories(prev=>prev.map(c=>{
        if(c.name!==catName) return c;
        const ab = {...(c.accountBudgets||{}), [budgetAcct]:numVal};
        return {...c, accountBudgets:ab};
      }));
    }
  };

  const saveDueDay = () => {
    const val = parseInt(dueDayVal);
    if(val>=1 && val<=31) {
      setCategories(prev=>prev.map(c=>c.name===editingDueDay?{...c,dueDay:val}:c));
    }
    setEditingDueDay(null);
  };

  const updateCatField = (catName, field, value) => {
    setCategories(prev=>prev.map(c=>c.name===catName?{...c,[field]:value}:c));
  };

  // Actual spending by category (exclude transfers), using filtered transactions
  const actualByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount<0 && t.catType!=='transfer').forEach(t=>{
      m[t.category] = (m[t.category]||0) + Math.abs(t.amount);
    });
    return m;
  },[filteredTxns]);

  // Transactions by category for drilldown
  const txnsByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount<0 && t.catType!=='transfer').forEach(t=>{
      if(!m[t.category]) m[t.category]=[];
      m[t.category].push(t);
    });
    return m;
  },[filteredTxns]);

  // Actual income by category (positive amounts, exclude transfers)
  const incomeByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount>=0 && t.catType!=='transfer').forEach(t=>{
      m[t.category] = (m[t.category]||0) + t.amount;
    });
    return m;
  },[filteredTxns]);

  // Income transactions by category for drilldown
  const incomeTxnsByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount>=0 && t.catType!=='transfer').forEach(t=>{
      if(!m[t.category]) m[t.category]=[];
      m[t.category].push(t);
    });
    return m;
  },[filteredTxns]);

  // Actual transfers by category
  const transferByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.catType==='transfer').forEach(t=>{
      m[t.category] = (m[t.category]||0) + Math.abs(t.amount);
    });
    return m;
  },[filteredTxns]);
  const transferTxnsByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.catType==='transfer').forEach(t=>{
      if(!m[t.category]) m[t.category]=[];
      m[t.category].push(t);
    });
    return m;
  },[filteredTxns]);

  const totalIncome = Object.values(incomeByCategory).reduce((s,v)=>s+v,0);
  const totalExpenses = Object.values(actualByCategory).reduce((s,v)=>s+v,0);
  const totalIncomeDisplay = selectedMonth==='all' ? totalIncome/numMonths : totalIncome;
  const totalExpensesDisplay = selectedMonth==='all' ? totalExpenses/numMonths : totalExpenses;

  // Format month label
  const monthLabel = (ym) => {
    const [y,m] = ym.split('-');
    const names = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[+m]+' '+y;
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'\uD83D\uDCB0 Budget Setup', h(InfoPill,{text:'Set monthly budget amounts for each category. The app tracks your actual spending against these budgets across all pages.'})),
        h('p',null,'Set monthly budget targets for each category.')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
        selectedMonth!=='all'
          ? h('button',{className:'btn sm',onClick:()=>setSelectedMonth('all'),style:{fontSize:11,padding:'4px 10px'}}, 'All Months (Avg)')
          : h('span',{style:{fontSize:12,fontWeight:600,color:'var(--accent2)',background:'rgba(232,160,32,0.12)',padding:'4px 10px',borderRadius:6}}, 'All Months (Avg)'),
        months.length>0 && selectedMonth!=='all' && h('div',{style:{display:'flex',alignItems:'center',gap:4}},
          h('button',{className:'btn sm',onClick:goPrevMonth,disabled:!canGoPrev,'aria-label':'Previous month',style:{padding:'4px 8px',fontSize:14}}, '\u2190'),
          h('span',{style:{fontWeight:700,fontSize:14,minWidth:100,textAlign:'center'}}, monthLabel(selectedMonth)),
          h('button',{className:'btn sm',onClick:goNextMonth,disabled:!canGoNext,'aria-label':'Next month',style:{padding:'4px 8px',fontSize:14}}, '\u2192')
        ),
        selectedMonth==='all' && months.length>0 && h('button',{className:'btn sm',onClick:()=>{
          const now=new Date();const curYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
          setSelectedMonth(months.includes(curYM)?curYM:months[months.length-1]);
        },style:{fontSize:11,padding:'4px 10px'}}, 'Go to Month \u25b8'),
        accounts.length>1 && h('select',{className:'input',value:budgetAcct,onChange:e=>setBudgetAcct(e.target.value),style:{fontSize:12}},
          h('option',{value:'all'},'All Accounts (Global)'),
          accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
        )
      )
    ),

    (()=>{
      // Always show current month actual vs budget
      const now = new Date();
      const curYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
      const acctFilter = t => budgetAcct==='all' || t.accountId===budgetAcct;
      const curTxns = transactions.filter(t=>acctFilter(t) && getYearMonth(t.date)===curYM);
      const curInc = curTxns.filter(t=>t.amount>=0 && t.catType!=='transfer').reduce((s,t)=>s+t.amount,0);
      const curFixed = curTxns.filter(t=>t.amount<0 && t.catType==='fixed').reduce((s,t)=>s+Math.abs(t.amount),0);
      const curDisc = curTxns.filter(t=>t.amount<0 && t.catType==='discretionary').reduce((s,t)=>s+Math.abs(t.amount),0);
      const curXfer = curTxns.filter(t=>t.amount<0 && t.catType==='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
      const incomeBudgetMo = (grouped['Income']||[]).reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
      const xferBudgetMo = categories.filter(c=>c.catType==='transfer').reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
      const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const mLabel = mNames[now.getMonth()];
      return h('div',{className:'stats'},
        h(Stat,{label:mLabel+' Income', value:fmt(curInc)+' / '+fmt(incomeBudgetMo), color:'var(--green)'}),
        h(Stat,{label:mLabel+' Fixed', value:fmt(curFixed)+' / '+fmt(fixedBudget), color:'var(--blue)'}),
        h(Stat,{label:mLabel+' Discretionary', value:fmt(curDisc)+' / '+fmt(discBudget), color:'var(--yellow)'}),
        xferBudgetMo>0 && h(Stat,{label:mLabel+' Transfers', value:fmt(curXfer)+' / '+fmt(xferBudgetMo), color:'var(--pink)'})
      );
    })(),

    categories.length === 0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'\uD83D\uDCB0'),
            h('p',null,'Create categories first on the Categories page, then come back here to set budgets.')
          )
        )
      : h('div',null,

          // ── Income Section ──
          grouped['Income'] && grouped['Income'].length>0 && h('div',{className:'card',style:{marginBottom:14}},
            h('h3',null, h('span',{className:'icon'},'📈'), 'Monthly Income',
              selectedMonth!=='all' && h('span',{style:{fontWeight:400,fontSize:12,color:'var(--card-text2)',marginLeft:8}},' — '+monthLabel(selectedMonth)),
              h(InfoPill,{text:'Your income categories and their monthly averages. Set expected amounts to help with balance forecasting on the Dashboard.'})
            ),
            grouped['Income'].map(c => {
              const actual = incomeByCategory[c.name]||0;
              const display = selectedMonth==='all' ? actual/numMonths : actual;
              const catBgt = getEffectiveBudget(c,budgetAcct);
              const pct = catBgt>0 ? Math.min(display/catBgt*100, 100) : 0;
              const catTxns = incomeTxnsByCategory[c.name]||[];
              const freq = c.frequency||'monthly';
              const moEquiv = getMonthlyBudget(c,budgetAcct);
              return h('div',{key:c.name,style:{marginBottom:10,padding:'8px 12px'}},
                h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
                  h('span',{style:{width:130,fontSize:13,fontWeight:500}}, c.name),
                  (()=>{
                    const isEditing = editingSchedule===c.name;
                    const summary = freq==='biweekly' ? (c.refDate ? 'Biweekly' : '+ Schedule')
                      : freq==='semimonthly' ? ('Day '+(c.dueDay||'?')+' & '+(c.dueDay2||'?'))
                      : freq==='quarterly' ? (c.dueDay ? 'Quarterly Day '+c.dueDay : '+ Schedule')
                      : freq==='annual' ? (c.dueDay ? 'Annual Day '+c.dueDay : '+ Schedule')
                      : (c.dueDay ? 'Day '+c.dueDay : '+ Schedule');
                    return isEditing
                      ? h('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:10,flexWrap:'wrap'},onClick:e=>e.stopPropagation()},
                          h('select',{value:freq,onChange:e=>updateCatField(c.name,'frequency',e.target.value),
                            style:{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',background:'var(--surface)'}},
                            h('option',{value:'monthly'},'Monthly'),
                            h('option',{value:'biweekly'},'Biweekly'),
                            h('option',{value:'semimonthly'},'Semi-monthly'),
                            h('option',{value:'quarterly'},'Quarterly'),
                            h('option',{value:'annual'},'Annual')
                          ),
                          (freq==='monthly'||freq==='quarterly'||freq==='annual') && h('input',{type:'number',min:1,max:31,placeholder:'Day',value:c.dueDay||'',
                            onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay',v);},
                            style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}}),
                          (freq==='quarterly'||freq==='annual') && h('input',{type:'date',value:c.refDate||'',placeholder:'Start date',
                            onChange:e=>updateCatField(c.name,'refDate',e.target.value),
                            style:{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)'}}),
                          freq==='semimonthly' && h(React.Fragment,null,
                            h('input',{type:'number',min:1,max:31,placeholder:'Day 1',value:c.dueDay||'',
                              onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay',v);},
                              style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}}),
                            h('span',null,'&'),
                            h('input',{type:'number',min:1,max:31,placeholder:'Day 2',value:c.dueDay2||'',
                              onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay2',v);},
                              style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}})
                          ),
                          freq==='biweekly' && h('input',{type:'date',value:c.refDate||'',
                            onChange:e=>updateCatField(c.name,'refDate',e.target.value),
                            style:{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)'}}),
                          h('button',{className:'btn sm',onClick:()=>setEditingSchedule(null),
                            style:{fontSize:9,padding:'1px 6px'}},'✓')
                        )
                      : h('span',{onClick:()=>setEditingSchedule(c.name),
                          style:{fontSize:9,padding:'1px 5px',borderRadius:99,background:'rgba(64,192,128,0.12)',color:'var(--green)',fontWeight:600,whiteSpace:'nowrap',cursor:'pointer'}},
                          summary);
                  })(),
                  h('span',{style:{color:'var(--text2)',fontSize:13}},'$'),
                  h('input',{className:'input',type:'number',value:catBgt,
                    onChange:e=>updateBudget(c.name,e.target.value),
                    style:{width:90,padding:'5px 8px',fontSize:13}
                  }),
                  freq!=='monthly' && catBgt>0 && h('span',{style:{fontSize:9,color:'var(--text2)',fontStyle:'italic'}},'~'+fmt(moEquiv)+'/mo'),
                  budgetAcct!=='all' && !(c.accountBudgets && c.accountBudgets[budgetAcct]!==undefined) && h('span',{style:{fontSize:9,color:'var(--text2)',fontStyle:'italic'}},'global'),
                  h('div',{style:{flex:1,minWidth:80}},
                    h('div',{className:'progress'},
                      h('div',{className:'progress-fill',style:{width:pct+'%',background:'var(--green)'}})
                    )
                  ),
                  h('span',{style:{fontSize:11,color:'var(--green)',minWidth:70,textAlign:'right'}},
                    fmt(display)+(selectedMonth==='all'?' avg':'')
                  ),
                  catBgt>0 && h('span',{style:{fontSize:11,color:'var(--text2)',minWidth:60,textAlign:'right'}},
                    'of ',fmt(moEquiv),'/mo'
                  ),
