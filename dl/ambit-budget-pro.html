// ── Dashboard Page ──────────────────────────────────────
function DashboardPage({categories, transactions, catMap, accounts, dictionary, setDictionary, onStartTour, tier, isDemo, groupColors, defaultAcct}) {
  const [selectedMonth, setSelectedMonth] = useState('all');
  const [selectedAcct, setSelectedAcctRaw] = useState(defaultAcct||'all');
  const setSelectedAcct = (v) => { setSelectedAcctRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [drilldown, setDrilldown] = useState(null);
  const [editingDueDay, setEditingDueDay] = useState(null);
  const [dueDayInput, setDueDayInput] = useState('');
  const [dueDayFreqInput, setDueDayFreqInput] = useState('monthly');
  const [expandedCats, setExpandedCats] = useState(new Set());
  const [expandedPayee, setExpandedPayee] = useState(null);
  const [forecastExpanded, setForecastExpanded] = useState(false);
  const [forecastDiscExpanded, setForecastDiscExpanded] = useState(new Set());
  const [dashView, setDashView] = useState('overview');
  const [yearViewYear, setYearViewYear] = useState(()=>new Date().getFullYear());
  const [yearViewDrilldown, setYearViewDrilldown] = useState(null);
  const toggleCat = k => setExpandedCats(prev => { const s = new Set(prev); s.has(k)?s.delete(k):s.add(k); return s; });

  // ── Bills & Budget Window ──
  const bbWindow = useMemo(()=>{
    const now = new Date();
    const realYear = now.getFullYear();
    const realMonth = now.getMonth()+1;
    const realYM = realYear+'-'+String(realMonth).padStart(2,'0');
    // Target month: use selectedMonth if specific, otherwise current month
    const targetYM = (selectedMonth!=='all') ? selectedMonth : realYM;
    const isCurrentMonth = targetYM===realYM;
    const [tYear, tMonth] = targetYM.split('-').map(Number);
    const todayDay = isCurrentMonth ? now.getDate() : new Date(tYear, tMonth, 0).getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const monthLabel = monthNames[tMonth-1]+' '+tYear;
    const curMonth = tMonth; // alias for backward compat within bbWindow

    const currentMonthTxns = transactions.filter(t=>getYearMonth(t.date)===targetYM && (selectedAcct==='all' || t.accountId===selectedAcct));

    // Historical data by payee
    const historyByPayee = {};
    transactions.forEach(t=>{
      if(!t.cleanName) return;
      if(selectedAcct!=='all' && t.accountId!==selectedAcct) return;
      const p = parseDateParts(t.date);
      if(!p) return;
      if(!historyByPayee[t.cleanName]) historyByPayee[t.cleanName]=[];
      historyByPayee[t.cleanName].push({day:p.day, amount:Math.abs(t.amount), ym:getYearMonth(t.date)});
    });

    const getExpectedDay = (cleanName, dictEntry, cat) => {
      if(dictEntry && dictEntry.dueDay && dictEntry.dueDay>=1 && dictEntry.dueDay<=31) return dictEntry.dueDay;
      if(cat && cat.dueDay && cat.dueDay>=1 && cat.dueDay<=31) return cat.dueDay;
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return null;
      const avg = Math.round(hist.reduce((s,h)=>s+h.day,0)/hist.length);
      return Math.min(avg,28);
    };

    const getExpectedAmount = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      return hist.reduce((s,h)=>s+h.amount,0)/hist.length;
    };

    const getMonthlyAvg = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      const months = new Set(hist.map(h=>h.ym));
      return months.size>0 ? hist.reduce((s,h)=>s+h.amount,0)/months.size : 0;
    };

    const dictByCleanName = {};
    (dictionary||[]).forEach(d=>{if(d.cleanName) dictByCleanName[d.cleanName]=d;});

    // Determine if a payee is expected this month based on frequency
    const isExpectedThisMonth = (rule) => {
      const freq = rule.frequency || 'monthly';
      if(freq==='monthly') return true;
      // Check history: what months does this payee typically appear?
      const hist = historyByPayee[rule.cleanName]||[];
      if(hist.length===0) return true; // No history, assume it could be this month
      const historicalMonths = [...new Set(hist.map(h=>{const parts=h.ym.split('-');return +parts[1];}))];
      if(freq==='quarterly') {
        // Expected if current month matches one of the historical months (mod 3 pattern)
        return historicalMonths.some(m=>m%3===curMonth%3) || historicalMonths.includes(curMonth);
      }
      if(freq==='biannual') {
        // Expected every 6 months — check if this month matches historical pattern
        return historicalMonths.some(m=>m%6===curMonth%6) || historicalMonths.includes(curMonth);
      }
      if(freq==='annual') {
        return historicalMonths.includes(curMonth);
      }
      return true;
    };

    // Get frequency label for display
    const freqLabel = (rule) => {
      const f = rule.frequency||'monthly';
      if(f==='quarterly') return 'Quarterly';
      if(f==='biannual') return 'Biannual';
      if(f==='annual') return 'Annual';
      return null;
    };

    // Income
    const incomeCats = categories.filter(c=>c.group==='Income');
    const incomeData = incomeCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const payees = rules.filter(rule=>{
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name && t.amount>=0);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name && t.amount>=0);
        const received = txns.length>0;
        const receivedAmount = txns.reduce((s,t)=>s+t.amount,0);
        const receivedDate = received?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule, cat);
        const expectedAmount = getExpectedAmount(cn);
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, received, receivedAmount, receivedDate, expectedDay, expectedAmount, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      const totalReceived = payees.filter(p=>p.received).reduce((s,p)=>s+p.receivedAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      return {...cat, payees, totalReceived, totalExpected};
    }).filter(c=>c.payees.length>0);

    // Fixed bills
    const fixedCats = categories.filter(c=>c.catType==='fixed' && c.group!=='Income');
    const billsData = fixedCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const payees = rules.filter(rule=>{
        // Always show if paid this month; otherwise only show if expected this month
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name);
        const isPaid = txns.length>0;
        const paidAmount = isPaid?txns.reduce((s,t)=>s+Math.abs(t.amount),0):0;
        const paidDate = isPaid?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule, cat);
        const expectedAmount = getExpectedAmount(cn);
        const isUpcoming = !isPaid && expectedDay!==null;
        const isPastDue = isUpcoming && expectedDay<todayDay;
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, isPaid, paidAmount, paidDate, expectedDay, expectedAmount, isUpcoming, isPastDue, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      const totalPaid = payees.filter(p=>p.isPaid).reduce((s,p)=>s+p.paidAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      const allPaid = payees.length>0 && payees.every(p=>p.isPaid);
      return {...cat, payees, totalPaid, totalExpected, allPaid};
    }).filter(c=>c.payees.length>0);

    // Discretionary — budget-focused (no payee drill-down)
    const discCats = categories.filter(c=>c.catType==='discretionary' && c.group!=='Income');
    const discretionaryData = discCats.map(cat=>{
      const catActual = currentMonthTxns.filter(t=>t.category===cat.name&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const catBudget = getEffectiveBudget(cat, selectedAcct);
      const overBudget = catBudget>0 && catActual>catBudget;
      const budgetPct = catBudget>0 ? Math.round(catActual/catBudget*100) : 0;
      const budgetRemaining = catBudget - catActual;
      return {...cat, catActual, catBudget, overBudget, budgetPct, budgetRemaining};
    }).filter(c=>c.catBudget>0||c.catActual>0);

    // ── Forecast ──
    const currentBalance = (selectedAcct==='all'
      ? accounts.reduce((s,a)=>s+(a.startingBalance||0),0)
      : (accounts.find(a=>a.id===selectedAcct)?.startingBalance||0))
      + transactions.filter(t=>selectedAcct==='all' || t.accountId===selectedAcct).reduce((s,t)=>s+t.amount,0);

    // Budget-driven forecast totals
    const curYMKey2 = (() => { const m = new Date().getMonth()+1; return new Date().getFullYear()+'-'+(m<10?'0':'')+m; })();
    const forecastFilterAcct = t => selectedAcct==='all' || t.accountId===selectedAcct;
    const forecastMonthTxns = transactions.filter(t=>forecastFilterAcct(t) && getYearMonth(t.date)===curYMKey2);

    const totalIncomeBudget = incomeCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const receivedIncome = forecastMonthTxns.filter(t=>t.amount>=0 && incomeCats.some(c=>c.name===t.category)).reduce((s,t)=>s+t.amount,0);
    const remainingIncome = Math.max(0, totalIncomeBudget - receivedIncome);

    const fixedBillCats = categories.filter(c=>(c.catType==='fixed'||c.catType==='transfer') && c.group!=='Income');
    const totalBillsBudget = fixedBillCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const paidBills = forecastMonthTxns.filter(t=>t.amount<0 && fixedBillCats.some(c=>c.name===t.category)).reduce((s,t)=>s+Math.abs(t.amount),0);
    const remainingBills = Math.max(0, totalBillsBudget - paidBills);

    const totalDiscBudget = discCats.reduce((s,c)=>s+getEffectiveBudget(c,selectedAcct),0);
    const totalDiscSpent = discretionaryData.reduce((s,c)=>s+c.catActual,0);
    const remainingDiscBudget = Math.max(0, totalDiscBudget - totalDiscSpent);

    const endOfMonthBalance = currentBalance + remainingIncome - remainingBills - remainingDiscBudget;

    const nextMonthBalance = endOfMonthBalance + totalIncomeBudget - totalBillsBudget - totalDiscBudget;

    return {monthLabel, curMonth, isCurrentMonth, incomeData, billsData, discretionaryData,
      currentBalance, remainingIncome, remainingBills, remainingDiscBudget,
      endOfMonthBalance, nextMonthBalance, totalDiscBudget};
  },[transactions, categories, dictionary, accounts, selectedMonth, selectedAcct]);

  // ── Day-by-Day Forecast ──
  const forecastRows = useMemo(()=>{
    const now = new Date();
    const todayDay = now.getDate();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth(); // 0-indexed
    const daysInCurMonth = new Date(curYear, curMonth+1, 0).getDate();
    const nextMonth = curMonth===11 ? 0 : curMonth+1;
    const nextYear = curMonth===11 ? curYear+1 : curYear;
    const daysInNextMonth = new Date(nextYear, nextMonth+1, 0).getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Budget-driven forecast using getForecastDates for frequency-aware date placement
    const curYM = (curMonth+1<10?'0':'')+(curMonth+1);
    const curYMKey = curYear+'-'+curYM;
    const filterAcct = t => selectedAcct==='all' || t.accountId===selectedAcct;
    const monthTxns = transactions.filter(t=>filterAcct(t) && getYearMonth(t.date)===curYMKey);

    // Fixed bills + transfers from budget categories (frequency-aware)
    const fixedCats = categories.filter(c=>(c.catType==='fixed'||c.catType==='transfer') && c.group!=='Income');
    const curBills = [];
    const nextBills = [];
    fixedCats.forEach(cat=>{
      const dates = getForecastDates(cat, selectedAcct, curYear, curMonth);
      if(dates.length===0) return;
      const paidThisMonth = monthTxns.filter(t=>t.category===cat.name && t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const totalExpected = dates.reduce((s,d)=>s+d.amount,0);
      const isPaid = paidThisMonth >= totalExpected * 0.5;
      if(!isPaid) dates.forEach(d=>curBills.push({day:d.day, label:'🔵 '+cat.name, amount:-d.amount, type:'bill'}));
      const nextDates = getForecastDates(cat, selectedAcct, nextYear, nextMonth);
      nextDates.forEach(d=>nextBills.push({day:d.day, label:'🔵 '+cat.name, amount:-d.amount, type:'bill'}));
    });

    // Income from budget categories (frequency-aware)
    const incomeCats = categories.filter(c=>c.group==='Income');
    const curIncome = [];
    const nextIncome = [];
    incomeCats.forEach(cat=>{
      const dates = getForecastDates(cat, selectedAcct, curYear, curMonth);
      if(dates.length===0) return;
      const receivedThisMonth = monthTxns.filter(t=>t.category===cat.name && t.amount>=0).reduce((s,t)=>s+t.amount,0);
      const totalExpected = dates.reduce((s,d)=>s+d.amount,0);
      const isReceived = receivedThisMonth >= totalExpected * 0.5;
      if(!isReceived) dates.forEach(d=>curIncome.push({day:d.day, label:'🟢 '+cat.name, amount:d.amount, type:'income'}));
      const nextDates = getForecastDates(cat, selectedAcct, nextYear, nextMonth);
      nextDates.forEach(d=>nextIncome.push({day:d.day, label:'🟢 '+cat.name, amount:d.amount, type:'income'}));
    });

    // Weekly discretionary from budgets (budget / 4 per category, spread on Mondays)
    const forecastDiscCats = categories.filter(c=>c.catType==='discretionary' && c.group!=='Income');
    const weeklyDiscTotal = forecastDiscCats.reduce((s,c)=>s+Math.round((getEffectiveBudget(c,selectedAcct)/4)*100)/100, 0);

    const rows = [];
    let running = bbWindow.currentBalance;

    // Current month: today through end of month
    for(let d=todayDay; d<=daysInCurMonth; d++){
      const dt = new Date(curYear, curMonth, d);
      const dateStr = (curMonth+1)+'/'+d;
      const isToday = d===todayDay;

      // Add items for this day
      const dayItems = [];

      // Bills due this day
      curBills.filter(b=>b.day===d).forEach(b=>dayItems.push(b));
      // Income due this day
      curIncome.filter(i=>i.day===d).forEach(i=>dayItems.push(i));
      // Discretionary on Mondays
      if(dt.getDay()===1 && weeklyDiscTotal>0){
        dayItems.push({day:d, label:'🟡 Weekly discretionary', amount:-weeklyDiscTotal, type:'discretionary'});
      }

      if(dayItems.length===0 && !isToday) continue; // skip empty days (except today)

      if(isToday){
        rows.push({date:dateStr, label:'Today', amount:0, runningBalance:running, isToday:true, type:'today'});
      }

      dayItems.forEach(item=>{
        running += item.amount;
        rows.push({date:dateStr, label:item.label, amount:item.amount, runningBalance:running, type:item.type});
      });
    }

    // Month divider
    rows.push({date:'', label:monthNames[nextMonth]+' '+nextYear, amount:0, runningBalance:running, isMonthDivider:true, type:'divider'});

    // Next month: day 1 through end
    for(let d=1; d<=daysInNextMonth; d++){
      const dt2 = new Date(nextYear, nextMonth, d);
      const dateStr = (nextMonth+1)+'/'+d;

      const dayItems = [];
      nextBills.filter(b=>b.day===d).forEach(b=>dayItems.push(b));
      nextIncome.filter(i=>i.day===d).forEach(i=>dayItems.push(i));
      if(dt2.getDay()===1 && weeklyDiscTotal>0){
        dayItems.push({day:d, label:'🟡 Weekly discretionary', amount:-weeklyDiscTotal, type:'discretionary'});
      }

      if(dayItems.length===0) continue;

      dayItems.forEach(item=>{
        running += item.amount;
        rows.push({date:dateStr, label:item.label, amount:item.amount, runningBalance:running, type:item.type});
      });
    }

    return rows;
  },[bbWindow, categories]);

  const openDueDayEditor = (keyword, currentDueDay, currentFreq) => {
    setEditingDueDay(keyword);
    setDueDayInput(currentDueDay ? String(currentDueDay) : '');
    setDueDayFreqInput(currentFreq || 'monthly');
  };

  const saveDueDay = () => {
    const val = parseInt(dueDayInput);
    const day = (val>=1 && val<=31) ? val : null;
    const freq = dueDayFreqInput==='monthly' ? undefined : dueDayFreqInput;
    setDictionary(prev=>prev.map(d=>d.keyword===editingDueDay?{...d, dueDay:day, frequency:freq}:d));
    setEditingDueDay(null);
  };

  const months = useMemo(()=>{
    const m = new Set();
    transactions.forEach(t=>{
      const ym = getYearMonth(t.date);
      if(ym) m.add(ym);
    });
    return [...m].sort();
  },[transactions]);

  const filteredTxns = useMemo(()=>{
    let arr = transactions;
    if(selectedMonth!=='all') arr = arr.filter(t=> getYearMonth(t.date) === selectedMonth);
    if(selectedAcct!=='all') arr = arr.filter(t=> t.accountId === selectedAcct);
    return arr;
  },[transactions, selectedMonth, selectedAcct]);

  const numMonths = selectedMonth==='all' ? Math.max(months.length,1) : 1;

  // Separate transfers from spending
  const spendingTxns = filteredTxns.filter(t=>t.catType!=='transfer');
  const transferTxns = filteredTxns.filter(t=>t.catType==='transfer');
  const expenses = spendingTxns.filter(t=>t.amount<0);
  const income = spendingTxns.filter(t=>t.amount>=0);
  const totalExp = expenses.reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const totalXfer = transferTxns.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const spendingCats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
  const totalBudget = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0) * numMonths;

  // Budget comparison: current month vs previous month
  const prevMonthBudget = useMemo(()=>{
    const now = new Date();
    const realYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const targetYM = (selectedMonth!=='all') ? selectedMonth : realYM;
    const [tYear,tMonth] = targetYM.split('-').map(Number);
    const prevMonth = tMonth===1 ? 12 : tMonth-1;
    const prevYear = tMonth===1 ? tYear-1 : tYear;
    const prevYM = prevYear+'-'+String(prevMonth).padStart(2,'0');
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const budgetPerMonth = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const filterAcct = arr => selectedAcct!=='all' ? arr.filter(t=>t.accountId===selectedAcct) : arr;
    const curTxns = filterAcct(transactions.filter(t=>getYearMonth(t.date)===targetYM));
    const prevTxns = filterAcct(transactions.filter(t=>getYearMonth(t.date)===prevYM));
    const curSpent = curTxns.filter(t=>t.amount<0&&t.catType!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
    const prevSpent = prevTxns.filter(t=>t.amount<0&&t.catType!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
    return {
      curLabel:monthNames[tMonth-1], prevLabel:monthNames[prevMonth-1],
      budget:budgetPerMonth, curSpent, prevSpent,
      curDiff:budgetPerMonth-curSpent, prevDiff:budgetPerMonth-prevSpent,
      curPct:budgetPerMonth>0?Math.round(curSpent/budgetPerMonth*100):0,
      prevPct:budgetPerMonth>0?Math.round(prevSpent/budgetPerMonth*100):0,
      hasPrevData:prevTxns.length>0
    };
  },[transactions,categories,selectedMonth,selectedAcct]);

  // Category analysis (exclude transfers)
  const catAnalysis = useMemo(()=>{
    const byCategory = {};
    expenses.forEach(t=>{
      if(!byCategory[t.category]) byCategory[t.category]={spent:0,txns:[]};
      byCategory[t.category].spent += Math.abs(t.amount);
      byCategory[t.category].txns.push(t);
    });

    return spendingCats.map(c=>{
      const data = byCategory[c.name] || {spent:0,txns:[]};
      const budget = getMonthlyBudget(c,selectedAcct)*numMonths;
      const avg = data.spent/numMonths;
      const diff = budget - data.spent;
      const pct = budget>0 ? (data.spent/budget*100) : 0;
      let status = '✅', sColor = 'var(--green)';
      if(pct>120) { status='🔴'; sColor='var(--red)'; }
      else if(pct>100) { status='🟡'; sColor='var(--yellow)'; }
      else if(pct<50 && budget>0) { status='💚'; }
      return { ...c, spent:data.spent, budget, avg, diff, pct, status, sColor, txns:data.txns };
    }).filter(c=>c.spent>0||c.budget>0).sort((a,b)=>b.spent-a.spent);
  },[spendingCats, expenses, numMonths]);

  // Group analysis (exclude transfers)
  const grpAnalysis = useMemo(()=>{
    const g = {};
    expenses.forEach(t=>{
      if(!g[t.group]) g[t.group]=0;
      g[t.group] += Math.abs(t.amount);
    });
    return Object.entries(g).sort((a,b)=>b[1]-a[1]);
  },[expenses]);

  // ── Calendar Year View data ──
  const expenseBudgetPerMonth = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
  const yearViewData = useMemo(()=>{
    if(dashView!=='annual') return null;
    const monthKeys = [];
    for(let m=1;m<=12;m++) monthKeys.push(yearViewYear+'-'+String(m).padStart(2,'0'));
    const cats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
    const spendMap = {};
    const txnMap = {};
    transactions.forEach(t=>{
      if(t.amount>=0 || t.catType==='transfer') return;
      const ym = getYearMonth(t.date);
      if(!ym || !ym.startsWith(yearViewYear+'-')) return;
      const key = t.category+'|'+ym;
      spendMap[key] = (spendMap[key]||0) + Math.abs(t.amount);
      if(!txnMap[key]) txnMap[key]=[];
      txnMap[key].push(t);
    });
    const grpd = {};
    cats.forEach(c=>{if(!grpd[c.group]) grpd[c.group]=[];grpd[c.group].push(c);});
    const colTotals = {};
    monthKeys.forEach(ym=>{colTotals[ym]=cats.reduce((s,c)=>s+(spendMap[c.name+'|'+ym]||0),0);});
    const rowTotals = {};
    cats.forEach(c=>{rowTotals[c.name]=monthKeys.reduce((s,ym)=>s+(spendMap[c.name+'|'+ym]||0),0);});
    const grandTotal = Object.values(rowTotals).reduce((s,v)=>s+v,0);
    // Yearly income/expenses/transfers for annual stats
    let yearIncome=0, yearExpenses=0, yearTransfers=0;
    transactions.forEach(t=>{
      const ym=getYearMonth(t.date);
      if(!ym||!ym.startsWith(yearViewYear+'-')) return;
      if(t.catType==='transfer'){if(t.amount<0) yearTransfers+=Math.abs(t.amount);}
      else if(t.amount>=0) yearIncome+=t.amount;
      else yearExpenses+=Math.abs(t.amount);
    });
    return {monthKeys,cats,grouped:grpd,spendMap,txnMap,colTotals,rowTotals,grandTotal,yearIncome,yearExpenses,yearTransfers};
  },[dashView,yearViewYear,categories,transactions]);

  const availableYears = useMemo(()=>{
    const yrs = new Set();
    transactions.forEach(t=>{const ym=getYearMonth(t.date);if(ym) yrs.add(+ym.split('-')[0]);});
    yrs.add(new Date().getFullYear());
    return [...yrs].sort();
  },[transactions]);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📊 Dashboard', h(InfoPill,{text:'Overview of your spending, bills, and balance projections. Use the filters above to view a specific account or month. Click any category in the table below to see individual transactions.'})),
        h('p',null,'Budget performance and spending analysis.')
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        (isDemo || tier?.yearView) && h('div',{style:{display:'flex',gap:0,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginRight:4}},
          h('button',{onClick:()=>setDashView('overview'),style:{padding:'5px 14px',fontSize:11,fontWeight:dashView==='overview'?700:400,border:'none',cursor:'pointer',background:dashView==='overview'?'var(--accent2)':'var(--surface2)',color:dashView==='overview'?'#fff':'var(--card-text)'}},'Dashboard'),
          h('button',{onClick:()=>setDashView('annual'),style:{padding:'5px 14px',fontSize:11,fontWeight:dashView==='annual'?700:400,border:'none',cursor:'pointer',background:dashView==='annual'?'var(--accent2)':'var(--surface2)',color:dashView==='annual'?'#fff':'var(--card-text)'}},'Annual View')
        ),
        dashView==='overview' && onStartTour && h('button',{className:'btn sm',onClick:onStartTour,style:{fontSize:12}},'\uD83C\uDFAF Tour'),
        dashView==='overview' && accounts.length>0 && h('select',{className:'input',value:selectedAcct,onChange:e=>setSelectedAcct(e.target.value)},
          h('option',{value:'all'},'All Accounts'),
          accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
        ),
        dashView==='overview' && h('select',{className:'input',value:selectedMonth,onChange:e=>setSelectedMonth(e.target.value)},
          h('option',{value:'all'},'All Time ('+months.length+' months)'),
          months.map(m=>h('option',{key:m,value:m}, new Date(+m.split('-')[0], +m.split('-')[1]-1, 1).toLocaleDateString('en-US',{year:'numeric',month:'long'})))
        )
      )
    ),

    // ── Overview View ──
    dashView==='overview' && h('div',null,

    // ── Balance Forecast (hero, top of page) ──
    bbWindow.isCurrentMonth && accounts.length>0 && (isDemo || tier?.forecast
    ? h('div',{className:'card',style:{padding:'10px 16px',marginBottom:14}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
          h('h3',{style:{margin:0,fontSize:13}}, h('span',{className:'icon'},'🔮'), 'Balance Forecast', h(InfoPill,{text:'End of Month = Current Balance + Remaining Income \u2212 Unpaid Bills \u2212 Remaining Discretionary Budget. \"Remaining Disc\" = your total discretionary budget minus what you have already spent this month. Next Month projects a full month of income, bills, and discretionary spending. Red means projected negative.'})),
          h('span',{style:{fontSize:10,color:'var(--card-text2)'}},'budget + expected bills')
        ),
        h('div',{style:{display:'flex',gap:0,alignItems:'center'}},
          h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px'}},
            h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'Current'),
            h('div',{style:{fontSize:22,fontWeight:700,color:bbWindow.currentBalance>=0?'var(--green)':'var(--red)'}},
              fmt(bbWindow.currentBalance))
          ),
          h('div',{style:{width:1,background:'var(--border)',alignSelf:'stretch',margin:'2px 0'}}),
          h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px',
            background:bbWindow.endOfMonthBalance<0?'rgba(224,80,80,0.08)':'transparent',borderRadius:6}},
            h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'End of Month'),
            h('div',{style:{fontSize:22,fontWeight:700,color:bbWindow.endOfMonthBalance>=0?'var(--green)':'var(--red)'}},
              fmt(bbWindow.endOfMonthBalance),
              bbWindow.endOfMonthBalance<0&&h('span',{style:{fontSize:10,marginLeft:4}},'⚠️'))
          ),
          h('div',{style:{width:1,background:'var(--border)',alignSelf:'stretch',margin:'2px 0'}}),
          h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px',
            background:bbWindow.nextMonthBalance<0?'rgba(224,80,80,0.08)':'transparent',borderRadius:6}},
            h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'Next Month'),
            h('div',{style:{fontSize:22,fontWeight:700,color:bbWindow.nextMonthBalance>=0?'var(--green)':'var(--red)'}},
              fmt(bbWindow.nextMonthBalance),
              bbWindow.nextMonthBalance<0&&h('span',{style:{fontSize:10,marginLeft:4}},'⚠️'))
          )
        ),
        h('div',{style:{display:'flex',gap:12,marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)',flexWrap:'wrap',justifyContent:'center'}},
          h('span',{style:{fontSize:10,color:'var(--green)'}}, '+Income: ',h('strong',null,fmt(bbWindow.remainingIncome)), bbWindow.remainingIncome===0 && h('span',{style:{fontSize:9,color:'var(--card-text2)',marginLeft:2}},'(received)')),
          h('span',{style:{fontSize:10,color:'var(--red)'}}, '-Bills: ',h('strong',null,fmt(bbWindow.remainingBills))),
          h('span',{style:{fontSize:10,color:'var(--yellow)'}}, '-Disc: ',h('strong',null,fmt(bbWindow.remainingDiscBudget)))
        )
      )
    : h('div',{style:{textAlign:'center',padding:'16px 20px',marginBottom:14,background:'rgba(232,160,32,0.06)',border:'1px dashed var(--accent2)',borderRadius:8}},

            h('div',{style:{fontSize:18,fontWeight:700}},fmt(prevMonthBudget.budget))

          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:10,color:'var(--card-text2)'}},'Spent'),
            h('div',{style:{fontSize:18,fontWeight:700,color:'var(--red)'}},fmt(prevMonthBudget.prevSpent))

        h('div',{className:'progress',style:{marginBottom:4}},

        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11}},
          h('span',{style:{color:prevMonthBudget.prevDiff>=0?'var(--green)':'var(--red)',fontWeight:600}},

            h('th',{style:{width:90,textAlign:'right',padding:'4px 6px'}},'Balance')

          h('tbody',null, forecastRows.map((row,i)=>{

            if(row.isToday) return h('tr',{key:'today-'+i,style:{background:'rgba(232,160,32,0.08)'}},

              h('td',{style:{padding:'4px 6px'}}),
              h('td',{style:{textAlign:'right',fontWeight:700,padding:'4px 6px',color:row.runningBalance>=0?'var(--green)':'var(--red)'}},

            const hasDetails = row.details && row.details.length>0;
            const discKey = 'disc-'+i;

            const mainRow = h('tr',{key:i,style:{background:row.runningBalance<0?'rgba(224,80,80,0.05)':'transparent',cursor:hasDetails?'pointer':'default'},

              h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:600,color:amtColor}},

              h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:700,color:row.runningBalance>=0?'var(--green)':'var(--red)'}},

            return [mainRow].concat(row.details.map((d,di)=>

                h('td',{style:{textAlign:'right',padding:'2px 6px',fontSize:11,color:'var(--yellow)'}}, '-'+fmt(d.amount)),

                  // Group spending bars
                  h('div',{style:{flex:1,minWidth:180}},
                    grpAnalysis.map(([grp,amt])=>{
                      const pct = totalExp>0 ? (amt/totalExp*100) : 0;
                      return h('div',{key:grp,style:{marginBottom:8}},

                        h('div',{className:'progress'},
                          h('div',{className:'progress-fill',style:{width:pct+'%',background:groupColors[grp]||'#8b90a5'}})

                  // Disc / Fixed / Transfers summary
                  h('div',{style:{flex:1,minWidth:180,display:'flex',gap:12,justifyContent:'center',alignItems:'center',flexWrap:'wrap'}},
                    (()=>{
                      const discSpent = expenses.filter(t=>t.catType==='discretionary').reduce((s,t)=>s+Math.abs(t.amount),0);
                      const fixedSpent = expenses.filter(t=>t.catType==='fixed').reduce((s,t)=>s+Math.abs(t.amount),0);

                        h('div',{key:'disc',style:{textAlign:'center'}},

                          h('div',{style:{fontSize:11,color:'var(--text2)'}},'Discretionary'),
                          h('div',{style:{fontSize:10,color:'var(--text2)'}},totalExp>0?Math.round(discSpent/totalExp*100)+'%':'—')

                        h('div',{key:'sep1',style:{width:1,height:36,background:'var(--border)'}}),
                        h('div',{key:'fix',style:{textAlign:'center'}},

                          h('div',{style:{fontSize:11,color:'var(--text2)'}},'Fixed'),
                          h('div',{style:{fontSize:10,color:'var(--text2)'}},totalExp>0?Math.round(fixedSpent/totalExp*100)+'%':'—')

                        h('div',{key:'sep2',style:{width:1,height:36,background:'var(--border)'}}),
                        h('div',{key:'xfer',style:{textAlign:'center'}},
                          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--pink)'}},fmt(totalXfer)),
                          h('div',{style:{fontSize:11,color:'var(--text2)'}},'Transfers'),
                          h('div',{style:{fontSize:10,color:'var(--text2)'}},'excluded')
                        )
                      ];
                    })()

                      h('thead',null,h('tr',null,

                          h('td',null, h('span',{style:{color:c.sColor}},c.status))

              h('h3',null,

                h('span',{style:{fontWeight:400,fontSize:12,color:'var(--card-text2)',marginLeft:8}},'\u2014 '+bbWindow.monthLabel),
                h(InfoPill,{text:bbWindow.isCurrentMonth
                  ? "Tracks this month's income, fixed bills, and discretionary spending. Click \u25b8 on a category to expand payee details. Click a payee to see transactions. Use \ud83d\udcc5 to set due dates and billing frequency."

              // Income section
              bbWindow.incomeData.length>0 && h('div',{style:{marginBottom:16}},
                h('div',{style:{fontSize:11,fontWeight:600,color:'var(--green)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}},'Income'),
                bbWindow.incomeData.map(cat=>{
                  const cKey='inc-'+cat.name;
                  const catOpen=expandedCats.has(cKey);
                  return h('div',{key:cat.name,style:{marginBottom:6}},
                    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'},
                      onClick:()=>toggleCat(cKey)},
                      h('span',{style:{fontWeight:600,fontSize:12}},
                        h('span',{style:{fontSize:9,color:'var(--card-text2)',marginRight:6}},catOpen?'▾':'▸'),

                          h('span',{style:{flex:1,fontWeight:500}},p.cleanName),
                          p.received
                            ? h('span',{style:{color:'var(--green)',fontSize:11}}, '+',fmt(p.receivedAmount))

                          h('button',{className:'btn sm',style:{fontSize:9,padding:'1px 4px'},onClick:e=>{e.stopPropagation();openDueDayEditor(p.keyword,p.dueDay,p.frequency)}},'📅')

                          h('div',{key:t.id,style:{display:'flex',gap:8,padding:'2px 0 2px 32px',fontSize:11,color:'var(--card-text2)'}},

                            h('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},t.description),
                            h('span',{style:{fontWeight:500,color:'var(--green)'}},fmt(t.amount))

                  const catOpen=expandedCats.has(cKey);

                      h('span',{style:{fontWeight:600,fontSize:12}},

                        cat.name),
                      h('span',{style:{fontSize:11,color:cat.allPaid?'var(--green)':'var(--card-text2)'}},
                        cat.allPaid?'All Paid ✅':fmt(cat.totalPaid)+' / ~'+fmt(cat.totalExpected))
                    ),
                    catOpen&&cat.payees.map(p=>{
                      const pKey='bill-'+cat.name+'-'+p.cleanName;
                      const isExp=expandedPayee===pKey;
                      return h('div',{key:p.cleanName},
                        h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'4px 0 4px 12px',fontSize:12,cursor:p.txns.length?'pointer':'default'},
                          onClick:()=>p.txns.length&&setExpandedPayee(isExp?null:pKey)},
                          p.txns.length>0&&h('span',{style:{fontSize:9,color:'var(--card-text2)',width:10}},isExp?'▾':'▸'),

                          p.isPaid

                                '~',fmt(p.expectedAmount),
                                p.expectedDay?' by '+bbWindow.curMonth+'/'+p.expectedDay:''),
                          h('button',{className:'btn sm',style:{fontSize:9,padding:'1px 4px'},onClick:e=>{e.stopPropagation();openDueDayEditor(p.keyword,p.dueDay,p.frequency)}},'📅')
                        ),
                        isExp&&p.txns.map(t=>
                          h('div',{key:t.id,style:{display:'flex',gap:8,padding:'2px 0 2px 32px',fontSize:11,color:'var(--card-text2)'}},
                            h('span',{style:{width:56,flexShrink:0}},fmtDate(t.date)),
                            h('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},t.description),
                            h('span',{style:{fontWeight:500}},fmt(Math.abs(t.amount)))
                          )
                        )
                      )})
                  )})
              ),

              // Discretionary section — budget vs spent
              bbWindow.discretionaryData.length>0 && h('div',null,
                h('div',{style:{fontSize:11,fontWeight:600,color:'var(--yellow)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.5px'}},'Discretionary'),
                bbWindow.discretionaryData.map(cat=>
                  h('div',{key:cat.name,style:{
                    marginBottom:6,
                    borderRadius:6,
                    border:cat.overBudget?'2px solid var(--red)':'none',
                    background:cat.overBudget?'rgba(224,80,80,0.08)':'transparent',
                    padding:cat.overBudget?'6px 8px':'0'
                  }},
                    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border)'}},
                      h('span',{style:{fontWeight:600,fontSize:12,color:cat.overBudget?'var(--red)':'inherit'}},
                        cat.overBudget?'🔴 ':'', cat.name),
                      h('div',{style:{display:'flex',alignItems:'center',gap:6}},

                        ),
                        cat.catBudget>0 && h('span',{style:{fontSize:10,fontWeight:600,
                          color:cat.overBudget?'var(--red)':cat.budgetPct>80?'var(--yellow)':'var(--green)'}},
                          cat.overBudget

                    ),
                    cat.catBudget>0 && h('div',{style:{margin:'4px 0'}},
                      h('div',{className:'progress'},
                        h('div',{className:'progress-fill',style:{
                          width:Math.min(cat.budgetPct,100)+'%',
                          background:cat.overBudget?'var(--red)':cat.budgetPct>80?'var(--yellow)':'var(--green)'}})
                      )
                    )
                  )

                  'Set up categories and payee rules to see your bills window here.')
            )
            ) // close right column
          )

    // ── Annual View ──
    dashView==='annual' && (isDemo || tier?.yearView)

// ── Debt Planner Page ─────────────────────────────────
function DebtPlannerPage({accounts, setAccounts, transactions, tier, isDemo, showToast}) {
  const [strategy, setStrategy] = useState('avalanche');
  const [extraPayment, setExtraPayment] = useState(0);
  const [editDebt, setEditDebt] = useState(null);
  const [modalPayment, setModalPayment] = useState('');
  const [modalFreq, setModalFreq] = useState('monthly');
  const [lumpSum, setLumpSum] = useState('');
  const [showLumpSum, setShowLumpSum] = useState(false);

  // Compute current balance per account
  const acctBalances = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{ m[a.id] = a.startingBalance||0; });
    transactions.forEach(t=>{ if(m[t.accountId]!==undefined) m[t.accountId]+=t.amount; });
    return m;
  },[accounts,transactions]);

  // Get debt accounts with current balances + effective monthly
  const debtAccounts = useMemo(()=>{
    return accounts
      .filter(a=>a.type==='credit_card'||a.type==='loan')
      .map(a=>{
        const minPay = a.minimumPayment||0;
        const planned = a.plannedPayment||0;
        const freq = a.paymentFrequency||'monthly';
        const effectiveMonthly = planned>0
          ? (freq==='biweekly' ? planned*26/12 : planned)
          : minPay;
        return {
          id:a.id, name:a.name, type:a.type,
          balance:Math.abs(acctBalances[a.id]||0),
          rate:a.interestRate||0,
          minPayment:minPay,
          plannedPayment:planned,
          paymentFrequency:freq,
          effectiveMonthly,
          creditLimit:a.creditLimit||0,
          last4:a.last4||''
        };
      })
      .filter(a=>a.balance>0);
  },[accounts,acctBalances]);

  // Open edit modal for a debt
  const openModal = (d) => {
    setEditDebt(d.id);
    const acct = accounts.find(a=>a.id===d.id);
    setModalPayment(acct?.plannedPayment || acct?.minimumPayment || '');
    setModalFreq(acct?.paymentFrequency || 'monthly');
  };
  const closeModal = () => { setEditDebt(null); setModalPayment(''); setModalFreq('monthly'); };
  const saveModal = () => {
    setAccounts(prev=>prev.map(a=>a.id===editDebt?{...a, plannedPayment:+modalPayment||0, paymentFrequency:modalFreq}:a));
    if(showToast) showToast('✅ Payment plan saved');
    closeModal();
  };
  const resetPlan = () => {
    setAccounts(prev=>prev.map(a=>a.id===editDebt?{...a, plannedPayment:undefined, paymentFrequency:undefined}:a));
    if(showToast) showToast('✅ Reset to minimum payment');
    closeModal();
  };
  const modalEffective = +modalPayment>0 ? (modalFreq==='biweekly'? +modalPayment*26/12 : +modalPayment) : 0;
  const editAcct = editDebt ? debtAccounts.find(d=>d.id===editDebt) : null;

  // Lump sum allocation helper
  const allocateLumpSum = (amount, debts, strat) => {
    let remaining = amount;
    const result = debts.map(d=>({id:d.id, name:d.name, balance:d.balance, rate:d.rate, allocated:0, newBalance:d.balance}));
    let sorted;
    if(strat==='avalanche') sorted = [...result].sort((a,b)=>b.rate-a.rate);
    else if(strat==='snowball') sorted = [...result].sort((a,b)=>a.balance-b.balance);
    else { // eliminate — pay off small debts first, skip ones too large, then apply leftover
      sorted = [...result].sort((a,b)=>a.balance-b.balance);
      // First pass: fully eliminate debts that fit
      for(const d of sorted) {
        if(remaining<=0) break;
        if(d.balance<=remaining) { d.allocated=d.balance; d.newBalance=0; remaining-=d.balance; }
      }
      // Second pass: apply leftover to next smallest unpaid debt
      for(const d of sorted) {
        if(remaining<=0) break;
        if(d.newBalance>0) { const pay=Math.min(remaining,d.newBalance); d.allocated+=pay; d.newBalance-=pay; remaining-=pay; }
      }
      return result;
    }
    for(const d of sorted) {
      if(remaining<=0) break;
      const pay = Math.min(remaining, d.balance);
      d.allocated = pay;
      d.newBalance = d.balance - pay;
      remaining -= pay;
    }
    return result;
  };

  // Payoff simulation — useMinOnly forces minimums (for baseline comparison)
  const simulate = (debts, extra, useMinOnly, strategyOverride) => {
    if(debts.length===0) return {months:0,totalInterest:0,snapshots:[],debtFreeDate:null,perDebt:{}};
    let balances = debts.map(d=>({...d, bal:d.balance, monthlyPay: useMinOnly ? d.minPayment : d.effectiveMonthly}));
    let totalInterest = 0;
    let months = 0;
    const maxMonths = 600;
    const snapshots = [];
    const perDebt = {};
    debts.forEach(d=>{ perDebt[d.id]={interest:0,paidOff:null,months:0}; });

    const sortDebts = (arr) => {
      if((strategyOverride||strategy)==='snowball') return [...arr].sort((a,b)=>a.bal-b.bal);
      return [...arr].sort((a,b)=>b.rate-a.rate);
    };

    while(balances.some(d=>d.bal>0.01) && months<maxMonths) {
      months++;
      let freedPayment = 0;

      balances.forEach(d=>{
        if(d.bal<=0) return;
        const interest = d.bal * (d.rate/100/12);
        d.bal += interest;
        totalInterest += interest;
        perDebt[d.id].interest += interest;
      });

      balances.forEach(d=>{
        if(d.bal<=0) return;
        const payment = Math.min(d.monthlyPay, d.bal);
        d.bal -= payment;
        if(d.bal<=0.01) { d.bal=0; freedPayment+=d.monthlyPay-payment; if(!perDebt[d.id].paidOff) perDebt[d.id].paidOff=months; }
      });

      let remaining = extra + freedPayment;
      const sorted = sortDebts(balances.filter(d=>d.bal>0));
      for(const target of sorted) {
        if(remaining<=0) break;
        const payment = Math.min(remaining, target.bal);
        target.bal -= payment;
        remaining -= payment;
        if(target.bal<=0.01) { target.bal=0; if(!perDebt[target.id].paidOff) perDebt[target.id].paidOff=months; }
      }

      snapshots.push(balances.map(d=>({id:d.id,bal:d.bal})));
    }

    debts.forEach(d=>{ perDebt[d.id].months = perDebt[d.id].paidOff||months; });
    const now = new Date();
    const debtFreeDate = new Date(now.getFullYear(), now.getMonth()+months, 1);
    return {months, totalInterest, snapshots, debtFreeDate, perDebt};
  };

  const result = useMemo(()=>simulate(debtAccounts, +extraPayment||0, false),[debtAccounts,strategy,extraPayment]);
  const baseline = useMemo(()=>simulate(debtAccounts, 0, true),[debtAccounts,strategy]);

  const totalDebt = debtAccounts.reduce((s,d)=>s+d.balance,0);
  const weightedRate = totalDebt>0 ? debtAccounts.reduce((s,d)=>s+d.rate*(d.balance/totalDebt),0) : 0;
  const interestSaved = baseline.totalInterest - result.totalInterest;
  const monthsSaved = baseline.months - result.months;
  const totalPlannedMonthly = debtAccounts.reduce((s,d)=>s+d.effectiveMonthly,0);

  // Lump sum analysis
  const lumpSumAnalysis = useMemo(()=>{
    const amt = +lumpSum||0;
    if(amt<=0 || debtAccounts.length===0) return null;
    const strategies = ['avalanche','snowball','eliminate'];
    const labels = {avalanche:'Avalanche',snowball:'Snowball',eliminate:'Eliminate Small Debts'};
    const icons = {avalanche:'\u26A1',snowball:'\u2744\uFE0F',eliminate:'\u2705'};
    const descs = {avalanche:'Apply to highest interest rate first',snowball:'Apply to smallest balance first',eliminate:'Pay off small debts entirely first'};
    return strategies.map(strat=>{
      const allocation = allocateLumpSum(amt, debtAccounts, strat);
      const modifiedDebts = debtAccounts.map(d=>{
        const alloc = allocation.find(a=>a.id===d.id);
        return {...d, balance: alloc ? alloc.newBalance : d.balance};
      }).filter(d=>d.balance>0.01);
      const simStrat = strat==='eliminate'?'snowball':strat;
      const simResult = modifiedDebts.length>0 ? simulate(modifiedDebts, +extraPayment||0, false, simStrat) : {months:0,totalInterest:0,debtFreeDate:new Date()};
      return {
        key:strat, label:labels[strat], icon:icons[strat], desc:descs[strat],
        allocation,
        months:simResult.months,
        totalInterest:simResult.totalInterest,
        lsInterestSaved: result.totalInterest - simResult.totalInterest,
        lsMonthsSaved: result.months - simResult.months,
        debtFreeDate: simResult.debtFreeDate,
        debtsEliminated: allocation.filter(a=>a.newBalance<0.01).length
      };
    });
  },[lumpSum,debtAccounts,extraPayment,strategy,result]);

  const lumpSumRec = useMemo(()=>{
    if(!lumpSumAnalysis) return null;
    return lumpSumAnalysis.reduce((best,s)=>!best||s.lsInterestSaved>best.lsInterestSaved?s:best, null);
  },[lumpSumAnalysis]);

  const fmtMo = (d) => { if(!d) return '—'; const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mo[d.getMonth()]+' '+d.getFullYear(); };

  // Sorted debt list by strategy
  const sortedDebts = useMemo(()=>{
    const list = [...debtAccounts];
    if(strategy==='snowball') list.sort((a,b)=>a.balance-b.balance);
    else list.sort((a,b)=>b.rate-a.rate);
    return list;
  },[debtAccounts,strategy]);

  // Plan vs Actual tracking
  const planTracking = useMemo(()=>{
    const now = new Date();
    const currentYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const dayOfMonth = now.getDate();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

    return debtAccounts.map(d=>{
      const monthTxns = transactions.filter(t=>t.accountId===d.id && t.amount>0 && getYearMonth(t.date)===currentYM);
      const totalPaid = monthTxns.reduce((s,t)=>s+t.amount,0);
      const expected = d.effectiveMonthly;
      const pct = expected>0 ? Math.min(Math.round(totalPaid/expected*100),100) : 0;

      let status, color;
      if(totalPaid>=expected && expected>0) { status='✅ On Target'; color='var(--green)'; }
      else if(totalPaid>=expected*0.5 && expected>0) { status='⏳ Partial'; color='var(--accent2)'; }
      else if(dayOfMonth>daysInMonth*0.65 && expected>0) { status='⚠️ Behind'; color='var(--red)'; }
      else { status='⏳ Pending'; color='var(--text2)'; }

      return {id:d.id, totalPaid, expected, pct, status, color, txnCount:monthTxns.length};
    });
  },[debtAccounts,transactions]);

  const trackMap = useMemo(()=>{ const m={}; planTracking.forEach(t=>{m[t.id]=t;}); return m; },[planTracking]);
  const totalPaidThisMonth = planTracking.reduce((s,t)=>s+t.totalPaid,0);
  const totalExpectedThisMonth = planTracking.reduce((s,t)=>s+t.expected,0);
  const overallPct = totalExpectedThisMonth>0 ? Math.min(Math.round(totalPaidThisMonth/totalExpectedThisMonth*100),100) : 0;

  // Gate check
  if(!isDemo && !tier?.debtPlanner) {
    return h('div',{className:'page'},
      h('div',{className:'page-header'},h('h2',null,'💳 Debt Reduction Planner')),
      h('div',{className:'card',style:{textAlign:'center',padding:'40px 20px'}},
        h('div',{style:{fontSize:48,marginBottom:12}},'💳'),
        h('h3',{style:{margin:'0 0 8px'}},'Debt Reduction Planner'),
        h('p',{style:{color:'var(--text2)',marginBottom:16}},'Plan your path to becoming debt-free with Snowball or Avalanche strategies.'),
        h('p',{style:{color:'var(--text2)',fontSize:13}},'This feature is available on the ',h('strong',null,'Pro'),' plan.'),
        h('a',{href:'https://ambitbudget.com/#pricing',target:'_blank',rel:'noopener',
          style:{display:'inline-block',marginTop:12,padding:'8px 20px',background:'var(--accent2)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600}}, 'Upgrade to Pro →')
      )
    );
  }

  // No debt accounts
  if(debtAccounts.length===0) {
    return h('div',{className:'page'},

// ── Accounts Page ──────────────────────────────────────
function AccountsPage({accounts, setAccounts, transactions, setTransactions, catMap, showToast, accountLimit, tier, isDemo}) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState('');
  const [type, setType] = useState('checking');
  const [startBal, setStartBal] = useState(0);
  const [last4, setLast4] = useState('');
  const [interestRate, setInterestRate] = useState('');
  const [minimumPayment, setMinimumPayment] = useState('');
  const [creditLimit, setCreditLimit] = useState('');
  const [plannedPay, setPlannedPay] = useState('');
  const [payFreq, setPayFreq] = useState('monthly');
  const [editIdx, setEditIdx] = useState(null);
  const isDebtType = type==='credit_card'||type==='loan';

  const resetForm = () => { setName(''); setType('checking'); setStartBal(0); setLast4(''); setInterestRate(''); setMinimumPayment(''); setCreditLimit(''); setPlannedPay(''); setPayFreq('monthly'); setEditIdx(null); setShowAdd(false); };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      const debtFields = (type==='credit_card'||type==='loan') ? {interestRate:+interestRate||0, minimumPayment:+minimumPayment||0, creditLimit:type==='credit_card'?+creditLimit||0:undefined, plannedPayment:+plannedPay||undefined, paymentFrequency:payFreq!=='monthly'?payFreq:undefined} : {interestRate:undefined, minimumPayment:undefined, creditLimit:undefined, plannedPayment:undefined, paymentFrequency:undefined};
      setAccounts(prev=>prev.map((a,i)=>i===editIdx?{...a, name:name.trim(), type, startingBalance:+startBal, last4:last4.trim(), ...debtFields}:a));
      showToast('✅ Updated: '+name.trim());
    } else {
      if(!isDemo && accountLimit !== undefined && accountLimit !== Infinity && accounts.length >= accountLimit) {
        showToast('⚡ Account limit reached. Upgrade your plan at ambitbudget.com');
        resetForm(); return;
      }
      const debtFields = (type==='credit_card'||type==='loan') ? {interestRate:+interestRate||0, minimumPayment:+minimumPayment||0, creditLimit:type==='credit_card'?+creditLimit||0:undefined, plannedPayment:+plannedPay||undefined, paymentFrequency:payFreq!=='monthly'?payFreq:undefined} : {};
      setAccounts(prev=>[...prev, {id:Date.now()+'_'+Math.random().toString(36).slice(2,6), name:name.trim(), type, startingBalance:+startBal, last4:last4.trim(), ...debtFields}]);
      showToast('✅ Added: '+name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const acct = accounts[idx];
    const txnCount = transactions.filter(t=>t.accountId===acct.id).length;
    if(txnCount>0 && !confirm(`"${acct.name}" has ${txnCount} transaction(s). Delete anyway?`)) return;
    setAccounts(prev=>prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: '+acct.name);
  };

  const startEdit = (idx) => {
    setName(accounts[idx].name);
    setType(accounts[idx].type);
    setStartBal(accounts[idx].startingBalance || 0);
    setLast4(accounts[idx].last4 || '');
    setInterestRate(accounts[idx].interestRate || '');
    setMinimumPayment(accounts[idx].minimumPayment || '');
    setCreditLimit(accounts[idx].creditLimit || '');
    setPlannedPay(accounts[idx].plannedPayment || '');
    setPayFreq(accounts[idx].paymentFrequency || 'monthly');
    setEditIdx(idx);
    setShowAdd(true);
  };

  // Per-account balances
  const balances = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{m[a.id]={income:0,expense:0,transfers:0};});
    transactions.forEach(t=>{
      if(!m[t.accountId]) return;
      if(t.catType==='transfer') {
        m[t.accountId].transfers += t.amount;
      } else if(t.amount>=0) {
        m[t.accountId].income += t.amount;
      } else {
        m[t.accountId].expense += Math.abs(t.amount);
      }
    });
    return m;
  },[accounts, transactions]);

  // Find unpaired transfer transactions
  const unpairedTransfers = useMemo(()=>{
    const linkedIds = new Set(transactions.filter(t=>t.linkedTxnId).map(t=>t.linkedTxnId));
    return transactions.filter(t=>{
      const cat = catMap[t.category];
      const isTransfer = t.catType==='transfer' || (cat && cat.catType==='transfer');
      return isTransfer && !t.linkedTxnId && !linkedIds.has(t.id);
    });
  },[transactions, catMap]);

  // Retroactively pair unpaired transfers
  const pairTransfers = () => {
    const paired = [];
    const acctLast4 = {};
    accounts.forEach(a=>{ if(a.last4 && a.last4.length>=3) acctLast4[a.last4]=a; });

    for(const txn of unpairedTransfers) {
      // Only pair if we can confirm the destination by last4 match in description
      let dest = null;
      for(const [digits, acct] of Object.entries(acctLast4)) {
        if(acct.id !== txn.accountId && txn.description.toUpperCase().includes(digits)) {
          dest = acct; break;
        }
      }
      // No fallback guessing — if we can't confirm by account number, skip it
      if(dest) {
        const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
        paired.push({
          original: txn,
          pair: {
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount,
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===txn.accountId)?.name||'Other')),
          },
          destName: dest.name,
          linkedId
        });
      }
    }

    if(paired.length===0) {
      showToast('⚠️ No unpaired transfers found that can be matched');
      return;
    }

    const summary = paired.map(p=>p.original.cleanName+' → '+p.destName).join('\n');
    if(!confirm('Create '+paired.length+' paired transfer(s)?\n\n'+summary)) return;

    // Update originals with linkedTxnId and add paired entries
    setTransactions(prev=>{
      const updates = new Map(paired.map(p=>[p.original.id, p.linkedId]));
      const updated = prev.map(t=>updates.has(t.id)?{...t, linkedTxnId:updates.get(t.id)}:t);
      return [...updated, ...paired.map(p=>p.pair)];
    });
    showToast('✅ Created '+paired.length+' paired transfer(s)');
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'🏦 Accounts', h(InfoPill,{text:'Track your bank accounts with starting balances. The app calculates current balances from imported transactions. Use Reconcile to verify your balance matches your bank statement.'})),
        h('p',null,'Manage your bank accounts. Each import targets a specific account.')
      ),
      h('div',{style:{display:'flex',gap:8}},
        unpairedTransfers.length>0 && h('button',{className:'btn',onClick:pairTransfers,style:{color:'var(--pink)',borderColor:'var(--pink)'}}, '↔ Pair '+unpairedTransfers.length+' Transfer'+(unpairedTransfers.length===1?'':'s')),
        h('button',{className:'btn primary',onClick:()=>{
          if(!isDemo && accountLimit !== undefined && accountLimit !== Infinity && accounts.length >= accountLimit) {
            showToast('⚡ Upgrade to add more accounts. You\'re on the '+(tier?tier.label:'Starter')+' plan.');
            return;
          }
          resetForm();setShowAdd(true);
        }},'+ New Account')
      )
    ),

    h('div',{className:'stats'},
      h(Stat,{label:'Accounts', value:accounts.length, color:'var(--accent2)'}),
      h(Stat,{label:'Checking', value:accounts.filter(a=>a.type==='checking').length, color:'var(--blue)'}),
      h(Stat,{label:'Savings', value:accounts.filter(a=>a.type==='savings').length, color:'var(--pink)'}),
      accounts.some(a=>a.type==='credit_card'||a.type==='loan') && h(Stat,{label:'Debt', value:accounts.filter(a=>a.type==='credit_card'||a.type==='loan').length, color:'var(--red)'})
    ),

    accounts.length===0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'🏦'),
            h('p',null,'No accounts yet. Add your checking and savings accounts to start tracking.')
          )
        )
      : h('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},
          accounts.map((a,i) => {
            const bal = balances[a.id]||{income:0,expense:0,transfers:0};
            const net = bal.income - bal.expense + bal.transfers;
            const runningBal = (a.startingBalance || 0) + net;
            const txnCount = transactions.filter(t=>t.accountId===a.id).length;
            return h('div',{key:a.id, className:'card', style:{flex:1,minWidth:280}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
                h('div',null,
                  h('div',{style:{fontSize:17,fontWeight:600}}, a.name),
                  h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}}, a.type==='checking'?'🏦 Checking':a.type==='savings'?'💰 Savings':a.type==='credit_card'?'💳 Credit Card':'🏦 Loan', a.last4 ? ' ••••'+a.last4 : '', a.interestRate ? ' • '+a.interestRate+'% APR' : ''),
                  a.plannedPayment && h('div',{style:{fontSize:11,color:'var(--green)',marginTop:2}},'📋 Plan: $'+a.plannedPayment+(a.paymentFrequency==='biweekly'?' bi-weekly':'/mo'), a.paymentFrequency==='biweekly'?' (≈$'+Math.round(a.plannedPayment*26/12)+'/mo)':'')
                ),
                h('div',{style:{display:'flex',gap:4}},
                  h('button',{className:'btn sm',onClick:()=>startEdit(i)},'✎'),
                  h('button',{className:'table del-btn',onClick:()=>del(i)},'×')
                )
              ),
              h('div',{style:{textAlign:'center',padding:'12px 0',marginBottom:10,background:'rgba(232,160,32,0.06)',borderRadius:8}},
                h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}},'Current Balance'),
                h('div',{style:{fontSize:26,fontWeight:700,color:runningBal>=0?'var(--green)':'var(--red)'}}, fmt(runningBal))
              ),
              h('div',{style:{display:'flex',gap:14,marginBottom:10,flexWrap:'wrap'}},
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Starting'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--accent2)'}},fmt(a.startingBalance||0))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Income'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--green)'}},fmt(bal.income))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Expenses'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--red)'}},fmt(bal.expense))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Transfers'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--pink)'}},fmt(Math.abs(bal.transfers)))
                )
              ),
              h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',justifyContent:'space-between'}},
                h('span',{style:{fontSize:12,color:'var(--text2)'}},txnCount+' transactions'),
                h('span',{style:{fontSize:13,fontWeight:600,color:'var(--text2)'}}, 'Net Activity: '+(net>=0?'+':'')+fmt(net))
              )
            );
          })
        ),

    !isDemo && accountLimit !== undefined && accountLimit !== Infinity && accounts.length >= accountLimit &&
      h('div',{className:'card', style:{textAlign:'center',padding:'16px 20px',marginTop:12,background:'rgba(232,160,32,0.06)',border:'1px dashed var(--accent2)'}},
        h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:6}},
          '⚡ You\'re using ',h('strong',null,accounts.length+'/'+accountLimit),' account'+(accountLimit===1?'':'s')+' on the ',h('strong',null,tier?tier.label:'Starter'),' plan.'
        ),
        h('a',{href:'https://ambitbudget.com/#pricing',target:'_blank',rel:'noopener',
          style:{color:'var(--accent2)',textDecoration:'underline',fontSize:13,fontWeight:600}}, 'Upgrade for more accounts →')
      ),

    showAdd && h(Modal,{onClose:resetForm},
      h('h3',null, editIdx!==null?'✏️ Edit Account':'➕ New Account'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',null,
          h('label',{htmlFor:'acct-name',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Name'),
          h('input',{id:'acct-name',className:'input',value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. Chase Checking',style:{width:'100%'},autoFocus:true})
        ),
        h('div',null,
          h('label',{htmlFor:'acct-type',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Type'),
          h('select',{id:'acct-type',className:'input',value:type,onChange:e=>setType(e.target.value),style:{width:'100%'}},
            h('option',{value:'checking'},'Checking'),
            h('option',{value:'savings'},'Savings'),
            h('option',{value:'credit_card'},'Credit Card'),
            h('option',{value:'loan'},'Loan')
          )
        ),
        h('div',null,
          h('label',{htmlFor:'acct-last4',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Last 4 Digits of Account Number'),
          h('input',{id:'acct-last4',className:'input',value:last4,onChange:e=>setLast4(e.target.value.replace(/\D/g,'').slice(0,4)),placeholder:'e.g. 3989',style:{width:'100%'},maxLength:4}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}},'Used to auto-detect transfers in bank descriptions (e.g. "ONLINE TRANSFER TO XXXXX3989").')
        ),
        h('div',null,
          h('label',{htmlFor:'acct-balance',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}}, isDebtType?'Current Balance Owed ($)':'Starting Balance ($)'),
          h('input',{id:'acct-balance',className:'input',type:'number',value:startBal,onChange:e=>setStartBal(e.target.value),placeholder:isDebtType?'e.g. -4200.00':'e.g. 5000.00',style:{width:'100%'},step:'0.01'}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}}, isDebtType?'Enter as negative (e.g. -4200 for $4,200 owed).':'Enter the account balance before your earliest imported transaction.')
        ),
        isDebtType && h('div',null,
          h('label',{htmlFor:'acct-apr',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Interest Rate (APR %)'),
          h('input',{id:'acct-apr',className:'input',type:'number',value:interestRate,onChange:e=>setInterestRate(e.target.value),placeholder:'e.g. 22.99',style:{width:'100%'},step:'0.01',min:'0',max:'100'})
        ),
        isDebtType && h('div',null,
          h('label',{htmlFor:'acct-minpay',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Minimum Monthly Payment ($)'),
          h('input',{id:'acct-minpay',className:'input',type:'number',value:minimumPayment,onChange:e=>setMinimumPayment(e.target.value),placeholder:'e.g. 105.00',style:{width:'100%'},step:'0.01',min:'0'})
        ),
        type==='credit_card' && h('div',null,
          h('label',{htmlFor:'acct-limit',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Credit Limit ($)'),
          h('input',{id:'acct-limit',className:'input',type:'number',value:creditLimit,onChange:e=>setCreditLimit(e.target.value),placeholder:'e.g. 8000',style:{width:'100%'},step:'0.01',min:'0'})
        ),
        isDebtType && h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}},
          h('div',{style:{fontSize:12,fontWeight:600,color:'var(--accent2)',marginBottom:8}},'📋 Payment Plan (optional)'),
          h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
            h('div',{style:{flex:1,minWidth:120}},
              h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Planned Payment ($)'),
              h('input',{className:'input',type:'number',value:plannedPay,onChange:e=>setPlannedPay(e.target.value),placeholder:'e.g. 350',style:{width:'100%'},step:'25',min:'0'})
            ),
            h('div',{style:{flex:1,minWidth:120}},
              h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Frequency'),
              h('select',{className:'input',value:payFreq,onChange:e=>setPayFreq(e.target.value),style:{width:'100%'}},
                h('option',{value:'monthly'},'Monthly'),
                h('option',{value:'biweekly'},'Bi-Weekly')
              )
            )
          ),
          +plannedPay>0 && payFreq==='biweekly' && h('div',{style:{fontSize:11,color:'var(--green)',marginTop:4}},'Effective: ~$'+Math.round(+plannedPay*26/12)+'/mo')
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetForm},'Cancel'),
          h('button',{className:'btn primary',onClick:save,disabled:!name.trim()}, editIdx!==null?'Update':'Add Account')
        )
      )
    )
  );
}

// ── Render ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
