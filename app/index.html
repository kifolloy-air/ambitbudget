// ── Smart CSV/TSV Parser ────────────────────────────────
function parseDelimitedLine(line, delimiter) {
  const result = [];
  let current = '';
  let inQuotes = false;
  let inParens = false;
  for(let i=0; i<line.length; i++) {
    const ch = line[i];
    if(ch==='"') { inQuotes=!inQuotes; }
    else if(ch==='(' && !inQuotes) { inParens=true; current+=ch; }
    else if(ch===')' && !inQuotes && inParens) { inParens=false; current+=ch; }
    else if(ch===delimiter && !inQuotes && !inParens) { result.push(current.trim()); current=''; }
    else { current+=ch; }
  }
  result.push(current.trim());
  return result;
}

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0] || '';
  const tabs = (firstLine.match(/\t/g) || []).length;
  const commas = (firstLine.match(/,/g) || []).length;
  return tabs >= commas && tabs > 0 ? '\t' : ',';
}

function looksLikeDate(val) {
  if(!val) return false;
  const s = val.trim();
  // MM/DD/YYYY, YYYY-MM-DD, MM-DD-YYYY, M/D/YYYY etc
  return /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(s) || /^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(s);
}

function looksLikeAmount(val) {
  if(!val) return false;
  const s = val.trim().replace(/[$,"\s]/g, '');
  return /^-?\d+\.?\d*$/.test(s) || /^\(-?\d+\.?\d*\)$/.test(s);
}

function parseAmount(val) {
  if(!val) return NaN;
  let s = val.trim().replace(/[$,"\s]/g, '');
  // Handle parentheses as negative: (100.00) -> -100.00
  if(/^\((.+)\)$/.test(s)) { s = '-' + s.replace(/[()]/g, ''); }
  return parseFloat(s);
}

// Auto-detect which columns are date, description, amount
function detectColumns(headers, sampleRows) {
  const result = { dateCol: -1, descCol: -1, amountCol: -1, debitCol: -1, creditCol: -1 };
  const numCols = headers.length;
  const headersLower = headers.map(h => h.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim());

  // Pass 1: Find date column first (most specific)
  for(let i=0; i<numCols; i++) {
    const h = headersLower[i];
    if(h.includes('date') || h==='posted' || h==='postdate') { result.dateCol=i; break; }
  }

  // Pass 2: Find amount / debit / credit columns
  for(let i=0; i<numCols; i++) {
    if(i===result.dateCol) continue;
    const h = headersLower[i];
    if(result.amountCol<0 && (h==='amount' || h==='total' || h==='sum')) result.amountCol=i;
    if(result.debitCol<0 && (h==='debit' || h==='withdrawal' || h==='withdrawals' || h==='debits')) result.debitCol=i;
    if(result.creditCol<0 && (h==='credit' || h==='deposit' || h==='deposits' || h==='credits')) result.creditCol=i;
  }

  // Pass 3: Find description column — skip columns already assigned
  const usedCols = new Set([result.dateCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
  for(let i=0; i<numCols; i++) {
    if(usedCols.has(i)) continue;
    const h = headersLower[i];
    if(h.includes('description') || h.includes('payee') || h.includes('memo') || h==='name' ||
       h.includes('merchant') || h.includes('narrative') || h.includes('details')) {
      result.descCol=i; break;
    }
  }

  // Pass 4: If description still not found, pick first unused text-like column
  if(result.descCol<0) {
    for(let i=0; i<numCols; i++) {
      if(usedCols.has(i)) continue;
      // Check sample data — if most values are long text strings, it's likely description
      if(sampleRows.length > 0) {
        const vals = sampleRows.map(r => r[i] || '');
        const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;
        if(textCount >= sampleRows.length * 0.5) { result.descCol=i; break; }
      }
    }
  }

  // Pass 5: Content-based fallback for any still-missing columns
  if(sampleRows.length > 0) {
    const allUsed = new Set([result.dateCol, result.descCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
    for(let col=0; col<numCols; col++) {
      if(allUsed.has(col)) continue;
      const vals = sampleRows.map(r => r[col] || '');
      const dateCount = vals.filter(v => looksLikeDate(v)).length;
      const numCount = vals.filter(v => looksLikeAmount(v)).length;
      const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;

      if(result.dateCol<0 && dateCount >= sampleRows.length * 0.7) { result.dateCol=col; allUsed.add(col); continue; }
      if(result.descCol<0 && textCount >= sampleRows.length * 0.5) { result.descCol=col; allUsed.add(col); continue; }
      if(result.amountCol<0 && result.debitCol<0 && numCount >= sampleRows.length * 0.5) { result.amountCol=col; allUsed.add(col); continue; }
    }
  }

  return result;
}

// (UnmatchedRow removed — Import is now a pure data utility)

// ── Import Page ─────────────────────────────────────────
function ImportPage({transactions, setTransactions, dictionary, categories, setCategories, catMap, categorize, showToast, accounts, setAccounts, setPage, tier, groupColors}) {
  const isFree = tier && tier.autoCategorize === false;
  const [csv, setCsv] = useState('');
  const [parsedData, setParsedData] = useState(null);
  const [colMap, setColMap] = useState({dateCol:-1, descCol:-1, amountCol:-1, debitCol:-1, creditCol:-1});
  const [importMode, setImportMode] = useState('paste');
  const [selectedAccount, setSelectedAccount] = useState('');
  const [postImport, setPostImport] = useState(null);
  const fileRef = useRef(null);
  const [newAcctName, setNewAcctName] = useState('');
  const [newAcctType, setNewAcctType] = useState('Checking');
  const [newAcctBal, setNewAcctBal] = useState('0');

  // Auto-select single account
  useEffect(()=>{
    if(accounts.length===1 && !selectedAccount) setSelectedAccount(accounts[0].id);
  },[accounts]);

  // Step 1: Parse raw text into headers+rows and auto-detect columns
  const parseRaw = (text) => {
    const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length) { showToast('❌ No data found'); return; }

    const delimiter = detectDelimiter(text);
    const allParsed = lines.map(l => parseDelimitedLine(l, delimiter));

    const firstRow = allParsed[0];
    const isHeader = firstRow.some(v => {
      const vl = v.toLowerCase();
      return vl.includes('date') || vl.includes('description') || vl.includes('amount') ||
             vl.includes('payee') || vl.includes('memo') || vl.includes('debit') || vl.includes('credit') ||
             vl.includes('transaction') || vl.includes('posted') || vl.includes('withdrawal') || vl.includes('deposit');
    });

    const headers = isHeader ? firstRow : firstRow.map((_,i) => 'Column '+(i+1));
    const dataRows = isHeader ? allParsed.slice(1) : allParsed;

    const sampleRows = dataRows.slice(0, Math.min(10, dataRows.length));
    const detected = detectColumns(headers, sampleRows);

    setParsedData({headers, rows:dataRows, delimiter, detected});
    setColMap(detected);
    showToast(`✅ Parsed ${dataRows.length} rows (${delimiter==='\t'?'tab':'comma'}-delimited, ${headers.length} columns)`);
  };

  // Build a map of last4 digits to account for transfer auto-detection
  const last4Map = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{
      if(a.last4 && a.last4.length>=3) m[a.last4] = a;
    });
    return m;
  },[accounts]);

  // Detect if a description looks like a transfer to a known account (by last4 digits)
  const detectTransferDest = useCallback((desc) => {
    const upper = desc.toUpperCase();
    // Look for transfer-like keywords
    if(!/TRANSFER|XFER|TRNSFR|ONLINE.*(?:TO|FROM)|ACH.*(?:TO|FROM)/i.test(upper)) return null;
    // Extract all 4-digit sequences from the description (from masked patterns like XXXXX3989, *3989, or standalone)
    const allDigitMatches = desc.match(/\d{4,}/g);
    if(!allDigitMatches || allDigitMatches.length===0) return null;
    // Check each 4-digit sequence (last 4 chars of each match) against known accounts, starting from the end
    for(let i = allDigitMatches.length - 1; i >= 0; i--) {
      const match = allDigitMatches[i];
      const last4 = match.slice(-4);
      if(last4Map[last4]) return last4Map[last4];
    }
    return null;
  },[last4Map]);

  // Step 2: Build transactions from parsed data + column mapping, then import directly
  const importTransactions = () => {
    if(!parsedData) return;
    if(!selectedAccount) { showToast('⚠️ Please select an account first'); return; }
    const {rows} = parsedData;
    const {dateCol, descCol, amountCol, debitCol, creditCol} = colMap;

    if(dateCol<0 || descCol<0 || (amountCol<0 && debitCol<0)) {
      showToast('❌ Please map Date, Description, and Amount columns'); return;
    }

    const existingKeys = new Set(transactions.map(t=>t.date+t.description+t.amount));
    let matched=[], unmatched=[], dupes=0, errors=0;
    let autoTransfers = 0;
    let pendingMatched = 0;

    // Build list of pending transactions for matching
    const pendingTxns = transactions.filter(t=>t.pending && t.accountId===selectedAccount);
    const matchedPendingIds = new Set();

    // Find a transfer category to use for auto-detected transfers (by name, since catType:'transfer' no longer exists on categories)
    let transferCat = categories.find(c=>c.name==='Account Transfer') || categories.find(c=>c.name.toLowerCase().includes('transfer'));
    let transferCatCreated = false;
    // Auto-create an "Account Transfer" category if none exists
    if(!transferCat) {
      transferCat = {name:'Account Transfer',group:'Other',catType:'discretionary',budget:0};
      transferCatCreated = true;
    }

    for(const row of rows) {
      const dateStr = (row[dateCol]||'').trim();
      const desc = (row[descCol]||'').trim();
      if(!dateStr || !desc) { errors++; continue; }

      let amt;
      if(amountCol >= 0) {
        amt = parseAmount(row[amountCol]);
      } else {
        const debit = debitCol>=0 ? parseAmount(row[debitCol]) : 0;
        const credit = creditCol>=0 ? parseAmount(row[creditCol]) : 0;
        if(!isNaN(debit) && debit > 0) amt = -Math.abs(debit);
        else if(!isNaN(credit) && credit > 0) amt = Math.abs(credit);
        else amt = NaN;
      }
      if(isNaN(amt)) { errors++; continue; }

      const key = dateStr+desc+amt;
      if(existingKeys.has(key)) { dupes++; existingKeys.add(key); continue; }
      existingKeys.add(key);

      // Check if this imported row matches a pending transaction
      const pendingMatch = pendingTxns.find(pt=>{
        if(matchedPendingIds.has(pt.id)) return false;
        if(Math.abs(pt.amount - amt) > 0.011) return false;
        const dateDiff = Math.abs(safeDate(pt.date) - safeDate(dateStr));
        const within14Days = dateDiff <= 14*86400000;
        const descMatch = desc.toLowerCase().includes(pt.cleanName.toLowerCase()) || pt.cleanName.toLowerCase().includes(desc.toLowerCase().substring(0,10));
        return within14Days || descMatch;
      });
      if(pendingMatch) {
        matchedPendingIds.add(pendingMatch.id);
        pendingMatched++;
        matched.push({_matchesPendingId:pendingMatch.id, date:dateStr, description:desc, amount:amt, cleanName:pendingMatch.cleanName, category:pendingMatch.category, group:pendingMatch.group, catType:pendingMatch.catType, accountId:selectedAccount});
        continue;
      }

      const match = isFree ? null : categorize(desc);
      let txn;

      if(match) {
        // If description looks like a transfer, override catType to 'transfer' even if category is discretionary
        const looksLikeTransferMatch = /TRANSFER|XFER|TRNSFR|ONLINE.*(?:TO|FROM)|ACH.*(?:TO|FROM)/i.test(desc.toUpperCase());
        txn = {
          id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
          date: dateStr, description: desc, amount: amt,
          cleanName: match.cleanName, category: match.category,
          group: match.group, catType: looksLikeTransferMatch ? 'transfer' : match.catType,
          accountId: selectedAccount
        };
        matched.push(txn);
        if(looksLikeTransferMatch) autoTransfers++;
      } else {
        // Check for auto-detectable transfer by last4 match
        const destAcct = detectTransferDest(desc);
        if(destAcct && destAcct.id !== selectedAccount && transferCat) {
          txn = {
            id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
            date: dateStr, description: desc, amount: amt,
            cleanName: 'Transfer to ' + destAcct.name,
            category: transferCat.name,
            group: transferCat.group || 'Other',
            catType: 'transfer',
            accountId: selectedAccount,
            _autoTransferDest: destAcct.id
          };
          matched.push(txn);
          autoTransfers++;
        } else {
          // Check if description contains transfer keywords — auto-assign transfer category even without last4 match
          const descUpper = desc.toUpperCase();
          const looksLikeTransfer = transferCat && /TRANSFER|XFER|TRNSFR|ONLINE.*(?:TO|FROM)|ACH.*(?:TO|FROM)/i.test(descUpper);
          if(looksLikeTransfer) {
            txn = {
              id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
              date: dateStr, description: desc, amount: amt,
              cleanName: desc,
              category: transferCat.name,
              group: transferCat.group || 'Other',
              catType: 'transfer',
              accountId: selectedAccount
            };
            matched.push(txn);
            autoTransfers++;
          } else {
            txn = {
              id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
              date: dateStr, description: desc, amount: amt,
              cleanName: desc, category: 'Uncategorized',
              group: 'Other', catType: 'discretionary',
              accountId: selectedAccount
            };
            unmatched.push(txn);
          }
        }
      }
    }

    // Persist the auto-created transfer category if any transfers were detected
    if(transferCatCreated && autoTransfers > 0 && setCategories) {
      setCategories(prev=>{
        if(prev.some(c=>c.name==='Account Transfer')) return prev;
        return [...prev, transferCat];
      });
    }

    // Now import everything directly
    const pendingUpdates = matched.filter(t=>t._matchesPendingId);
    const newMatched = matched.filter(t=>!t._matchesPendingId);
    const all = [...newMatched, ...unmatched];

    const pendingUpdateMap = {};
    pendingUpdates.forEach(pu=>{ pendingUpdateMap[pu._matchesPendingId] = pu; });

    // Create paired entries for transfers
    const paired = [];
    for(const txn of all) {
      const isTransfer = txn.catType==='transfer';
      if(isTransfer) {
        let destId = txn._autoTransferDest || null;
        if(!destId) {
          for(const acct of accounts) {
            if(acct.id !== selectedAccount && acct.last4 && acct.last4.length >= 3 && txn.description.toUpperCase().includes(acct.last4)) {
              destId = acct.id;
              break;
            }
          }
        }
        const dest = destId ? accounts.find(a=>a.id===destId) : null;
        if(dest) {
          const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
          txn.linkedTxnId = linkedId;
          paired.push({
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount,
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===selectedAccount)?.name||'Other')),
          });
        }
        delete txn._autoTransferDest;
      }
    }

    setTransactions(prev=>{
      let updated = prev;
      if(pendingUpdates.length > 0) {
        updated = updated.map(t=>{
          const upd = pendingUpdateMap[t.id];
          if(upd) return {...t, pending:false, date:upd.date, description:upd.description};
          return t;
        });
      }
      return [...updated,...all,...paired];
    });

    const totalImported = all.length;
    const matchedCount = newMatched.length;
    const unmatchedCount = unmatched.length;
    const pairMsg = paired.length > 0 ? ` (${paired.length} paired transfers created)` : '';
    const pendMsg = pendingUpdates.length > 0 ? `, ${pendingUpdates.length} pending cleared` : '';
    showToast(`\u2705 ${totalImported} transactions imported${pairMsg}${pendMsg}`);
    setPostImport({total:totalImported, matched:matchedCount, unmatched:unmatchedCount, transfers:paired.length, autoTransfers, pendingMatched, dupes, errors});
    setCsv(''); setParsedData(null);
  };

  // File upload handler
  const handleFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setCsv(text);
      parseRaw(text);
    };
    reader.readAsText(file);
    // Reset so same file can be re-selected
    e.target.value = '';
  };

  return h('div',{className:'animate-in'},
    h(HelpBar, HELP_CONTENT.import),
    h('div',{className:'page-header'},
      h('h2',null,'📥 Import Transactions', h(InfoPill,{text:'Import bank transactions by pasting from Excel/CSV or uploading a file. The system auto-matches payees to your rules and categories.'})),
      h('p',null,'Paste data from Excel or upload a bank CSV file. Columns are auto-detected.')
    ),

    h('div',{className:'import-layout',style:{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}},

        ),

                h('select',{className:'input',value:selectedAccount,onChange:e=>setSelectedAccount(e.target.value),
                    'aria-label':'Import to account', 'aria-required':'true', style:{flex:1,maxWidth:220}},
                    h('option',{value:''},'Select account...'),
                    accounts.map(a=>h('option',{key:a.id,value:a.id}, a.name+' ('+a.type+')'))
                  ),
                !selectedAccount && h('span',{style:{fontSize:11,color:'var(--yellow)'}},'⚠️ Required')
              )
            )
          : h('div',{className:'card',style:{marginBottom:16,padding:18}},
              h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
                h('img',{src:'images/mr-ambit/idea.png',alt:'Mr. Ambit idea',style:{width:40,height:40,objectFit:'contain'}}),
                h('span',{style:{fontSize:14,fontWeight:600,color:'var(--card-text)'}},"First, let's set up your account!")
              ),
              h('form',{onSubmit:e=>{
                e.preventDefault();
                if(!newAcctName.trim()){ showToast('❌ Please enter an account name'); return; }
                const newAcct = {
                  id: Date.now()+'_'+Math.random().toString(36).slice(2,6),

                setAccounts(prev=>[...prev, newAcct]);

              h('select',{id:'import-credit-col',className:'input',value:colMap.creditCol,onChange:e=>setColMap(p=>({...p,creditCol:+e.target.value})),style:{width:'100%'}},

        ),

      )
    ),

    // Post-import summary card
    postImport && h('div',{className:'card animate-in',style:{marginTop:20,border:'2px solid var(--green)',padding:24}},
      h('div',{style:{display:'flex',alignItems:'center',gap:16,marginBottom:20}},
        h('img',{src:'images/mr-ambit/thumbs-up.png',alt:'Mr. Ambit thumbs up',style:{width:64,height:64,objectFit:'contain'}}),
        h('div',null,
          h('h3',{style:{color:'var(--green)',margin:0,marginBottom:4}},'Imported '+postImport.total+' transactions'),
          h('p',{style:{fontSize:12,color:'var(--card-text2)',margin:0}},'All done! Here\'s a summary of your import.')
        )
      ),
      h('div',{style:{display:'flex',gap:12,flexWrap:'wrap',marginBottom:20}},
        h('div',{style:{flex:1,textAlign:'center',padding:12,background:'rgba(64,192,128,0.1)',borderRadius:8,minWidth:100}},

        ),
        postImport.transfers>0 && h('div',{style:{flex:1,textAlign:'center',padding:12,background:'rgba(208,96,160,0.1)',borderRadius:8,minWidth:100}},

        )
      ),
      postImport.unmatched>0 && h('div',{style:{padding:'10px 14px',marginBottom:16,background:'rgba(232,160,32,0.08)',border:'1px solid rgba(232,160,32,0.2)',borderRadius:8,fontSize:13,color:'var(--card-text2)'}},

      ),
      h('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
        h('button',{className:'btn primary',onClick:()=>{setPage('transactions');}},'Go to Transactions \u2192'),
        h('button',{className:'btn',onClick:()=>{setPostImport(null);setCsv('');setParsedData(null);}},'Import More')
      )
    )
  );
}

// ── Transactions Page ───────────────────────────────────
function TransactionsPage({transactions, setTransactions, catMap, accounts, setAccounts, defaultAcct, categories, setCategories, dictionary, setDictionary, showToast, groupList, groups, setGroups, groupColors, tier, onUpgrade}) {
  const isFree = tier && tier.budget === false;
  // Legacy cleanup: remove old search localStorage key
  useMemo(()=>{localStorage.removeItem('ambit_txn_search');},[]);
  const [acctFilter, setAcctFilterRaw] = useState(defaultAcct||'all');
  const setAcctFilter = (v) => { setAcctFilterRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [sortCol, setSortCol] = useState('date');
  const [sortDir, setSortDir] = useState(-1);
  const [editId, setEditId] = useState(null);
  const [editCat, setEditCat] = useState('');
  const [editPayeeId, setEditPayeeId] = useState(null);
  const [editPayeeName, setEditPayeeName] = useState('');
  const [showReconcile, setShowReconcile] = useState(false);
  const [reconcileDate, setReconcileDate] = useState('');
  const [showAddTxn, setShowAddTxn] = useState(false);
  const [statusFilter, setStatusFilter] = useState(()=>{
    const saved = localStorage.getItem('ambit_txn_filter');
    if(saved) { localStorage.removeItem('ambit_txn_filter'); return saved; }
    return 'all';
  });
  const [dateFilter, setDateFilter] = useState('current'); // 'all', 'current', or 'YYYY-MM'
  const [newTxn, setNewTxn] = useState({date:'',description:'',amount:'',category:'',accountId:'',pending:false,checkNumber:'',transferDest:'',isTransfer:false});
  // New category inline creation state
  const [showNewCat, setShowNewCat] = useState(false);
  const [newCatName, setNewCatName] = useState('');
  const [newCatGroup, setNewCatGroup] = useState('Other');
  const [newCatType, setNewCatType] = useState('discretionary');
  const [newCatContext, setNewCatContext] = useState(null); // 'inline' or 'modal'
  const [bulkApplyPrompt, setBulkApplyPrompt] = useState(null); // {txn, newCleanName, keyword, matchCount, needsCategory}
  const [bulkApplyCat, setBulkApplyCat] = useState('');
  const [bulkNewCat, setBulkNewCat] = useState(false);
  const [bulkNewCatName, setBulkNewCatName] = useState('');
  const [bulkNewCatGroup, setBulkNewCatGroup] = useState('Other');
  const [bulkNewCatType, setBulkNewCatType] = useState('discretionary');
  // Column header filters
  const [payeeFilter, setPayeeFilter] = useState('');
  const [showPayeeFilter, setShowPayeeFilter] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [showCatFilter, setShowCatFilter] = useState(false);
  const createNewCategory = () => {
    if(!newCatName.trim()) return;
    if(categories && categories.find(c=>c.name.toLowerCase()===newCatName.trim().toLowerCase())) {
      showToast('⚠️ Category already exists'); return;
    }
    const name = newCatName.trim();
    setCategories(prev=>[...prev, {name, group:newCatGroup, catType:newCatType, budget:0}]);
    if(newCatContext==='inline') setEditCat(name);
    if(newCatContext==='modal') setNewTxn(p=>({...p, category:name}));
    setShowNewCat(false); setNewCatName(''); setNewCatGroup('Other'); setNewCatType('discretionary'); setNewCatContext(null);
    showToast('✅ Category created: '+name);
  };
  const handleCatDropdown = (val, context) => {
    if(val==='__new__') {
      if(context==='bulk') { setBulkNewCat(true); setBulkApplyCat(''); }
      else { setShowNewCat(true); setNewCatContext(context); }
    }
    else if(context==='inline') setEditCat(val);
    else if(context==='modal') setNewTxn(p=>({...p, category:val}));
    else if(context==='bulk') { setBulkApplyCat(val); setBulkNewCat(false); }
  };
  const createBulkNewCategory = () => {
    if(!bulkNewCatName.trim()) return;
    if(categories && categories.find(c=>c.name.toLowerCase()===bulkNewCatName.trim().toLowerCase())) {
      showToast('\u26a0\ufe0f Category already exists'); return;
    }
    const name = bulkNewCatName.trim();
    setCategories(prev=>[...prev, {name, group:bulkNewCatGroup, catType:bulkNewCatType, budget:0}]);
    setBulkApplyCat(name);
    setBulkNewCat(false); setBulkNewCatName(''); setBulkNewCatGroup('Other'); setBulkNewCatType('discretionary');
    showToast('\u2705 Category created: '+name);
  };

  const resetNewTxn = () => { setNewTxn({date:'',description:'',amount:'',category:'',accountId:'',pending:false,checkNumber:'',transferDest:'',isTransfer:false}); setShowAddTxn(false); setShowNewCat(false); };

  const saveNewTxn = () => {
    const {date,amount,accountId,pending,checkNumber,transferDest,isTransfer} = newTxn;
    let description = newTxn.description;
    if(!date||!amount||!accountId) return;
    if(isTransfer && !transferDest) return; // require destination for transfers
    // Auto-generate description for transfers if left blank
    if(isTransfer && !description.trim()) {
      const fromName = accounts.find(a=>a.id===accountId)?.name||'Account';
      const toName = accounts.find(a=>a.id===transferDest)?.name||'Account';
      description = 'Transfer: '+fromName+' → '+toName;
    }
    if(!description.trim()) return; // still require description for non-transfers
    // For transfers, find or create an "Account Transfer" category (as discretionary)
    let cat, txnCategory, txnGroup;
    if(isTransfer) {
      cat = categories.find(c=>c.name==='Account Transfer');
      if(!cat) {
        cat = {name:'Account Transfer',group:'Other',catType:'discretionary',budget:0};
        setCategories(prev=>{
          if(prev.some(c=>c.name==='Account Transfer')) return prev;
          return [...prev, cat];
        });
      }
      txnCategory = 'Account Transfer';
      txnGroup = 'Other';
    } else {
      cat = catMap[newTxn.category];
      txnCategory = newTxn.category || 'Uncategorized';
      txnGroup = cat?.group || 'Other';
    }
    // Auto-set sign based on category: expenses negative, income positive
    let amt = +amount;
    if(isTransfer) {
      amt = -Math.abs(amt); // transfers always deduct from source
    } else {
      if(cat && cat.group !== 'Income' && amt > 0) amt = -Math.abs(amt);
      if(cat && cat.group === 'Income' && amt < 0) amt = Math.abs(amt);
    }
    const txnId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
    const txn = {
      id: txnId,
      date, description: description.trim(),
      amount: amt,
      cleanName: description.trim(),
      category: txnCategory,
      group: txnGroup,
      catType: isTransfer ? 'transfer' : (cat?.catType || 'discretionary'),
      accountId
    };
    if(pending) txn.pending = true;
    if(checkNumber.trim()) txn.checkNumber = checkNumber.trim();
    // Create paired transaction for transfers
    if(isTransfer && transferDest) {
      const pairedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
      txn.linkedTxnId = pairedId;
      const paired = {
        id: pairedId, linkedTxnId: txnId,
        date, description: description.trim() + ' (paired)',
        amount: -amt, // reverse: outflow on source = inflow on dest
        cleanName: 'Transfer from ' + (accounts.find(a=>a.id===accountId)?.name||'Other'),
        category: txnCategory,
        group: txnGroup,
        catType: 'transfer',
        accountId: transferDest
      };
      if(pending) paired.pending = true;
      setTransactions(prev=>[...prev, txn, paired]);
    } else {
      setTransactions(prev=>[...prev, txn]);
    }
    // Create dictionary rule so Dashboard bills/budget tracks this payee
    if(!isTransfer && newTxn.category && newTxn.category!=='Uncategorized' && setDictionary) {
      const keyword = description.trim().toUpperCase();
      if(keyword) {
        setDictionary(prev => {
          const existing = prev.find(d=>d.keyword.toUpperCase()===keyword);
          if(!existing) {
            return [...prev, {keyword, cleanName:description.trim(), category:newTxn.category}];
          }
          return prev;
        });
      }
    }
    resetNewTxn();
  };

  const acctMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a;}); return m;
  },[accounts]);

  // Check if a transaction is reconciled based on its account's reconciledThrough date
  const isReconciled = useCallback((t)=>{
    const acct = acctMap[t.accountId];
    if(!acct || !acct.reconciledThrough) return false;
    return safeDate(t.date) <= safeDate(acct.reconciledThrough);
  },[acctMap]);

  // Reconcile: set the reconciledThrough date on the selected account
  const doReconcile = ()=>{
    if(!reconcileDate || acctFilter==='all') return;
    setAccounts(prev=>prev.map(a=>a.id===acctFilter?{...a, reconciledThrough:reconcileDate}:a));
    setShowReconcile(false);
    setReconcileDate('');
  };

  // Build a map of starting balances from accounts
  const startBalMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a.startingBalance||0;}); return m;
  },[accounts]);

  // Compute running balance for cleared/reconciled transactions only (excludes pending)
  const runningBalMap = useMemo(()=>{
    const cleared = transactions.filter(t=>!t.pending);
    const dateSorted = [...cleared].sort((a,b)=>safeDate(a.date)-safeDate(b.date));
    const accBal = {};
    const balMap = {};
    dateSorted.forEach(t=>{
      if(!(t.accountId in accBal)) accBal[t.accountId] = startBalMap[t.accountId]||0;
      accBal[t.accountId] += t.amount;
      balMap[t.id] = accBal[t.accountId];
    });
    return balMap;
  },[transactions, startBalMap]);
  const txnOrder = useMemo(()=>{
    const dateSorted = [...transactions].sort((a,b)=>safeDate(a.date)-safeDate(b.date));
    const m = {};
    dateSorted.forEach((t,i)=>{m[t.id]=i;});
    return m;
  },[transactions]);

  const pendingCount = useMemo(()=>transactions.filter(t=>t.pending).length,[transactions]);

  // Build list of available year-months from transaction data
  const availableMonths = useMemo(()=>{
    const months = new Set();
    transactions.forEach(t=>{ const ym = getYearMonth(t.date); if(ym) months.add(ym); });
    return [...months].sort().reverse();
  },[transactions]);

  const currentYM = useMemo(()=>{
    const now = new Date();
    return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  },[]);

  const sorted = useMemo(()=>{
    let arr = [...transactions];
    if(acctFilter!=='all') arr = arr.filter(t=>t.accountId===acctFilter);
    if(dateFilter!=='all') {
      const ym = dateFilter==='current' ? currentYM : dateFilter;
      // Pending transactions always show regardless of date filter
      arr = arr.filter(t=>t.pending || getYearMonth(t.date)===ym);
    }
    if(statusFilter==='pending') arr = arr.filter(t=>t.pending);
    else if(statusFilter==='cleared') arr = arr.filter(t=>!t.pending);
    else if(statusFilter==='uncategorized') arr = arr.filter(t=>t.category==='Uncategorized');
    if(payeeFilter) {
      const f = payeeFilter.toLowerCase();
      arr = arr.filter(t=>(t.cleanName||'').toLowerCase().includes(f)||(t.description||'').toLowerCase().includes(f));
    }
    if(catFilter && catFilter!=='all') {
      if(catFilter==='__uncategorized__') arr = arr.filter(t=>t.category==='Uncategorized');
      else arr = arr.filter(t=>t.category===catFilter);
    }
    arr.sort((a,b)=>{
      // Pending transactions always on top (no date)
      if(a.pending && !b.pending) return -1;
      if(!a.pending && b.pending) return 1;
      if(a.pending && b.pending) return (a.cleanName||'').localeCompare(b.cleanName||'');
      if(sortCol==='date') {
        const d = safeDate(a.date)-safeDate(b.date);
        if(d!==0) return d*sortDir;
        // Same date: sort by processing order so the balance column is monotonic
        return ((txnOrder[a.id]||0)-(txnOrder[b.id]||0))*sortDir;
      }
      if(sortCol==='amount') return (a.amount-b.amount)*sortDir;
      return (a[sortCol]||'').localeCompare(b[sortCol]||'')*sortDir;
    });
    return arr;
  },[transactions,payeeFilter,catFilter,acctFilter,dateFilter,currentYM,statusFilter,sortCol,sortDir,txnOrder]);

  const toggleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d*-1);
    else { setSortCol(col); setSortDir(-1); }
  };

  const delTxn = (id) => {
    const txn = transactions.find(t=>t.id===id);
    if(txn && isReconciled(txn)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to delete it?')) return;
    }
    setTransactions(prev=>prev.filter(t=>t.id!==id));
  };

  const togglePending = (id) => setTransactions(prev=>prev.map(t=>t.id===id?{...t, pending:!t.pending}:t));

  const startEditCat = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its category?')) return;
    }
    setEditId(t.id); setEditCat(t.category);
  };

  const saveCat = (id) => {
    if(!editCat) return;
    // Look up category from catMap, but also check the categories array directly
    // in case catMap hasn't re-derived yet after a new category was just created
    const cat = catMap[editCat] || categories.find(c=>c.name===editCat);
    const txn = transactions.find(t=>t.id===id);
    // Extract a smart keyword from the description (strips prefixes, card #s, locations)
    const smartKeyword = txn ? extractKeyword(txn.description||'') : '';
    let ruleCleanName = txn ? (txn.cleanName || txn.description || '') : '';
    if(txn && setDictionary && smartKeyword) {
      // Check if a rule already exists for this keyword — if so, use its cleanName
      const existingRule = dictionary.find(d=>d.keyword.toUpperCase()===smartKeyword.toUpperCase());
      if(existingRule) {
        ruleCleanName = existingRule.cleanName;
      }
      setDictionary(prev => {
        const existing = prev.find(d=>d.keyword.toUpperCase()===smartKeyword.toUpperCase());
        if(existing) {
          return prev.map(d=>d.keyword.toUpperCase()===smartKeyword.toUpperCase()?{...d, category:editCat}:d);
        } else {
          return [...prev, {keyword:smartKeyword, cleanName:ruleCleanName, category:editCat}];
        }
      });
    }
    // Update only this transaction's category (no auto-apply — bulk apply is handled via the payee rename flow)
    setTransactions(prev => prev.map(t => {
      if(t.id === id) {
        return {...t, cleanName:ruleCleanName, category:editCat, group:cat?.group||'Other', catType:cat?.catType||'discretionary'};
      }
      return t;
    }));
    showToast('Category updated: '+editCat);
    setEditId(null); setEditCat('');
  };

  const startEditPayee = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its payee?')) return;
    }
    setEditPayeeId(t.id); setEditPayeeName(t.cleanName);
  };

  const savePayee = (id) => {
    if(!editPayeeName.trim()) return;
    const txn = transactions.find(t=>t.id===id);
    if(!txn) return;
    const newName = editPayeeName.trim();
    const keyword = extractKeyword(txn.description||'');
    // Count matching uncategorized transactions (excluding this one)
    const matchCount = keyword ? transactions.filter(t=>t.id!==id && t.category==='Uncategorized' && normalizeForMatch(t.description).includes(normalizeForMatch(keyword))).length : 0;
    setEditPayeeId(null); setEditPayeeName('');
    if(matchCount > 0) {
      const needsCategory = !txn.category || txn.category === 'Uncategorized';
      setBulkApplyPrompt({ txn, newCleanName: newName, keyword, matchCount, needsCategory });
      if(!needsCategory) setBulkApplyCat(txn.category);
      else setBulkApplyCat('');
    } else {
      // No matches — just update this one
      setTransactions(prev=>prev.map(t=>t.id===id?{...t, cleanName:newName}:t));
    }
  };

  const confirmBulkApply = () => {
    if(!bulkApplyPrompt) return;
    const { txn, newCleanName, keyword } = bulkApplyPrompt;
    const selectedCat = bulkApplyCat;
    if(!selectedCat) return; // must pick a category
    const cat = catMap[selectedCat] || categories.find(c=>c.name===selectedCat);
    const normKw = normalizeForMatch(keyword);
    // Update all matching uncategorized transactions + the current one
    let applied = 0;
    setTransactions(prev => prev.map(t => {
      if(t.id === txn.id) {
        return {...t, cleanName:newCleanName, category:selectedCat, group:cat?.group||'Other', catType:cat?.catType||'discretionary'};
      }
      if(normKw && t.category === 'Uncategorized' && normalizeForMatch(t.description).includes(normKw)) {
        applied++;
        return {...t, cleanName:newCleanName, category:selectedCat, group:cat?.group||'Other', catType:cat?.catType||'discretionary'};
      }
      return t;
    }));
    // Create/update payee rule in dictionary
    if(setDictionary && keyword) {
      setDictionary(prev => {
        const existing = prev.find(d=>d.keyword.toUpperCase()===keyword.toUpperCase());
        if(existing) {
          return prev.map(d=>d.keyword.toUpperCase()===keyword.toUpperCase()?{...d, cleanName:newCleanName, category:selectedCat}:d);
        }
        return [...prev, {keyword, cleanName:newCleanName, category:selectedCat}];
      });
    }
    setTimeout(()=>showToast('Updated '+(applied+1)+' transaction'+(applied>0?'s':'')+' and created payee rule'),100);
    setBulkApplyPrompt(null); setBulkApplyCat(''); setBulkNewCat(false); setBulkNewCatName('');
  };

  const declineBulkApply = () => {
    if(!bulkApplyPrompt) return;
    const { txn, newCleanName } = bulkApplyPrompt;
    // Only update this single transaction's cleanName
    setTransactions(prev=>prev.map(t=>t.id===txn.id?{...t, cleanName:newCleanName}:t));
    setBulkApplyPrompt(null); setBulkApplyCat(''); setBulkNewCat(false); setBulkNewCatName('');
  };

  const nonTransfer = transactions.filter(t=>t.catType!=='transfer');
  const expenses = nonTransfer.filter(t=>t.amount<0);
  const income = nonTransfer.filter(t=>t.amount>=0);
  const totalExp = expenses.reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const transfers = transactions.filter(t=>t.catType==='transfer' && t.amount<0);
  const totalXfer = transfers.reduce((s,t)=>s+Math.abs(t.amount),0);

  // Per-account cleared balances
  const acctBalances = useMemo(()=>{
    return accounts.map(a=>{
      const startBal = a.startingBalance||0;
      const clearedSum = transactions.filter(t=>!t.pending && t.accountId===a.id).reduce((s,t)=>s+t.amount,0);
      const pendSum = transactions.filter(t=>t.pending && t.accountId===a.id).reduce((s,t)=>s+t.amount,0);
      const cleared = startBal + clearedSum;
      return { id:a.id, name:a.name, type:a.type, cleared, pending:pendSum, projected:cleared+pendSum };
    });
  },[transactions, accounts]);
  const filteredBals = acctFilter==='all' ? acctBalances : acctBalances.filter(b=>b.id===acctFilter);

  return h('div',{className:'animate-in'},
    h(HelpBar, HELP_CONTENT.transactions),
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📋 Transactions', h(InfoPill,{text:'All imported transactions. Click column headers to sort or filter. Click a payee or category to edit it inline. Use the + button to add manual transactions.'})),
        h('p',null,'View and manage all imported transactions.')
      ),
      h('button',{className:'btn primary',onClick:()=>{
        setNewTxn(prev=>({...prev, accountId: acctFilter!=='all'?acctFilter:(accounts[0]?.id||'')}));
        setShowAddTxn(true);
      }},'+ Add Transaction')
    ),

    h('div',{style:{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}},
      filteredBals.map(b=>{
        const isDebt = b.type==='credit_card'||b.type==='loan'||b.type==='student_loan'||b.type==='mortgage';
        const displayBal = isDebt ? -Math.abs(b.cleared) : b.cleared;
        const displayProj = isDebt ? -Math.abs(b.projected) : b.projected;
        return h('div',{key:b.id,style:{
          background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 16px',minWidth:140,color:'var(--card-text)',
          cursor:acctFilter==='all'?'pointer':'default'
        },onClick:()=>{if(acctFilter==='all')setAcctFilter(b.id)}},
          h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:4,fontWeight:600}},b.name),
          h('div',{style:{fontSize:18,fontWeight:700,color:displayBal>=0?'var(--green)':'var(--red)'}},fmt(displayBal)),
          b.pending!==0 && h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:2}},'After pending: '+fmt(displayProj))
        );
      })
    ),

    h('div',{className:'card'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
        h('h3',{style:{margin:0}}, 'All Transactions'),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          accounts.length>0 && h('select',{className:'input',value:acctFilter,onChange:e=>setAcctFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'all'},'All Accounts'),
            accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
          ),
          h('select',{className:'input',value:dateFilter,onChange:e=>setDateFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'current'},'This Month'),
            h('option',{value:'all'},'All Time'),
            availableMonths.filter(ym=>ym!==currentYM).map(ym=>{
              const [y,m] = ym.split('-');
              const label = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m]+' '+y;
              return h('option',{key:ym,value:ym},label);
            })
          ),
          h('select',{className:'input',value:statusFilter,onChange:e=>setStatusFilter(e.target.value),style:{fontSize:12}},
            h('option',{value:'all'},'All Status'),
            h('option',{value:'pending'},'🟡 Pending'),
            h('option',{value:'cleared'},'🟢 Cleared'),
            h('option',{value:'uncategorized'},'⚠ Uncategorized')
          ),
          (()=>{const uc=transactions.filter(t=>t.category==='Uncategorized').length; return uc>0 && h('button',{className:'btn sm'+(statusFilter==='uncategorized'?' primary':''),onClick:()=>setStatusFilter(statusFilter==='uncategorized'?'all':'uncategorized'),style:{fontSize:11,whiteSpace:'nowrap'}},'⚠ '+uc+' Uncategorized');})(),
          acctFilter!=='all'
            ? h('button',{className:'btn green sm',onClick:()=>{
                const acct = acctMap[acctFilter];
                setReconcileDate(acct?.reconciledThrough||'');
                setShowReconcile(true);
              }},'✓ Reconcile')
            : accounts.length>0 && h('span',{style:{fontSize:11,color:'var(--text2)',alignSelf:'center'}},'Select an account to reconcile'),
          h('div',{style:{display:'flex',gap:12,alignItems:'center',fontSize:10,color:'var(--text2)'}},
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#e8a020'}}),'Pending'),
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#40c080'}}),'Cleared'),
            h('span',{style:{display:'flex',alignItems:'center',gap:3}},h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#5090e8'}}),'Reconciled')
          )
        )
      ),
      sorted.length === 0
        ? h('div',{className:'empty'},
            h('img',{src:'images/mr-ambit/full-body.png',alt:'Mr. Ambit',style:{width:120,height:120,objectFit:'contain',marginBottom:8}}),
            h('div',{className:'icon'},'📋'),
            h('p',null, transactions.length===0 ? 'No transactions yet. Import some on the Import page.' : 'No transactions match your filters.')
          )
        : h('div',{className:'table-scroll',style:{maxHeight:500,overflowY:'auto'}},
            h('table',{className:'table txn-table'},
              h('thead',null,
                h('tr',null,
                  h('th',{scope:'col',style:{width:30}},null),
                  h('th',{scope:'col',onClick:()=>toggleSort('date'), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSort('date');}}, tabIndex:0, role:'columnheader', 'aria-sort':sortCol==='date'?(sortDir>0?'ascending':'descending'):'none', style:{cursor:'pointer',color:sortCol==='date'?'var(--accent)':'inherit'}},
                    'Date ',h('span',{style:{fontSize:10,color:sortCol==='date'?'var(--accent)':'var(--text2)'}},sortCol==='date'?(sortDir>0?'\u25b2':'\u25bc'):'\u25b4\u25be')
                  ),
                  h('th',{scope:'col',onClick:()=>setShowPayeeFilter(v=>!v), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setShowPayeeFilter(v=>!v);}}, tabIndex:0, role:'columnheader', style:{cursor:'pointer',color:payeeFilter?'var(--accent)':'inherit'}},
                    'Payee ',payeeFilter && h('span',{style:{fontSize:9,color:'var(--accent)',marginLeft:2}},'\u25cf')
                  ),
                  h('th',{scope:'col',onClick:()=>setShowCatFilter(v=>!v), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setShowCatFilter(v=>!v);}}, tabIndex:0, role:'columnheader', style:{cursor:'pointer',color:catFilter!=='all'?'var(--accent)':'inherit'}},
                    'Category ',catFilter!=='all' && h('span',{style:{fontSize:9,color:'var(--accent)',marginLeft:2}},'\u25cf')
                  ),
                  h('th',{scope:'col'},'Type'),
                  accounts.length>0 && h('th',{scope:'col'},'Account'),
                  h('th',{onClick:()=>toggleSort('amount'), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSort('amount');}}, tabIndex:0, role:'columnheader', 'aria-sort':sortCol==='amount'?(sortDir>0?'ascending':'descending'):'none', style:{cursor:'pointer',color:sortCol==='amount'?'var(--accent)':'inherit'}},
                    'Amount ',h('span',{style:{fontSize:10,color:sortCol==='amount'?'var(--accent)':'var(--text2)'}},sortCol==='amount'?(sortDir>0?'\u25b2':'\u25bc'):'\u25b4\u25be')
                  ),
                  h('th',null,'Balance'),
                  h('th',{style:{width:60}},null)
                ),
                (showPayeeFilter || showCatFilter) && h('tr',null,
                  h('th',null),
                  h('th',null),
                  h('th',{style:{padding:'4px 6px'}},
                    showPayeeFilter && h('input',{className:'input',value:payeeFilter,onChange:e=>setPayeeFilter(e.target.value),placeholder:'Filter payee...',style:{width:'100%',fontSize:11,padding:'3px 6px'},autoFocus:showPayeeFilter,onKeyDown:e=>{if(e.key==='Escape'){setPayeeFilter('');setShowPayeeFilter(false);}}})
                  ),
                  h('th',{style:{padding:'4px 6px'}},
                    showCatFilter && h('select',{className:'input',value:catFilter,onChange:e=>{setCatFilter(e.target.value);},style:{width:'100%',fontSize:11,padding:'3px 6px'}},
                      h('option',{value:'all'},'All Categories'),
                      h('option',{value:'__uncategorized__'},'Uncategorized'),
                      Object.keys(catMap).sort((a,b)=>a.localeCompare(b)).map(c=>h('option',{key:c,value:c},c))
                    )
                  ),
                  h('th',null),
                  accounts.length>0 && h('th',null),
                  h('th',null),
                  h('th',null),
                  h('th',null)
                )
              ),
              h('tbody',null, sorted.slice(0,200).map(t => {
                const rec = isReconciled(t);
                const rowBg = t.pending ? {background:'rgba(232,160,32,0.06)'} : rec ? {background:'rgba(64,192,128,0.06)'} : undefined;
                return h('tr',{key:t.id, style:rowBg},
                  h('td',{onClick:()=>{if(!rec)togglePending(t.id)},style:{textAlign:'center',fontSize:12,cursor:rec?'default':'pointer',userSelect:'none'},title:t.pending?'Pending — click to clear':rec?'Reconciled':'Cleared — click to mark pending'}, h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:t.pending?'#e8a020':rec?'#5090e8':'#40c080'}})),
                  h('td',{style:{color:t.pending?'var(--accent2)':'var(--text2)',fontSize:12,fontStyle:t.pending?'italic':'normal'}},t.pending?'Pending':t.date),
                  h('td',{style:{fontWeight:500}},
                    editPayeeId===t.id
                      ? h('div',{style:{display:'flex',gap:4}},
                          h('input',{className:'input',value:editPayeeName,onChange:e=>setEditPayeeName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')savePayee(t.id);if(e.key==='Escape')setEditPayeeId(null);},style:{fontSize:12,padding:'3px 6px',width:140},autoFocus:true}),
                          h('button',{className:'btn sm',onClick:()=>savePayee(t.id)},'\u2713'),
                          h('button',{className:'btn sm',onClick:()=>setEditPayeeId(null)},'\u2717')
                        )
                      : h('span',{onClick:()=>startEditPayee(t), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startEditPayee(t);}}, tabIndex:0, role:'button', style:{cursor:'pointer'},title:'Click to edit payee'},t.cleanName,
                          t.checkNumber && h('span',{style:{fontSize:10,color:'var(--text2)',marginLeft:6}},'#'+t.checkNumber),
                          t.cleanName!==t.description && h('div',{style:{fontSize:10,color:'var(--text2)',marginTop:1}},t.description.substring(0,30))
                        )
                  ),
                  h('td',null,
                    editId===t.id

function BudgetMonthlyTab({categories, setCategories, transactions, dictionary, groupColors, accounts, defaultAcct, showToast}) {
  const [expandedGroup, setExpandedGroup] = useState(null);
  const [selectedMonth, setSelectedMonth] = useState(()=>{const now=new Date();return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');});
  const [drilldown, setDrilldown] = useState(null);
  const [budgetAcct, setBudgetAcctRaw] = useState(defaultAcct||'all');
  const setBudgetAcct = (v) => { setBudgetAcctRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [editingDueDay, setEditingDueDay] = useState(null);
  const [dueDayVal, setDueDayVal] = useState('');
  const [editingSchedule, setEditingSchedule] = useState(null); // category name being edited

  // Build due day lookup: category-level dueDay, then dictionary overrides
  const dueDayByCategory = useMemo(()=>{
    const m = {};
    categories.forEach(c=>{
      if(c.dueDay && c.dueDay>=1 && c.dueDay<=31) m[c.name] = c.dueDay;
    });
    (dictionary||[]).forEach(d=>{
      if(d.dueDay && d.dueDay>=1 && d.dueDay<=31 && d.category){
        m[d.category] = d.dueDay;
      }
    });
    return m;
  },[dictionary, categories]);

  // Get months with data
  const months = useMemo(()=>{
    const m = new Set();
    transactions.forEach(t=>{
      const ym = getYearMonth(t.date);
      if(ym) m.add(ym);
    });
    return [...m].sort();
  },[transactions]);

  const monthIdx = selectedMonth==='all' ? -1 : months.indexOf(selectedMonth);
  const canGoPrev = selectedMonth!=='all' && monthIdx > 0;
  const canGoNext = selectedMonth!=='all' && monthIdx < months.length-1;
  const goPrevMonth = ()=>{ if(canGoPrev) setSelectedMonth(months[monthIdx-1]); };
  const goNextMonth = ()=>{ if(canGoNext) setSelectedMonth(months[monthIdx+1]); };

  // Filter transactions by selected month and account
  const filteredTxns = useMemo(()=>{
    let arr = transactions;
    if(selectedMonth!=='all') arr = arr.filter(t=>getYearMonth(t.date)===selectedMonth);
    if(budgetAcct!=='all') arr = arr.filter(t=>t.accountId===budgetAcct);
    return arr;
  },[transactions, selectedMonth, budgetAcct]);

  const numMonths = selectedMonth==='all' ? Math.max(months.length, 1) : 1;

  const grouped = useMemo(()=>{
    const g = {};
    categories.forEach(c=>{
      if(!g[c.group]) g[c.group]=[];
      g[c.group].push(c);
    });
    return g;
  },[categories]);

  const spendingCats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
  const totalBudget = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
  const discBudget = spendingCats.filter(c=>c.catType==='discretionary').reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);
  const fixedBudget = spendingCats.filter(c=>c.catType==='fixed').reduce((s,c)=>s+getMonthlyBudget(c,budgetAcct),0);

  const budgetToastRef = useRef(null);
  const updateBudget = (catName, val) => {
    const numVal = Math.max(0,+val);
    if(budgetAcct==='all') {
      setCategories(prev=>prev.map(c=>c.name===catName?{...c,budget:numVal}:c));
    } else {
      setCategories(prev=>prev.map(c=>{
        if(c.name!==catName) return c;
        const ab = {...(c.accountBudgets||{}), [budgetAcct]:numVal};
        return {...c, accountBudgets:ab};
      }));
    }
    if(showToast) {
      clearTimeout(budgetToastRef.current);
      budgetToastRef.current = setTimeout(()=>showToast('✅ Budget saved: '+catName+' $'+numVal+'/mo'), 600);
    }
  };

  const saveDueDay = () => {
    const val = parseInt(dueDayVal);
    if(val>=1 && val<=31) {
      setCategories(prev=>prev.map(c=>c.name===editingDueDay?{...c,dueDay:val}:c));

                                (freq==='monthly'||freq==='quarterly'||freq==='annual') && h('input',{type:'number',min:1,max:31,placeholder:'Day',value:c.dueDay||'',
                                  onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay',v);},
                                  style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}}),
                                (freq==='quarterly'||freq==='annual') && h('input',{type:'date',value:c.refDate||'',placeholder:'Start date',
                                  onChange:e=>updateCatField(c.name,'refDate',e.target.value),
                                  style:{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)'}}),
                                freq==='semimonthly' && h(React.Fragment,null,
                                  h('input',{type:'number',min:1,max:31,placeholder:'Day 1',value:c.dueDay||'',
                                    onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay',v);},
                                    style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}}),
                                  h('span',null,'&'),
                                  h('input',{type:'number',min:1,max:31,placeholder:'Day 2',value:c.dueDay2||'',
                                    onChange:e=>{const v=parseInt(e.target.value);if(v>=1&&v<=31)updateCatField(c.name,'dueDay2',v);},
                                    style:{width:36,fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)',textAlign:'center'}})
                                ),
                                freq==='biweekly' && h('input',{type:'date',value:c.refDate||'',
                                  onChange:e=>updateCatField(c.name,'refDate',e.target.value),
                                  style:{fontSize:10,padding:'2px 4px',borderRadius:4,border:'1px solid var(--border)'}}),
                                h('button',{className:'btn sm',onClick:()=>setEditingSchedule(null),
                                  style:{fontSize:9,padding:'1px 6px'}},'✓')
                              )
                            : h('span',{onClick:()=>setEditingSchedule(c.name),
                                style:{fontSize:9,padding:'1px 5px',borderRadius:99,background:schedBg,color:schedColor,fontWeight:600,whiteSpace:'nowrap',cursor:'pointer'}},
                                summary);
                        })(),
                        h('span',{style:{color:'var(--text2)',fontSize:13}},'$'),
                        h('input',{className:'input',type:'number',value:catBgt,
                          onChange:e=>updateBudget(c.name,e.target.value),
                          style:{width:90,padding:'5px 8px',fontSize:13}
                        }),
                        (c.frequency && c.frequency!=='monthly' && catBgt>0) && h('span',{style:{fontSize:9,color:'var(--text2)',fontStyle:'italic'}},'~'+fmt(getMonthlyBudget(c,budgetAcct))+'/mo'),
                        budgetAcct!=='all' && !(c.accountBudgets && c.accountBudgets[budgetAcct]!==undefined) && h('span',{style:{fontSize:9,color:'var(--text2)',fontStyle:'italic'}},'global'),
                        h('div',{style:{flex:1,minWidth:80}},
                          h('div',{className:'progress'},
                            h('div',{className:'progress-fill',style:{width:pct+'%',background:display>catBgt?'var(--red)':'var(--accent)'}})
                          )
                        ),
                        h('span',{style:{fontSize:11,color:display>catBgt?'var(--red)':'var(--text2)',minWidth:70,textAlign:'right'}},
                          fmt(display)+(selectedMonth==='all'?' avg':'')
                        ),
                        catTxns.length>0 && h('button',{className:'btn sm',onClick:()=>setDrilldown({name:c.name,txns:catTxns,budget:catBgt}),
                          style:{fontSize:10,padding:'3px 8px'}}, catTxns.length+' txn'+(catTxns.length===1?'':'s')+' ▸')
                      )
                    );
                  })
                )
              );
            })
          )
        ),

    // Drilldown modal
    drilldown && h(Modal, {onClose:()=>setDrilldown(null)},
      h('h3',null, '🔍 ', drilldown.name,
        selectedMonth!=='all' && h('span',{style:{fontWeight:400,fontSize:13,color:'var(--card-text2)'}},' — '+monthLabel(selectedMonth))
      ),
      h('div',{style:{display:'flex',gap:12,marginBottom:14}},
        h('div',{style:{flex:1,textAlign:'center',padding:10,background:drilldown.isIncome?'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:drilldown.isIncome?'var(--green)':'var(--red)'}},fmt(drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},drilldown.isIncome?'Received':'Spent')
        ),
        drilldown.budget>0 && h('div',{style:{flex:1,textAlign:'center',padding:10,background:'rgba(64,192,128,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--accent2)'}},fmt(drilldown.budget)),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},'Budget')
        ),
        drilldown.budget>0 && h('div',{style:{flex:1,textAlign:'center',padding:10,background: (drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0)) >=0 ? 'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:(drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))>=0?'var(--green)':'var(--red)'}},
            (drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))>=0?'+':'-',
            fmt(Math.abs(drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0)))
          ),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},'Remaining')
        )
      ),
      h('div',{style:{maxHeight:350,overflowY:'auto'}},
        h('table',{className:'table'},
          h('thead',null,h('tr',null,
            h('th',null,'Date'), h('th',null,'Payee'), h('th',null,'Amount')
          )),
          h('tbody',null, drilldown.txns.sort((a,b)=>safeDate(b.date)-safeDate(a.date)).map((t,i)=>
            h('tr',{key:i},
              h('td',{style:{fontSize:12,color:'var(--card-text2)'}},t.date),
              h('td',{style:{fontWeight:500}},t.cleanName),
              h('td',{style:{fontWeight:600}},fmt(t.amount))
            )
          ))
        )
      ),
      h('div',{style:{textAlign:'right',marginTop:12}},
        h('button',{className:'btn',onClick:()=>setDrilldown(null)},'Close')
      )
    )
  );
}

// ── Dashboard Page ──────────────────────────────────────
function DashboardPage({categories, transactions, catMap, accounts, setAccounts, dictionary, setDictionary, onStartTour, tier, isDemo, demoBypass, isTierDemo, groupColors, defaultAcct, setPage, onUpgrade}) {
  const isFree = tier && tier.budget === false;
  const [selectedMonth, setSelectedMonth] = useState('all');
  const [selectedAcct, setSelectedAcctRaw] = useState(defaultAcct||'all');
  const setSelectedAcct = (v) => { setSelectedAcctRaw(v); localStorage.setItem('ambit_default_account', v); };
  const [drilldown, setDrilldown] = useState(null);
  const [editingDueDay, setEditingDueDay] = useState(null);
  const [dueDayInput, setDueDayInput] = useState('');
  const [dueDayFreqInput, setDueDayFreqInput] = useState('monthly');
  const [expandedCats, setExpandedCats] = useState(new Set());
  const [expandedPayee, setExpandedPayee] = useState(null);
  const [forecastExpanded, setForecastExpanded] = useState(false);
  const [forecastDiscExpanded, setForecastDiscExpanded] = useState(new Set());
  const [dashView, setDashView] = useState('overview');
  const [yearViewYear, setYearViewYear] = useState(()=>new Date().getFullYear());
  const [yearViewDrilldown, setYearViewDrilldown] = useState(null);
  const [plansExpanded, setPlansExpanded] = useState(false);
  const toggleCat = k => setExpandedCats(prev => { const s = new Set(prev); s.has(k)?s.delete(k):s.add(k); return s; });

  // ── Bills & Budget Window ──
  const bbWindow = useMemo(()=>{
    const now = new Date();
    const realYear = now.getFullYear();
    const realMonth = now.getMonth()+1;
    const realYM = realYear+'-'+String(realMonth).padStart(2,'0');
    // Target month: use selectedMonth if specific, otherwise current month
    const targetYM = (selectedMonth!=='all') ? selectedMonth : realYM;
    const isCurrentMonth = targetYM===realYM;
    const [tYear, tMonth] = targetYM.split('-').map(Number);
    const todayDay = isCurrentMonth ? now.getDate() : new Date(tYear, tMonth, 0).getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const monthLabel = monthNames[tMonth-1]+' '+tYear;
    const curMonth = tMonth; // alias for backward compat within bbWindow

    const currentMonthTxns = transactions.filter(t=>getYearMonth(t.date)===targetYM && (selectedAcct==='all' || t.accountId===selectedAcct));

    // Historical data by payee
    const historyByPayee = {};
    transactions.forEach(t=>{
      if(!t.cleanName) return;
      if(selectedAcct!=='all' && t.accountId!==selectedAcct) return;
      const p = parseDateParts(t.date);
      if(!p) return;
      if(!historyByPayee[t.cleanName]) historyByPayee[t.cleanName]=[];
      historyByPayee[t.cleanName].push({day:p.day, amount:Math.abs(t.amount), ym:getYearMonth(t.date)});
    });

    const getExpectedDay = (cleanName, dictEntry, cat) => {
      if(dictEntry && dictEntry.dueDay && dictEntry.dueDay>=1 && dictEntry.dueDay<=31) return dictEntry.dueDay;
      if(cat && cat.dueDay && cat.dueDay>=1 && cat.dueDay<=31) return cat.dueDay;
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return null;
      const avg = Math.round(hist.reduce((s,h)=>s+h.day,0)/hist.length);
      return Math.min(avg,28);
    };

    const getExpectedAmount = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      return hist.reduce((s,h)=>s+h.amount,0)/hist.length;
    };

    const getMonthlyAvg = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      const months = new Set(hist.map(h=>h.ym));
      return months.size>0 ? hist.reduce((s,h)=>s+h.amount,0)/months.size : 0;
    };

    const dictByCleanName = {};
    (dictionary||[]).forEach(d=>{if(d.cleanName) dictByCleanName[d.cleanName]=d;});

    // Determine if a payee is expected this month based on frequency
    const isExpectedThisMonth = (rule) => {
      const freq = rule.frequency || 'monthly';
      if(freq==='monthly') return true;
      // Check history: what months does this payee typically appear?
      const hist = historyByPayee[rule.cleanName]||[];
      if(hist.length===0) return true; // No history, assume it could be this month
      const historicalMonths = [...new Set(hist.map(h=>{const parts=h.ym.split('-');return +parts[1];}))];
      if(freq==='quarterly') {
        // Expected if current month matches one of the historical months (mod 3 pattern)
        return historicalMonths.some(m=>m%3===curMonth%3) || historicalMonths.includes(curMonth);
      }
      if(freq==='biannual') {
        // Expected every 6 months — check if this month matches historical pattern
        return historicalMonths.some(m=>m%6===curMonth%6) || historicalMonths.includes(curMonth);
      }
      if(freq==='annual') {
        return historicalMonths.includes(curMonth);
      }
      return true;
    };

    // Get frequency label for display
    const freqLabel = (rule) => {
      const f = rule.frequency||'monthly';
      if(f==='biweekly') return 'Biweekly';
      if(f==='semimonthly') return 'Semimonthly';
      if(f==='quarterly') return 'Quarterly';
      if(f==='biannual') return 'Biannual';
      if(f==='annual') return 'Annual';
      return null;
    };

    // Income
    const incomeCats = categories.filter(c=>c.group==='Income');
    const incomeData = incomeCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const ruleCleanNames = new Set(rules.map(r=>r.cleanName));
      const payees = rules.filter(rule=>{
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name && t.amount>=0);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name && t.amount>=0);
        const received = txns.length>0;
        const receivedAmount = txns.reduce((s,t)=>s+t.amount,0);
        const receivedDate = received?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule, cat);
        const expectedAmount = getExpectedAmount(cn);
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, received, receivedAmount, receivedDate, expectedDay, expectedAmount, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      // Also include income transactions with no dictionary rule
      const unruledTxns = currentMonthTxns.filter(t=>t.category===cat.name && t.amount>=0 && !ruleCleanNames.has(t.cleanName));
      const unruledByPayee = {};
      unruledTxns.forEach(t=>{
        if(!unruledByPayee[t.cleanName]) unruledByPayee[t.cleanName] = [];
        unruledByPayee[t.cleanName].push(t);
      });
      Object.entries(unruledByPayee).forEach(([cn, txns])=>{
        const receivedAmount = txns.reduce((s,t)=>s+t.amount,0);
        payees.push({cleanName:cn, keyword:'', received:true, receivedAmount, receivedDate:txns[0].date, expectedDay:null, expectedAmount:receivedAmount, dueDay:null, freq:'', frequency:'monthly', txns});
      });
      const totalReceived = payees.filter(p=>p.received).reduce((s,p)=>s+p.receivedAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      return {...cat, payees, totalReceived, totalExpected};
    }).filter(c=>c.payees.length>0);

    // Fixed bills
    const fixedCats = categories.filter(c=>c.catType==='fixed' && c.group!=='Income');
    const billsData = fixedCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const ruleCleanNames = new Set(rules.map(r=>r.cleanName));
      const payees = rules.filter(rule=>{
        // Always show if paid this month; otherwise only show if expected this month
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name);
        const isPaid = txns.length>0;
        const paidAmount = isPaid?txns.reduce((s,t)=>s+Math.abs(t.amount),0):0;
        const paidDate = isPaid?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule, cat);
        const expectedAmount = getExpectedAmount(cn);
        const isUpcoming = !isPaid && expectedDay!==null;
        const isPastDue = isUpcoming && expectedDay<todayDay;
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, isPaid, paidAmount, paidDate, expectedDay, expectedAmount, isUpcoming, isPastDue, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      // Also include transactions in this category that have no dictionary rule
      const unruledTxns = currentMonthTxns.filter(t=>t.category===cat.name && !ruleCleanNames.has(t.cleanName));
      const unruledByPayee = {};
      unruledTxns.forEach(t=>{
        if(!unruledByPayee[t.cleanName]) unruledByPayee[t.cleanName] = [];
        unruledByPayee[t.cleanName].push(t);
      });
      Object.entries(unruledByPayee).forEach(([cn, txns])=>{
        const paidAmount = txns.reduce((s,t)=>s+Math.abs(t.amount),0);
        payees.push({cleanName:cn, keyword:'', isPaid:true, paidAmount, paidDate:txns[0].date, expectedDay:null, expectedAmount:paidAmount, isUpcoming:false, isPastDue:false, dueDay:null, freq:'', frequency:'monthly', txns});
      });
      const totalPaid = payees.filter(p=>p.isPaid).reduce((s,p)=>s+p.paidAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      const allPaid = payees.length>0 && payees.every(p=>p.isPaid);
      return {...cat, payees, totalPaid, totalExpected, allPaid};
    }).filter(c=>c.payees.length>0);

    // Discretionary — budget-focused (no payee drill-down)
    const discCats = categories.filter(c=>c.catType==='discretionary' && c.group!=='Income');
    const discretionaryData = discCats.map(cat=>{
      const catActual = currentMonthTxns.filter(t=>t.category===cat.name&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const catBudget = getEffectiveBudget(cat, selectedAcct);
      const overBudget = catBudget>0 && catActual>catBudget;
      const budgetPct = catBudget>0 ? Math.round(catActual/catBudget*100) : 0;
      const budgetRemaining = catBudget - catActual;
      return {...cat, catActual, catBudget, overBudget, budgetPct, budgetRemaining};
    }).filter(c=>c.catBudget>0||c.catActual>0);

    // ── Forecast ──
    const currentBalance = (selectedAcct==='all'
      ? accounts.reduce((s,a)=>s+(a.startingBalance||0),0)
      : (accounts.find(a=>a.id===selectedAcct)?.startingBalance||0))
      + transactions.filter(t=>selectedAcct==='all' || t.accountId===selectedAcct).reduce((s,t)=>s+t.amount,0);

    // Budget-driven forecast totals
    const curYMKey2 = (() => { const m = new Date().getMonth()+1; return new Date().getFullYear()+'-'+(m<10?'0':'')+m; })();
    const forecastFilterAcct = t => selectedAcct==='all' || t.accountId===selectedAcct;
    const forecastMonthTxns = transactions.filter(t=>forecastFilterAcct(t) && getYearMonth(t.date)===curYMKey2);

    const totalIncomeBudget = incomeCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const receivedIncome = forecastMonthTxns.filter(t=>t.amount>=0 && incomeCats.some(c=>c.name===t.category)).reduce((s,t)=>s+t.amount,0);
    const remainingIncome = Math.max(0, totalIncomeBudget - receivedIncome);

    const fixedBillCats = categories.filter(c=>c.catType==='fixed' && c.group!=='Income');
    const totalBillsBudget = fixedBillCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const paidBills = forecastMonthTxns.filter(t=>t.amount<0 && fixedBillCats.some(c=>c.name===t.category)).reduce((s,t)=>s+Math.abs(t.amount),0);
    const remainingBills = Math.max(0, totalBillsBudget - paidBills);

    const totalDiscBudget = discCats.reduce((s,c)=>s+getEffectiveBudget(c,selectedAcct),0);
    const totalDiscSpent = discretionaryData.reduce((s,c)=>s+c.catActual,0);
    const remainingDiscBudget = Math.max(0, totalDiscBudget - totalDiscSpent);

    const endOfMonthBalance = currentBalance + remainingIncome - remainingBills - remainingDiscBudget;

    const nextMonthBalance = endOfMonthBalance + totalIncomeBudget - totalBillsBudget - totalDiscBudget;

    return {monthLabel, curMonth, isCurrentMonth, incomeData, billsData, discretionaryData,
      currentBalance, remainingIncome, remainingBills, remainingDiscBudget,
      endOfMonthBalance, nextMonthBalance, totalDiscBudget};
  },[transactions, categories, dictionary, accounts, selectedMonth, selectedAcct]);

  // ── Day-by-Day Forecast ──
  const forecastRows = useMemo(()=>{
    const now = new Date();
    const todayDay = now.getDate();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth(); // 0-indexed
    const daysInCurMonth = new Date(curYear, curMonth+1, 0).getDate();
    const nextMonth = curMonth===11 ? 0 : curMonth+1;
    const nextYear = curMonth===11 ? curYear+1 : curYear;
    const daysInNextMonth = new Date(nextYear, nextMonth+1, 0).getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Budget-driven forecast using getForecastDates for frequency-aware date placement
    const curYM = (curMonth+1<10?'0':'')+(curMonth+1);
    const curYMKey = curYear+'-'+curYM;
    const filterAcct = t => selectedAcct==='all' || t.accountId===selectedAcct;
    const monthTxns = transactions.filter(t=>filterAcct(t) && getYearMonth(t.date)===curYMKey);

    // Fixed bills + transfers from budget categories (frequency-aware)
    const fixedCats = categories.filter(c=>c.catType==='fixed' && c.group!=='Income');
    const curBills = [];
    const nextBills = [];
    fixedCats.forEach(cat=>{
      const dates = getForecastDates(cat, selectedAcct, curYear, curMonth);
      if(dates.length===0) return;
      const paidThisMonth = monthTxns.filter(t=>t.category===cat.name && t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const totalExpected = dates.reduce((s,d)=>s+d.amount,0);
      const isPaid = paidThisMonth >= totalExpected * 0.5;
      if(!isPaid) dates.forEach(d=>curBills.push({day:d.day, label:'🔵 '+cat.name, amount:-d.amount, type:'bill'}));
      const nextDates = getForecastDates(cat, selectedAcct, nextYear, nextMonth);
      nextDates.forEach(d=>nextBills.push({day:d.day, label:'🔵 '+cat.name, amount:-d.amount, type:'bill'}));
    });

    // Income from budget categories (frequency-aware)
    const incomeCats = categories.filter(c=>c.group==='Income');
    const curIncome = [];
    const nextIncome = [];
    incomeCats.forEach(cat=>{
      const dates = getForecastDates(cat, selectedAcct, curYear, curMonth);
      if(dates.length===0) return;
      const receivedThisMonth = monthTxns.filter(t=>t.category===cat.name && t.amount>=0).reduce((s,t)=>s+t.amount,0);
      const totalExpected = dates.reduce((s,d)=>s+d.amount,0);
      const isReceived = receivedThisMonth >= totalExpected * 0.5;
      if(!isReceived) dates.forEach(d=>curIncome.push({day:d.day, label:'🟢 '+cat.name, amount:d.amount, type:'income'}));
      const nextDates = getForecastDates(cat, selectedAcct, nextYear, nextMonth);
      nextDates.forEach(d=>nextIncome.push({day:d.day, label:'🟢 '+cat.name, amount:d.amount, type:'income'}));
    });

    // Weekly discretionary from budgets (budget / 4 per category, spread on Mondays)
    const forecastDiscCats = categories.filter(c=>c.catType==='discretionary' && c.group!=='Income');
    const weeklyDiscTotal = forecastDiscCats.reduce((s,c)=>s+Math.round((getEffectiveBudget(c,selectedAcct)/4)*100)/100, 0);

    const rows = [];
    let running = bbWindow.currentBalance;

    // Current month: today through end of month
    for(let d=todayDay; d<=daysInCurMonth; d++){
      const dt = new Date(curYear, curMonth, d);
      const dateStr = (curMonth+1)+'/'+d;
      const isToday = d===todayDay;

      // Add items for this day
      const dayItems = [];

      // Bills due this day
      curBills.filter(b=>b.day===d).forEach(b=>dayItems.push(b));
      // Income due this day
      curIncome.filter(i=>i.day===d).forEach(i=>dayItems.push(i));
      // Discretionary on Mondays
      if(dt.getDay()===1 && weeklyDiscTotal>0){
        dayItems.push({day:d, label:'🟡 Weekly discretionary', amount:-weeklyDiscTotal, type:'discretionary'});
      }

      if(dayItems.length===0 && !isToday) continue; // skip empty days (except today)

      if(isToday){
        rows.push({date:dateStr, label:'Today', amount:0, runningBalance:running, isToday:true, type:'today'});
      }

      dayItems.forEach(item=>{
        running += item.amount;
        rows.push({date:dateStr, label:item.label, amount:item.amount, runningBalance:running, type:item.type});
      });
    }

    // Month divider
    rows.push({date:'', label:monthNames[nextMonth]+' '+nextYear, amount:0, runningBalance:running, isMonthDivider:true, type:'divider'});

    // Next month: day 1 through end
    for(let d=1; d<=daysInNextMonth; d++){
      const dt2 = new Date(nextYear, nextMonth, d);
      const dateStr = (nextMonth+1)+'/'+d;

      const dayItems = [];
      nextBills.filter(b=>b.day===d).forEach(b=>dayItems.push(b));
      nextIncome.filter(i=>i.day===d).forEach(i=>dayItems.push(i));
      if(dt2.getDay()===1 && weeklyDiscTotal>0){
        dayItems.push({day:d, label:'🟡 Weekly discretionary', amount:-weeklyDiscTotal, type:'discretionary'});
      }

      if(dayItems.length===0) continue;

      dayItems.forEach(item=>{
        running += item.amount;
        rows.push({date:dateStr, label:item.label, amount:item.amount, runningBalance:running, type:item.type});
      });
    }

  const filteredTxns = useMemo(()=>{

  const numMonths = selectedMonth==='all' ? Math.max(months.length,1) : 1;

  // Separate transfers from spending
  const spendingTxns = filteredTxns.filter(t=>t.catType!=='transfer');

  const expenses = spendingTxns.filter(t=>t.amount<0);
  const income = spendingTxns.filter(t=>t.amount>=0);
