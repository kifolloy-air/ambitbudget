<style>
:root {
  --bg: #0c1445;
  --surface: #fdf6e3;
  --surface2: #f5ecd0;
  --border: #e8dbb8;
  --text: #eef0ff;
  --text2: #c0c8e8;
  --card-text: #1a1510;
  --card-text2: #504838;
  --accent: #e8a020;
  --accent2: #f0c050;
  --green: #48d888;
  --red: #f07070;
  --yellow: #f0b030;
  --orange: #f09040;
  --blue: #70a8f0;
  --pink: #e080b8;
  --sidebar-bg: #101850;
  --sidebar-border: #2a3580;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  font-size: 16px;
}
/* High Contrast Theme */
:root.high-contrast {
  --bg: #000000;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --border: #666666;
  --text: #ffffff;
  --text2: #e0e0e0;
  --card-text: #000000;
  --card-text2: #333333;
  --accent: #ffaa00;
  --accent2: #ffcc44;
  --green: #33ff88;
  --red: #ff5555;
  --yellow: #ffcc00;
  --orange: #ffaa33;
  --blue: #66aaff;
  --pink: #ff66bb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 1rem; }
/* Skip link */
.skip-link { position:absolute; top:-100px; left:0; background:var(--accent); color:#fff; padding:8px 16px; z-index:999; font-size:0.875rem; font-weight:600; border-radius:0 0 8px 0; transition:top 0.2s; }
.skip-link:focus { top:0; }
input, select, textarea, button { font-family: inherit; }
code { font-family: 'JetBrains Mono', monospace; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); padding: 20px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; color: var(--text); }
.main { flex: 1; margin-left: 220px; padding: 28px 36px; min-height: 100vh; }

/* Mode tabs (Demo / My Budget) */
.mode-tabs { display: flex; gap: 0; margin-bottom: 0; padding: 0 20px 16px; }
.mode-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: all 0.15s; color: var(--text2); background: transparent; border: 1px solid transparent; }
.mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.mode-tab.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-color: rgba(232,160,32,0.25); }
.mode-tab .mode-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.mode-tab .mode-dot.demo { background: var(--blue); }
.mode-tab .mode-dot.mine { background: var(--green); }
.demo-banner { background: rgba(80,144,232,0.1); border: 1px solid rgba(80,144,232,0.2); border-radius: 8px; padding: 8px 14px; margin-bottom: 16px; font-size: 0.75rem; color: var(--blue); display: flex; align-items: center; gap: 8px; }
.demo-banner .dismiss { cursor: pointer; margin-left: auto; opacity: 0.6; font-size: 0.875rem; }

.logo { padding: 0 20px 24px; font-size: 1.25rem; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 0.75rem; display: block; margin-top: 2px; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 0.875rem; color: var(--text2); transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(232,160,32,0.08); }
.nav-item.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-left-color: var(--accent); font-weight: 600; }
.nav-item .icon { font-size: 1rem; width: 22px; text-align: center; }

.nav-sep { height: 1px; background: var(--sidebar-border); margin: 12px 20px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.card h3 { font-size: 0.9375rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--card-text); }
.card h3 .icon { font-size: 1rem; }

/* Stat cards */
.stats { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; flex: 1; min-width: 120px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.stat .label { font-size: 0.6875rem; color: var(--card-text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.stat .value { font-size: 1.125rem; font-weight: 700; }
.stat .sub { font-size: 0.6875rem; color: var(--card-text2); margin-top: 1px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--card-text); font-size: 0.8125rem; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #d09018; }
.btn.green { background: #38b070; border-color: #38b070; color: #fff; }
.btn.green:hover { background: #309860; }
.btn.danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(255,107,107,0.1); }
.btn.sm { padding: 5px 10px; font-size: 0.75rem; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Inputs */
.input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--card-text); font-size: 0.8125rem; transition: border-color 0.15s; }
.input:focus { border-color: var(--accent); outline: 3px solid var(--accent2); outline-offset: 1px; }
.input::placeholder { color: var(--card-text2); }
textarea.input { resize: vertical; min-height: 100px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
select.input { cursor: pointer; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 0.6875rem; font-weight: 600; }
.disc-tag { font-size: 0.625rem; padding: 1px 6px; border-radius: 99px; font-weight: 600; }
.disc-tag.disc { background: rgba(232,160,32,0.15); color: var(--yellow); }
.disc-tag.fixed { background: rgba(80,144,232,0.15); color: var(--blue); }
.disc-tag.transfer { background: rgba(208,96,160,0.15); color: var(--pink); }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; color: var(--card-text); }
.table th { text-align: left; padding: 10px 12px; color: var(--card-text2); font-weight: 600; font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
.table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.table tr:hover { background: rgba(232,160,32,0.05); }
.table .del-btn { border: none; background: none; color: var(--red); cursor: pointer; font-size: 1rem; opacity: 0.7; transition: opacity 0.15s; }
.table .del-btn:hover { opacity: 1; }
.table.compact-budget { width: 100%; }
.table.compact-budget th, .table.compact-budget td { padding: 5px 8px; border-right: 1px solid var(--border); white-space: nowrap; }
.table.compact-budget th:first-child, .table.compact-budget td:first-child { white-space: normal; }
.table.compact-budget th:last-child, .table.compact-budget td:last-child { border-right: none; width: 24px; text-align: center; }
.info-tooltip { position:absolute; top:100%; left:0; z-index:100; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:0.75rem; font-weight:400; color:var(--card-text); line-height:1.5; width:280px; margin-top:6px; box-shadow:0 4px 16px rgba(0,0,0,0.15); white-space:normal; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--card-text2); }
.empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty p { font-size: 0.8125rem; max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* Group colors */
.grp-housing { background: rgba(232,160,32,0.15); color: #f0c050; }
.grp-food { background: rgba(72,216,136,0.15); color: #48d888; }
.grp-transport { background: rgba(240,144,64,0.15); color: #f09040; }
.grp-utilities { background: rgba(112,168,240,0.15); color: #70a8f0; }
.grp-personal { background: rgba(224,128,184,0.15); color: #e080b8; }
.grp-health { background: rgba(240,112,112,0.15); color: #f07070; }
.grp-entertainment { background: rgba(240,176,48,0.15); color: #f0b030; }
.grp-savings { background: rgba(72,216,136,0.15); color: #48d888; }
.grp-income { background: rgba(80,200,160,0.15); color: #60d8b0; }
.grp-other { background: rgba(192,200,232,0.15); color: #c0c8e8; }

/* Badge */
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 99px; font-size: 0.6875rem; font-weight: 700; padding: 0 6px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.25s ease-out; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.5px; }
.page-header p { color: var(--text2); font-size: 0.8125rem; margin-top: 4px; }

/* Compass watermark behind page content */
.compass-watermark { position: fixed; top: 50%; left: calc(110px + 50vw); transform: translate(-50%, -50%); pointer-events: none; z-index: 0; opacity: 0.07; }

/* ── Savings Goals ── */
.goal-card { background: rgba(232,160,32,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
.goal-card:first-of-type { margin-top: 10px; }
.goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.goal-name { font-size: 0.8125rem; font-weight: 600; color: var(--card-text); }
.goal-meta { font-size: 0.6875rem; color: var(--card-text2); }
.goal-progress-track { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
.goal-progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
.goal-progress-fill.on-track { background: var(--green); }
.goal-progress-fill.slightly-behind { background: var(--yellow); }
.goal-progress-fill.behind { background: var(--red); }
.goal-stats { display: flex; justify-content: space-between; align-items: center; font-size: 0.6875rem; color: var(--card-text2); }
.goal-actions { display: flex; gap: 4px; }
.goal-actions .btn { padding: 3px 8px; font-size: 0.6875rem; }
.goals-earmark { font-size: 0.75rem; color: var(--card-text2); margin-top: 6px; padding: 6px 10px; background: rgba(72,216,136,0.06); border-radius: 6px; display: flex; justify-content: space-between; }
.goals-hint { background: rgba(126,200,227,0.08); border: 1px solid rgba(126,200,227,0.2); border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: flex; align-items: flex-start; gap: 10px; font-size: 0.8125rem; color: var(--card-text2); line-height: 1.5; }
.goals-hint .dismiss { cursor: pointer; margin-left: auto; opacity: 0.5; font-size: 1rem; flex-shrink: 0; }
.goals-hint .dismiss:hover { opacity: 1; }
.skip-save-input { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.skip-save-input .input { padding: 4px 8px; font-size: 0.75rem; }
.dash-goals-widget { margin-bottom: 14px; }
.dash-goal-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.dash-goal-row:last-child { border-bottom: none; }
.dash-goal-info { flex: 1; min-width: 0; }
.dash-goal-name { font-size: 0.8125rem; font-weight: 500; color: var(--card-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dash-goal-acct { font-size: 0.6875rem; color: var(--card-text2); }
.dash-goal-bar { flex: 0 0 100px; }
.dash-goal-status { font-size: 0.6875rem; font-weight: 600; white-space: nowrap; }
.spending-suggestion { background: rgba(112,168,240,0.06); border: 1px solid rgba(112,168,240,0.15); border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 0.75rem; color: var(--card-text2); line-height: 1.5; }

/* ── Splash Screen ── */
.splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.splash-screen .splash-title { font-size: 2.25rem; font-weight: 700; color: var(--accent2); letter-spacing: -1px; margin-top: 12px; }
.splash-screen .splash-sub { font-size: 0.8125rem; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; }
@keyframes splashFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
.splash-fade { animation: splashFadeOut 0.5s ease-out forwards; }

/* ── Onboarding Tour ── */
.tour-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.tour-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.2s; }
.tour-dot.active { background: var(--accent); transform: scale(1.25); }
.tour-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }
.tour-title { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 8px; color: var(--card-text); }
.tour-desc { font-size: 0.8125rem; line-height: 1.6; text-align: center; color: var(--card-text2); margin-bottom: 24px; }
.tour-nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.tour-skip { font-size: 0.75rem; color: var(--card-text2); cursor: pointer; opacity: 0.7; }
.tour-skip:hover { opacity: 1; }
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
[role="button"]:focus-visible, [role="tab"]:focus-visible, [role="menuitem"]:focus-visible, .nav-item:focus-visible, .tab-item:focus-visible, .mode-tab:focus-visible { outline: 3px solid var(--accent2); outline-offset: 2px; border-radius: 4px; }
a:focus-visible, button:focus-visible, .btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.budget-tab:focus-visible { outline: 3px solid var(--accent2); outline-offset: -3px; }

/* ── Bottom Tab Bar ── */
.bottom-tabs { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: var(--sidebar-bg); border-top: 1px solid var(--sidebar-border); z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.bottom-tabs .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 0.6875rem; color: rgba(255,255,255,0.75); cursor: pointer; transition: color 0.15s; }
.bottom-tabs .tab-item.active { color: var(--accent2); }
.bottom-tabs .tab-item .tab-icon { font-size: 1.25rem; }
.more-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; }
.more-menu { position: fixed; bottom: 56px; left: 0; right: 0; background: var(--sidebar-bg); border-top: 1px solid var(--sidebar-border); border-radius: 16px 16px 0 0; padding: 16px 0 8px; z-index: 61; }
.more-menu .more-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.7); font-size: 0.875rem; cursor: pointer; }
.more-menu .more-item:hover, .more-menu .more-item.active { color: var(--accent2); background: rgba(232,160,32,0.08); }
.more-menu .more-item .icon { font-size: 1.125rem; }

/* Budget page tabs */
.budget-tabs { display: flex; gap: 0; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.budget-tab { flex: 1; padding: 10px 16px; text-align: center; font-size: 0.8125rem; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--card-text2); transition: all 0.15s; }
.budget-tab:hover { background: var(--surface2); }
.budget-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

/* ── Table scroll wrapper ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── Tablet: 1024px ── */
@media (max-width: 1024px) {
  .dash-layout { flex-direction: column !important; }
  .dash-right { width: 100% !important; min-width: 0 !important; flex-shrink: 1 !important; max-height: none !important; }
  .dash-left { min-width: 0 !important; }
  .dash-left .card { min-width: 0 !important; }
  .import-layout { flex-direction: column !important; }
  .import-right { min-width: 0 !important; }
}

/* ── Phone: 768px ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-tabs { display: flex; }
  .main { margin-left: 0; padding: 16px 12px 72px 12px; }
  .stats { flex-direction: row; flex-wrap: wrap; }
  .stats .stat { min-width: calc(50% - 6px); flex: 0 0 calc(50% - 6px); }
  .card { padding: 14px; }
  .page-header h2 { font-size: 1.125rem; }
  .page-header p { font-size: 0.75rem; }
  .info-tooltip { width: calc(100vw - 48px); max-width: 280px; left: auto; right: -8px; }
  .modal { padding: 16px; width: 95%; max-width: none; }
  .toast { left: 12px; right: 12px; bottom: 72px; }
  .compass-watermark { left: 50% !important; }
  .txn-table th:nth-child(5), .txn-table td:nth-child(5) { display: none; }
  .txn-table th:nth-child(8), .txn-table td:nth-child(8) { display: none; }
  .dict-table th:nth-child(4), .dict-table td:nth-child(4) { display: none; }

const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ── Budget Helpers ──────────────────────────────────────
function getEffectiveBudget(category, accountId) {
  if (!accountId || accountId === 'all') return category.budget || 0;
  if (category.accountBudgets && category.accountBudgets[accountId] !== undefined) return category.accountBudgets[accountId];
  return category.budget || 0;
}

// Convert per-payment budget to monthly equivalent
function getMonthlyBudget(category, accountId) {
  const amt = getEffectiveBudget(category, accountId);
  const freq = category.frequency || 'monthly';
  if (freq === 'biweekly') return amt * 2;
  if (freq === 'semimonthly') return amt * 2;
  if (freq === 'quarterly') return Math.round(amt / 3 * 100) / 100;
  if (freq === 'annual') return Math.round(amt / 12 * 100) / 100;
  return amt;
}

// Get forecast payment dates for a category in a given month
// Returns array of {day, amount} — could be 1 (monthly), 2 (semimonthly), 2-3 (biweekly)
function getForecastDates(category, accountId, year, month) {
  const amt = getEffectiveBudget(category, accountId);
  if (amt <= 0) return [];
  const freq = category.frequency || 'monthly';
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  if (freq === 'semimonthly') {
    const d1 = category.dueDay || 1;
    const d2 = category.dueDay2 || 15;
    return [
      {day: Math.min(d1, daysInMonth), amount: amt},
      {day: Math.min(d2, daysInMonth), amount: amt}
    ];
  }

  if (freq === 'biweekly') {
    if (!category.refDate) return [];
    const ref = new Date(category.refDate + 'T12:00:00');
    if (isNaN(ref.getTime())) return [];
    const results = [];
    // Walk forward/backward from refDate by 14-day increments to find dates in target month
    const monthStart = new Date(year, month, 1);
    const monthEnd = new Date(year, month + 1, 0);
    // Start from a point before the target month
    let d = new Date(ref);
    // Walk backward to before monthStart
    while (d > monthStart) d.setDate(d.getDate() - 14);
    // Now walk forward collecting dates in the target month
    while (d <= monthEnd) {
      d.setDate(d.getDate() + 14);
      if (d.getFullYear() === year && d.getMonth() === month) {
        results.push({day: d.getDate(), amount: amt});
      }
    }
    return results;
  }

  if (freq === 'quarterly') {
    const dueDay = category.dueDay;
    if (!dueDay) return [];
    // Quarterly: check if this month is a quarter month from refMonth (or default Jan/Apr/Jul/Oct)
    const refMonth = category.refDate ? new Date(category.refDate + 'T12:00:00').getMonth() : 0;
    if ((month - refMonth + 12) % 3 === 0) {
      return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
    }
    return [];
  }

  if (freq === 'annual') {
    const dueDay = category.dueDay;
    if (!dueDay) return [];
    // Annual: only in the reference month (or January by default)
    const refMonth = category.refDate ? new Date(category.refDate + 'T12:00:00').getMonth() : 0;
    if (month === refMonth) {
      return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
    }
    return [];
  }

  // monthly (default)
  const dueDay = category.dueDay;
  if (!dueDay) return [];
  return [{day: Math.min(dueDay, daysInMonth), amount: amt}];
}

// ── Persistence ─────────────────────────────────────────
const STORE_KEY = 'budgetpro_v2';
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveState(state) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

// IndexedDB wrapper — primary storage with localStorage fallback
const AmbitDB = {
  DB_NAME: 'AmbitBudget',
  STORE: 'data',
  KEY: 'main',
  _dbPromise: null,

  _open() {
    if(!this._dbPromise) {
      this._dbPromise = new Promise((resolve, reject) => {
        try {
          const req = indexedDB.open(this.DB_NAME, 1);
          req.onupgradeneeded = (e) => e.target.result.createObjectStore(this.STORE);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => { this._dbPromise = null; reject(req.error); };
        } catch(e) { this._dbPromise = null; reject(e); }
      });
    }
    return this._dbPromise;
  },

  async load() {
    try {
      const db = await this._open();
      return new Promise((resolve) => {
        const tx = db.transaction(this.STORE, 'readonly');
        const req = tx.objectStore(this.STORE).get(this.KEY);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    } catch(e) {
      return null; // Will fall back to localStorage in App
    }
  },

  async save(state) {
    // Always mirror to localStorage as backup
    saveState(state);
    try {
      const db = await this._open();
      const tx = db.transaction(this.STORE, 'readwrite');
      tx.objectStore(this.STORE).put(state, this.KEY);
    } catch(e) {} // localStorage backup already saved
  }
};

// ── Format helpers ──────────────────────────────────────
const normalizeForMatch = (s) => s.toUpperCase().replace(/[^A-Z0-9\s]/g,'').replace(/\s+/g,' ').trim();

// Extract a smart keyword from a transaction description by stripping
// common bank prefixes, masked card numbers, trailing locations, and IDs.
const extractKeyword = (desc) => {
  if(!desc) return '';
  let s = desc.toUpperCase().trim();
  // Strip common transaction prefixes
  const prefixes = [
    'RECURRING DEBIT CARD','DEBIT CARD PURCHASE','ELECTRONIC WITHDRAWAL',
    'ONLINE TRANSFER','ACH PAYMENT','POS PURCHASE','CHECK CARD','DIRECT DEBIT'
  ];
  for(const p of prefixes) { if(s.startsWith(p)) { s = s.slice(p.length).trim(); break; } }
  // Strip masked card numbers (e.g. XXXXXXXXX1078, XXXXX3989, xxxxxxxxxxxx1078)
  s = s.replace(/X{4,}\d{0,4}/gi, '').trim();
  // Strip phone numbers (xxx-xxx-xxxx or xxxxxxxxxx patterns after merchant)
  s = s.replace(/\d{3}-\d{3}-\d{4}/g, '').trim();
  // Strip trailing state abbreviations (2-letter codes at end, possibly preceded by city)
  // e.g. "DUNKIN XX2963 PHILADELPHI PA" -> strip " PHILADELPHI PA"
  s = s.replace(/\s+[A-Z]{2,}\s+[A-Z]{2}\s*$/, '').trim();
  // Also handle just a trailing 2-letter state code
  s = s.replace(/\s+[A-Z]{2}\s*$/, '').trim();
  // Strip trailing store/reference IDs like #12345, XX1416, x2963
  s = s.replace(/\s+#?\d{3,}$/,'').trim();
  s = s.replace(/\s+[Xx#]{1,2}\d{3,}$/,'').trim();
  // Strip any remaining trailing pure-digit sequences
  s = s.replace(/\s+\d{4,}$/,'').trim();
  // Clean up extra whitespace
  s = s.replace(/\s+/g,' ').trim();
  // If result is too short, take the first recognizable word (3+ chars, alphabetic)
  if(s.length < 3) {
    const words = desc.toUpperCase().replace(/[^A-Z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>=3 && /[A-Z]/.test(w));
    // Skip common prefix words
    const skipWords = new Set(['DEBIT','CARD','PURCHASE','ACH','PAYMENT','ONLINE','TRANSFER','POS','CHECK','RECURRING','ELECTRONIC','WITHDRAWAL','DIRECT']);
    const meaningful = words.find(w=>!skipWords.has(w));
    s = meaningful || words[0] || desc.toUpperCase().trim();
  }
  return s;
};

const fmtDate = (d) => { const dt=new Date(d); return (dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear(); };

// Robust date parsing — extracts year/month/day without timezone shift
function parseDateParts(dateStr) {
  if(!dateStr) return null;
  const s = dateStr.trim();
  let m, d, y;
  // YYYY-MM-DD or YYYY/MM/DD
  let match = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(match) { y=+match[1]; m=+match[2]; d=+match[3]; }
  else {
    // MM/DD/YYYY or MM-DD-YYYY or M/D/YY
    match = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(match) { m=+match[1]; d=+match[2]; y=+match[3]; if(y<100) y+=2000; }
  }
  if(m && d && y && m>=1 && m<=12) return {year:y, month:m, day:d};
  return null;
}

// Get YYYY-MM string for grouping by month
function getYearMonth(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return null;
  return p.year+'-'+p.month.toString().padStart(2,'0');
}

// Get a proper local Date object from a date string
function safeDate(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return new Date(dateStr); // fallback
  return new Date(p.year, p.month-1, p.day);
}

// ── Animated Demo Component ─────────────────────────────
function AnimatedDemo({steps}) {
  const [current, setCurrent] = useState(0);
  const [playing, setPlaying] = useState(true);
  const timerRef = useRef(null);

  useEffect(()=>{
    if(playing && steps && steps.length>1) {
      timerRef.current = setInterval(()=>setCurrent(c=>(c+1)%steps.length), 3500);
      return ()=>clearInterval(timerRef.current);
    }
    return ()=>{ if(timerRef.current) clearInterval(timerRef.current); };
  },[playing, steps]);

  if(!steps || steps.length===0) return null;

  const goTo = (i) => { setCurrent(i); setPlaying(false); };
  const toggle = () => setPlaying(p=>!p);

  return h('div',{className:'demo-container'},
    // Controls
    h('div',{className:'demo-controls'},
      h('button',{className:'demo-play-btn', onClick:toggle, 'aria-label':playing?'Pause demo':'Play demo'}, h('span',{'aria-hidden':'true'},playing?'⏸':'▶')),
      current>0 && h('button',{className:'demo-play-btn', onClick:()=>goTo((current-1+steps.length)%steps.length), 'aria-label':'Previous step'}, h('span',{'aria-hidden':'true'},'◀')),
      h('button',{className:'demo-play-btn', onClick:()=>{setCurrent(c=>(c+1)%steps.length);setPlaying(false);}, 'aria-label':'Next step'}, h('span',{'aria-hidden':'true'},'▶'))
    ),
    // Steps
    steps.map((step,i)=>
      h('div',{key:i, className:'demo-step'+(i===current?' active':'')},
        h('div',{className:'demo-mockup'},
          // Render mockup elements
          (step.elements||[]).map((el,j)=>
            h('div',{key:j, className:'demo-element'+(el.highlight?' demo-highlight':''), style:{
              left:el.x+'%', top:el.y+'%', width:el.w+'%', height:el.h+'%',
              background:el.bg||'rgba(255,255,255,0.08)', border:el.highlight?undefined:'1px solid rgba(255,255,255,0.1)',
              fontSize:el.fontSize||10, fontWeight:el.bold?700:400,
              color:el.color||'rgba(255,255,255,0.7)', borderRadius:el.round?'99px':'6px',
              ...(el.style||{})
            }}, el.label||'')
          ),
          // Arrow overlay
          step.arrow && h('svg',{className:'demo-arrow', style:{position:'absolute',left:0,top:0,width:'100%',height:'100%',pointerEvents:'none'}},
            h('defs',null,h('marker',{id:'ah',markerWidth:8,markerHeight:6,refX:8,refY:3,orient:'auto'},
              h('polygon',{points:'0 0, 8 3, 0 6',fill:'var(--accent)'})
            )),
            h('line',{x1:step.arrow.x1+'%',y1:step.arrow.y1+'%',x2:step.arrow.x2+'%',y2:step.arrow.y2+'%',
              stroke:'var(--accent)',strokeWidth:2,markerEnd:'url(#ah)',strokeDasharray:'4,3'})
          )
        ),
        // Label
        h('div',{className:'demo-label'},
          h('span',{style:{color:'var(--accent)',fontWeight:700,marginRight:8}}, 'Step '+(i+1)),
          step.label
        ),
        // Dots
        h('div',{className:'demo-dots'},
          steps.map((_,di)=>h('div',{key:di, className:'demo-dot'+(di===current?' active':''), role:'button', tabIndex:0, 'aria-label':'Step '+(di+1)+' of '+steps.length, onClick:()=>goTo(di), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();goTo(di);}}}))
        )
      )
    )
  );
}

function InfoPill({text}) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    if(!open) return;
    const handler = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return ()=> document.removeEventListener('mousedown', handler);
  },[open]);
  return h('span',{ref, style:{position:'relative',display:'inline-block',marginLeft:8}},
    h('span',{...a11yClick(e=>{e.stopPropagation();setOpen(!open)}, 'More info'), 'aria-expanded':open,
      style:{cursor:'pointer',fontSize:13,opacity:0.5,userSelect:'none'}},'ℹ️'),
    open && h('div',{className:'info-tooltip'}, text)
  );
}

function Modal({onClose, children}) {
  const modalRef = useRef(null);
  const previousFocus = useRef(null);
  useEffect(()=>{
    previousFocus.current = document.activeElement;
    const el = modalRef.current;
    if(el) { const first = el.querySelector('input,select,textarea,button,[tabindex]'); if(first) first.focus(); }
    const handleKey = (e) => {
      if(e.key==='Escape') { onClose(); return; }
      if(e.key==='Tab' && el) {
        const focusable = el.querySelectorAll('input,select,textarea,button,[tabindex]:not([tabindex="-1"])');
        if(focusable.length===0) return;
        const first=focusable[0], last=focusable[focusable.length-1];
        if(e.shiftKey && document.activeElement===first) { e.preventDefault(); last.focus(); }
        else if(!e.shiftKey && document.activeElement===last) { e.preventDefault(); first.focus(); }
      }
    };
    document.addEventListener('keydown', handleKey);
    return ()=>{ document.removeEventListener('keydown', handleKey); if(previousFocus.current) previousFocus.current.focus(); };
  },[]);
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{ref:modalRef, className:'modal animate-in', role:'dialog', 'aria-modal':'true',
      'aria-label':'Dialog'},
      h('button',{onClick:onClose, 'aria-label':'Close dialog',
        style:{position:'absolute',top:12,right:12,background:'none',border:'none',fontSize:18,cursor:'pointer',color:'var(--card-text2)',padding:4,borderRadius:4}},
        '✕'),
      children)
  );
}

function Toast({message, onDone}) {
  useEffect(()=>{ const t=setTimeout(onDone,4000); return ()=>clearTimeout(t); },[]);
  return h('div',{className:'toast', role:'alert', 'aria-live':'assertive', onClick:onDone, style:{cursor:'pointer'},title:'Click to dismiss'},
    h('span',null,message),
    h('button',{onClick:onDone,'aria-label':'Dismiss notification',style:{background:'none',border:'none',marginLeft:12,fontSize:14,cursor:'pointer',color:'var(--card-text2)',padding:2}},'✕')
  );
}

const FEEDBACK_QUESTIONS = {
  import: 'How was the import experience?',
  monthly: 'How is Ambit Budget working for you?'
};

function FeedbackWidget({task, onDismiss}) {
  const [phase, setPhase] = useState('ask'); // ask | comment | thanks | fadeout
  const [comment, setComment] = useState('');
  const [sending, setSending] = useState(false);
  const containerRef = useRef(null);

  const logFeedback = (rating, text) => {
    const entry = {date: new Date().toISOString(), task, rating, comment: text || ''};
    try {
      const log = JSON.parse(localStorage.getItem('ambit_feedback_log') || '[]');
      log.push(entry);
      localStorage.setItem('ambit_feedback_log', JSON.stringify(log));
      localStorage.setItem('ambit_feedback_last', new Date().toISOString().slice(0,10));
    } catch(e) {}
  };

  const fadeAndDismiss = (msg) => {
    setPhase('thanks');
    setTimeout(()=>{ setPhase('fadeout'); setTimeout(onDismiss, 500); }, 2000);
  };

  const handleEmoji = (rating) => {
    if(rating === 'sad') {
      logFeedback('sad', '');
      setPhase('comment');
    } else {
      logFeedback(rating, '');
      fadeAndDismiss();
    }
  };

  const handleSend = async () => {
    setSending(true);
    logFeedback('sad', comment);
    try {
      await fetch('https://formspree.io/f/YOUR_FORM_ID', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({task, rating:'sad', comment, _subject:'Ambit Feedback'})
      });
    } catch(e) {}
    setSending(false);
    fadeAndDismiss();
  };

  const handleOptout = () => {
    localStorage.setItem('ambit_feedback_optout','1');
    onDismiss();
  };

  const question = FEEDBACK_QUESTIONS[task] || 'How was your experience?';
  const cls = 'feedback-widget' + (phase==='fadeout' ? ' fade-out' : '');

  if(phase === 'thanks' || phase === 'fadeout') {
    return h('div', {className:cls},
      h('div', {className:'fw-thanks'}, phase === 'thanks' && task === 'monthly' ? 'Thanks! We\'ll work on it.' : 'Thanks!')
    );
  }

  if(phase === 'comment') {
    return h('div', {className:cls},
      h('button', {className:'fw-dismiss', onClick:onDismiss, 'aria-label':'Dismiss'}, '\u00D7'),
      h('div', {className:'fw-question'}, 'What went wrong?'),
      h('textarea', {className:'fw-textarea', placeholder:'Tell us more...', value:comment, onInput:e=>setComment(e.target.value), autoFocus:true}),
      h('button', {className:'fw-send', onClick:handleSend, disabled:sending}, sending ? 'Sending...' : 'Send'),
      h('button', {className:'fw-optout', onClick:handleOptout}, 'Don\'t ask again')
    );
  }

  return h('div', {className:cls},
    h('button', {className:'fw-dismiss', onClick:onDismiss, 'aria-label':'Dismiss'}, '\u00D7'),
    h('div', {className:'fw-question'}, question),
    h('div', {className:'fw-emojis'},
      h('button', {className:'fw-emoji-btn', style:{background:'#40c080'}, onClick:()=>handleEmoji('happy'), 'aria-label':'Happy', title:'Great'}, '\uD83D\uDE0A'),
      h('button', {className:'fw-emoji-btn', style:{background:'#e8a020'}, onClick:()=>handleEmoji('neutral'), 'aria-label':'Neutral', title:'Okay'}, '\uD83D\uDE10'),
      h('button', {className:'fw-emoji-btn', style:{background:'#e05050'}, onClick:()=>handleEmoji('sad'), 'aria-label':'Unhappy', title:'Not great'}, '\uD83D\uDE1F')
    ),
    h('button', {className:'fw-optout', onClick:handleOptout}, 'Don\'t ask again')
  );
}

// ── First-Run Setup Wizard ──────────────────────────────
function FirstRunWizard({setPage, onDismiss, isFree, setAccounts, accounts, transactions}) {
  const [step, setStep] = useState(0);
  const [ttsOn, setTtsOn] = useState(false);
  const [acctName, setAcctName] = useState('');
  const [acctType, setAcctType] = useState('checking');
  const [acctBal, setAcctBal] = useState('');
  const [stepKey, setStepKey] = useState(0); // for re-triggering fade animation
  const cardRef = useRef(null);
  const reducedMotion = useMemo(()=> window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches, []);

  const IMG = 'images/mr-ambit/';
  const totalSteps = isFree ? 4 : 5;

  // TTS helper
  const speak = useCallback((text) => {
    if(!ttsOn || reducedMotion || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0; utter.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v=> /Google US English|Daniel/i.test(v.name) && v.lang.startsWith('en'));
    const male = voices.find(v=> v.lang.startsWith('en') && /male/i.test(v.name));
    const english = voices.find(v=> v.lang.startsWith('en'));
    utter.voice = preferred || male || english || null;
    window.speechSynthesis.speak(utter);
  },[ttsOn, reducedMotion]);

  // Speak on step change
  useEffect(()=>{
    const texts = getStepText(step, isFree);
    if(texts) speak(texts);
  },[step, ttsOn]);

  // Stop TTS on unmount or toggle off
  useEffect(()=>()=>{ if(window.speechSynthesis) window.speechSynthesis.cancel(); },[]);
  useEffect(()=>{ if(!ttsOn && window.speechSynthesis) window.speechSynthesis.cancel(); },[ttsOn]);

  // Preload voices
  useEffect(()=>{ if(window.speechSynthesis) window.speechSynthesis.getVoices(); },[]);

  // Focus trap
  useEffect(()=>{
    const el = cardRef.current;
    if(!el) return;
    const focusable = el.querySelectorAll('button, input, select, [tabindex]:not([tabindex="-1"])');
    if(focusable.length) focusable[0].focus();
    const trap = (e) => {
      if(e.key !== 'Tab' || !focusable.length) return;
      const first = focusable[0], last = focusable[focusable.length-1];
      if(e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    el.addEventListener('keydown', trap);
    return ()=> el.removeEventListener('keydown', trap);
  },[step]);

  function getStepText(s, free) {
    if(s===0) return "Hey! I'm Mr. Ambit. Let's get your budget set up in 2 minutes. No sign-up needed — your data stays right here on your device.";
    if(s===1) return "First, what's your main bank account?";
    if(s===2) return "Now let's see where your money's been going. You can paste bank data or upload a CSV file.";
    if(!free && s===3) return "Want me to remember these for next time? Set up payee rules to auto-categorize your imports.";
    const completionStep = free ? 3 : 4;
    if(s===completionStep) return free
      ? "You're all set! Here's your dashboard. Import some transactions to see your spending breakdown."
      : "You're all set! Your budget is ready. Check the Dashboard to see your spending overview.";
    return '';
  }

  function getStepImage(s, free) {
    if(s===0) return 'full-body.png';
    if(s===1) return 'pointing.png';
    if(s===2) return 'idea.png';
    if(!free && s===3) return 'thinking.png';
    return 'thumbs-up.png';
  }

  function getImageAlt(s, free) {
    if(s===0) return 'Mr. Ambit standing and waving';
    if(s===1) return 'Mr. Ambit pointing';
    if(s===2) return 'Mr. Ambit with an idea';
    if(!free && s===3) return 'Mr. Ambit thinking';
    return 'Mr. Ambit giving a thumbs up';
  }

  const goStep = (n) => { setStep(n); setStepKey(k=>k+1); };

  const createAccount = () => {
    if(!acctName.trim()) return;
    const newAcct = {
      id: Date.now()+'_'+Math.random().toString(36).slice(2,6),
      name: acctName.trim(),
      type: acctType,
      startingBalance: parseFloat(acctBal) || 0,
      last4: ''
    };
    setAccounts(prev => [...prev, newAcct]);
    goStep(2);
  };

  const dismiss = () => { if(window.speechSynthesis) window.speechSynthesis.cancel(); onDismiss(); };

  const completionStep = isFree ? 3 : 4;

  // Render step content
  const renderContent = () => {
    const text = getStepText(step, isFree);

    if(step === 0) {
      return h('div',{className:'onboard-step-enter', key:stepKey},
        h('div',{className:'onboard-bubble', role:'status', 'aria-live':'polite'}, text),
        h('div',{className:'onboard-actions'},
          h('button',{className:'btn primary', onClick:()=>goStep(1)}, "Let's go!")
        )
      );
    }

    if(step === 1) {
      return h('div',{className:'onboard-step-enter', key:stepKey},
        h('div',{className:'onboard-bubble', role:'status', 'aria-live':'polite'}, text),
        h('div',{className:'onboard-form'},
          h('label',null,'Account name',
            h('input',{className:'input', type:'text', placeholder:'e.g. Chase Checking', value:acctName, onChange:e=>setAcctName(e.target.value), autoFocus:true})
          ),
          h('label',null,'Account type',
            h('select',{className:'input', value:acctType, onChange:e=>setAcctType(e.target.value)},
              h('option',{value:'checking'},'Checking'),
              h('option',{value:'savings'},'Savings')
            )
          ),
          h('label',null,'Starting balance',
            h('input',{className:'input', type:'number', step:'0.01', placeholder:'0.00', value:acctBal, onChange:e=>setAcctBal(e.target.value)})
          )
        ),
        h('div',{className:'onboard-actions'},
          h('button',{className:'btn', onClick:()=>goStep(0)}, 'Back'),
          h('button',{className:'btn primary', onClick:createAccount, disabled:!acctName.trim()}, 'Next')
        )
      );
    }

    if(step === 2) {
      return h('div',{className:'onboard-step-enter', key:stepKey},
        h('div',{className:'onboard-bubble', role:'status', 'aria-live':'polite'}, text),
        h('div',{className:'onboard-actions'},
          h('button',{className:'btn', onClick:()=>goStep(1)}, 'Back'),
          h('button',{className:'btn primary', onClick:()=>{ setPage('import'); dismiss(); }}, 'Go to Import'),
          h('button',{className:'btn', onClick:()=>goStep(isFree ? 3 : 3)}, 'Skip for now')
        )
      );
    }

    // Starter+ step 4: payee rules
    if(!isFree && step === 3) {
      return h('div',{className:'onboard-step-enter', key:stepKey},
        h('div',{className:'onboard-bubble', role:'status', 'aria-live':'polite'}, text),
        h('div',{className:'onboard-actions'},
          h('button',{className:'btn', onClick:()=>goStep(2)}, 'Back'),
          h('button',{className:'btn primary', onClick:()=>{ setPage('budget'); dismiss(); }}, 'Set up rules'),
          h('button',{className:'btn', onClick:()=>goStep(4)}, 'Skip for now')
        )
      );
    }

    // Completion step
    if(step === completionStep) {
      return h('div',{className:'onboard-step-enter', key:stepKey},
        h('div',{className:'onboard-bubble', role:'status', 'aria-live':'polite'}, text),
        h('div',{className:'onboard-actions'},
          h('button',{className:'btn', onClick:()=>goStep(step-1)}, 'Back'),
          h('button',{className:'btn primary', onClick:()=>{ setPage('dashboard'); dismiss(); }}, "Let's go!")
        )
      );
    }
    return null;
  };

  return h('div',{className:'onboard-overlay', role:'dialog', 'aria-modal':'true', 'aria-label':'Welcome setup wizard'},
    h('div',{className:'onboard-card', ref:cardRef},
      // TTS toggle
      h('button',{
        className:'onboard-tts'+(ttsOn?' active':''),
        onClick:()=>setTtsOn(!ttsOn),
        'aria-label': ttsOn ? 'Disable read aloud' : 'Enable read aloud',
        title: ttsOn ? 'Turn off voice' : 'Read aloud'
      }, ttsOn ? '\uD83D\uDD0A On' : '\uD83D\uDD0A Read aloud'),

      // Left: Mr. Ambit image
      h('div',{className:'onboard-left'},
        h('img',{src:IMG+getStepImage(step, isFree), alt:getImageAlt(step, isFree), key:step, style:{opacity:1}})
      ),

      // Right: content
      h('div',{className:'onboard-right'},
        renderContent(),

        // Progress dots
        h('div',{className:'onboard-dots'},
          Array.from({length:totalSteps},(_,i)=>
            h('div',{key:i, className:'dot'+(i===step?' active':'')+(i<step?' done':'')})
          )
        ),

        // Skip link
        h('button',{className:'onboard-skip', onClick:dismiss, 'aria-label':'Skip setup entirely'}, 'Skip setup')
      )
    )
  );
}

// ── Monthly Budget Review Modal ─────────────────────────
function MonthlyReviewModal({categories, transactions, onClose, onUpdateBudgets}) {
  const now = new Date();
  const prevMonthIdx = now.getMonth()===0 ? 11 : now.getMonth()-1;
  const prevYear = now.getMonth()===0 ? now.getFullYear()-1 : now.getFullYear();
  const prevYM = prevYear+'-'+String(prevMonthIdx+1).padStart(2,'0');
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const prevMonthName = monthNames[prevMonthIdx]+' '+prevYear;

  const expenseCats = categories.filter(c=>c.group!=='Income' && c.name!=='Account Transfer');
  const prevTxns = transactions.filter(t=>getYearMonth(t.date)===prevYM && t.amount<0);

  const reviewData = useMemo(()=>{
    return expenseCats.map(c=>{
      const actual = prevTxns.filter(t=>t.category===c.name).reduce((s,t)=>s+Math.abs(t.amount),0);
      return {name:c.name, group:c.group, catType:c.catType, budget:c.budget||0, actual:Math.round(actual*100)/100};
    }).filter(c=>c.budget>0||c.actual>0);
  },[]);

  const [adjustedBudgets, setAdjustedBudgets] = useState(()=>{
    const m = {};
    reviewData.forEach(c=>{ m[c.name] = c.budget; });
    return m;
  });

  const matchActuals = ()=>{
    const m = {};
    reviewData.forEach(c=>{ m[c.name] = Math.round(c.actual); });
    setAdjustedBudgets(m);
  };

  const totalBudget = reviewData.reduce((s,c)=>s+c.budget,0);
  const totalActual = reviewData.reduce((s,c)=>s+c.actual,0);
  const totalNew = reviewData.reduce((s,c)=>s+(adjustedBudgets[c.name]||0),0);

  return h(Modal,{onClose},
    h('h3',{style:{marginBottom:4}}, '📊 '+prevMonthName+' Budget Review'),
    h('p',{style:{fontSize:12,color:'var(--card-text2)',marginBottom:16}},
      'Compare your budgets against actual spending last month. Adjust if needed.'),

    // Summary row
    h('div',{style:{display:'flex',gap:12,marginBottom:14}},
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:'rgba(232,160,32,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:'var(--accent2)'}},fmt(totalBudget)),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},'Budget')
      ),
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:'rgba(224,80,80,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:'var(--red)'}},fmt(totalActual)),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},'Actual')
      ),
      h('div',{style:{flex:1,textAlign:'center',padding:8,background:totalBudget>=totalActual?'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
        h('div',{style:{fontSize:18,fontWeight:700,color:totalBudget>=totalActual?'var(--green)':'var(--red)'}},
          (totalBudget>=totalActual?'+':'-')+fmt(Math.abs(totalBudget-totalActual))),
        h('div',{style:{fontSize:10,color:'var(--card-text2)'}},totalBudget>=totalActual?'Under':'Over')
      )
    ),

    // Category table
    h('div',{style:{maxHeight:350,overflowY:'auto'}},
      h('table',{className:'table',style:{fontSize:12}},
        h('thead',null,h('tr',null,
          h('th',{style:{padding:'4px 6px'}},'Category'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'Budget'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'Actual'),
          h('th',{style:{textAlign:'right',padding:'4px 6px'}},'+/-'),
          h('th',{style:{textAlign:'right',padding:'4px 6px',width:80}},'New Budget')
        )),
        h('tbody',null, reviewData.map(c=>{
          const diff = c.budget - c.actual;
          return h('tr',{key:c.name,style:{background:diff<0?'rgba(224,80,80,0.05)':'transparent'}},
            h('td',{style:{padding:'4px 6px'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:6}},
                h('span',{style:{fontWeight:500}},c.name),
                h(TypeTag,{catType:c.catType})
              )
            ),
            h('td',{style:{textAlign:'right',padding:'4px 6px'}},fmt(c.budget)),
            h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:600}},fmt(c.actual)),
            h('td',{style:{textAlign:'right',padding:'4px 6px',fontWeight:700,color:diff>=0?'var(--green)':'var(--red)'}},
              (diff>=0?'+':'-')+fmt(Math.abs(diff))),
            h('td',{style:{padding:'4px 6px'}},
              h('input',{className:'input',type:'number',value:adjustedBudgets[c.name]||0,
                onChange:e=>setAdjustedBudgets(prev=>({...prev,[c.name]:Math.max(0,+e.target.value)})),
                style:{width:'100%',padding:'3px 6px',fontSize:12,textAlign:'right'}
              })
            )
          );
        }))
      )
    ),

    // New total
    h('div',{style:{display:'flex',justifyContent:'flex-end',padding:'8px 6px',fontSize:12,fontWeight:600,color:'var(--card-text2)'}},
      'New total: ',h('span',{style:{color:'var(--accent2)',marginLeft:4}},fmt(totalNew))
    ),

    // Action buttons
    h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
      h('button',{className:'btn',onClick:onClose},'Keep Current'),
      h('button',{className:'btn',onClick:matchActuals},'Match Actuals'),
      h('button',{className:'btn primary',onClick:()=>{onUpdateBudgets(adjustedBudgets);onClose();}},'Save Changes')
    )
  );
}

// ── Main App ────────────────────────────────────────────
function App({idbData}) {
  const saved = useMemo(()=>idbData || loadState(),[]);

  // URL mode override (check first — used by tour & mode init)
  const urlParams = useMemo(()=> new URLSearchParams(window.location.search), []);
  const urlMode = useMemo(()=> urlParams.get('mode'), []);
  const urlTier = useMemo(()=> {
    const t = (urlParams.get('tier')||'').toLowerCase();
    return t === 'free' ? 'Free' : t === 'starter' ? 'Starter' : t === 'plus' ? 'Plus' : t === 'pro' ? 'Pro' : null;
  }, []);

  // Splash & Tour — tour only auto-starts via ?mode=demo URL (marketing site clicks)
  const [showSplash, setShowSplash] = useState(true);
  const [tourStep, setTourStep] = useState(()=> urlMode === 'demo' ? 0 : null);

  // ── License / Tier system ──
  const TIERS = useMemo(()=>({
    Free:    { limit:1, label:'Free', price:0, forecast:false, dayByDay:false, review:false, yearView:false, debtPlanner:false, perAccountBudgets:false, paymentScheduling:false, budget:false, payeeRules:false, groups:false, autoCategorize:false, savingsGoals:false },
    Starter: { limit:2, label:'Starter', price:9.99, forecast:false, dayByDay:false, review:false, yearView:false, debtPlanner:false, perAccountBudgets:false, paymentScheduling:false, budget:true, payeeRules:true, groups:true, autoCategorize:true, savingsGoals:false },
    Plus:    { limit:3, label:'Plus', price:19.99, forecast:true,  dayByDay:false, review:true,  yearView:true,  debtPlanner:false, perAccountBudgets:true, paymentScheduling:false, budget:true, payeeRules:true, groups:true, autoCategorize:true, savingsGoals:true },
    Pro:     { limit:Infinity, label:'Pro', price:29.99, forecast:true, dayByDay:true, review:true, yearView:true, debtPlanner:true, perAccountBudgets:true, paymentScheduling:true, budget:true, payeeRules:true, groups:true, autoCategorize:true, savingsGoals:true }
  }),[]);
  const [license, setLicense] = useState(()=>{ try { return JSON.parse(localStorage.getItem('ambit_license'))||null; } catch{ return null; } });
  const [showLicenseGate, setShowLicenseGate] = useState(false);
  const [licenseDismissed, setLicenseDismissed] = useState(()=> localStorage.getItem('ambit_license_dismissed')==='1');
  const isLicensed = license && license.valid;
  const isFreeTier = !isLicensed && !urlMode;
  // In demo mode with ?tier= param, use that tier's feature gates (for landing page tier-specific demos)
  const demoTier = (urlMode === 'demo' && urlTier) ? TIERS[urlTier] : null;
  const tier = isLicensed ? (TIERS[license.tier]||TIERS.Starter) : (isFreeTier ? TIERS.Free : demoTier);
  const accountLimit = tier ? tier.limit : 0;
  // isTierDemo and demoBypass are defined after isDemo (below) to avoid temporal dead zone
  const API_BASE = 'https://ambitbudget.com';

  // Beta test keys — remove before public launch
  const BETA_KEYS = { 'BETA-STARTER-2026':'Starter', 'BETA-PLUS-2026':'Plus', 'BETA-PRO-2026':'Pro' };

  const activateLicense = async (key) => {
    // Check for beta keys first (offline, no API call needed)
    const betaTier = BETA_KEYS[key.trim().toUpperCase()];
    if(betaTier) {
      const lic = {valid:true, key:key.trim().toUpperCase(), tier:betaTier, instance_id:'beta', at:new Date().toISOString()};
      localStorage.setItem('ambit_license', JSON.stringify(lic));
      setLicense(lic);
      setShowLicenseGate(false);
      setMode('mine'); setPage('dashboard');
      showToast('✅ Beta activated! Welcome to ' + betaTier + '.');
      return {success:true, tier:betaTier};
    }

    try {
      const res = await fetch(API_BASE+'/api/validate', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({license_key:key.trim()})
      });
      const data = await res.json();
      if(data.activated) {
        const pName = (data.meta?.product_name || data.meta?.variant_name || '').toLowerCase();
        const tierName = pName.endsWith('- pro') || pName === 'pro' ? 'Pro' : pName.endsWith('- plus') || pName === 'plus' ? 'Plus' : pName.endsWith('- starter') || pName === 'starter' ? 'Starter' : pName.includes('pro') && !pName.includes('starter') && !pName.includes('plus') ? 'Pro' : pName.includes('plus') ? 'Plus' : 'Starter';
        const lic = {valid:true, key:key.trim(), tier:tierName, instance_id:data.instance?.id, at:new Date().toISOString()};
        localStorage.setItem('ambit_license', JSON.stringify(lic));
        setLicense(lic);
        setShowLicenseGate(false);
        setMode('mine'); setPage('dashboard');
        showToast('✅ Licensed! Welcome to ' + tierName + '.');
        return {success:true, tier:tierName};
      }
      return {success:false, error:data.error||'Invalid license key'};
    } catch(e) { return {success:false, error:'Connection failed. Check your internet and try again.'}; }
  };

  const deactivateLicense = () => {
    localStorage.removeItem('ambit_license');
    setLicense(null);
    setMode('mine'); setPage('dashboard');
    showToast('License deactivated. You\'re now on the Free plan.');
  };

  const [demoHidden, setDemoHidden] = useState(()=> urlMode ? false : localStorage.getItem('ambit_demo_hidden')==='1');
  const [mode, setMode] = useState(()=> {
    if(urlMode === 'demo') return 'demo';
    if(isLicensed) return localStorage.getItem('ambit_demo_hidden')==='1' ? 'mine' : 'demo';
    // No license, no URL mode: Free tier — go straight to 'mine' mode
    return 'mine';

// ── Categories Page ─────────────────────────────────────
function CategoriesPage({categories, setCategories, dictionary, showToast, groups, setGroups, groupList, groupColors}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [name, setName] = useState('');
  const [group, setGroup] = useState('Other');
  const [catType, setCatType] = useState('discretionary');
  const [budget, setBudget] = useState(0);

  const startEdit = (idx) => {
    const c = categories[idx];
    setName(c.name); setGroup(c.group); setCatType(c.catType||'discretionary'); setBudget(c.budget||0);
    setEditIdx(idx); setShowAdd(true);
  };

  const resetForm = () => { setName(''); setGroup('Other'); setCatType('discretionary'); setBudget(0); setEditIdx(null); setShowAdd(false); };

  // ── Group management state ──
  const [showGroupMgr, setShowGroupMgr] = useState(false);
  const [newGrpName, setNewGrpName] = useState('');
  const [newGrpColor, setNewGrpColor] = useState('#8b90a5');
  const [editGrpIdx, setEditGrpIdx] = useState(null);
  const [editGrpName, setEditGrpName] = useState('');
  const [editGrpColor, setEditGrpColor] = useState('');

  const addGroup = () => {
    if(!newGrpName.trim()) return;
    if(groups.find(g=>g.name.toLowerCase()===newGrpName.trim().toLowerCase())) { showToast('\u26A0\uFE0F Group already exists'); return; }
    setGroups(prev=>[...prev, {name:newGrpName.trim(), color:newGrpColor}]);
    showToast('\u2705 Group added: '+newGrpName.trim());
    setNewGrpName(''); setNewGrpColor('#8b90a5');
  };
  const startEditGrp = (idx) => { setEditGrpIdx(idx); setEditGrpName(groups[idx].name); setEditGrpColor(groups[idx].color); };
  const saveEditGrp = () => {
    if(editGrpIdx===null) return;
    const oldName = groups[editGrpIdx].name;
    const newName = editGrpName.trim();
    if(!newName) { setEditGrpIdx(null); return; }
    if(oldName!==newName && groups.find((g,i)=>i!==editGrpIdx && g.name.toLowerCase()===newName.toLowerCase())) { showToast('\u26A0\uFE0F Group name already exists'); return; }
    setGroups(prev=>prev.map((g,i)=>i===editGrpIdx?{...g, name:newName, color:editGrpColor}:g));
    if(oldName!==newName) setCategories(prev=>prev.map(c=>c.group===oldName?{...c, group:newName}:c));
    showToast('\u2705 Group updated: '+newName);
    setEditGrpIdx(null);
  };
  const deleteGroup = (idx) => {
    const g = groups[idx];
    if(g.name==='Income'||g.name==='Other') { showToast('\u26A0\uFE0F Cannot delete system group: '+g.name); return; }
    const inUse = categories.filter(c=>c.group===g.name).length;
    if(inUse>0) { showToast('\u26A0\uFE0F Cannot delete: '+inUse+' categories use "'+g.name+'". Reassign them first.'); return; }
    setGroups(prev=>prev.filter((_,i)=>i!==idx));
    showToast('\uD83D\uDDD1\uFE0F Deleted group: '+g.name);
  };

  // ── Bulk category import state ──
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const bulkImportCategories = () => {
    const lines = bulkText.split('\n').map(l=>l.trim()).filter(Boolean);
    const results = [];
    let newGroups = [];
    for(const line of lines) {
      const parts = line.split(/[,\t]+/).map(s=>s.trim());
      if(parts.length<1 || !parts[0]) continue;
      const catName = parts[0];
      const grp = parts[1] || 'Other';
      const typeRaw = (parts[2]||'discretionary').toLowerCase();
      const catType = typeRaw.startsWith('f') ? 'fixed' : 'discretionary';
      const bgt = parseFloat(parts[3]) || 0;
      if(categories.find(c=>c.name.toLowerCase()===catName.toLowerCase())) continue;
      if(results.find(r=>r.name.toLowerCase()===catName.toLowerCase())) continue;
      if(!groupList.includes(grp) && !newGroups.find(g=>g.name===grp)) newGroups.push({name:grp, color:'#8b90a5'});
      results.push({name:catName, group:grp, catType, budget:bgt});
    }
    if(newGroups.length>0) setGroups(prev=>[...prev, ...newGroups]);
    if(results.length>0) {
      setCategories(prev=>[...prev, ...results]);
      showToast('\u2705 Imported '+results.length+' categories'+(newGroups.length>0?' ('+newGroups.length+' new groups created)':''));
    } else {
      showToast('\u26A0\uFE0F No new categories to import (all duplicates or empty)');
    }
    setBulkText(''); setShowBulkImport(false);
  };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      setCategories(prev => prev.map((c,i) => i===editIdx ? {...c, name:name.trim(), group, catType, budget:+budget} : c));
      showToast('✅ Updated: ' + name.trim());
    } else {
      if(categories.find(c=>c.name.toLowerCase()===name.trim().toLowerCase())) {
        showToast('⚠️ Category already exists'); return;
      }
      setCategories(prev => [...prev, {name:name.trim(), group, catType, budget:+budget}]);
      showToast('✅ Added: ' + name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const c = categories[idx];
    const inUse = dictionary.filter(d=>d.category===c.name).length;
    if(inUse > 0 && !confirm(`"${c.name}" has ${inUse} payee rule(s). Delete anyway?`)) return;
    setCategories(prev => prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: ' + c.name);
  };

  const grouped = useMemo(()=>{
    const m = {};
    categories.forEach((c,i)=>{
      if(!m[c.group]) m[c.group]=[];
      m[c.group].push({...c, _idx:i});
    });
    Object.keys(m).forEach(g=>m[g].sort((a,b)=>a.name.localeCompare(b.name)));
    return m;
  },[categories]);

  return h('div',{className:'animate-in'},
    h(HelpBar, HELP_CONTENT.categoriesGroups),
    h('div',{className:'page-header', style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📂 Categories', h(InfoPill,{text:'Organize your spending into categories (e.g., Groceries, Rent) and groups (e.g., Food, Housing). Set each as Income, Fixed, Discretionary, or Transfer. Budget amounts are set on the Budget page.'})),
        h('p',null,'Define your spending categories and assign them to groups.')
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
        h('button',{className:'btn primary', onClick:()=>{resetForm();setShowAdd(true);}}, '+ New Category'),
        h('button',{className:'btn', onClick:()=>setShowBulkImport(true)}, '\uD83D\uDCE5 Import'),
        h('button',{className:'btn'+(showGroupMgr?' primary':''), onClick:()=>setShowGroupMgr(!showGroupMgr)}, showGroupMgr?'Hide Groups':'Manage Groups')
      )
    ),

    h('div',{className:'stats'},
      h(Stat, {label:'Categories', value:categories.length, color:'var(--accent2)'}),
      h(Stat, {label:'Groups', value:groups.length, color:'var(--blue)'}),
      h(Stat, {label:'Discretionary', value:categories.filter(c=>c.catType==='discretionary').length, color:'var(--yellow)'}),
      h(Stat, {label:'Fixed', value:categories.filter(c=>c.catType==='fixed').length, color:'var(--blue)'})
    ),

    // ── Group Management Card ──
    showGroupMgr && h('div',{className:'card',style:{marginBottom:14}},
      h('h3',{style:{marginBottom:12}},'\uD83C\uDFA8 Manage Groups'),
      h('table',{className:'table'},
        h('thead',null, h('tr',null,
          h('th',{style:{width:30}},'Color'), h('th',null,'Name'), h('th',null,'Categories'), h('th',{style:{width:100}},null)
        )),
        h('tbody',null,
          groups.map((g,i)=>
            h('tr',{key:g.name},
              h('td',null,
                editGrpIdx===i
                  ? h('div',{style:{display:'flex',gap:3,flexWrap:'wrap'}},
                      COLOR_PRESETS.map(c=>h('div',{key:c,...a11yClick(()=>setEditGrpColor(c),'Select color '+c),style:{width:16,height:16,borderRadius:'50%',background:c,cursor:'pointer',border:editGrpColor===c?'2px solid white':'2px solid transparent'}}))
                    )
                  : h('div',{style:{width:16,height:16,borderRadius:'50%',background:g.color}})
              ),
              h('td',null,
                editGrpIdx===i
                  ? h('input',{className:'input',value:editGrpName,onChange:e=>setEditGrpName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')saveEditGrp();if(e.key==='Escape')setEditGrpIdx(null);},style:{fontSize:12,padding:'3px 6px',width:120},autoFocus:true,disabled:g.name==='Income'||g.name==='Other'})
                  : h('span',{style:{fontWeight:500}},g.name, (g.name==='Income'||g.name==='Other') && h('span',{style:{fontSize:10,color:'var(--text2)',marginLeft:6}},'(system)'))
              ),
              h('td',{style:{fontSize:12,color:'var(--text2)'}}, categories.filter(c=>c.group===g.name).length),
              h('td',null,
                editGrpIdx===i
                  ? h('div',{style:{display:'flex',gap:4}},
                      h('button',{className:'btn sm',onClick:saveEditGrp},'\u2713'),
                      h('button',{className:'btn sm',onClick:()=>setEditGrpIdx(null)},'\u2717')
                    )
                  : h('div',{style:{display:'flex',gap:4}},
                      h('button',{className:'btn sm',onClick:()=>startEditGrp(i)},'\u270E'),
                      g.name!=='Income' && g.name!=='Other' && h('button',{className:'table del-btn',onClick:()=>deleteGroup(i)},'\u00D7')
                    )
              )
            )
          ),
          // Add new group row
          h('tr',null,
            h('td',null,
              h('div',{style:{display:'flex',gap:3,flexWrap:'wrap'}},
                COLOR_PRESETS.slice(0,7).map(c=>h('div',{key:c,...a11yClick(()=>setNewGrpColor(c),'Select color '+c),style:{width:14,height:14,borderRadius:'50%',background:c,cursor:'pointer',border:newGrpColor===c?'2px solid white':'2px solid transparent'}}))
              )
            ),
            h('td',null, h('input',{className:'input',value:newGrpName,onChange:e=>setNewGrpName(e.target.value),onKeyDown:e=>{if(e.key==='Enter')addGroup();},placeholder:'New group name...',style:{fontSize:12,padding:'3px 6px',width:140}})),
            h('td',null),
            h('td',null, h('button',{className:'btn sm green',onClick:addGroup,disabled:!newGrpName.trim()},'+'))
          )
        )
      )
    ),

    categories.length === 0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('img',{src:'images/mr-ambit/full-body.png',alt:'Mr. Ambit',style:{width:120,height:120,objectFit:'contain',marginBottom:8}}),
            h('div',{className:'icon'},'📂'),

      : Object.entries(grouped).map(([grp, cats]) =>

              )),

                  h('td',{style:{fontWeight:500}}, c.name),
                  h('td',null, h(TypeTag,{catType:c.catType})),
                  h('td',null, c.budget>0 ? fmt(c.budget) : h('span',{style:{color:'var(--text2)'}},'—')),

// ── Dictionary (Payee Rules) Page ───────────────────────
function DictionaryPage({dictionary, setDictionary, categories, showToast, groupColors, transactions, setTransactions, catMap}) {
  const [keyword, setKeyword] = useState('');
  const [cleanName, setCleanName] = useState('');
  const [category, setCategory] = useState('');
  const [dueDay, setDueDay] = useState('');
  const [frequency, setFrequency] = useState('monthly');
  const [editDueDayIdx, setEditDueDayIdx] = useState(null);
  const [editDueDayVal, setEditDueDayVal] = useState('');
  const [filter, setFilter] = useState('');
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const add = () => {
    if(!keyword.trim()||!cleanName.trim()||!category) return;
    if(dictionary.find(d=>d.keyword.toUpperCase()===keyword.trim().toUpperCase())) {
      showToast('⚠️ Keyword already exists'); return;
    }
    const dd = parseInt(dueDay);
    const entry = {keyword:keyword.trim().toUpperCase(), cleanName:cleanName.trim(), category};
    if(dd>=1 && dd<=31) entry.dueDay = dd;
    if(frequency && frequency!=='monthly') entry.frequency = frequency;
    setDictionary(prev=>[...prev, entry]);
    setKeyword(''); setCleanName(''); setDueDay(''); setFrequency('monthly');
    // Retroactive application: check existing uncategorized transactions
    const kw = entry.keyword;
    const matching = (transactions||[]).filter(t =>
      t.category === 'Uncategorized' &&
      normalizeForMatch(t.description).includes(normalizeForMatch(kw))
    );
    if(matching.length > 0 && setTransactions) {
      if(confirm('Apply this rule to '+matching.length+' existing transaction(s) matching "'+kw+'"?')) {
        const cat = (catMap||{})[entry.category];
        setTransactions(prev => prev.map(t => {
          if(t.category === 'Uncategorized' && normalizeForMatch(t.description).includes(normalizeForMatch(kw))) {
            return {...t, cleanName: entry.cleanName, category: entry.category, group: cat?.group||'Other', catType: cat?.catType||'discretionary'};
          }
          return t;
        }));
        showToast('✅ Rule added + applied to '+matching.length+' transactions');
      } else {
        showToast('✅ Rule added (future imports only)');
      }
    } else {
      showToast('✅ Rule added');
    }
  };

  const del = (idx) => {
