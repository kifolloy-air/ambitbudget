  const totalXfer = transferTxns.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const spendingCats = categories.filter(c=>c.catType!=='transfer' && c.group!=='Income');
  const totalBudget = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0) * numMonths;

  // Budget comparison: current month vs previous month
  const prevMonthBudget = useMemo(()=>{
    const now = new Date();
    const realYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const targetYM = (selectedMonth!=='all') ? selectedMonth : realYM;
    const [tYear,tMonth] = targetYM.split('-').map(Number);
    const prevMonth = tMonth===1 ? 12 : tMonth-1;
    const prevYear = tMonth===1 ? tYear-1 : tYear;
    const prevYM = prevYear+'-'+String(prevMonth).padStart(2,'0');
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const budgetPerMonth = spendingCats.reduce((s,c)=>s+getMonthlyBudget(c,selectedAcct),0);
    const filterAcct = arr => selectedAcct!=='all' ? arr.filter(t=>t.accountId===selectedAcct) : arr;
    const curTxns = filterAcct(transactions.filter(t=>getYearMonth(t.date)===targetYM));
    const prevTxns = filterAcct(transactions.filter(t=>getYearMonth(t.date)===prevYM));
    const curSpent = curTxns.filter(t=>t.amount<0&&t.catType!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
    const prevSpent = prevTxns.filter(t=>t.amount<0&&t.catType!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
    return {
      curLabel:monthNames[tMonth-1], prevLabel:monthNames[prevMonth-1],
      budget:budgetPerMonth, curSpent, prevSpent,
      curDiff:budgetPerMonth-curSpent, prevDiff:budgetPerMonth-prevSpent,
      curPct:budgetPerMonth>0?Math.round(curSpent/budgetPerMonth*100):0,
      prevPct:budgetPerMonth>0?Math.round(prevSpent/budgetPerMonth*100):0,

  },[transactions,categories,selectedMonth,selectedAcct]);

  // Category analysis (exclude transfers)
  const catAnalysis = useMemo(()=>{
    const byCategory = {};

      return { ...c, spent:data.spent, budget, avg, diff, pct, status, sColor, txns:data.txns };

    cats.forEach(c=>{rowTotals[c.name]=monthKeys.reduce((s,ym)=>s+(spendMap[c.name+'|'+ym]||0),0);});

    // Yearly income/expenses/transfers for annual stats
    let yearIncome=0, yearExpenses=0, yearTransfers=0;
    transactions.forEach(t=>{
      const ym=getYearMonth(t.date);

      if(t.catType==='transfer'){if(t.amount<0) yearTransfers+=Math.abs(t.amount);}
      else if(t.amount>=0) yearIncome+=t.amount;
      else yearExpenses+=Math.abs(t.amount);
    });
    return {monthKeys,cats,grouped:grpd,spendMap,txnMap,colTotals,rowTotals,grandTotal,yearIncome,yearExpenses,yearTransfers};

                )),

                  h('tr',{key:i},

                  h('option',{value:'monthly'},'Monthly'),

                )

// ── Debt Planner Page ─────────────────────────────────
function DebtPlannerPage({accounts, setAccounts, transactions, tier, isDemo, showToast, embedded}) {
  const [strategy, setStrategy] = useState('avalanche');
  const [extraPayment, setExtraPayment] = useState(0);
  const [editDebt, setEditDebt] = useState(null);
  const [modalPayment, setModalPayment] = useState('');
  const [modalFreq, setModalFreq] = useState('monthly');
  const [lumpSum, setLumpSum] = useState('');
  const [showLumpSum, setShowLumpSum] = useState(false);

  // Compute current balance per account
  const acctBalances = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{ m[a.id] = a.startingBalance||0; });
    transactions.forEach(t=>{ if(m[t.accountId]!==undefined) m[t.accountId]+=t.amount; });
    return m;
  },[accounts,transactions]);

  // Get debt accounts with current balances + effective monthly
  const debtAccounts = useMemo(()=>{
    return accounts
      .filter(a=>a.type==='credit_card'||a.type==='loan'||a.type==='student_loan'||a.type==='mortgage')
      .map(a=>{
        const minPay = a.minimumPayment||0;
        const planned = a.plannedPayment||0;
        const freq = a.paymentFrequency||'monthly';
        const effectiveMonthly = planned>0
          ? (freq==='biweekly' ? planned*26/12 : planned)
          : minPay;
        return {
          id:a.id, name:a.name, type:a.type,
          balance:Math.abs(acctBalances[a.id]||0),
          rate:a.interestRate||0,
          minPayment:minPay,
          plannedPayment:planned,
          paymentFrequency:freq,
          effectiveMonthly,
          creditLimit:a.creditLimit||0,
          last4:a.last4||''
        };
      })
      .filter(a=>a.balance>0);
  },[accounts,acctBalances]);

  // Open edit modal for a debt
  const openModal = (d) => {
    setEditDebt(d.id);
    const acct = accounts.find(a=>a.id===d.id);
    setModalPayment(acct?.plannedPayment || acct?.minimumPayment || '');
    setModalFreq(acct?.paymentFrequency || 'monthly');
  };
  const closeModal = () => { setEditDebt(null); setModalPayment(''); setModalFreq('monthly'); };
  const saveModal = () => {
    setAccounts(prev=>prev.map(a=>a.id===editDebt?{...a, plannedPayment:+modalPayment||0, paymentFrequency:modalFreq}:a));
    if(showToast) showToast('✅ Payment plan saved');
    closeModal();
  };
  const resetPlan = () => {
    setAccounts(prev=>prev.map(a=>a.id===editDebt?{...a, plannedPayment:undefined, paymentFrequency:undefined}:a));
    if(showToast) showToast('✅ Reset to minimum payment');
    closeModal();
  };
  const modalEffective = +modalPayment>0 ? (modalFreq==='biweekly'? +modalPayment*26/12 : +modalPayment) : 0;
  const editAcct = editDebt ? debtAccounts.find(d=>d.id===editDebt) : null;

  // Lump sum allocation helper
  const allocateLumpSum = (amount, debts, strat) => {
    let remaining = amount;
    const result = debts.map(d=>({id:d.id, name:d.name, balance:d.balance, rate:d.rate, allocated:0, newBalance:d.balance}));
    let sorted;
    if(strat==='avalanche') sorted = [...result].sort((a,b)=>b.rate-a.rate);
    else if(strat==='snowball') sorted = [...result].sort((a,b)=>a.balance-b.balance);
    else { // eliminate — pay off small debts first, skip ones too large, then apply leftover
      sorted = [...result].sort((a,b)=>a.balance-b.balance);
      // First pass: fully eliminate debts that fit
      for(const d of sorted) {
        if(remaining<=0) break;
        if(d.balance<=remaining) { d.allocated=d.balance; d.newBalance=0; remaining-=d.balance; }
      }
      // Second pass: apply leftover to next smallest unpaid debt
      for(const d of sorted) {
        if(remaining<=0) break;
        if(d.newBalance>0) { const pay=Math.min(remaining,d.newBalance); d.allocated+=pay; d.newBalance-=pay; remaining-=pay; }
      }
      return result;
    }
    for(const d of sorted) {
      if(remaining<=0) break;
      const pay = Math.min(remaining, d.balance);
      d.allocated = pay;
      d.newBalance = d.balance - pay;
      remaining -= pay;
    }
    return result;
  };

  // Payoff simulation — useMinOnly forces minimums (for baseline comparison)
  const simulate = (debts, extra, useMinOnly, strategyOverride) => {
    if(debts.length===0) return {months:0,totalInterest:0,snapshots:[],debtFreeDate:null,perDebt:{}};
    let balances = debts.map(d=>({...d, bal:d.balance, monthlyPay: useMinOnly ? d.minPayment : d.effectiveMonthly}));
    let totalInterest = 0;
    let months = 0;
    const maxMonths = 600;
    const snapshots = [];
    const perDebt = {};
    debts.forEach(d=>{ perDebt[d.id]={interest:0,paidOff:null,months:0}; });

    const sortDebts = (arr) => {
      if((strategyOverride||strategy)==='snowball') return [...arr].sort((a,b)=>a.bal-b.bal);
      return [...arr].sort((a,b)=>b.rate-a.rate);
    };

    while(balances.some(d=>d.bal>0.01) && months<maxMonths) {
      months++;
      let freedPayment = 0;

      balances.forEach(d=>{
        if(d.bal<=0) return;
        const interest = d.bal * (d.rate/100/12);
        d.bal += interest;
        totalInterest += interest;
        perDebt[d.id].interest += interest;
      });

      balances.forEach(d=>{
        if(d.bal<=0) return;
        const payment = Math.min(d.monthlyPay, d.bal);
        d.bal -= payment;
        if(d.bal<=0.01) { d.bal=0; freedPayment+=d.monthlyPay-payment; if(!perDebt[d.id].paidOff) perDebt[d.id].paidOff=months; }
      });

      let remaining = extra + freedPayment;
      const sorted = sortDebts(balances.filter(d=>d.bal>0));
      for(const target of sorted) {
        if(remaining<=0) break;
        const payment = Math.min(remaining, target.bal);
        target.bal -= payment;
        remaining -= payment;
        if(target.bal<=0.01) { target.bal=0; if(!perDebt[target.id].paidOff) perDebt[target.id].paidOff=months; }
      }

      snapshots.push(balances.map(d=>({id:d.id,bal:d.bal})));
    }

    debts.forEach(d=>{ perDebt[d.id].months = perDebt[d.id].paidOff||months; });
    const now = new Date();
    const debtFreeDate = new Date(now.getFullYear(), now.getMonth()+months, 1);
    return {months, totalInterest, snapshots, debtFreeDate, perDebt};
  };

  const result = useMemo(()=>simulate(debtAccounts, +extraPayment||0, false),[debtAccounts,strategy,extraPayment]);
  const baseline = useMemo(()=>simulate(debtAccounts, 0, true),[debtAccounts,strategy]);

  const totalDebt = debtAccounts.reduce((s,d)=>s+d.balance,0);
  const weightedRate = totalDebt>0 ? debtAccounts.reduce((s,d)=>s+d.rate*(d.balance/totalDebt),0) : 0;
  const interestSaved = baseline.totalInterest - result.totalInterest;
  const monthsSaved = baseline.months - result.months;
  const totalPlannedMonthly = debtAccounts.reduce((s,d)=>s+d.effectiveMonthly,0);

  // Lump sum analysis
  const lumpSumAnalysis = useMemo(()=>{
    const amt = +lumpSum||0;
    if(amt<=0 || debtAccounts.length===0) return null;
    const strategies = ['avalanche','snowball','eliminate'];
    const labels = {avalanche:'Avalanche',snowball:'Snowball',eliminate:'Eliminate Small Debts'};
    const icons = {avalanche:'\u26A1',snowball:'\u2744\uFE0F',eliminate:'\u2705'};
    const descs = {avalanche:'Apply to highest interest rate first',snowball:'Apply to smallest balance first',eliminate:'Pay off small debts entirely first'};
    return strategies.map(strat=>{
      const allocation = allocateLumpSum(amt, debtAccounts, strat);
      const modifiedDebts = debtAccounts.map(d=>{
        const alloc = allocation.find(a=>a.id===d.id);
        return {...d, balance: alloc ? alloc.newBalance : d.balance};
      }).filter(d=>d.balance>0.01);
      const simStrat = strat==='eliminate'?'snowball':strat;
      const simResult = modifiedDebts.length>0 ? simulate(modifiedDebts, +extraPayment||0, false, simStrat) : {months:0,totalInterest:0,debtFreeDate:new Date()};
      return {
        key:strat, label:labels[strat], icon:icons[strat], desc:descs[strat],
        allocation,
        months:simResult.months,
        totalInterest:simResult.totalInterest,
        lsInterestSaved: result.totalInterest - simResult.totalInterest,
        lsMonthsSaved: result.months - simResult.months,
        debtFreeDate: simResult.debtFreeDate,
        debtsEliminated: allocation.filter(a=>a.newBalance<0.01).length
      };
    });
  },[lumpSum,debtAccounts,extraPayment,strategy,result]);

  const lumpSumRec = useMemo(()=>{
    if(!lumpSumAnalysis) return null;
    return lumpSumAnalysis.reduce((best,s)=>!best||s.lsInterestSaved>best.lsInterestSaved?s:best, null);
  },[lumpSumAnalysis]);

  const fmtMo = (d) => { if(!d) return '—'; const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mo[d.getMonth()]+' '+d.getFullYear(); };

  // Sorted debt list by strategy
  const sortedDebts = useMemo(()=>{
    const list = [...debtAccounts];
    if(strategy==='snowball') list.sort((a,b)=>a.balance-b.balance);
    else list.sort((a,b)=>b.rate-a.rate);
    return list;
  },[debtAccounts,strategy]);

  // Plan vs Actual tracking
  const planTracking = useMemo(()=>{
    const now = new Date();
    const currentYM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const dayOfMonth = now.getDate();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

    return debtAccounts.map(d=>{
      const monthTxns = transactions.filter(t=>t.accountId===d.id && t.amount>0 && getYearMonth(t.date)===currentYM);
      const totalPaid = monthTxns.reduce((s,t)=>s+t.amount,0);
      const expected = d.effectiveMonthly;
      const pct = expected>0 ? Math.min(Math.round(totalPaid/expected*100),100) : 0;

      let status, color;
      if(totalPaid>=expected && expected>0) { status='✅ On Target'; color='var(--green)'; }
      else if(totalPaid>=expected*0.5 && expected>0) { status='⏳ Partial'; color='var(--accent2)'; }
      else if(dayOfMonth>daysInMonth*0.65 && expected>0) { status='⚠️ Behind'; color='var(--red)'; }
      else { status='⏳ Pending'; color='var(--text2)'; }

      return {id:d.id, totalPaid, expected, pct, status, color, txnCount:monthTxns.length};
    });
  },[debtAccounts,transactions]);

  const trackMap = useMemo(()=>{ const m={}; planTracking.forEach(t=>{m[t.id]=t;}); return m; },[planTracking]);
  const totalPaidThisMonth = planTracking.reduce((s,t)=>s+t.totalPaid,0);
  const totalExpectedThisMonth = planTracking.reduce((s,t)=>s+t.expected,0);
  const overallPct = totalExpectedThisMonth>0 ? Math.min(Math.round(totalPaidThisMonth/totalExpectedThisMonth*100),100) : 0;

  // Gate check
  if(!isDemo && !tier?.debtPlanner) {
    return h('div',{className:embedded?'':'page'},
      !embedded && h('div',{className:'page-header'},h('h2',null,'💳 Debt Reduction Planner')),
      h('div',{className:'card',style:{textAlign:'center',padding:'40px 20px'}},
        h('div',{style:{fontSize:48,marginBottom:12}},'💳'),
        h('h3',{style:{margin:'0 0 8px'}},'Debt Reduction Planner'),
        h('p',{style:{color:'var(--text2)',marginBottom:16}},'Plan your path to becoming debt-free with Snowball or Avalanche strategies.'),
        h('p',{style:{color:'var(--text2)',fontSize:13}},'This feature is available on the ',h('strong',null,'Pro'),' plan.'),
        h('a',{href:'https://ambitbudget.com/#pricing',target:'_blank',rel:'noopener',
          style:{display:'inline-block',marginTop:12,padding:'8px 20px',background:'var(--accent2)',color:'#fff',borderRadius:8,textDecoration:'none',fontWeight:600}}, 'Upgrade to Pro →')
      )
    );
  }

  // No debt accounts
  if(debtAccounts.length===0) {
    return embedded ? null : h('div',{className:'page'},
      h('div',{className:'page-header'},h('h2',null,'💳 Debt Reduction Planner')),
      h('div',{className:'card',style:{textAlign:'center',padding:'40px 20px'}},
        h('div',{className:'empty'},
          h('img',{src:'images/mr-ambit/full-body.png',alt:'Mr. Ambit',style:{width:120,height:120,objectFit:'contain',marginBottom:8}}),
          h('div',{className:'icon'},'💳'),
          h('p',null,'No debt accounts found.'),
          h('p',{style:{fontSize:13,color:'var(--text2)'}},'Add a Credit Card or Loan account on the Accounts page to get started.')
        )
      )
    );
  }

  return h('div',{className:embedded?'':'page'},
    // Header
    h('div',{className:embedded?'':'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}},
      !embedded && h('h2',{style:{margin:0}},'💳 Debt Reduction Planner'),
      h('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
        h('div',{style:{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}},
          h('button',{onClick:()=>setStrategy('avalanche'),
            style:{padding:'6px 14px',fontSize:12,fontWeight:strategy==='avalanche'?700:400,cursor:'pointer',border:'none',
              background:strategy==='avalanche'?'var(--accent2)':'var(--bg2)',color:strategy==='avalanche'?'#fff':'var(--text2)'
          }},'⚡ Avalanche'),
          h('button',{onClick:()=>setStrategy('snowball'),
            style:{padding:'6px 14px',fontSize:12,fontWeight:strategy==='snowball'?700:400,cursor:'pointer',border:'none',
              background:strategy==='snowball'?'var(--accent2)':'var(--bg2)',color:strategy==='snowball'?'#fff':'var(--text2)'
          }},'❄️ Snowball')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:6}},
          h('label',{style:{fontSize:12,color:'var(--text2)',whiteSpace:'nowrap'}},'Extra $/mo:'),
          h('input',{className:'input',type:'number',value:extraPayment,onChange:e=>setExtraPayment(e.target.value),
            style:{width:80,textAlign:'right'},min:0,step:25,placeholder:'0'})
        )
      )
    ),

    // Strategy explanation
    h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:14,padding:'8px 12px',background:'var(--bg2)',borderRadius:8}},
      strategy==='avalanche'
        ? '⚡ Avalanche: Pay highest interest rate first. Saves the most money over time.'
        : '❄️ Snowball: Pay smallest balance first. Quick wins to build momentum.'
    ),

    // Summary cards
    h('div',{className:'stats',style:{marginBottom:16}},
      h(Stat,{label:'Total Debt', value:'$'+Math.round(totalDebt).toLocaleString(), color:'var(--red)'}),
      h(Stat,{label:'Avg APR', value:weightedRate.toFixed(1)+'%', color:'var(--accent2)'}),
      h(Stat,{label:'Debt-Free', value:fmtMo(result.debtFreeDate), color:'var(--green)'}),
      h(Stat,{label:'Total Interest', value:'$'+Math.round(result.totalInterest).toLocaleString(), color:'var(--pink)'})
    ),

    // This Month's Progress
    totalExpectedThisMonth>0 && h('div',{className:'card',style:{padding:'14px 16px',marginBottom:14}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('h3',{style:{margin:0,fontSize:14}},'📅 This Month\'s Progress'),
        h('span',{style:{fontSize:12,color:overallPct>=100?'var(--green)':'var(--text2)',fontWeight:600}},
          '$'+Math.round(totalPaidThisMonth).toLocaleString()+' / $'+Math.round(totalExpectedThisMonth).toLocaleString())
      ),
      h('div',{style:{height:10,background:'var(--bg2)',borderRadius:6,overflow:'hidden',marginBottom:12}},
        h('div',{style:{height:'100%',width:overallPct+'%',borderRadius:6,transition:'width 0.5s',
          background:overallPct>=100?'var(--green)':overallPct>=50?'var(--accent2)':'var(--red)'}})
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
        sortedDebts.map(d=>{
          const t = trackMap[d.id]||{totalPaid:0,expected:0,pct:0,status:'—',color:'var(--text2)'};
          return h('div',{key:d.id,style:{display:'flex',alignItems:'center',gap:10,fontSize:12}},
            h('span',{style:{flex:'0 0 140px',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},d.name),
            h('div',{style:{flex:1,height:6,background:'var(--bg2)',borderRadius:4,overflow:'hidden'}},
              h('div',{style:{height:'100%',width:t.pct+'%',borderRadius:4,background:t.color,transition:'width 0.3s'}})
            ),
            h('span',{style:{flex:'0 0 100px',textAlign:'right',color:'var(--text2)'}},
              '$'+Math.round(t.totalPaid)+' / $'+Math.round(t.expected)),
            h('span',{style:{flex:'0 0 90px',textAlign:'right',fontSize:11,color:t.color,fontWeight:600}},t.status)
          );
        })
      )
    ),

    // Savings banner
    (interestSaved>1) && h('div',{className:'card',style:{padding:'12px 16px',marginBottom:14,border:'1px solid rgba(72,187,120,0.3)'}},
      h('div',{style:{display:'flex',justifyContent:'space-around',flexWrap:'wrap',gap:12,textAlign:'center'}},
        h('div',null,
          h('div',{style:{fontSize:11,color:'var(--text2)',textTransform:'uppercase'}},'Interest Saved'),
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--green)'}},'+$'+Math.round(interestSaved).toLocaleString())
        ),
        h('div',null,
          h('div',{style:{fontSize:11,color:'var(--text2)',textTransform:'uppercase'}},'Months Faster'),
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--green)'}},monthsSaved>0?monthsSaved+' mo':'—')
        ),
        h('div',null,
          h('div',{style:{fontSize:11,color:'var(--text2)',textTransform:'uppercase'}},'Monthly Payment'),
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--accent2)'}},'$'+Math.round(totalPlannedMonthly+(+extraPayment||0)).toLocaleString())
        )

// ── Savings Goals Helpers ─────────────────────────────
function goalProgress(goal) {
  if(!goal.target || goal.target<=0) return 0;
  return Math.min(100, Math.round((goal.saved/goal.target)*100));
}

function goalStatus(goal) {
  // Returns 'on-track', 'slightly-behind', 'behind', or 'ahead'
  if(!goal.deadline) return goalProgress(goal)>=100?'ahead':'on-track';
  const now = new Date();
  const deadline = new Date(goal.deadline);
  const created = new Date(goal.createdAt || now);
  const totalDays = Math.max(1,(deadline-created)/(1000*60*60*24));
  const elapsedDays = Math.max(0,(now-created)/(1000*60*60*24));
  const expectedPct = Math.min(100,(elapsedDays/totalDays)*100);
  const actualPct = goalProgress(goal);
  if(actualPct>=100) return 'ahead';
  if(now>deadline) return 'behind';
  if(actualPct >= expectedPct-5) return actualPct>expectedPct+10?'ahead':'on-track';
  if(actualPct >= expectedPct-20) return 'slightly-behind';
  return 'behind';
}

function goalStatusLabel(status) {
  if(status==='ahead') return {text:'Ahead',color:'var(--green)'};
  if(status==='on-track') return {text:'On track',color:'var(--green)'};
  if(status==='slightly-behind') return {text:'Slightly behind',color:'var(--yellow)'};
  return {text:'Behind',color:'var(--red)'};
}

function goalProgressClass(status) {
  if(status==='ahead'||status==='on-track') return 'on-track';
  if(status==='slightly-behind') return 'slightly-behind';
  return 'behind';
}

function goalMonthlyNeeded(goal) {
  if(!goal.deadline || goalProgress(goal)>=100) return null;
  const now = new Date();
  const deadline = new Date(goal.deadline);
  const monthsLeft = Math.max(0.5, (deadline-now)/(1000*60*60*24*30.44));
  const remaining = Math.max(0, goal.target - goal.saved);
  return remaining/monthsLeft;
}

function goalWeeklyNeeded(goal) {
  if(!goal.deadline || goalProgress(goal)>=100) return null;
  const now = new Date();
  const deadline = new Date(goal.deadline);
  const weeksLeft = Math.max(0.5, (deadline-now)/(1000*60*60*24*7));
  const remaining = Math.max(0, goal.target - goal.saved);
  return remaining/weeksLeft;
}

function getAccountEarmarked(account) {
  if(!account.goals || !account.goals.length) return 0;
  return account.goals.reduce((sum,g)=>sum+g.saved, 0);
}

// ── Dashboard Goals Widget ───────────────────────────
function DashboardGoalsWidget({accounts, setAccounts, setPage, showToast}) {
  const [quickSkipGoal, setQuickSkipGoal] = useState(null);
  const [quickSkipAmt, setQuickSkipAmt] = useState('');
  const [quickSkipDesc, setQuickSkipDesc] = useState('');
  const [quickMotiv, setQuickMotiv] = useState(null);

  // Gather all goals across non-debt accounts
  const allGoals = useMemo(()=>{
    const goals = [];
    accounts.forEach(a=>{
      if(a.type!=='checking'&&a.type!=='savings') return;
      (a.goals||[]).forEach(g=>{
        goals.push({...g, accountId:a.id, accountName:a.name});
      });
    });
    return goals;
  },[accounts]);

  if(allGoals.length===0) return null;

  const doQuickSkip = (g) => {
    const amt = +quickSkipAmt;
    if(!amt||amt<=0) return;
    setAccounts(prev=>prev.map(a=>{
      if(a.id!==g.accountId) return a;
      return {...a, goals:(a.goals||[]).map(gl=>gl.id===g.id?{...gl,saved:gl.saved+amt}:gl)};
    }));
    const newSaved = g.saved+amt;
    const pct = Math.min(100,Math.round((newSaved/g.target)*100));
    setQuickMotiv({gid:g.id, text:'Nice! '+pct+'% to your goal.'});
    setTimeout(()=>setQuickMotiv(null), 3500);
    setQuickSkipGoal(null); setQuickSkipAmt(''); setQuickSkipDesc('');
  };

  return h('div',{className:'card dash-goals-widget',style:{padding:'12px 16px',marginBottom:14}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
      h('h3',{style:{margin:0,fontSize:13}}, h('span',{className:'icon'},'🎯'), ' Savings Goals'),
      setPage && h('button',{className:'btn sm',onClick:()=>setPage('accounts'),style:{fontSize:11}},'Manage')
    ),
    allGoals.map(g=>{
      const pct = goalProgress(g);
      const status = goalStatus(g);
      const statusInfo = goalStatusLabel(status);
      return h('div',{key:g.id,className:'dash-goal-row'},
        h('div',{className:'dash-goal-info'},
          h('div',{className:'dash-goal-name'}, g.name),
          h('div',{className:'dash-goal-acct'}, g.accountName, ' \u2022 ', fmt(g.saved),' / ',fmt(g.target))
        ),
        h('div',{className:'dash-goal-bar'},
          h('div',{className:'goal-progress-track',style:{height:6}},
            h('div',{className:'goal-progress-fill '+goalProgressClass(status), style:{width:pct+'%'}})
          )
        ),
        h('div',{className:'dash-goal-status',style:{color:statusInfo.color,minWidth:70,textAlign:'right'}},
          pct+'% \u2022 ',statusInfo.text
        ),
        h('button',{className:'btn sm',onClick:()=>setQuickSkipGoal(quickSkipGoal===g.id?null:g.id),
          style:{fontSize:10,padding:'2px 6px',background:'rgba(72,216,136,0.08)',color:'var(--green)',borderColor:'rgba(72,216,136,0.25)'}},
          'Skip & Save')
      );
    }),
    // Quick skip & save input
    quickSkipGoal && h('div',{style:{display:'flex',gap:6,alignItems:'center',marginTop:8,flexWrap:'wrap'}},
      h('input',{className:'input',type:'text',placeholder:'What did you skip?',value:quickSkipDesc,onChange:e=>setQuickSkipDesc(e.target.value),style:{flex:'1 1 100px',padding:'4px 8px',fontSize:12}}),
      h('input',{className:'input',type:'number',placeholder:'$',value:quickSkipAmt,onChange:e=>setQuickSkipAmt(e.target.value),style:{width:70,padding:'4px 8px',fontSize:12},min:'0',step:'0.01',
        onKeyDown:e=>{if(e.key==='Enter'){const g=allGoals.find(x=>x.id===quickSkipGoal);if(g)doQuickSkip(g);}}}),
      h('button',{className:'btn sm green',onClick:()=>{const g=allGoals.find(x=>x.id===quickSkipGoal);if(g)doQuickSkip(g);},disabled:!+quickSkipAmt,style:{fontSize:11}},'Save'),
      h('button',{className:'btn sm',onClick:()=>{setQuickSkipGoal(null);setQuickSkipAmt('');setQuickSkipDesc('');},style:{fontSize:11}},'Cancel')
    ),
    // Motivational message
    quickMotiv && h('div',{style:{fontSize:12,color:'var(--green)',fontWeight:600,marginTop:6,padding:'4px 8px',background:'rgba(72,216,136,0.08)',borderRadius:6}}, quickMotiv.text)
  );
}

// ── Account Goals Component ──────────────────────────
function AccountGoals({account, setAccounts, transactions, catMap, showToast, tier, isDemo}) {
  const [showGoalModal, setShowGoalModal] = useState(false);
  const [editGoal, setEditGoal] = useState(null);
  const [goalName, setGoalName] = useState('');
  const [goalTarget, setGoalTarget] = useState('');
  const [goalDeadline, setGoalDeadline] = useState('');
  const [goalInitial, setGoalInitial] = useState('');
  const [addToGoalId, setAddToGoalId] = useState(null);
  const [addToGoalAmt, setAddToGoalAmt] = useState('');
  const [skipSaveId, setSkipSaveId] = useState(null);
  const [skipDesc, setSkipDesc] = useState('');
  const [skipAmt, setSkipAmt] = useState('');
  const [motivMsg, setMotivMsg] = useState(null);

  const goals = account.goals || [];
  const earmarked = getAccountEarmarked(account);

  const resetGoalForm = () => {
    setGoalName(''); setGoalTarget(''); setGoalDeadline(''); setGoalInitial('');
    setEditGoal(null); setShowGoalModal(false);
  };

  const saveGoal = () => {
    if(!goalName.trim() || !+goalTarget) return;
    setAccounts(prev=>prev.map(a=>{
      if(a.id!==account.id) return a;
      let newGoals = [...(a.goals||[])];
      if(editGoal) {
        newGoals = newGoals.map(g=>g.id===editGoal.id?{...g, name:goalName.trim(), target:+goalTarget, deadline:goalDeadline||null}:g);
      } else {
        newGoals.push({
          id:'g'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
          name:goalName.trim(),
          target:+goalTarget,
          saved:+goalInitial||0,
          deadline:goalDeadline||null,
          createdAt:new Date().toISOString().slice(0,10)
        });
      }
      return {...a, goals:newGoals};
    }));
    showToast(editGoal ? 'Updated goal: '+goalName.trim() : 'Goal created: '+goalName.trim());
    resetGoalForm();
  };

  const deleteGoal = (gid) => {
    if(!confirm('Delete this savings goal?')) return;
    setAccounts(prev=>prev.map(a=>{
      if(a.id!==account.id) return a;
      return {...a, goals:(a.goals||[]).filter(g=>g.id!==gid)};
    }));
    showToast('Goal deleted');
  };

  const startEditGoal = (g) => {
    setGoalName(g.name); setGoalTarget(String(g.target)); setGoalDeadline(g.deadline||''); setGoalInitial('');
    setEditGoal(g); setShowGoalModal(true);
  };

  const addToGoal = (gid) => {
    const amt = +addToGoalAmt;
    if(!amt || amt<=0) return;
    setAccounts(prev=>prev.map(a=>{
      if(a.id!==account.id) return a;
      const newGoals = (a.goals||[]).map(g=>g.id===gid?{...g,saved:g.saved+amt}:g);
      return {...a, goals:newGoals};
    }));
    const goal = goals.find(g=>g.id===gid);
    const newSaved = (goal?goal.saved:0)+amt;
    const pct = goal?Math.min(100,Math.round((newSaved/goal.target)*100)):0;
    showToast('Added '+fmt(amt)+' to '+((goal&&goal.name)||'goal')+' ('+pct+'%)');
    setAddToGoalId(null); setAddToGoalAmt('');
  };

  const doSkipSave = (gid) => {
    const amt = +skipAmt;
    if(!amt || amt<=0) return;
    setAccounts(prev=>prev.map(a=>{
      if(a.id!==account.id) return a;
      const newGoals = (a.goals||[]).map(g=>g.id===gid?{...g,saved:g.saved+amt}:g);
      return {...a, goals:newGoals};
    }));
    const goal = goals.find(g=>g.id===gid);
    const newSaved = (goal?goal.saved:0)+amt;
    const pct = goal?Math.min(100,Math.round((newSaved/goal.target)*100)):0;
    setMotivMsg({gid, text:'Nice! You\'re now '+pct+'% to your goal.'});
    setTimeout(()=>setMotivMsg(null), 4000);
    setSkipSaveId(null); setSkipDesc(''); setSkipAmt('');
  };

  // Spending-based suggestions
  const spendingSuggestion = useMemo(()=>{
    const acctTxns = transactions.filter(t=>t.accountId===account.id && t.amount<0);
    if(acctTxns.length < 10) return null;
    const catTotals = {};
    acctTxns.forEach(t=>{
      const cat = catMap[t.category];
      const catType = t.catType || (cat&&cat.catType) || 'discretionary';
      if(catType!=='discretionary') return;
      const name = t.category||'Uncategorized';
      catTotals[name] = (catTotals[name]||0) + Math.abs(t.amount);
    });
    const sorted = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    if(sorted.length===0) return null;
    const months = new Set(acctTxns.map(t=>getYearMonth(t.date)));
    const monthCount = Math.max(1, months.size);
    const top = sorted[0];
    const monthlyAvg = top[1]/monthCount;
    if(monthlyAvg < 20) return null;
    return {category:top[0], monthly:monthlyAvg, halfSaving:monthlyAvg*0.5};
  },[transactions, account.id, catMap]);

  // Monthly/weekly needed calculation for modal
  const modalRateCalc = useMemo(()=>{
    if(!goalDeadline || !+goalTarget) return null;
    const now = new Date();
    const dl = new Date(goalDeadline);
    if(dl<=now) return null;
    const remaining = +goalTarget - (+goalInitial||0);
    if(remaining<=0) return null;
    const months = Math.max(0.5,(dl-now)/(1000*60*60*24*30.44));
    const weeks = Math.max(0.5,(dl-now)/(1000*60*60*24*7));
    return {perMonth: remaining/months, perWeek: remaining/weeks};
  },[goalDeadline, goalTarget, goalInitial]);

  if(goals.length===0 && !showGoalModal) {
    return h('div',{style:{marginTop:8}},
      h('button',{className:'btn sm',onClick:()=>{resetGoalForm();setShowGoalModal(true);},style:{fontSize:11}}, '+ Add Savings Goal'),
      showGoalModal && null
    );
  }

  return h('div',{style:{marginTop:4}},
    // Earmark summary
    goals.length>0 && h('div',{className:'goals-earmark'},
      h('span',null,'Available: ',h('strong',{style:{color:'var(--green)'}},fmt((account._runningBal||0)-earmarked))),
      h('span',null,'Earmarked: ',h('strong',{style:{color:'var(--accent2)'}},fmt(earmarked)))
    ),

    // Goal cards
    goals.map(g=>{
      const pct = goalProgress(g);
      const status = goalStatus(g);
      const statusInfo = goalStatusLabel(status);
      const monthly = goalMonthlyNeeded(g);
      return h('div',{key:g.id, className:'goal-card'},
        h('div',{className:'goal-header'},
          h('div',null,
            h('span',{className:'goal-name'}, g.name),
            g.deadline && h('span',{className:'goal-meta',style:{marginLeft:8}}, 'by '+g.deadline)
          ),
          h('div',{className:'goal-actions'},
            h('button',{className:'btn sm',onClick:()=>setSkipSaveId(skipSaveId===g.id?null:g.id),title:'Skip & Save',style:{background:'rgba(72,216,136,0.1)',color:'var(--green)',borderColor:'rgba(72,216,136,0.3)'}},'Skip & Save'),
            h('button',{className:'btn sm',onClick:()=>setAddToGoalId(addToGoalId===g.id?null:g.id),title:'Add to goal'},'+ Add'),
            h('button',{className:'btn sm',onClick:()=>startEditGoal(g),title:'Edit goal'},'Edit'),
            h('button',{className:'btn sm',onClick:()=>deleteGoal(g.id),title:'Delete goal',style:{color:'var(--red)',borderColor:'var(--red)'}},'Del')
          )
        ),
        // Progress bar
        h('div',{className:'goal-progress-track'},
          h('div',{className:'goal-progress-fill '+goalProgressClass(status), style:{width:pct+'%'}})
        ),
        h('div',{className:'goal-stats'},
          h('span',null, fmt(g.saved)+' of '+fmt(g.target)+' ('+pct+'%)'),
          h('span',{style:{color:statusInfo.color,fontWeight:600}}, statusInfo.text,
            monthly && pct<100 ? ' \u2022 '+fmt(monthly)+'/mo needed' : null)
        ),

        // Motivational message
        motivMsg && motivMsg.gid===g.id && h('div',{style:{fontSize:12,color:'var(--green)',fontWeight:600,marginTop:4,padding:'4px 8px',background:'rgba(72,216,136,0.08)',borderRadius:6}}, motivMsg.text),

        // Add to goal inline input
        addToGoalId===g.id && h('div',{className:'skip-save-input'},
          h('input',{className:'input',type:'number',placeholder:'Amount',value:addToGoalAmt,onChange:e=>setAddToGoalAmt(e.target.value),style:{width:90},min:'0',step:'0.01',autoFocus:true,onKeyDown:e=>{if(e.key==='Enter')addToGoal(g.id);}}),
          h('button',{className:'btn sm green',onClick:()=>addToGoal(g.id),disabled:!+addToGoalAmt},'Add'),
          h('button',{className:'btn sm',onClick:()=>{setAddToGoalId(null);setAddToGoalAmt('');}},'Cancel')
        ),

        // Skip & Save inline input
        skipSaveId===g.id && h('div',{className:'skip-save-input'},
          h('input',{className:'input',type:'text',placeholder:'What did you skip?',value:skipDesc,onChange:e=>setSkipDesc(e.target.value),style:{width:130,flex:'1 1 100px'}}),
          h('input',{className:'input',type:'number',placeholder:'$',value:skipAmt,onChange:e=>setSkipAmt(e.target.value),style:{width:70},min:'0',step:'0.01',onKeyDown:e=>{if(e.key==='Enter')doSkipSave(g.id);}}),
          h('button',{className:'btn sm green',onClick:()=>doSkipSave(g.id),disabled:!+skipAmt},'Save'),
          h('button',{className:'btn sm',onClick:()=>{setSkipSaveId(null);setSkipDesc('');setSkipAmt('');}},'Cancel')
        ),

        // Spending suggestion
        spendingSuggestion && pct<100 && g===goals[0] && h('div',{className:'spending-suggestion'},
          'Based on your spending, you average ',h('strong',null,fmt(spendingSuggestion.monthly)+'/mo'),' on ',h('strong',null,spendingSuggestion.category),'. ',
          'Cutting that by 50% could save ',h('strong',null,fmt(spendingSuggestion.halfSaving)+'/mo'),' toward this goal.'
        )
      );
    }),

    // Add goal button
    h('button',{className:'btn sm',onClick:()=>{resetGoalForm();setShowGoalModal(true);},style:{marginTop:8,fontSize:11}}, '+ Add Goal'),

    // Add/Edit Goal Modal
    showGoalModal && h(Modal,{onClose:resetGoalForm},
      h('h3',null, editGoal?'Edit Savings Goal':'New Savings Goal'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',null,
          h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Goal Name'),
          h('input',{className:'input',value:goalName,onChange:e=>setGoalName(e.target.value),placeholder:'e.g. New Laptop',style:{width:'100%'},autoFocus:true})
        ),
        h('div',null,
          h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Target Amount ($)'),
          h('input',{className:'input',type:'number',value:goalTarget,onChange:e=>setGoalTarget(e.target.value),placeholder:'e.g. 1200',style:{width:'100%'},min:'0',step:'0.01'})
        ),
        h('div',null,
          h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Target Date (optional)'),
          h('input',{className:'input',type:'date',value:goalDeadline,onChange:e=>setGoalDeadline(e.target.value),style:{width:'100%'}})
        ),
        !editGoal && h('div',null,
          h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Initial Amount to Earmark ($)'),
          h('input',{className:'input',type:'number',value:goalInitial,onChange:e=>setGoalInitial(e.target.value),placeholder:'0',style:{width:'100%'},min:'0',step:'0.01'})
        ),
        // Rate calculation
        modalRateCalc && h('div',{style:{padding:'8px 12px',background:'rgba(72,216,136,0.06)',borderRadius:6,fontSize:12,color:'var(--green)'}},
          'That\'s ',h('strong',null,fmt(modalRateCalc.perMonth)+'/month'),' or ',h('strong',null,fmt(modalRateCalc.perWeek)+'/week')
        ),
        // Spending suggestion in modal
        spendingSuggestion && h('div',{className:'spending-suggestion'},
          'Based on your spending, you average ',h('strong',null,fmt(spendingSuggestion.monthly)+'/mo'),' on ',h('strong',null,spendingSuggestion.category),'. ',
          'Cutting that by 50% could save ~',h('strong',null,fmt(spendingSuggestion.halfSaving)+'/mo'),'.'
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetGoalForm},'Cancel'),
          h('button',{className:'btn primary',onClick:saveGoal,disabled:!goalName.trim()||!+goalTarget}, editGoal?'Update Goal':'Create Goal')
        )
      )
    )
  );
}

// ── Accounts Page ──────────────────────────────────────
function AccountsPage({accounts, setAccounts, transactions, setTransactions, catMap, showToast, accountLimit, tier, isDemo, demoBypass}) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState('');
  const [type, setType] = useState('checking');
  const [startBal, setStartBal] = useState(0);
  const [last4, setLast4] = useState('');
  const [interestRate, setInterestRate] = useState('');
  const [minimumPayment, setMinimumPayment] = useState('');
  const [creditLimit, setCreditLimit] = useState('');
  const [plannedPay, setPlannedPay] = useState('');
  const [payFreq, setPayFreq] = useState('monthly');
  const [editIdx, setEditIdx] = useState(null);
  const isDebtType = type==='credit_card'||type==='loan'||type==='student_loan'||type==='mortgage';
  const [goalsHintDismissed, setGoalsHintDismissed] = useState(()=>localStorage.getItem('ambit_goals_hint_dismissed')==='1');

  const resetForm = () => { setName(''); setType('checking'); setStartBal(0); setLast4(''); setInterestRate(''); setMinimumPayment(''); setCreditLimit(''); setPlannedPay(''); setPayFreq('monthly'); setEditIdx(null); setShowAdd(false); };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      const debtFields = isDebtType ? {interestRate:+interestRate||0, minimumPayment:+minimumPayment||0, creditLimit:type==='credit_card'?+creditLimit||0:undefined, plannedPayment:+plannedPay||undefined, paymentFrequency:payFreq!=='monthly'?payFreq:undefined} : {interestRate:undefined, minimumPayment:undefined, creditLimit:undefined, plannedPayment:undefined, paymentFrequency:undefined};
      setAccounts(prev=>prev.map((a,i)=>i===editIdx?{...a, name:name.trim(), type, startingBalance:+startBal, last4:last4.trim(), ...debtFields}:a));
      showToast('✅ Updated: '+name.trim());
    } else {
      if(!isDemo && accountLimit !== undefined && accountLimit !== Infinity && accounts.length >= accountLimit) {
        showToast('⚡ Account limit reached. Upgrade your plan at ambitbudget.com');
        resetForm(); return;
      }
      const debtFields = isDebtType ? {interestRate:+interestRate||0, minimumPayment:+minimumPayment||0, creditLimit:type==='credit_card'?+creditLimit||0:undefined, plannedPayment:+plannedPay||undefined, paymentFrequency:payFreq!=='monthly'?payFreq:undefined} : {};
      setAccounts(prev=>[...prev, {id:Date.now()+'_'+Math.random().toString(36).slice(2,6), name:name.trim(), type, startingBalance:+startBal, last4:last4.trim(), ...debtFields}]);
      showToast('✅ Added: '+name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const acct = accounts[idx];
    const txnCount = transactions.filter(t=>t.accountId===acct.id).length;
    if(txnCount>0 && !confirm(`"${acct.name}" has ${txnCount} transaction(s). Delete anyway?`)) return;
    setAccounts(prev=>prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: '+acct.name);
  };

  const startEdit = (idx) => {
    setName(accounts[idx].name);
    setType(accounts[idx].type);
    setStartBal(accounts[idx].startingBalance || 0);
    setLast4(accounts[idx].last4 || '');
    setInterestRate(accounts[idx].interestRate || '');
    setMinimumPayment(accounts[idx].minimumPayment || '');
    setCreditLimit(accounts[idx].creditLimit || '');
    setPlannedPay(accounts[idx].plannedPayment || '');
    setPayFreq(accounts[idx].paymentFrequency || 'monthly');
    setEditIdx(idx);
    setShowAdd(true);
  };

  // Per-account balances
  const balances = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{m[a.id]={income:0,expense:0,transfers:0};});
    transactions.forEach(t=>{
      if(!m[t.accountId]) return;
      if(t.catType==='transfer') {
        m[t.accountId].transfers += t.amount;
      } else if(t.amount>=0) {
        m[t.accountId].income += t.amount;
      } else {
        m[t.accountId].expense += Math.abs(t.amount);
      }
    });
    return m;
  },[accounts, transactions]);

  // Find unpaired transfer transactions
  const unpairedTransfers = useMemo(()=>{
    const linkedIds = new Set(transactions.filter(t=>t.linkedTxnId).map(t=>t.linkedTxnId));
    return transactions.filter(t=>{
      return t.catType==='transfer' && !t.linkedTxnId && !linkedIds.has(t.id);
    });
  },[transactions]);

  // Retroactively pair unpaired transfers
  const pairTransfers = () => {
    const paired = [];
    const acctLast4 = {};
    accounts.forEach(a=>{ if(a.last4 && a.last4.length>=3) acctLast4[a.last4]=a; });

    for(const txn of unpairedTransfers) {
      // Only pair if we can confirm the destination by last4 match in description
      let dest = null;
      for(const [digits, acct] of Object.entries(acctLast4)) {
        if(acct.id !== txn.accountId && txn.description.toUpperCase().includes(digits)) {
          dest = acct; break;
        }
      }
      // No fallback guessing — if we can't confirm by account number, skip it
      if(dest) {
        const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
        paired.push({
          original: txn,
          pair: {
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount,
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===txn.accountId)?.name||'Other')),
          },
          destName: dest.name,
          linkedId
        });
      }
    }

    if(paired.length===0) {
      showToast('⚠️ No unpaired transfers found that can be matched');
      return;
    }

    const summary = paired.map(p=>p.original.cleanName+' → '+p.destName).join('\n');
    if(!confirm('Create '+paired.length+' paired transfer(s)?\n\n'+summary)) return;

    // Update originals with linkedTxnId and add paired entries
    setTransactions(prev=>{
      const updates = new Map(paired.map(p=>[p.original.id, p.linkedId]));
      const updated = prev.map(t=>updates.has(t.id)?{...t, linkedTxnId:updates.get(t.id)}:t);
      return [...updated, ...paired.map(p=>p.pair)];
    });
    showToast('✅ Created '+paired.length+' paired transfer(s)');
  };

  return h('div',{className:'animate-in'},
    h(HelpBar, HELP_CONTENT.accounts),
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'🏦 Accounts', h(InfoPill,{text:'Track your bank accounts with starting balances. The app calculates current balances from imported transactions. Use Reconcile to verify your balance matches your bank statement.'})),
        h('p',null,'Manage your bank accounts. Each import targets a specific account.')
      ),
      h('div',{style:{display:'flex',gap:8}},
        unpairedTransfers.length>0 && h('button',{className:'btn',onClick:pairTransfers,style:{color:'var(--pink)',borderColor:'var(--pink)'}}, '↔ Pair '+unpairedTransfers.length+' Transfer'+(unpairedTransfers.length===1?'':'s')),
        h('button',{className:'btn primary',onClick:()=>{
          if(!isDemo && accountLimit !== undefined && accountLimit !== Infinity && accounts.length >= accountLimit) {
            showToast('⚡ Upgrade to add more accounts. You\'re on the '+(tier?tier.label:'Starter')+' plan.');
            return;
          }
          resetForm();setShowAdd(true);
        }},'+ New Account')
      )
    ),

    h('div',{className:'stats'},
      h(Stat,{label:'Accounts', value:accounts.length, color:'var(--accent2)'}),
      h(Stat,{label:'Checking', value:accounts.filter(a=>a.type==='checking').length, color:'var(--blue)'}),
      h(Stat,{label:'Savings', value:accounts.filter(a=>a.type==='savings').length, color:'var(--pink)'}),
      accounts.some(a=>a.type==='credit_card'||a.type==='loan'||a.type==='student_loan'||a.type==='mortgage') && h(Stat,{label:'Debt', value:accounts.filter(a=>a.type==='credit_card'||a.type==='loan'||a.type==='student_loan'||a.type==='mortgage').length, color:'var(--red)'})
    ),

    accounts.length===0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('img',{src:'images/mr-ambit/full-body.png',alt:'Mr. Ambit',style:{width:120,height:120,objectFit:'contain',marginBottom:8}}),
            h('div',{className:'icon'},'🏦'),
            h('p',null,'No accounts yet. Add your checking and savings accounts to start tracking.')
          )
        )
      : h('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},
          accounts.map((a,i) => {
            const bal = balances[a.id]||{income:0,expense:0,transfers:0};
            const net = bal.income - bal.expense + bal.transfers;
            const runningBal = (a.startingBalance || 0) + net;
            const txnCount = transactions.filter(t=>t.accountId===a.id).length;
            return h('div',{key:a.id, className:'card', style:{flex:1,minWidth:280}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
                h('div',null,
                  h('div',{style:{fontSize:17,fontWeight:600}}, a.name),
                  h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}}, a.type==='checking'?'🏦 Checking':a.type==='savings'?'💰 Savings':a.type==='credit_card'?'💳 Credit Card':a.type==='student_loan'?'🎓 Student Loan':a.type==='mortgage'?'🏠 Mortgage':'🏦 Loan', a.last4 ? ' ••••'+a.last4 : '', a.interestRate ? ' • '+a.interestRate+'% APR' : ''),
                  a.plannedPayment && h('div',{style:{fontSize:11,color:'var(--green)',marginTop:2}},'📋 Plan: $'+a.plannedPayment+(a.paymentFrequency==='biweekly'?' bi-weekly':'/mo'), a.paymentFrequency==='biweekly'?' (≈$'+Math.round(a.plannedPayment*26/12)+'/mo)':'')
                ),
                h('div',{style:{display:'flex',gap:4}},
                  h('button',{className:'btn sm',onClick:()=>startEdit(i)},'✎'),
                  h('button',{className:'table del-btn',onClick:()=>del(i)},'×')
                )
              ),
              h('div',{style:{textAlign:'center',padding:'12px 0',marginBottom:10,background:'rgba(232,160,32,0.06)',borderRadius:8}},
                h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}},'Current Balance'),
                h('div',{style:{fontSize:26,fontWeight:700,color:runningBal>=0?'var(--green)':'var(--red)'}}, fmt(runningBal))
              ),
              h('div',{style:{display:'flex',gap:14,marginBottom:10,flexWrap:'wrap'}},
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Starting'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--accent2)'}},fmt(a.startingBalance||0))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Income'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--green)'}},fmt(bal.income))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Expenses'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--red)'}},fmt(bal.expense))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Transfers'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--pink)'}},fmt(Math.abs(bal.transfers)))
                )
              ),
              h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',justifyContent:'space-between'}},
                h('span',{style:{fontSize:12,color:'var(--text2)'}},txnCount+' transactions'),
                h('span',{style:{fontSize:13,fontWeight:600,color:'var(--text2)'}}, 'Net Activity: '+(net>=0?'+':'')+fmt(net))
              ),
              // Savings Goals (non-debt accounts, Plus+ tier)
              (a.type==='checking'||a.type==='savings') && (demoBypass || tier?.savingsGoals) &&
                h(AccountGoals, {account:{...a, _runningBal:runningBal}, setAccounts, transactions, catMap, showToast, tier, isDemo})
            );
          })
        ),

    // Account limit and savings goals upgrade hints removed — consolidated into Dashboard bottom section

    // Savings Goals: First-time hint for Plus+ users with no goals
    (demoBypass || tier?.savingsGoals) && !goalsHintDismissed && accounts.some(a=>(a.type==='checking'||a.type==='savings')&&(!a.goals||a.goals.length===0)) &&
      h('div',{className:'goals-hint',style:{marginTop:12}},
        h('span',{'aria-hidden':'true',style:{fontSize:18,flexShrink:0}},'💡'),
        h('span',null,'Set a savings goal on any account. Earmark part of your balance for something you\'re saving for — no need to open a new account.'),
        h('span',{className:'dismiss','aria-label':'Dismiss hint',...a11yClick(()=>{localStorage.setItem('ambit_goals_hint_dismissed','1');setGoalsHintDismissed(true);})}, '✕')
      ),

    // Debt Payoff Planner (shown when user has debt accounts)
    accounts.some(a=>a.type==='credit_card'||a.type==='loan'||a.type==='student_loan'||a.type==='mortgage') && h(DebtPlannerSection, {accounts, setAccounts, transactions, tier, isDemo, showToast}),

    showAdd && h(Modal,{onClose:resetForm},
      h('h3',null, editIdx!==null?'✏️ Edit Account':'➕ New Account'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',null,
          h('label',{htmlFor:'acct-name',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Name'),
          h('input',{id:'acct-name',className:'input',value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. Chase Checking',style:{width:'100%'},autoFocus:true})
        ),
        h('div',null,
          h('label',{htmlFor:'acct-type',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Type'),
          h('select',{id:'acct-type',className:'input',value:type,onChange:e=>setType(e.target.value),style:{width:'100%'}},
            h('option',{value:'checking'},'Checking'),
            h('option',{value:'savings'},'Savings'),
            h('option',{value:'credit_card'},'Credit Card'),
            h('option',{value:'loan'},'Loan'),
            h('option',{value:'student_loan'},'Student Loan'),
            h('option',{value:'mortgage'},'Mortgage')
          )
        ),
        h('div',null,
          h('label',{htmlFor:'acct-last4',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Last 4 Digits of Account Number'),
          h('input',{id:'acct-last4',className:'input',value:last4,onChange:e=>setLast4(e.target.value.replace(/\D/g,'').slice(0,4)),placeholder:'e.g. 3989',style:{width:'100%'},maxLength:4}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}},'Used to auto-detect transfers in bank descriptions (e.g. "ONLINE TRANSFER TO XXXXX3989").')
        ),
        h('div',null,
          h('label',{htmlFor:'acct-balance',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}}, isDebtType?'Current Balance Owed ($)':'Starting Balance ($)'),
          h('input',{id:'acct-balance',className:'input',type:'number',value:startBal,onChange:e=>setStartBal(e.target.value),placeholder:isDebtType?'e.g. -4200.00':'e.g. 5000.00',style:{width:'100%'},step:'0.01'}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}}, isDebtType?'Enter as negative (e.g. -4200 for $4,200 owed).':'Enter the account balance before your earliest imported transaction.')
        ),
        isDebtType && h('div',null,
          h('label',{htmlFor:'acct-apr',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Interest Rate (APR %)'),
          h('input',{id:'acct-apr',className:'input',type:'number',value:interestRate,onChange:e=>setInterestRate(e.target.value),placeholder:'e.g. 22.99',style:{width:'100%'},step:'0.01',min:'0',max:'100'})
        ),
        isDebtType && h('div',null,
          h('label',{htmlFor:'acct-minpay',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Minimum Monthly Payment ($)'),
          h('input',{id:'acct-minpay',className:'input',type:'number',value:minimumPayment,onChange:e=>setMinimumPayment(e.target.value),placeholder:'e.g. 105.00',style:{width:'100%'},step:'0.01',min:'0'})
        ),
        type==='credit_card' && h('div',null,
          h('label',{htmlFor:'acct-limit',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Credit Limit ($)'),
          h('input',{id:'acct-limit',className:'input',type:'number',value:creditLimit,onChange:e=>setCreditLimit(e.target.value),placeholder:'e.g. 8000',style:{width:'100%'},step:'0.01',min:'0'})
        ),
        isDebtType && h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}},
          h('div',{style:{fontSize:12,fontWeight:600,color:'var(--accent2)',marginBottom:8}},'📋 Payment Plan (optional)'),
          h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
            h('div',{style:{flex:1,minWidth:120}},
              h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Planned Payment ($)'),
              h('input',{className:'input',type:'number',value:plannedPay,onChange:e=>setPlannedPay(e.target.value),placeholder:'e.g. 350',style:{width:'100%'},step:'25',min:'0'})
            ),
            h('div',{style:{flex:1,minWidth:120}},
              h('label',{style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Frequency'),
              h('select',{className:'input',value:payFreq,onChange:e=>setPayFreq(e.target.value),style:{width:'100%'}},
                h('option',{value:'monthly'},'Monthly'),
                h('option',{value:'biweekly'},'Bi-Weekly')
              )
            )
          ),
          +plannedPay>0 && payFreq==='biweekly' && h('div',{style:{fontSize:11,color:'var(--green)',marginTop:4}},'Effective: ~$'+Math.round(+plannedPay*26/12)+'/mo')
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetForm},'Cancel'),
          h('button',{className:'btn primary',onClick:save,disabled:!name.trim()}, editIdx!==null?'Update':'Add Account')
        )
      )
    )
  );
}

// ── Error Boundary ──────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError:false, error:null}; }
  static getDerivedStateFromError(error) { return {hasError:true, error}; }
  render() {
    if(this.state.hasError) {
      return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#0c1445',color:'#eef0ff',fontFamily:'-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif'}},
        h('div',{style:{textAlign:'center',maxWidth:420,padding:40}},
          h('img',{src:'images/mr-ambit/thinking.png',alt:'Mr. Ambit thinking',style:{width:100,height:100,objectFit:'contain',marginBottom:12}}),
          h('h2',{style:{marginBottom:12,fontSize:20}},'Something went wrong'),
          h('p',{style:{fontSize:14,color:'#c0c8e8',lineHeight:1.6,marginBottom:20}},
            'Ambit Budget encountered an error. Your data is safe — it\'s stored locally on your device.'),
          h('div',{style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
            h('button',{onClick:()=>window.location.reload(),
              style:{padding:'10px 20px',background:'#e8a020',color:'#fff',border:'none',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}},
              '🔄 Reload App'),
            h('button',{onClick:()=>{
              try {
                const raw = localStorage.getItem('budgetpro_v2');
                if(raw) {
                  const blob = new Blob([raw],{type:'application/json'});
                  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ambit-emergency-backup.json'; a.click();
                }
              } catch(e){}
            }, style:{padding:'10px 20px',background:'transparent',color:'#e8a020',border:'1px solid #e8a020',borderRadius:8,fontSize:14,cursor:'pointer',fontWeight:600}},
              '💾 Download Backup')
          ),
          h('details',{style:{marginTop:20,textAlign:'left',fontSize:12,color:'#9da5d0'}},
            h('summary',{style:{cursor:'pointer'}},'Error details'),
            h('pre',{style:{marginTop:8,padding:12,background:'rgba(255,255,255,0.05)',borderRadius:8,overflow:'auto',maxHeight:150,fontSize:11}},
              String(this.state.error))
          )
        )
      );
    }
    return this.props.children;
  }
}

// ── App Loader (IndexedDB async init) ───────────────────
function AppLoader() {
  const [ready, setReady] = useState(false);
  const [idbData, setIdbData] = useState(null);
  useEffect(()=>{
    AmbitDB.load().then(data=>{
      setIdbData(data);
      setReady(true);
    }).catch(()=>setReady(true));
  },[]);
  if(!ready) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)',color:'var(--text)',fontSize:16,fontFamily:'DM Sans, sans-serif'}},
    h('div',{style:{textAlign:'center'}},
      h('div',{style:{fontSize:32,marginBottom:8}},'🔮'),
      h('div',null,'Loading Ambit Budget...')
    )
  );
  return h(App, {idbData});
}

// ── Service Worker Registration ─────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Render ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(ErrorBoundary, null, h(AppLoader)));
</script>
</body>
</html>
