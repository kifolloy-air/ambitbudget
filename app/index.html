// ── Budget Page ─────────────────────────────────────────
function BudgetPage({categories, setCategories, transactions}) {
  const [expandedGroup, setExpandedGroup] = useState(null);
  const [selectedMonth, setSelectedMonth] = useState('all');
  const [drilldown, setDrilldown] = useState(null);

  // Get months with data
  const months = useMemo(()=>{
    const m = new Set();
    transactions.forEach(t=>{
      const ym = getYearMonth(t.date);
      if(ym) m.add(ym);
    });
    return [...m].sort();
  },[transactions]);

  // Filter transactions by selected month
  const filteredTxns = useMemo(()=>{
    if(selectedMonth==='all') return transactions;
    return transactions.filter(t=>getYearMonth(t.date)===selectedMonth);
  },[transactions, selectedMonth]);

  const numMonths = selectedMonth==='all' ? Math.max(months.length, 1) : 1;

  const grouped = useMemo(()=>{
    const g = {};
    categories.forEach(c=>{
      if(!g[c.group]) g[c.group]=[];
      g[c.group].push(c);
    });
    return g;
  },[categories]);

  const spendingCats = categories.filter(c=>c.catType!=='transfer');
  const totalBudget = spendingCats.reduce((s,c)=>s+(c.budget||0),0);
  const discBudget = spendingCats.filter(c=>c.catType==='discretionary').reduce((s,c)=>s+(c.budget||0),0);
  const fixedBudget = spendingCats.filter(c=>c.catType==='fixed').reduce((s,c)=>s+(c.budget||0),0);

  const updateBudget = (catName, val) => {
    setCategories(prev=>prev.map(c=>c.name===catName?{...c,budget:Math.max(0,+val)}:c));
  };

  // Actual spending by category (exclude transfers), using filtered transactions
  const actualByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount<0 && t.catType!=='transfer').forEach(t=>{
      m[t.category] = (m[t.category]||0) + Math.abs(t.amount);
    });
    return m;
  },[filteredTxns]);

  // Transactions by category for drilldown
  const txnsByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount<0 && t.catType!=='transfer').forEach(t=>{
      if(!m[t.category]) m[t.category]=[];
      m[t.category].push(t);
    });
    return m;
  },[filteredTxns]);

  // Actual income by category (positive amounts, exclude transfers)
  const incomeByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount>=0 && t.catType!=='transfer').forEach(t=>{
      m[t.category] = (m[t.category]||0) + t.amount;
    });
    return m;
  },[filteredTxns]);

  // Income transactions by category for drilldown
  const incomeTxnsByCategory = useMemo(()=>{
    const m = {};
    filteredTxns.filter(t=>t.amount>=0 && t.catType!=='transfer').forEach(t=>{
      if(!m[t.category]) m[t.category]=[];
      m[t.category].push(t);
    });
    return m;
  },[filteredTxns]);

  const totalIncome = Object.values(incomeByCategory).reduce((s,v)=>s+v,0);
  const totalExpenses = Object.values(actualByCategory).reduce((s,v)=>s+v,0);
  const totalIncomeDisplay = selectedMonth==='all' ? totalIncome/numMonths : totalIncome;
  const totalExpensesDisplay = selectedMonth==='all' ? totalExpenses/numMonths : totalExpenses;

  // Format month label
  const monthLabel = (ym) => {
    const [y,m] = ym.split('-');
    const names = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[+m]+' '+y;
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'💰 Budget Setup', h(InfoPill,{text:'Set monthly budget amounts for each category. The app tracks your actual spending against these budgets across all pages.'})),
        h('p',null,'Set monthly budget targets for each category.')
      ),
      months.length>0 && h('select',{className:'input',value:selectedMonth,onChange:e=>setSelectedMonth(e.target.value),style:{fontSize:13,padding:'8px 12px'}},
        h('option',{value:'all'},'All Months (Average)'),
        [...months].reverse().map(m=>h('option',{key:m,value:m},monthLabel(m)))
      )
    ),

    h('div',{className:'stats'},
      h(Stat,{label:'Income'+(selectedMonth==='all'?' Avg':''), value:fmt(totalIncomeDisplay), sub:selectedMonth==='all'?'/mo':'', color:'var(--green)'}),
      h(Stat,{label:'Expenses'+(selectedMonth==='all'?' Avg':''), value:fmt(totalExpensesDisplay), sub:selectedMonth==='all'?'/mo':'', color:'var(--red)'}),
      h(Stat,{label:'Net'+(selectedMonth==='all'?' Avg':''), value:fmt(totalIncomeDisplay-totalExpensesDisplay), color:totalIncomeDisplay-totalExpensesDisplay>=0?'var(--green)':'var(--red)'}),
      h(Stat,{label:'Expense Budget', value:fmt(totalBudget), sub:'/month', color:'var(--accent2)'}),
      h(Stat,{label: selectedMonth==='all'?'Months of Data':'Viewing', value: selectedMonth==='all'?numMonths:monthLabel(selectedMonth), color:'var(--blue)'})
    ),

    categories.length === 0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'💰'),
            h('p',null,'Create categories first on the Categories page, then come back here to set budgets.')
          )
        )
      : h('div',null,

          // ── Income Section ──
          grouped['Income'] && grouped['Income'].length>0 && h('div',{className:'card',style:{marginBottom:14}},
            h('h3',null, h('span',{className:'icon'},'📈'), 'Monthly Income',
              selectedMonth!=='all' && h('span',{style:{fontWeight:400,fontSize:12,color:'var(--card-text2)',marginLeft:8}},' — '+monthLabel(selectedMonth)),
              h(InfoPill,{text:'Your income categories and their monthly averages. Set expected amounts to help with balance forecasting on the Dashboard.'})
            ),
            grouped['Income'].map(c => {
              const actual = incomeByCategory[c.name]||0;
              const display = selectedMonth==='all' ? actual/numMonths : actual;
              const pct = (c.budget||0)>0 ? Math.min(display/(c.budget||1)*100, 100) : 0;
              const catTxns = incomeTxnsByCategory[c.name]||[];
              return h('div',{key:c.name,style:{marginBottom:10,padding:'8px 12px'}},
                h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
                  h('span',{style:{width:130,fontSize:13,fontWeight:500}}, c.name),
                  h('span',{style:{color:'var(--text2)',fontSize:13}},'$'),
                  h('input',{className:'input',type:'number',value:c.budget||0,
                    onChange:e=>updateBudget(c.name,e.target.value),
                    style:{width:90,padding:'5px 8px',fontSize:13}
                  }),
                  h('div',{style:{flex:1,minWidth:80}},
                    h('div',{className:'progress'},
                      h('div',{className:'progress-fill',style:{width:pct+'%',background:'var(--green)'}})
                    )
                  ),
                  h('span',{style:{fontSize:11,color:'var(--green)',minWidth:70,textAlign:'right'}},
                    fmt(display)+(selectedMonth==='all'?' avg':'')
                  ),
                  (c.budget||0)>0 && h('span',{style:{fontSize:11,color:'var(--text2)',minWidth:60,textAlign:'right'}},
                    'of ',fmt(c.budget),'/mo'
                  ),
                  catTxns.length>0 && h('button',{className:'btn sm',onClick:()=>setDrilldown({name:c.name,txns:catTxns,budget:c.budget||0,isIncome:true}),
                    style:{fontSize:10,padding:'3px 8px'}}, catTxns.length+' txn'+(catTxns.length===1?'':'s')+' ▸')
                )
              );
            })
          ),

          // ── Expenses Section ──
          h('div',{className:'card'},
            h('h3',null, h('span',{className:'icon'},'📊'), 'Monthly Expenses by Group',
              selectedMonth!=='all' && h('span',{style:{fontWeight:400,fontSize:12,color:'var(--card-text2)',marginLeft:8}},' — '+monthLabel(selectedMonth)),
              h(InfoPill,{text:'Budget vs actual for each expense group. Click a category row to see the transactions driving that number.'})
            ),
            Object.entries(grouped).filter(([grp])=>grp!=='Income').map(([grp, cats]) => {
              const grpBudget = cats.reduce((s,c)=>s+(c.budget||0),0);
              const grpActual = cats.reduce((s,c)=>s+(actualByCategory[c.name]||0),0);
              const grpDisplay = selectedMonth==='all' ? grpActual/numMonths : grpActual;
              const isOpen = expandedGroup===grp;

              return h('div',{key:grp,style:{marginBottom:8}},
                h('div',{...a11yClick(()=>setExpandedGroup(isOpen?null:grp), (isOpen?'Collapse':'Expand')+' '+grp+' group'), 'aria-expanded':isOpen, style:{
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'12px 16px',background:'var(--surface2)',borderRadius:8,cursor:'pointer',
                  border:'1px solid var(--border)',flexWrap:'wrap',gap:8
                }},
                  h('span',{style:{fontWeight:600,color:GROUP_COLORS[grp]||'var(--text)'}}, (isOpen?'▼':'▶')+' '+grp),
                  h('div',{style:{display:'flex',gap:16,alignItems:'center'}},
                    h('span',{style:{fontSize:12,color:'var(--text2)'}},
                      selectedMonth==='all'?'Avg: ':'Spent: ',
                      h('strong',{style:{color:grpDisplay>grpBudget?'var(--red)':'var(--green)'}}, fmt(grpDisplay)),
                      selectedMonth==='all'?'/mo':''
                    ),
                    h('span',{style:{fontWeight:600}}, fmt(grpBudget), '/mo')
                  )
                ),
                isOpen && h('div',{style:{padding:'10px 12px 4px 20px'}},
                  cats.map(c => {
                    const actual = actualByCategory[c.name]||0;
                    const display = selectedMonth==='all' ? actual/numMonths : actual;
                    const pct = (c.budget||0)>0 ? Math.min(display/(c.budget||1)*100, 100) : 0;
                    const catTxns = txnsByCategory[c.name]||[];
                    return h('div',{key:c.name,style:{marginBottom:10}},
                      h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
                        h(TypeTag,{catType:c.catType}),
                        h('span',{style:{width:130,fontSize:13}}, c.name),
                        h('span',{style:{color:'var(--text2)',fontSize:13}},'$'),
                        h('input',{className:'input',type:'number',value:c.budget||0,
                          onChange:e=>updateBudget(c.name,e.target.value),
                          style:{width:90,padding:'5px 8px',fontSize:13}
                        }),
                        h('div',{style:{flex:1,minWidth:80}},
                          h('div',{className:'progress'},
                            h('div',{className:'progress-fill',style:{width:pct+'%',background:display>(c.budget||0)?'var(--red)':'var(--accent)'}})
                          )
                        ),
                        h('span',{style:{fontSize:11,color:display>(c.budget||0)?'var(--red)':'var(--text2)',minWidth:70,textAlign:'right'}},
                          fmt(display)+(selectedMonth==='all'?' avg':'')
                        ),
                        catTxns.length>0 && h('button',{className:'btn sm',onClick:()=>setDrilldown({name:c.name,txns:catTxns,budget:c.budget||0}),
                          style:{fontSize:10,padding:'3px 8px'}}, catTxns.length+' txn'+(catTxns.length===1?'':'s')+' ▸')
                      )
                    );
                  })
                )
              );
            })
          )
        ),

    // Drilldown modal
    drilldown && h(Modal, {onClose:()=>setDrilldown(null)},
      h('h3',null, '🔍 ', drilldown.name,
        selectedMonth!=='all' && h('span',{style:{fontWeight:400,fontSize:13,color:'var(--card-text2)'}},' — '+monthLabel(selectedMonth))
      ),
      h('div',{style:{display:'flex',gap:12,marginBottom:14}},
        h('div',{style:{flex:1,textAlign:'center',padding:10,background:drilldown.isIncome?'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:drilldown.isIncome?'var(--green)':'var(--red)'}},fmt(drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},drilldown.isIncome?'Received':'Spent')
        ),
        drilldown.budget>0 && h('div',{style:{flex:1,textAlign:'center',padding:10,background:'rgba(64,192,128,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:'var(--accent2)'}},fmt(drilldown.budget)),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},'Budget')
        ),
        drilldown.budget>0 && h('div',{style:{flex:1,textAlign:'center',padding:10,background: (drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0)) >=0 ? 'rgba(64,192,128,0.06)':'rgba(224,80,80,0.06)',borderRadius:8}},
          h('div',{style:{fontSize:20,fontWeight:700,color:(drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))>=0?'var(--green)':'var(--red)'}},
            (drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0))>=0?'+':'-',
            fmt(Math.abs(drilldown.budget - drilldown.txns.reduce((s,t)=>s+Math.abs(t.amount),0)))
          ),
          h('div',{style:{fontSize:11,color:'var(--card-text2)'}},'Remaining')
        )
      ),
      h('div',{style:{maxHeight:350,overflowY:'auto'}},
        h('table',{className:'table'},
          h('thead',null,h('tr',null,
            h('th',null,'Date'), h('th',null,'Payee'), h('th',null,'Amount')
          )),
          h('tbody',null, drilldown.txns.sort((a,b)=>safeDate(b.date)-safeDate(a.date)).map((t,i)=>
            h('tr',{key:i},
              h('td',{style:{fontSize:12,color:'var(--card-text2)'}},t.date),
              h('td',{style:{fontWeight:500}},t.cleanName),
              h('td',{style:{fontWeight:600}},fmt(t.amount))
            )
          ))
        )
      ),
      h('div',{style:{textAlign:'right',marginTop:12}},
        h('button',{className:'btn',onClick:()=>setDrilldown(null)},'Close')
      )
    )
  );
}

// ── Dashboard Page ──────────────────────────────────────
function DashboardPage({categories, transactions, catMap, accounts, dictionary, setDictionary, onStartTour}) {
  const [selectedMonth, setSelectedMonth] = useState('all');
  const [selectedAcct, setSelectedAcct] = useState('all');
  const [drilldown, setDrilldown] = useState(null);
  const [editingDueDay, setEditingDueDay] = useState(null);
  const [dueDayInput, setDueDayInput] = useState('');
  const [dueDayFreqInput, setDueDayFreqInput] = useState('monthly');
  const [expandedCats, setExpandedCats] = useState(new Set());
  const [expandedPayee, setExpandedPayee] = useState(null);
  const toggleCat = k => setExpandedCats(prev => { const s = new Set(prev); s.has(k)?s.delete(k):s.add(k); return s; });

  // ── Bills & Budget Window (always current month) ──
  const bbWindow = useMemo(()=>{
    const now = new Date();
    const curYear = now.getFullYear();
    const curMonth = now.getMonth()+1;
    const currentYM = curYear+'-'+String(curMonth).padStart(2,'0');
    const todayDay = now.getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const monthLabel = monthNames[curMonth-1]+' '+curYear;

    const currentMonthTxns = transactions.filter(t=>getYearMonth(t.date)===currentYM);

    // Historical data by payee
    const historyByPayee = {};
    transactions.forEach(t=>{
      if(!t.cleanName) return;
      const p = parseDateParts(t.date);
      if(!p) return;
      if(!historyByPayee[t.cleanName]) historyByPayee[t.cleanName]=[];
      historyByPayee[t.cleanName].push({day:p.day, amount:Math.abs(t.amount), ym:getYearMonth(t.date)});
    });

    const getExpectedDay = (cleanName, dictEntry) => {
      if(dictEntry && dictEntry.dueDay && dictEntry.dueDay>=1 && dictEntry.dueDay<=31) return dictEntry.dueDay;
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return null;
      const avg = Math.round(hist.reduce((s,h)=>s+h.day,0)/hist.length);
      return Math.min(avg,28);
    };

    const getExpectedAmount = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      return hist.reduce((s,h)=>s+h.amount,0)/hist.length;
    };

    const getMonthlyAvg = (cleanName) => {
      const hist = historyByPayee[cleanName]||[];
      if(hist.length===0) return 0;
      const months = new Set(hist.map(h=>h.ym));
      return months.size>0 ? hist.reduce((s,h)=>s+h.amount,0)/months.size : 0;
    };

    const dictByCleanName = {};
    (dictionary||[]).forEach(d=>{if(d.cleanName) dictByCleanName[d.cleanName]=d;});

    // Determine if a payee is expected this month based on frequency
    const isExpectedThisMonth = (rule) => {
      const freq = rule.frequency || 'monthly';
      if(freq==='monthly') return true;
      // Check history: what months does this payee typically appear?
      const hist = historyByPayee[rule.cleanName]||[];
      if(hist.length===0) return true; // No history, assume it could be this month
      const historicalMonths = [...new Set(hist.map(h=>{const parts=h.ym.split('-');return +parts[1];}))];
      if(freq==='quarterly') {
        // Expected if current month matches one of the historical months (mod 3 pattern)
        return historicalMonths.some(m=>m%3===curMonth%3) || historicalMonths.includes(curMonth);
      }
      if(freq==='biannual') {
        // Expected every 6 months — check if this month matches historical pattern
        return historicalMonths.some(m=>m%6===curMonth%6) || historicalMonths.includes(curMonth);
      }
      if(freq==='annual') {
        return historicalMonths.includes(curMonth);
      }
      return true;
    };

    // Get frequency label for display
    const freqLabel = (rule) => {
      const f = rule.frequency||'monthly';
      if(f==='quarterly') return 'Quarterly';
      if(f==='biannual') return 'Biannual';
      if(f==='annual') return 'Annual';
      return null;
    };

    // Income
    const incomeCats = categories.filter(c=>c.group==='Income');
    const incomeData = incomeCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const payees = rules.filter(rule=>{
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name && t.amount>=0);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name && t.amount>=0);
        const received = txns.length>0;
        const receivedAmount = txns.reduce((s,t)=>s+t.amount,0);
        const receivedDate = received?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule);
        const expectedAmount = getExpectedAmount(cn);
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, received, receivedAmount, receivedDate, expectedDay, expectedAmount, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      const totalReceived = payees.filter(p=>p.received).reduce((s,p)=>s+p.receivedAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      return {...cat, payees, totalReceived, totalExpected};
    }).filter(c=>c.payees.length>0);

    // Fixed bills
    const fixedCats = categories.filter(c=>c.catType==='fixed' && c.group!=='Income');
    const billsData = fixedCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const payees = rules.filter(rule=>{
        // Always show if paid this month; otherwise only show if expected this month
        const txns = currentMonthTxns.filter(t=>t.cleanName===rule.cleanName && t.category===cat.name);
        return txns.length>0 || isExpectedThisMonth(rule);
      }).map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name);
        const isPaid = txns.length>0;
        const paidAmount = isPaid?txns.reduce((s,t)=>s+Math.abs(t.amount),0):0;
        const paidDate = isPaid?txns[0].date:null;
        const expectedDay = getExpectedDay(cn, rule);
        const expectedAmount = getExpectedAmount(cn);
        const isUpcoming = !isPaid && expectedDay!==null;
        const isPastDue = isUpcoming && expectedDay<todayDay;
        const freq = freqLabel(rule);
        return {cleanName:cn, keyword:rule.keyword, isPaid, paidAmount, paidDate, expectedDay, expectedAmount, isUpcoming, isPastDue, dueDay:rule.dueDay||null, freq, frequency:rule.frequency||'monthly', txns};
      });
      const totalPaid = payees.filter(p=>p.isPaid).reduce((s,p)=>s+p.paidAmount,0);
      const totalExpected = payees.reduce((s,p)=>s+p.expectedAmount,0);
      const allPaid = payees.length>0 && payees.every(p=>p.isPaid);
      return {...cat, payees, totalPaid, totalExpected, allPaid};
    }).filter(c=>c.payees.length>0);

    // Discretionary
    const discCats = categories.filter(c=>c.catType==='discretionary' && c.group!=='Income');
    const discretionaryData = discCats.map(cat=>{
      const rules = (dictionary||[]).filter(d=>d.category===cat.name);
      const payees = rules.map(rule=>{
        const cn = rule.cleanName;
        const txns = currentMonthTxns.filter(t=>t.cleanName===cn && t.category===cat.name && t.amount<0);
        const actualSpend = txns.reduce((s,t)=>s+Math.abs(t.amount),0);
        const monthlyAvg = getMonthlyAvg(cn);
        const delta = actualSpend - monthlyAvg;
        return {cleanName:cn, actualSpend, monthlyAvg, delta, txnCount:txns.length, txns};
      }).filter(p=>p.actualSpend>0||p.monthlyAvg>0);
      const catActual = currentMonthTxns.filter(t=>t.category===cat.name&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
      const catBudget = cat.budget||0;
      const overBudget = catBudget>0 && catActual>catBudget;
      const budgetPct = catBudget>0 ? Math.round(catActual/catBudget*100) : 0;
      const budgetRemaining = catBudget - catActual;
      return {...cat, payees, catActual, catBudget, overBudget, budgetPct, budgetRemaining};
    }).filter(c=>c.payees.length>0||c.catActual>0);

    // ── Forecast ──
    const currentBalance = accounts.reduce((s,a)=>s+(a.startingBalance||0),0)
      + transactions.reduce((s,t)=>s+t.amount,0);

    const remainingIncome = incomeData.reduce((s,cat)=>
      s + cat.payees.filter(p=>!p.received).reduce((s2,p)=>s2+p.expectedAmount,0), 0);

    const remainingBills = billsData.reduce((s,cat)=>
      s + cat.payees.filter(p=>!p.isPaid).reduce((s2,p)=>s2+p.expectedAmount,0), 0);

    const totalDiscBudget = discCats.reduce((s,c)=>s+(c.budget||0),0);
    const totalDiscSpent = discretionaryData.reduce((s,c)=>s+c.catActual,0);
    const remainingDiscBudget = Math.max(0, totalDiscBudget - totalDiscSpent);

    const endOfMonthBalance = currentBalance + remainingIncome - remainingBills - remainingDiscBudget;

    const nextMonthIncome = incomeData.reduce((s,cat)=>s+cat.totalExpected,0);
    const nextMonthBills = billsData.reduce((s,cat)=>s+cat.totalExpected,0);
    const nextMonthBalance = endOfMonthBalance + nextMonthIncome - nextMonthBills - totalDiscBudget;

    return {monthLabel, curMonth, incomeData, billsData, discretionaryData,
      currentBalance, remainingIncome, remainingBills, remainingDiscBudget,
      endOfMonthBalance, nextMonthBalance, totalDiscBudget};
  },[transactions, categories, dictionary, accounts]);

  const openDueDayEditor = (keyword, currentDueDay, currentFreq) => {
    setEditingDueDay(keyword);
    setDueDayInput(currentDueDay ? String(currentDueDay) : '');
    setDueDayFreqInput(currentFreq || 'monthly');
  };

  const saveDueDay = () => {
    const val = parseInt(dueDayInput);
    const day = (val>=1 && val<=31) ? val : null;
    const freq = dueDayFreqInput==='monthly' ? undefined : dueDayFreqInput;
    setDictionary(prev=>prev.map(d=>d.keyword===editingDueDay?{...d, dueDay:day, frequency:freq}:d));
    setEditingDueDay(null);
  };

  const months = useMemo(()=>{
    const m = new Set();
    transactions.forEach(t=>{
      const ym = getYearMonth(t.date);
      if(ym) m.add(ym);
    });
    return [...m].sort();
  },[transactions]);

  const filteredTxns = useMemo(()=>{
    let arr = transactions;
    if(selectedMonth!=='all') arr = arr.filter(t=> getYearMonth(t.date) === selectedMonth);
    if(selectedAcct!=='all') arr = arr.filter(t=> t.accountId === selectedAcct);
    return arr;
  },[transactions, selectedMonth, selectedAcct]);

  const numMonths = selectedMonth==='all' ? Math.max(months.length,1) : 1;

  // Separate transfers from spending
  const spendingTxns = filteredTxns.filter(t=>t.catType!=='transfer');
  const transferTxns = filteredTxns.filter(t=>t.catType==='transfer');
  const expenses = spendingTxns.filter(t=>t.amount<0);
  const income = spendingTxns.filter(t=>t.amount>=0);
  const totalExp = expenses.reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const totalXfer = transferTxns.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const spendingCats = categories.filter(c=>c.catType!=='transfer');
  const totalBudget = spendingCats.reduce((s,c)=>s+(c.budget||0),0) * numMonths;

  // Category analysis (exclude transfers)
  const catAnalysis = useMemo(()=>{
    const byCategory = {};
    expenses.forEach(t=>{
      if(!byCategory[t.category]) byCategory[t.category]={spent:0,txns:[]};
      byCategory[t.category].spent += Math.abs(t.amount);
      byCategory[t.category].txns.push(t);
    });

    return spendingCats.map(c=>{
      const data = byCategory[c.name] || {spent:0,txns:[]};
      const budget = (c.budget||0)*numMonths;
      const avg = data.spent/numMonths;
      const diff = budget - data.spent;
      const pct = budget>0 ? (data.spent/budget*100) : 0;
      let status = '✅', sColor = 'var(--green)';
      if(pct>120) { status='🔴'; sColor='var(--red)'; }
      else if(pct>100) { status='🟡'; sColor='var(--yellow)'; }
      else if(pct<50 && budget>0) { status='💚'; }
      return { ...c, spent:data.spent, budget, avg, diff, pct, status, sColor, txns:data.txns };
    }).filter(c=>c.spent>0||c.budget>0).sort((a,b)=>b.spent-a.spent);
  },[spendingCats, expenses, numMonths]);

  // Group analysis (exclude transfers)
  const grpAnalysis = useMemo(()=>{
    const g = {};
    expenses.forEach(t=>{
      if(!g[t.group]) g[t.group]=0;
      g[t.group] += Math.abs(t.amount);
    });
    return Object.entries(g).sort((a,b)=>b[1]-a[1]);
  },[expenses]);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📊 Dashboard', h(InfoPill,{text:'Overview of your spending, bills, and balance projections. Use the filters above to view a specific account or month. Click any category in the table below to see individual transactions.'})),
        h('p',null,'Budget performance and spending analysis.')
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        onStartTour && h('button',{className:'btn sm',onClick:onStartTour,style:{fontSize:12}},'🎯 Tour'),
        accounts.length>0 && h('select',{className:'input',value:selectedAcct,onChange:e=>setSelectedAcct(e.target.value)},
          h('option',{value:'all'},'All Accounts'),
          accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))
        ),
        h('select',{className:'input',value:selectedMonth,onChange:e=>setSelectedMonth(e.target.value)},
          h('option',{value:'all'},'All Time ('+months.length+' months)'),
          months.map(m=>h('option',{key:m,value:m}, new Date(+m.split('-')[0], +m.split('-')[1]-1, 1).toLocaleDateString('en-US',{year:'numeric',month:'long'})))
        )
      )
    ),

    // Top stats
    h('div',{className:'stats'},
      h(Stat,{label:'Income', value:fmt(totalInc), color:'var(--green)'}),
      h(Stat,{label:'Expenses', value:fmt(totalExp), color:'var(--red)'}),
      h(Stat,{label:'Transfers', value:fmt(totalXfer), color:'var(--pink)'}),
      h(Stat,{label:'Net', value:fmt(totalInc-totalExp), color:totalInc-totalExp>=0?'var(--green)':'var(--red)'}),
      h(Stat,{label:'Budget', value:totalBudget>0?fmt(totalBudget):'—', sub:totalBudget>0?(totalExp<=totalBudget?'Under ✅':'Over ⚠️'):'Not set', color:'var(--accent2)'})
    ),

    // ── Balance Forecast ──
    accounts.length>0 && h('div',{className:'card',style:{marginBottom:14,padding:'10px 16px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
        h('h3',{style:{margin:0,fontSize:13}}, h('span',{className:'icon'},'🔮'), 'Balance Forecast', h(InfoPill,{text:'Projects your balance at end of month and next month. Uses your current balance, expected remaining income, unpaid bills, and remaining discretionary budget. Red means projected negative.'})),
        h('span',{style:{fontSize:10,color:'var(--card-text2)'}},'budget + expected bills')
      ),
      // Top-line numbers
      h('div',{style:{display:'flex',gap:0,alignItems:'center'}},
        // Current Balance
        h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px'}},
          h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'Current'),
          h('div',{style:{fontSize:18,fontWeight:700,color:bbWindow.currentBalance>=0?'var(--green)':'var(--red)'}},
            (bbWindow.currentBalance<0?'-':'')+fmt(bbWindow.currentBalance))
        ),
        h('div',{style:{width:1,background:'var(--border)',alignSelf:'stretch',margin:'2px 0'}}),
        // End of Month
        h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px',
          background:bbWindow.endOfMonthBalance<0?'rgba(224,80,80,0.08)':'transparent',
          borderRadius:6}},
          h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'End of Month'),
          h('div',{style:{fontSize:18,fontWeight:700,color:bbWindow.endOfMonthBalance>=0?'var(--green)':'var(--red)'}},
            (bbWindow.endOfMonthBalance<0?'-':'')+fmt(bbWindow.endOfMonthBalance),
            bbWindow.endOfMonthBalance<0&&h('span',{style:{fontSize:10,marginLeft:4}},'⚠️'))
        ),
        h('div',{style:{width:1,background:'var(--border)',alignSelf:'stretch',margin:'2px 0'}}),
        // Next Month
        h('div',{style:{flex:1,textAlign:'center',padding:'4px 6px',
          background:bbWindow.nextMonthBalance<0?'rgba(224,80,80,0.08)':'transparent',
          borderRadius:6}},
          h('div',{style:{fontSize:10,color:'var(--card-text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:2}},'Next Month'),
          h('div',{style:{fontSize:18,fontWeight:700,color:bbWindow.nextMonthBalance>=0?'var(--green)':'var(--red)'}},
            (bbWindow.nextMonthBalance<0?'-':'')+fmt(bbWindow.nextMonthBalance),
            bbWindow.nextMonthBalance<0&&h('span',{style:{fontSize:10,marginLeft:4}},'⚠️'))
        )
      ),
      // Breakdown detail
      h('div',{style:{display:'flex',gap:12,marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)',flexWrap:'wrap',justifyContent:'center'}},
        h('span',{style:{fontSize:10,color:'var(--green)'}}, '+Income: ',h('strong',null,fmt(bbWindow.remainingIncome))),
        h('span',{style:{fontSize:10,color:'var(--red)'}}, '-Bills: ',h('strong',null,fmt(bbWindow.remainingBills))),
        h('span',{style:{fontSize:10,color:'var(--yellow)'}}, '-Disc: ',h('strong',null,fmt(bbWindow.remainingDiscBudget)))
      )
    ),

    transactions.length===0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'📊'),
            h('p',null,'Import transactions to see your spending dashboard.')
          )
        )
      : h('div',null,
          // Main layout: left analysis + right bills window
          h('div',{className:'dash-layout',style:{display:'flex',gap:16,marginBottom:20,flexWrap:'wrap',alignItems:'flex-start'}},

            // Left column: Spending analysis
            h('div',{className:'dash-left',style:{flex:1,minWidth:300,display:'flex',flexDirection:'column',gap:16}},
              h('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},
                h('div',{className:'card',style:{flex:1,minWidth:250}},
                  h('h3',null, h('span',{className:'icon'},'🏷'), 'Spending by Group', h(InfoPill,{text:'Shows how your spending breaks down by category group (Housing, Food, Transport, etc.) as a percentage of total expenses.'})),
                  grpAnalysis.map(([grp,amt])=>{
                    const pct = totalExp>0 ? (amt/totalExp*100) : 0;
                    return h('div',{key:grp,style:{marginBottom:10}},
                      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
                        h(Tag,{color:GROUP_COLORS[grp]||'#8b90a5'},grp),
                        h('span',{style:{fontSize:12}}, fmt(amt), h('span',{style:{color:'var(--text2)',marginLeft:4}},Math.round(pct)+'%'))
                      ),
                      h('div',{className:'progress'},
                        h('div',{className:'progress-fill',style:{width:pct+'%',background:GROUP_COLORS[grp]||'#8b90a5'}})
                      )
                    );
                  })
                ),
                h('div',{className:'card',style:{flex:1,minWidth:250}},
                  h('h3',null, h('span',{className:'icon'},'📈'), 'Spending Breakdown', h(InfoPill,{text:'Compares your discretionary vs fixed spending. Discretionary is what you can control; fixed bills are recurring obligations.'})),
                  h('div',{style:{display:'flex',gap:16,justifyContent:'center',padding:'20px 0',flexWrap:'wrap'}},
                    (()=>{
                      const discSpent = expenses.filter(t=>t.catType==='discretionary').reduce((s,t)=>s+Math.abs(t.amount),0);
                      const fixedSpent = expenses.filter(t=>t.catType==='fixed').reduce((s,t)=>s+Math.abs(t.amount),0);
                      return [
                        h('div',{key:'disc',style:{textAlign:'center'}},
                          h('div',{style:{fontSize:26,fontWeight:700,color:'var(--yellow)'}},fmt(discSpent)),
                          h('div',{style:{fontSize:12,color:'var(--text2)'}},'Discretionary'),

// ── Accounts Page ──────────────────────────────────────
function AccountsPage({accounts, setAccounts, transactions, setTransactions, catMap, showToast}) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState('');
  const [type, setType] = useState('checking');
  const [startBal, setStartBal] = useState(0);
  const [last4, setLast4] = useState('');
  const [editIdx, setEditIdx] = useState(null);

  const resetForm = () => { setName(''); setType('checking'); setStartBal(0); setLast4(''); setEditIdx(null); setShowAdd(false); };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      setAccounts(prev=>prev.map((a,i)=>i===editIdx?{...a, name:name.trim(), type, startingBalance:+startBal, last4:last4.trim()}:a));
      showToast('✅ Updated: '+name.trim());
    } else {
      setAccounts(prev=>[...prev, {id:Date.now()+'_'+Math.random().toString(36).slice(2,6), name:name.trim(), type, startingBalance:+startBal, last4:last4.trim()}]);
      showToast('✅ Added: '+name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const acct = accounts[idx];
    const txnCount = transactions.filter(t=>t.accountId===acct.id).length;
    if(txnCount>0 && !confirm(`"${acct.name}" has ${txnCount} transaction(s). Delete anyway?`)) return;
    setAccounts(prev=>prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: '+acct.name);
  };

  const startEdit = (idx) => {
    setName(accounts[idx].name);
    setType(accounts[idx].type);
    setStartBal(accounts[idx].startingBalance || 0);
    setLast4(accounts[idx].last4 || '');
    setEditIdx(idx);
    setShowAdd(true);
  };

  // Per-account balances
  const balances = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{m[a.id]={income:0,expense:0,transfers:0};});
    transactions.forEach(t=>{
      if(!m[t.accountId]) return;
      if(t.catType==='transfer') {
        m[t.accountId].transfers += t.amount;
      } else if(t.amount>=0) {
        m[t.accountId].income += t.amount;
      } else {
        m[t.accountId].expense += Math.abs(t.amount);
      }
    });
    return m;
  },[accounts, transactions]);

  // Find unpaired transfer transactions
  const unpairedTransfers = useMemo(()=>{
    const linkedIds = new Set(transactions.filter(t=>t.linkedTxnId).map(t=>t.linkedTxnId));
    return transactions.filter(t=>{
      const cat = catMap[t.category];
      const isTransfer = t.catType==='transfer' || (cat && cat.catType==='transfer');
      return isTransfer && !t.linkedTxnId && !linkedIds.has(t.id);
    });
  },[transactions, catMap]);

  // Retroactively pair unpaired transfers
  const pairTransfers = () => {
    const paired = [];
    const acctLast4 = {};
    accounts.forEach(a=>{ if(a.last4 && a.last4.length>=3) acctLast4[a.last4]=a; });

    for(const txn of unpairedTransfers) {
      // Only pair if we can confirm the destination by last4 match in description
      let dest = null;
      for(const [digits, acct] of Object.entries(acctLast4)) {
        if(acct.id !== txn.accountId && txn.description.toUpperCase().includes(digits)) {
          dest = acct; break;
        }
      }
      // No fallback guessing — if we can't confirm by account number, skip it
      if(dest) {
        const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
        paired.push({
          original: txn,
          pair: {
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount,
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===txn.accountId)?.name||'Other')),
          },
          destName: dest.name,
          linkedId
        });
      }
    }

    if(paired.length===0) {
      showToast('⚠️ No unpaired transfers found that can be matched');
      return;
    }

    const summary = paired.map(p=>p.original.cleanName+' → '+p.destName).join('\n');
    if(!confirm('Create '+paired.length+' paired transfer(s)?\n\n'+summary)) return;

    // Update originals with linkedTxnId and add paired entries
    setTransactions(prev=>{
      const updates = new Map(paired.map(p=>[p.original.id, p.linkedId]));
      const updated = prev.map(t=>updates.has(t.id)?{...t, linkedTxnId:updates.get(t.id)}:t);
      return [...updated, ...paired.map(p=>p.pair)];
    });
    showToast('✅ Created '+paired.length+' paired transfer(s)');
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'🏦 Accounts', h(InfoPill,{text:'Track your bank accounts with starting balances. The app calculates current balances from imported transactions. Use Reconcile to verify your balance matches your bank statement.'})),
        h('p',null,'Manage your bank accounts. Each import targets a specific account.')
      ),
      h('div',{style:{display:'flex',gap:8}},
        unpairedTransfers.length>0 && h('button',{className:'btn',onClick:pairTransfers,style:{color:'var(--pink)',borderColor:'var(--pink)'}}, '↔ Pair '+unpairedTransfers.length+' Transfer'+(unpairedTransfers.length===1?'':'s')),
        h('button',{className:'btn primary',onClick:()=>{resetForm();setShowAdd(true);}},'+ New Account')
      )
    ),

    h('div',{className:'stats'},
      h(Stat,{label:'Accounts', value:accounts.length, color:'var(--accent2)'}),
      h(Stat,{label:'Checking', value:accounts.filter(a=>a.type==='checking').length, color:'var(--blue)'}),
      h(Stat,{label:'Savings', value:accounts.filter(a=>a.type==='savings').length, color:'var(--pink)'})
    ),

    accounts.length===0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'🏦'),
            h('p',null,'No accounts yet. Add your checking and savings accounts to start tracking.')
          )
        )
      : h('div',{style:{display:'flex',gap:16,flexWrap:'wrap'}},
          accounts.map((a,i) => {
            const bal = balances[a.id]||{income:0,expense:0,transfers:0};
            const net = bal.income - bal.expense + bal.transfers;
            const runningBal = (a.startingBalance || 0) + net;
            const txnCount = transactions.filter(t=>t.accountId===a.id).length;
            return h('div',{key:a.id, className:'card', style:{flex:1,minWidth:280}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
                h('div',null,
                  h('div',{style:{fontSize:17,fontWeight:600}}, a.name),
                  h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}}, a.type==='checking'?'🏦 Checking':'💰 Savings', a.last4 ? ' ••••'+a.last4 : '')
                ),
                h('div',{style:{display:'flex',gap:4}},
                  h('button',{className:'btn sm',onClick:()=>startEdit(i)},'✎'),
                  h('button',{className:'table del-btn',onClick:()=>del(i)},'×')
                )
              ),
              h('div',{style:{textAlign:'center',padding:'12px 0',marginBottom:10,background:'rgba(232,160,32,0.06)',borderRadius:8}},
                h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:4}},'Current Balance'),
                h('div',{style:{fontSize:26,fontWeight:700,color:runningBal>=0?'var(--green)':'var(--red)'}}, (runningBal<0?'-':'')+fmt(runningBal))
              ),
              h('div',{style:{display:'flex',gap:14,marginBottom:10,flexWrap:'wrap'}},
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Starting'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--accent2)'}},fmt(a.startingBalance||0))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Income'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--green)'}},fmt(bal.income))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Expenses'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--red)'}},fmt(bal.expense))
                ),
                h('div',null,
                  h('div',{style:{fontSize:10,color:'var(--text2)',textTransform:'uppercase'}},'Transfers'),
                  h('div',{style:{fontSize:15,fontWeight:600,color:'var(--pink)'}},fmt(Math.abs(bal.transfers)))
                )
              ),
              h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',justifyContent:'space-between'}},
                h('span',{style:{fontSize:12,color:'var(--text2)'}},txnCount+' transactions'),
                h('span',{style:{fontSize:13,fontWeight:600,color:'var(--text2)'}}, 'Net Activity: '+(net>=0?'+':'')+fmt(Math.abs(net)))
              )
            );
          })
        ),

    showAdd && h(Modal,{onClose:resetForm},
      h('h3',null, editIdx!==null?'✏️ Edit Account':'➕ New Account'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',null,
          h('label',{htmlFor:'acct-name',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Name'),
          h('input',{id:'acct-name',className:'input',value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. Chase Checking',style:{width:'100%'},autoFocus:true})
        ),
        h('div',null,
          h('label',{htmlFor:'acct-type',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Account Type'),
          h('select',{id:'acct-type',className:'input',value:type,onChange:e=>setType(e.target.value),style:{width:'100%'}},
            h('option',{value:'checking'},'Checking'),
            h('option',{value:'savings'},'Savings')
          )
        ),
        h('div',null,
          h('label',{htmlFor:'acct-last4',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Last 4 Digits of Account Number'),
          h('input',{id:'acct-last4',className:'input',value:last4,onChange:e=>setLast4(e.target.value.replace(/\D/g,'').slice(0,4)),placeholder:'e.g. 3989',style:{width:'100%'},maxLength:4}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}},'Used to auto-detect transfers in bank descriptions (e.g. "ONLINE TRANSFER TO XXXXX3989").')
        ),
        h('div',null,
          h('label',{htmlFor:'acct-balance',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Starting Balance ($)'),
          h('input',{id:'acct-balance',className:'input',type:'number',value:startBal,onChange:e=>setStartBal(e.target.value),placeholder:'e.g. 5000.00',style:{width:'100%'},step:'0.01'}),
          h('div',{style:{fontSize:11,color:'var(--text2)',marginTop:4}},'Enter the account balance before your earliest imported transaction.')
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetForm},'Cancel'),
          h('button',{className:'btn primary',onClick:save,disabled:!name.trim()}, editIdx!==null?'Update':'Add Account')
        )
      )
    )
  );
}

// ── Render ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
