<!DOCTYPE html>
<html lang="en">

<title>Ambit Budget Pro</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1445;
  --surface: #fdf6e3;
  --surface2: #f5ecd0;
  --border: #e8dbb8;
  --text: #eef0ff;
  --text2: #9da5d0;
  --card-text: #2a2520;
  --card-text2: #6b6356;
  --accent: #e8a020;
  --accent2: #f0c050;
  --green: #40c080;
  --red: #e05050;
  --yellow: #e8a020;
  --orange: #e07828;
  --blue: #5090e8;
  --pink: #d060a0;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, select, textarea, button { font-family: inherit; }
code { font-family: 'JetBrains Mono', monospace; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #101850; border-right: 1px solid #2a3580; padding: 20px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; color: var(--text); }
.main { flex: 1; margin-left: 220px; padding: 28px 36px; min-height: 100vh; }

/* Mode tabs (Demo / My Budget) */
.mode-tabs { display: flex; gap: 0; margin-bottom: 0; padding: 0 20px 16px; }
.mode-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border-radius: 8px; transition: all 0.15s; color: var(--text2); background: transparent; border: 1px solid transparent; }
.mode-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.mode-tab.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-color: rgba(232,160,32,0.25); }
.mode-tab .mode-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.mode-tab .mode-dot.demo { background: var(--blue); }
.mode-tab .mode-dot.mine { background: var(--green); }
.demo-banner { background: rgba(80,144,232,0.1); border: 1px solid rgba(80,144,232,0.2); border-radius: 8px; padding: 8px 14px; margin-bottom: 16px; font-size: 12px; color: var(--blue); display: flex; align-items: center; gap: 8px; }
.demo-banner .dismiss { cursor: pointer; margin-left: auto; opacity: 0.6; font-size: 14px; }

.logo { padding: 0 20px 24px; font-size: 20px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
.logo span { color: var(--text2); font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: rgba(232,160,32,0.08); }
.nav-item.active { color: var(--accent2); background: rgba(232,160,32,0.12); border-left-color: var(--accent); font-weight: 600; }
.nav-item .icon { font-size: 16px; width: 22px; text-align: center; }

.nav-sep { height: 1px; background: var(--border); margin: 12px 20px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--card-text); }
.card h3 .icon { font-size: 16px; }

/* Stat cards */
.stats { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; flex: 1; min-width: 120px; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.stat .label { font-size: 10px; color: var(--card-text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.stat .value { font-size: 18px; font-weight: 700; }
.stat .sub { font-size: 10px; color: var(--card-text2); margin-top: 1px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--card-text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--border); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: #d09018; }
.btn.green { background: #40c080; border-color: #40c080; color: #fff; }
.btn.green:hover { background: #38a870; }
.btn.danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(255,107,107,0.1); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Inputs */
.input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--card-text); font-size: 13px; outline: none; transition: border-color 0.15s; }
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--card-text2); }
textarea.input { resize: vertical; min-height: 100px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
select.input { cursor: pointer; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.disc-tag { font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 600; }
.disc-tag.disc { background: rgba(232,160,32,0.15); color: var(--yellow); }
.disc-tag.fixed { background: rgba(80,144,232,0.15); color: var(--blue); }
.disc-tag.transfer { background: rgba(208,96,160,0.15); color: var(--pink); }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 13px; color: var(--card-text); }
.table th { text-align: left; padding: 10px 12px; color: var(--card-text2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
.table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.table tr:hover { background: rgba(232,160,32,0.05); }
.table .del-btn { border: none; background: none; color: var(--red); cursor: pointer; font-size: 16px; opacity: 0.7; transition: opacity 0.15s; }
.table .del-btn:hover { opacity: 1; }
.table.compact-budget { width: 100%; }
.table.compact-budget th, .table.compact-budget td { padding: 5px 8px; border-right: 1px solid var(--border); white-space: nowrap; }
.table.compact-budget th:first-child, .table.compact-budget td:first-child { white-space: normal; }
.table.compact-budget th:last-child, .table.compact-budget td:last-child { border-right: none; width: 24px; text-align: center; }
.info-tooltip { position:absolute; top:100%; left:0; z-index:100; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:12px; font-weight:400; color:var(--card-text); line-height:1.5; width:280px; margin-top:6px; box-shadow:0 4px 16px rgba(0,0,0,0.15); white-space:normal; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--card-text2); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 13px; max-width: 320px; margin: 0 auto; line-height: 1.6; }

/* Group colors */
.grp-housing { background: rgba(232,160,32,0.15); color: #f0c050; }
.grp-food { background: rgba(64,192,128,0.15); color: #40c080; }
.grp-transport { background: rgba(224,120,40,0.15); color: #e07828; }
.grp-utilities { background: rgba(80,144,232,0.15); color: #5090e8; }
.grp-personal { background: rgba(208,96,160,0.15); color: #d060a0; }
.grp-health { background: rgba(224,80,80,0.15); color: #e05050; }
.grp-entertainment { background: rgba(232,160,32,0.15); color: #e8a020; }
.grp-savings { background: rgba(64,192,128,0.15); color: #40c080; }
.grp-income { background: rgba(80,200,160,0.15); color: #50c8a0; }
.grp-other { background: rgba(157,165,208,0.15); color: #9da5d0; }

/* Badge */
.badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 99px; font-size: 11px; font-weight: 700; padding: 0 6px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeIn 0.25s ease-out; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.page-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }

/* Compass watermark behind page content */
.compass-watermark { position: fixed; top: 50%; left: calc(110px + 50vw); transform: translate(-50%, -50%); pointer-events: none; z-index: 0; opacity: 0.07; }

/* ── Splash Screen ── */
.splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.splash-screen .splash-title { font-size: 36px; font-weight: 700; color: var(--accent2); letter-spacing: -1px; margin-top: 12px; }
.splash-screen .splash-sub { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; }
@keyframes splashFadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
.splash-fade { animation: splashFadeOut 0.5s ease-out forwards; }

/* ── Onboarding Tour ── */
.tour-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.tour-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.2s; }
.tour-dot.active { background: var(--accent); transform: scale(1.25); }
.tour-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
.tour-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; color: var(--card-text); }
.tour-desc { font-size: 13px; line-height: 1.6; text-align: center; color: var(--card-text2); margin-bottom: 24px; }
.tour-nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.tour-skip { font-size: 12px; color: var(--card-text2); cursor: pointer; opacity: 0.7; }
.tour-skip:hover { opacity: 1; }
[role="button"]:focus, [role="tab"]:focus, [role="menuitem"]:focus, .nav-item:focus, .tab-item:focus, .mode-tab:focus { outline: 2px solid var(--accent2); outline-offset: 2px; border-radius: 4px; }

/* ── Bottom Tab Bar ── */
.bottom-tabs { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: #101850; border-top: 1px solid #2a3580; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.bottom-tabs .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; color: rgba(255,255,255,0.5); cursor: pointer; transition: color 0.15s; }
.bottom-tabs .tab-item.active { color: var(--accent2); }
.bottom-tabs .tab-item .tab-icon { font-size: 20px; }
.more-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 60; }
.more-menu { position: fixed; bottom: 56px; left: 0; right: 0; background: #101850; border-top: 1px solid #2a3580; border-radius: 16px 16px 0 0; padding: 16px 0 8px; z-index: 61; }
.more-menu .more-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: rgba(255,255,255,0.7); font-size: 14px; cursor: pointer; }
.more-menu .more-item:hover, .more-menu .more-item.active { color: var(--accent2); background: rgba(232,160,32,0.08); }
.more-menu .more-item .icon { font-size: 18px; }

/* ── Table scroll wrapper ── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

/* ── Tablet: 1024px ── */
@media (max-width: 1024px) {
  .dash-layout { flex-direction: column !important; }
  .dash-right { width: 100% !important; min-width: 0 !important; flex-shrink: 1 !important; max-height: none !important; }
  .dash-left { min-width: 0 !important; }
  .dash-left .card { min-width: 0 !important; }
  .import-layout { flex-direction: column !important; }
  .import-right { min-width: 0 !important; }
}

/* ── Phone: 768px ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-tabs { display: flex; }
  .main { margin-left: 0; padding: 16px 12px 72px 12px; }
  .stats { flex-direction: row; flex-wrap: wrap; }
  .stats .stat { min-width: calc(50% - 6px); flex: 0 0 calc(50% - 6px); }
  .card { padding: 14px; }
  .page-header h2 { font-size: 18px; }
  .page-header p { font-size: 12px; }
  .info-tooltip { width: calc(100vw - 48px); max-width: 280px; left: auto; right: -8px; }
  .modal { padding: 16px; width: 95%; max-width: none; }
  .toast { left: 12px; right: 12px; bottom: 72px; }
  .compass-watermark { left: 50% !important; }
  .txn-table th:nth-child(5), .txn-table td:nth-child(5) { display: none; }
  .txn-table th:nth-child(8), .txn-table td:nth-child(8) { display: none; }
  .dict-table th:nth-child(4), .dict-table td:nth-child(4) { display: none; }
  .dict-table th:nth-child(6), .dict-table td:nth-child(6) { display: none; }
}

/* ── Small phone: 480px ── */
@media (max-width: 480px) {
  .main { padding: 12px 8px 68px 8px; }
  .stats .stat { min-width: 100%; flex: 0 0 100%; }
  .stat .value { font-size: 16px; }
  .page-header h2 { font-size: 16px; }
  .card { padding: 10px; }
  .btn { padding: 6px 12px; font-size: 12px; }
  .table th, .table td { padding: 6px 8px; font-size: 12px; }
  .compact-budget th, .compact-budget td { font-size: 11px; padding: 4px 6px; }
}

/* ── Print ── */
@media print {
  .sidebar, .bottom-tabs, .more-menu-overlay, .compass-watermark,
  .demo-banner, .mode-tabs, .toast, .splash-screen { display: none !important; }
  .main { margin-left: 0 !important; padding: 20px !important; min-height: auto !important; }
  .app { display: block !important; }
  .card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ccc !important; background: #fff !important; }
  .page-header .btn { display: none !important; }
  body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .stat { border: 1px solid #ccc !important; background: #fff !important; }
  .tag, .disc-tag { border: 1px solid #999 !important; }
}

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; color: var(--card-text); --text: var(--card-text); --text2: var(--card-text2); }
.modal h3 { margin-bottom: 16px; font-size: 17px; color: var(--card-text); }

/* Progress bar */
.progress { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 200; animation: fadeIn 0.2s; box-shadow: var(--shadow); color: var(--card-text); }
</style>
</head>

const normalizeForMatch = (s) => s.toUpperCase().replace(/[^A-Z0-9\s]/g,'').replace(/\s+/g,' ').trim();

// Robust date parsing — extracts year/month/day without timezone shift
function parseDateParts(dateStr) {
  if(!dateStr) return null;
  const s = dateStr.trim();
  let m, d, y;
  // YYYY-MM-DD or YYYY/MM/DD
  let match = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(match) { y=+match[1]; m=+match[2]; d=+match[3]; }
  else {
    // MM/DD/YYYY or MM-DD-YYYY or M/D/YY
    match = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(match) { m=+match[1]; d=+match[2]; y=+match[3]; if(y<100) y+=2000; }
  }
  if(m && d && y && m>=1 && m<=12) return {year:y, month:m, day:d};
  return null;
}

// Get YYYY-MM string for grouping by month
function getYearMonth(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return null;
  return p.year+'-'+p.month.toString().padStart(2,'0');
}

// Get a proper local Date object from a date string
function safeDate(dateStr) {
  const p = parseDateParts(dateStr);
  if(!p) return new Date(dateStr); // fallback
  return new Date(p.year, p.month-1, p.day);
}

// ── Categories Page ─────────────────────────────────────
function CategoriesPage({categories, setCategories, dictionary, showToast}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [name, setName] = useState('');
  const [group, setGroup] = useState('Other');
  const [catType, setCatType] = useState('discretionary');
  const [budget, setBudget] = useState(0);

  const startEdit = (idx) => {
    const c = categories[idx];
    setName(c.name); setGroup(c.group); setCatType(c.catType||'discretionary'); setBudget(c.budget||0);
    setEditIdx(idx); setShowAdd(true);
  };

  const resetForm = () => { setName(''); setGroup('Other'); setCatType('discretionary'); setBudget(0); setEditIdx(null); setShowAdd(false); };

  const save = () => {
    if(!name.trim()) return;
    if(editIdx !== null) {
      setCategories(prev => prev.map((c,i) => i===editIdx ? {...c, name:name.trim(), group, catType, budget:+budget} : c));
      showToast('✅ Updated: ' + name.trim());
    } else {
      if(categories.find(c=>c.name.toLowerCase()===name.trim().toLowerCase())) {
        showToast('⚠️ Category already exists'); return;
      }
      setCategories(prev => [...prev, {name:name.trim(), group, catType, budget:+budget}]);
      showToast('✅ Added: ' + name.trim());
    }
    resetForm();
  };

  const del = (idx) => {
    const c = categories[idx];
    const inUse = dictionary.filter(d=>d.category===c.name).length;
    if(inUse > 0 && !confirm(`"${c.name}" has ${inUse} payee rule(s). Delete anyway?`)) return;
    setCategories(prev => prev.filter((_,i)=>i!==idx));
    showToast('🗑️ Deleted: ' + c.name);
  };

  const grouped = useMemo(()=>{
    const m = {};
    categories.forEach((c,i)=>{
      if(!m[c.group]) m[c.group]=[];
      m[c.group].push({...c, _idx:i});
    });
    Object.keys(m).forEach(g=>m[g].sort((a,b)=>a.name.localeCompare(b.name)));
    return m;
  },[categories]);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header', style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📂 Categories', h(InfoPill,{text:'Organize your spending into categories (e.g., Groceries, Rent) and groups (e.g., Food, Housing). Set each as Income, Fixed, Discretionary, or Transfer. Budget amounts are set on the Budget page.'})),
        h('p',null,'Define your spending categories and assign them to groups.')
      ),
      h('button',{className:'btn primary', onClick:()=>{resetForm();setShowAdd(true);}}, '+ New Category')
    ),

    h('div',{className:'stats'},
      h(Stat, {label:'Categories', value:categories.length, color:'var(--accent2)'}),
      h(Stat, {label:'Discretionary', value:categories.filter(c=>c.catType==='discretionary').length, color:'var(--yellow)'}),
      h(Stat, {label:'Fixed', value:categories.filter(c=>c.catType==='fixed').length, color:'var(--blue)'}),
      h(Stat, {label:'Transfer', value:categories.filter(c=>c.catType==='transfer').length, color:'var(--pink)'})
    ),

    categories.length === 0
      ? h('div',{className:'card'},
          h('div',{className:'empty'},
            h('div',{className:'icon'},'📂'),
            h('p',null,'No categories yet. Click "New Category" to start building your budget structure.')
          )
        )
      : Object.entries(grouped).map(([grp, cats]) =>
          h('div',{key:grp, className:'card', style:{marginBottom:14}},
            h('h3',null,
              h('span',{className:'icon'},'▸'),
              h(Tag,{color:GROUP_COLORS[grp]||'#8b90a5'}, grp),
              h('span',{style:{color:'var(--text2)',fontWeight:400,fontSize:12}}, cats.length + ' categor'+(cats.length===1?'y':'ies'))
            ),
            h('table',{className:'table'},
              h('thead',null, h('tr',null,
                h('th',null,'Name'), h('th',null,'Type'), h('th',null,'Budget/Mo'), h('th',null,'Payees'), h('th',{style:{width:80}},null)
              )),
              h('tbody',null, cats.map(c =>
                h('tr',{key:c.name},
                  h('td',{style:{fontWeight:500}}, c.name),
                  h('td',null, h(TypeTag,{catType:c.catType})),
                  h('td',null, c.budget>0 ? fmt(c.budget) : h('span',{style:{color:'var(--text2)'}},'—')),
                  h('td',null, h('span',{style:{color:'var(--text2)',fontSize:12}}, dictionary.filter(d=>d.category===c.name).length + ' rules')),
                  h('td',null,
                    h('button',{className:'btn sm', onClick:()=>startEdit(c._idx), style:{marginRight:4}}, '✎'),
                    h('button',{className:'table del-btn', onClick:()=>del(c._idx)}, '×')
                  )
                )
              ))
            )
          )
        ),

    showAdd && h(Modal, {onClose:resetForm},
      h('h3',null, editIdx!==null ? '✏️ Edit Category' : '➕ New Category'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',null,
          h('label',{htmlFor:'cat-name',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Category Name'),
          h('input',{id:'cat-name',className:'input',value:name,onChange:e=>setName(e.target.value),placeholder:'e.g. Groceries',style:{width:'100%'},autoFocus:true})
        ),
        h('div',null,
          h('label',{htmlFor:'cat-group',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Group'),
          h('select',{id:'cat-group',className:'input',value:group,onChange:e=>setGroup(e.target.value),style:{width:'100%'}},
            GROUP_LIST.map(g=>h('option',{key:g,value:g},g))
          )
        ),
        h('div',null,
          h('label',{id:'cat-type-label',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:6}},'Type'),
          h('div',{role:'radiogroup','aria-labelledby':'cat-type-label',style:{display:'flex',gap:16}},
            ['discretionary','fixed','transfer'].map(t =>
              h('label',{key:t,htmlFor:'cat-type-'+t,style:{fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:5}},
                h('input',{id:'cat-type-'+t,type:'radio',name:'catType',value:t,checked:catType===t,onChange:()=>setCatType(t)}),
                t==='discretionary'?'Discretionary':t==='fixed'?'Fixed':'Transfer'
              )
            )
          )
        ),
        catType!=='transfer' && h('div',null,
          h('label',{htmlFor:'cat-budget',style:{fontSize:12,color:'var(--text2)',display:'block',marginBottom:4}},'Monthly Budget ($)'),
          h('input',{id:'cat-budget',className:'input',type:'number',value:budget,onChange:e=>setBudget(e.target.value),style:{width:'100%'},min:0})
        ),
        catType==='transfer' && h('div',{style:{padding:10,background:'rgba(208,96,160,0.08)',borderRadius:8,fontSize:12,color:'var(--pink)'}},
          '💡 Transfer categories are excluded from spending totals and tracked separately.'
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
          h('button',{className:'btn',onClick:resetForm},'Cancel'),
          h('button',{className:'btn primary',onClick:save,disabled:!name.trim()}, editIdx!==null?'Update':'Add Category')
        )
      )
    )
  );
}

// ── Dictionary (Payee Rules) Page ───────────────────────
function DictionaryPage({dictionary, setDictionary, categories, showToast}) {
  const [keyword, setKeyword] = useState('');
  const [cleanName, setCleanName] = useState('');
  const [category, setCategory] = useState('');
  const [dueDay, setDueDay] = useState('');
  const [frequency, setFrequency] = useState('monthly');
  const [editDueDayIdx, setEditDueDayIdx] = useState(null);
  const [editDueDayVal, setEditDueDayVal] = useState('');
  const [filter, setFilter] = useState('');
  const [bulkMode, setBulkMode] = useState(false);
  const [bulkText, setBulkText] = useState('');

  const add = () => {
    if(!keyword.trim()||!cleanName.trim()||!category) return;
    if(dictionary.find(d=>d.keyword.toUpperCase()===keyword.trim().toUpperCase())) {
      showToast('⚠️ Keyword already exists'); return;
    }
    const dd = parseInt(dueDay);
    const entry = {keyword:keyword.trim().toUpperCase(), cleanName:cleanName.trim(), category};
    if(dd>=1 && dd<=31) entry.dueDay = dd;
    if(frequency && frequency!=='monthly') entry.frequency = frequency;
    setDictionary(prev=>[...prev, entry]);
    setKeyword(''); setCleanName(''); setDueDay(''); setFrequency('monthly');
    showToast('✅ Rule added');
  };

  const del = (idx) => {
    setDictionary(prev=>prev.filter((_,i)=>i!==idx));
  };

  const bulkImport = () => {
    const lines = bulkText.trim().split('\n').filter(l=>l.trim());
    let added=0, skipped=0;
    const existing = new Set(dictionary.map(d=>d.keyword.toUpperCase()));
    const newRules = [];
    for(const line of lines) {
      const parts = line.split(',').map(s=>s.trim());
      if(parts.length>=3) {
        const kw = parts[0].toUpperCase();
        if(!existing.has(kw)) {
          const rule = {keyword:kw, cleanName:parts[1], category:parts[2]};
          if(parts[3] && parseInt(parts[3])>=1 && parseInt(parts[3])<=31) rule.dueDay = parseInt(parts[3]);
          newRules.push(rule);
          existing.add(kw);
          added++;
        } else { skipped++; }
      } else { skipped++; }
    }
    setDictionary(prev=>[...prev,...newRules]);
    setBulkText('');
    showToast(`✅ ${added} added, ${skipped} skipped`);
  };

  const filtered = useMemo(()=>{
    if(!filter) return dictionary;
    const f = filter.toLowerCase();
    return dictionary.filter(d=>d.keyword.toLowerCase().includes(f)||d.cleanName.toLowerCase().includes(f)||d.category.toLowerCase().includes(f));
  },[dictionary,filter]);

  const catNames = categories.map(c=>c.name);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header', style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h2',null,'📖 Payee Rules', h(InfoPill,{text:'Rules map bank descriptions to clean payee names and categories. When you import transactions, any description containing the keyword is automatically categorized. Set due days and frequency for recurring bills.'})),
        h('p',null,'Map transaction keywords to categories for automatic matching.')
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{className:'btn'+(bulkMode?' primary':''), onClick:()=>setBulkMode(!bulkMode)}, bulkMode?'Single Add':'Bulk Import')
      )
    ),

    h('div',{className:'stats'},
      h(Stat,{label:'Total Rules', value:dictionary.length, color:'var(--accent2)'}),
      h(Stat,{label:'Categories Covered', value: new Set(dictionary.map(d=>d.category)).size, color:'var(--green)'})
    ),

    // Add form
    h('div',{className:'card', style:{marginBottom:16}},
      !bulkMode
        ? h('div',null,
            h('h3',null, h('span',{className:'icon'},'⚡'), 'Add Payee Rule'),
            categories.length === 0
              ? h('p',{style:{color:'var(--text2)',fontSize:13}}, '⚠️ Create categories first before adding payee rules.')
              : h('div',{style:{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}},
                  h('div',{style:{flex:1,minWidth:140}},
                    h('label',{htmlFor:'rule-keyword',style:{fontSize:11,color:'var(--text2)',display:'block',marginBottom:3}},'Keyword'),
                    h('input',{id:'rule-keyword',className:'input',value:keyword,onChange:e=>setKeyword(e.target.value),placeholder:'e.g. WALMART',style:{width:'100%'}})
                  ),
                  h('div',{style:{flex:1,minWidth:140}},
                    h('label',{htmlFor:'rule-cleanname',style:{fontSize:11,color:'var(--text2)',display:'block',marginBottom:3}},'Clean Name'),
                    h('input',{id:'rule-cleanname',className:'input',value:cleanName,onChange:e=>setCleanName(e.target.value),placeholder:'e.g. Walmart',style:{width:'100%'}})
                  ),
                  h('div',{style:{flex:1,minWidth:140}},
                    h('label',{htmlFor:'rule-category',style:{fontSize:11,color:'var(--text2)',display:'block',marginBottom:3}},'Category'),
                    h('select',{id:'rule-category',className:'input',value:category,onChange:e=>setCategory(e.target.value),style:{width:'100%'}},
                      h('option',{value:''},'Select...'),
                      catNames.map(c=>h('option',{key:c,value:c},c))
                    )
                  ),
                  h('div',{style:{minWidth:70}},
                    h('label',{htmlFor:'rule-dueday',style:{fontSize:11,color:'var(--text2)',display:'block',marginBottom:3}},'Due Day'),
                    h('input',{id:'rule-dueday',className:'input',type:'number',min:1,max:31,value:dueDay,onChange:e=>setDueDay(e.target.value),placeholder:'—',style:{width:70,fontSize:12,padding:'5px 8px'}})
                  ),
                  h('div',{style:{minWidth:90}},
                    h('label',{htmlFor:'rule-frequency',style:{fontSize:11,color:'var(--text2)',display:'block',marginBottom:3}},'Frequency'),
                    h('select',{id:'rule-frequency',className:'input',value:frequency,onChange:e=>setFrequency(e.target.value),style:{width:100,fontSize:12,padding:'5px 8px'}},
                      h('option',{value:'monthly'},'Monthly'),
                      h('option',{value:'quarterly'},'Quarterly'),
                      h('option',{value:'biannual'},'Biannual'),
                      h('option',{value:'annual'},'Annual')
                    )
                  ),
                  h('button',{className:'btn primary',onClick:add,disabled:!keyword.trim()||!cleanName.trim()||!category},'+ Add')
                )
          )
        : h('div',null,
            h('h3',null, h('span',{className:'icon'},'📦'), 'Bulk Import', h(InfoPill,{text:'Paste multiple rules at once: one per line as keyword, payee name, category (comma or tab separated).'})),
            h('p',{style:{color:'var(--text2)',fontSize:12,marginBottom:10}},'CSV format: Keyword, Clean Name, Category[, Due Day]'),
            h('textarea',{className:'input',value:bulkText,onChange:e=>setBulkText(e.target.value),
              placeholder:'WALMART,Walmart,Groceries\nNETFLIX,Netflix,Streaming\nSHELL OIL,Shell Gas,Gas',
              style:{width:'100%',height:160}}),
            h('button',{className:'btn primary',onClick:bulkImport,disabled:!bulkText.trim(),style:{marginTop:10}},'⚡ Import Rules')
          )
    ),

    // Rules list
    h('div',{className:'card'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
        h('h3',{style:{margin:0}}, h('span',{className:'icon'},'📖'), 'Dictionary ('+dictionary.length+')'),
        h('input',{className:'input',value:filter,onChange:e=>setFilter(e.target.value),placeholder:'Filter rules...',style:{width:200}})
      ),
      filtered.length === 0
        ? h('div',{className:'empty'},
            h('div',{className:'icon'},'📖'),
            h('p',null, dictionary.length===0 ? 'No payee rules yet. Add keywords above to auto-categorize transactions when you import them.' : 'No rules match your filter.')
          )
        : h('div',{className:'table-scroll'}, h('table',{className:'table dict-table'},
            h('thead',null, h('tr',null,
              h('th',null,'Keyword'), h('th',null,'Clean Name'), h('th',null,'Category'), h('th',null,'Group'), h('th',null,'Due Day'), h('th',null,'Freq'), h('th',{style:{width:40}},null)
            )),
            h('tbody',null, filtered.map((d,i) => {
              const cat = categories.find(c=>c.name===d.category);
              const grp = cat?.group||'Other';
              return h('tr',{key:d.keyword+i},
                h('td',null, h('code',{style:{background:'var(--surface2)',padding:'2px 6px',borderRadius:4,fontSize:12}},d.keyword)),
                h('td',{style:{fontWeight:500}},d.cleanName),
                h('td',null,d.category),
                h('td',null, h(Tag,{color:GROUP_COLORS[grp]||'#8b90a5'},grp)),
                editDueDayIdx===i
                  ? h('td',null,
                      h('input',{className:'input',type:'number',min:1,max:31,
                        value:editDueDayVal,onChange:e=>setEditDueDayVal(e.target.value),
                        onBlur:()=>{
                          const val=parseInt(editDueDayVal);
                          const day=(val>=1&&val<=31)?val:null;
                          const ri=dictionary.indexOf(d);
                          if(ri>=0) setDictionary(prev=>prev.map((r,j)=>j===ri?{...r,dueDay:day}:r));
                          setEditDueDayIdx(null);
                        },
                        onKeyDown:e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape')setEditDueDayIdx(null);},
                        style:{width:50,padding:'3px 6px',fontSize:12},autoFocus:true
                      })
                    )
                  : h('td',{style:{fontSize:12,cursor:'pointer'},title:'Click to set due day',
                      onClick:()=>{setEditDueDayIdx(i);setEditDueDayVal(d.dueDay?String(d.dueDay):'');}
                    },
                      d.dueDay ? d.dueDay : h('span',{style:{color:'var(--card-text2)'}},'—')
                    ),
                h('td',null,
                  h('select',{className:'input',value:d.frequency||'monthly',
                    onChange:e=>{const ri=dictionary.indexOf(d);if(ri>=0)setDictionary(prev=>prev.map((r,j)=>j===ri?{...r,frequency:e.target.value==='monthly'?undefined:e.target.value}:r));},
                    style:{fontSize:11,padding:'2px 4px',width:80}},
                    h('option',{value:'monthly'},'Monthly'),
                    h('option',{value:'quarterly'},'Quarterly'),
                    h('option',{value:'biannual'},'Biannual'),
                    h('option',{value:'annual'},'Annual')
                  )
                ),
                h('td',null, h('button',{className:'table del-btn',onClick:()=>{const ri=dictionary.indexOf(d);if(ri>=0)del(ri);}}, '×'))
              );
            }))
          ))
    )
  );
}

// ── Smart CSV/TSV Parser ────────────────────────────────
function parseDelimitedLine(line, delimiter) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for(let i=0; i<line.length; i++) {
    const ch = line[i];
    if(ch==='"') { inQuotes=!inQuotes; }
    else if(ch===delimiter && !inQuotes) { result.push(current.trim()); current=''; }
    else { current+=ch; }
  }
  result.push(current.trim());
  return result;
}

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0] || '';
  const tabs = (firstLine.match(/\t/g) || []).length;
  const commas = (firstLine.match(/,/g) || []).length;
  return tabs >= commas && tabs > 0 ? '\t' : ',';
}

function looksLikeDate(val) {
  if(!val) return false;
  const s = val.trim();
  // MM/DD/YYYY, YYYY-MM-DD, MM-DD-YYYY, M/D/YYYY etc
  return /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(s) || /^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(s);
}

function looksLikeAmount(val) {
  if(!val) return false;
  const s = val.trim().replace(/[$,"\s]/g, '');
  return /^-?\d+\.?\d*$/.test(s) || /^\(-?\d+\.?\d*\)$/.test(s);
}

function parseAmount(val) {
  if(!val) return NaN;
  let s = val.trim().replace(/[$,"\s]/g, '');
  // Handle parentheses as negative: (100.00) -> -100.00
  if(/^\((.+)\)$/.test(s)) { s = '-' + s.replace(/[()]/g, ''); }
  return parseFloat(s);
}

// Auto-detect which columns are date, description, amount
function detectColumns(headers, sampleRows) {
  const result = { dateCol: -1, descCol: -1, amountCol: -1, debitCol: -1, creditCol: -1 };
  const numCols = headers.length;
  const headersLower = headers.map(h => h.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim());

  // Pass 1: Find date column first (most specific)
  for(let i=0; i<numCols; i++) {
    const h = headersLower[i];
    if(h.includes('date') || h==='posted' || h==='postdate') { result.dateCol=i; break; }
  }

  // Pass 2: Find amount / debit / credit columns
  for(let i=0; i<numCols; i++) {
    if(i===result.dateCol) continue;
    const h = headersLower[i];
    if(result.amountCol<0 && (h==='amount' || h==='total' || h==='sum')) result.amountCol=i;
    if(result.debitCol<0 && (h==='debit' || h==='withdrawal' || h==='debits')) result.debitCol=i;
    if(result.creditCol<0 && (h==='credit' || h==='deposit' || h==='credits')) result.creditCol=i;
  }

  // Pass 3: Find description column — skip columns already assigned
  const usedCols = new Set([result.dateCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
  for(let i=0; i<numCols; i++) {
    if(usedCols.has(i)) continue;
    const h = headersLower[i];
    if(h.includes('description') || h.includes('payee') || h.includes('memo') || h==='name' ||
       h.includes('merchant') || h.includes('narrative') || h.includes('details')) {
      result.descCol=i; break;
    }
  }

  // Pass 4: If description still not found, pick first unused text-like column
  if(result.descCol<0) {
    for(let i=0; i<numCols; i++) {
      if(usedCols.has(i)) continue;
      // Check sample data — if most values are long text strings, it's likely description
      if(sampleRows.length > 0) {
        const vals = sampleRows.map(r => r[i] || '');
        const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;
        if(textCount >= sampleRows.length * 0.5) { result.descCol=i; break; }
      }
    }
  }

  // Pass 5: Content-based fallback for any still-missing columns
  if(sampleRows.length > 0) {
    const allUsed = new Set([result.dateCol, result.descCol, result.amountCol, result.debitCol, result.creditCol].filter(c=>c>=0));
    for(let col=0; col<numCols; col++) {
      if(allUsed.has(col)) continue;
      const vals = sampleRows.map(r => r[col] || '');
      const dateCount = vals.filter(v => looksLikeDate(v)).length;
      const numCount = vals.filter(v => looksLikeAmount(v)).length;
      const textCount = vals.filter(v => v.length > 3 && !looksLikeDate(v) && !looksLikeAmount(v)).length;

      if(result.dateCol<0 && dateCount >= sampleRows.length * 0.7) { result.dateCol=col; allUsed.add(col); continue; }
      if(result.descCol<0 && textCount >= sampleRows.length * 0.5) { result.descCol=col; allUsed.add(col); continue; }
      if(result.amountCol<0 && result.debitCol<0 && numCount >= sampleRows.length * 0.5) { result.amountCol=col; allUsed.add(col); continue; }
    }
  }

  return result;
}

// ── Unmatched Row Translator ────────────────────────────
function UnmatchedRow({txn, index, categories, setCategories, showToast, onResolve, onSkip}) {
  const [expanded, setExpanded] = useState(false);
  const [keyword, setKeyword] = useState('');
  const [cleanName, setCleanName] = useState('');
  const [category, setCategory] = useState('');
  const [showNewCat, setShowNewCat] = useState(false);
  const [newCatName, setNewCatName] = useState('');
  const [newCatGroup, setNewCatGroup] = useState('Other');
  const [newCatDisc, setNewCatDisc] = useState('discretionary');

  // Auto-suggest keyword from description
  useEffect(()=>{
    if(!keyword && txn.description) {
      const desc = txn.description.toUpperCase();
      // Check for masked account numbers (e.g. XXXXX3989, ****1234, X1234)
      const acctMatch = desc.match(/[X*]{2,}\d{3,}/i);
      if(acctMatch) {
        // Use the account number pattern as keyword — most specific for transfers
        setKeyword(acctMatch[0]);
        setCleanName('Transfer ' + acctMatch[0].slice(-4));
      } else {
        const words = desc.replace(/[^A-Z0-9\s]/g,'').trim().split(/\s+/);
        const stopWords = new Set(['THE','A','AN','OF','IN','AT','TO','FOR','ON','BY','WITH','AND','OR','FROM','ACH','POS','DEBIT','CREDIT','PURCHASE','CARD','PAYMENT','TRANSACTION','CHECKCARD','ONLINE','TRANSFER','WITHDRAWAL','DEPOSIT']);
        const meaningful = words.filter(w=>!stopWords.has(w) && w.length>1);
        const suggested = meaningful.slice(0,2).join(' ');
        setKeyword(suggested);
        if(suggested) {
          setCleanName(suggested.split(' ').map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' '));
        }
      }
    }
  },[txn.description]);

  const handleCatChange = (val) => {
    if(val==='__new__') { setShowNewCat(true); setCategory(''); }
    else { setCategory(val); setShowNewCat(false); }
  };

  const createCategory = () => {
    if(!newCatName.trim()) return;
    if(categories.find(c=>c.name.toLowerCase()===newCatName.trim().toLowerCase())) {
      showToast('⚠️ Category already exists'); return;
    }
    setCategories(prev=>[...prev, {name:newCatName.trim(), group:newCatGroup, catType:newCatDisc, budget:0}]);
    setCategory(newCatName.trim());
    setShowNewCat(false);
    setNewCatName('');
    showToast('✅ Category created: '+newCatName.trim());
  };

  const canSave = keyword.trim() && cleanName.trim() && category;

  return h('div',{style:{borderTop:index?'1px solid rgba(232,160,32,0.15)':'none'}},
    // Summary row
    h('div',{style:{display:'flex',gap:8,padding:'8px 10px',alignItems:'center',fontSize:12,cursor:'pointer'},onClick:()=>setExpanded(!expanded)},
      h('span',{style:{color:'var(--yellow)',fontSize:14,width:18}}, expanded?'▼':'▶'),
      h('span',{style:{minWidth:75,color:'var(--text2)'}},txn.date),
      h('span',{style:{flex:1,fontWeight:500}},txn.description),
      h('span',{style:{fontWeight:600}}, (txn.amount>=0?'+':'')+fmt(txn.amount)),
      !expanded && h('button',{className:'btn sm primary',onClick:e=>{e.stopPropagation();setExpanded(true);},style:{fontSize:11,padding:'3px 8px'}},'Translate')
    ),

    // Expanded translator form
    expanded && h('div',{style:{padding:'6px 10px 12px 28px',background:'rgba(232,160,32,0.03)'}},
      h('div',{style:{fontSize:11,color:'var(--text2)',marginBottom:6}},
        'Raw: ', h('code',{style:{background:'var(--surface2)',padding:'1px 4px',borderRadius:3,fontSize:10}}, txn.description)
      ),
      h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-keyword',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Keyword (for matching)'),
          h('input',{id:'trans-keyword',className:'input',value:keyword,onChange:e=>setKeyword(e.target.value),
            placeholder:'e.g. WALMART',style:{width:'100%',fontSize:12,padding:'5px 8px'}})
        ),
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-cleanname',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Clean Name'),
          h('input',{id:'trans-cleanname',className:'input',value:cleanName,onChange:e=>setCleanName(e.target.value),
            placeholder:'e.g. Walmart',style:{width:'100%',fontSize:12,padding:'5px 8px'}})
        ),
        h('div',{style:{flex:1,minWidth:110}},
          h('label',{htmlFor:'trans-category',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Category'),
          h('select',{id:'trans-category',className:'input',value:category,onChange:e=>handleCatChange(e.target.value),
            style:{width:'100%',fontSize:12,padding:'5px 8px'}},
            h('option',{value:''},'Select...'),
            [...categories].sort((a,b)=>a.name.localeCompare(b.name)).map(c=>h('option',{key:c.name,value:c.name},c.name)),
            h('option',{value:'__new__',style:{fontWeight:600,color:'#e8a020'}},'＋ New Category...')
          )
        ),
        h('button',{className:'btn sm green',onClick:()=>onResolve(keyword.trim(), cleanName.trim(), category),
          disabled:!canSave,style:{fontSize:11}},'✓ Save Rule'),
        h('button',{className:'btn sm',onClick:()=>setExpanded(false),style:{fontSize:11}},'Skip')
      ),

      // Inline new category creation
      showNewCat && h('div',{style:{marginTop:8,padding:10,border:'1px dashed var(--accent)',borderRadius:8,background:'rgba(232,160,32,0.04)'}},
        h('div',{style:{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:8}},'➕ Quick Create Category'),
        h('div',{style:{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}},
          h('div',{style:{flex:1,minWidth:100}},
            h('label',{htmlFor:'trans-newcat',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Name'),
            h('input',{id:'trans-newcat',className:'input',value:newCatName,onChange:e=>setNewCatName(e.target.value),
              placeholder:'e.g. Fast Food',style:{width:'100%',fontSize:12,padding:'5px 8px'},autoFocus:true})
          ),
          h('div',{style:{flex:1,minWidth:100}},
            h('label',{htmlFor:'trans-newcat-group',style:{fontSize:10,color:'var(--text2)',display:'block',marginBottom:2}},'Group'),
            h('select',{id:'trans-newcat-group',className:'input',value:newCatGroup,onChange:e=>setNewCatGroup(e.target.value),
              style:{width:'100%',fontSize:12,padding:'5px 8px'}},
              GROUP_LIST.map(g=>h('option',{key:g,value:g},g))
            )
          ),
          h('label',{style:{fontSize:11,display:'flex',alignItems:'center',gap:4,cursor:'pointer',whiteSpace:'nowrap'}},
            h('select',{className:'input',value:newCatDisc,onChange:e=>setNewCatDisc(e.target.value),style:{fontSize:11,padding:'3px 6px'}},
              h('option',{value:'discretionary'},'Disc'),
              h('option',{value:'fixed'},'Fixed'),
              h('option',{value:'transfer'},'Transfer')
            )
          ),
          h('button',{className:'btn sm primary',onClick:createCategory,disabled:!newCatName.trim(),style:{fontSize:11}},'Create'),
          h('button',{className:'btn sm',onClick:()=>setShowNewCat(false),style:{fontSize:11}},'Cancel')
        )
      )
    )
  );
}

// ── Import Page ─────────────────────────────────────────
function ImportPage({transactions, setTransactions, dictionary, setDictionary, categories, setCategories, catMap, categorize, showToast, accounts}) {
  const [csv, setCsv] = useState('');
  const [preview, setPreview] = useState(null);
  const [parsedData, setParsedData] = useState(null);
  const [colMap, setColMap] = useState({dateCol:-1, descCol:-1, amountCol:-1, debitCol:-1, creditCol:-1});
  const [importMode, setImportMode] = useState('paste');
  const [selectedAccount, setSelectedAccount] = useState('');
  const [transferDestAcct, setTransferDestAcct] = useState('');
  const fileRef = useRef(null);

  // Step 1: Parse raw text into headers+rows and auto-detect columns
  const parseRaw = (text) => {
    const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length) { showToast('❌ No data found'); return; }

    const delimiter = detectDelimiter(text);
    const allParsed = lines.map(l => parseDelimitedLine(l, delimiter));

    const firstRow = allParsed[0];
    const isHeader = firstRow.some(v => {
      const vl = v.toLowerCase();
      return vl.includes('date') || vl.includes('description') || vl.includes('amount') ||
             vl.includes('payee') || vl.includes('memo') || vl.includes('debit') || vl.includes('credit') ||
             vl.includes('transaction') || vl.includes('posted') || vl.includes('withdrawal') || vl.includes('deposit');
    });

    const headers = isHeader ? firstRow : firstRow.map((_,i) => 'Column '+(i+1));
    const dataRows = isHeader ? allParsed.slice(1) : allParsed;

    const sampleRows = dataRows.slice(0, Math.min(10, dataRows.length));
    const detected = detectColumns(headers, sampleRows);

    setParsedData({headers, rows:dataRows, delimiter, detected});
    setColMap(detected);
    setPreview(null);
    showToast(`✅ Parsed ${dataRows.length} rows (${delimiter==='\t'?'tab':'comma'}-delimited, ${headers.length} columns)`);
  };

  // Build a map of last4 digits to account for transfer auto-detection
  const last4Map = useMemo(()=>{
    const m = {};
    accounts.forEach(a=>{
      if(a.last4 && a.last4.length>=3) m[a.last4] = a;
    });
    return m;
  },[accounts]);

  // Detect if a description looks like a transfer to a known account (by last4 digits)
  const detectTransferDest = useCallback((desc) => {
    const upper = desc.toUpperCase();
    // Look for transfer-like keywords
    if(!/TRANSFER|XFER|TRNSFR|ONLINE.*TO|ACH.*TO/i.test(upper)) return null;
    // Look for masked account number patterns containing a known last4
    for(const [digits, acct] of Object.entries(last4Map)) {
      // Match patterns like XXXXX3989, ****3989, or just the 4 digits at end of a number sequence
      const pattern = new RegExp('[X*]+' + digits + '|\\b\\d*' + digits + '\\b');
      if(pattern.test(upper) || upper.includes(digits)) {
        return acct;
      }
    }
    return null;
  },[last4Map]);

  // Step 2: Build transactions from parsed data + column mapping
  const buildPreview = () => {
    if(!parsedData) return;
    if(!selectedAccount) { showToast('⚠️ Please select an account first'); return; }
    const {rows} = parsedData;
    const {dateCol, descCol, amountCol, debitCol, creditCol} = colMap;

    if(dateCol<0 || descCol<0 || (amountCol<0 && debitCol<0)) {
      showToast('❌ Please map Date, Description, and Amount columns'); return;
    }

    const existingKeys = new Set(transactions.map(t=>t.date+t.description+t.amount));
    let matched=[], unmatched=[], dupes=0, errors=0;
    let autoTransfers = 0;

    // Find a transfer category to use for auto-detected transfers
    const transferCat = categories.find(c=>c.catType==='transfer');

    for(const row of rows) {
      const dateStr = (row[dateCol]||'').trim();
      const desc = (row[descCol]||'').trim();
      if(!dateStr || !desc) { errors++; continue; }

      let amt;
      if(amountCol >= 0) {
        amt = parseAmount(row[amountCol]);
      } else {
        const debit = debitCol>=0 ? parseAmount(row[debitCol]) : 0;
        const credit = creditCol>=0 ? parseAmount(row[creditCol]) : 0;
        if(!isNaN(debit) && debit > 0) amt = -Math.abs(debit);
        else if(!isNaN(credit) && credit > 0) amt = Math.abs(credit);
        else amt = NaN;
      }
      if(isNaN(amt)) { errors++; continue; }

      const key = dateStr+desc+amt;
      if(existingKeys.has(key)) { dupes++; existingKeys.add(key); continue; }
      existingKeys.add(key);

      const match = categorize(desc);
      let txn;

      if(match) {
        txn = {
          id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
          date: dateStr, description: desc, amount: amt,
          cleanName: match.cleanName, category: match.category,
          group: match.group, catType: match.catType,
          accountId: selectedAccount
        };
        matched.push(txn);
      } else {
        // Check for auto-detectable transfer by last4 match
        const destAcct = detectTransferDest(desc);
        if(destAcct && destAcct.id !== selectedAccount && transferCat) {
          txn = {
            id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
            date: dateStr, description: desc, amount: amt,
            cleanName: 'Transfer to ' + destAcct.name,
            category: transferCat.name,
            group: transferCat.group || 'Other',
            catType: 'transfer',
            accountId: selectedAccount,
            _autoTransferDest: destAcct.id // flag for pairing
          };
          matched.push(txn);
          autoTransfers++;
          // Auto-set the transfer destination if not already set
          if(!transferDestAcct) setTransferDestAcct(destAcct.id);
        } else {
          txn = {
            id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
            date: dateStr, description: desc, amount: amt,
            cleanName: desc, category: 'Uncategorized',
            group: 'Other', catType: 'discretionary',
            accountId: selectedAccount
          };
          unmatched.push(txn);
        }
      }
    }

    if(autoTransfers > 0) {
      showToast(`✅ Auto-detected ${autoTransfers} transfer(s) by account number`);
    }
    setPreview({matched, unmatched, dupes, errors, autoTransfers, total: matched.length+unmatched.length+dupes+errors});
  };

  const confirmImport = () => {
    if(!preview) return;
    const all = [...preview.matched, ...preview.unmatched];

    // For transfer-type transactions, create paired entries on the destination account
    // Use auto-detected destination if available, otherwise fall back to manual selection
    const paired = [];

    for(const txn of all) {
      const cat = catMap[txn.category];
      const isTransfer = txn.catType==='transfer' || (cat && cat.catType==='transfer');
      if(isTransfer) {
        // Only pair if we have a confirmed destination:
        // 1. Auto-detected via last4 match in description (from buildPreview)
        // 2. User explicitly selected a destination in the transfer picker
        // 3. Last4 match found in description as fallback
        let destId = txn._autoTransferDest || null;
        if(!destId) {
          // Scan description for any account's last4 — only pair if we find a match
          for(const acct of accounts) {
            if(acct.id !== selectedAccount && acct.last4 && acct.last4.length >= 3 && txn.description.toUpperCase().includes(acct.last4)) {
              destId = acct.id;
              break;
            }
          }
        }
        // Only fall back to manual selection if description has transfer-like keywords
        if(!destId && transferDestAcct && /TRANSFER|XFER|TRNSFR|ONLINE.*TO/i.test(txn.description)) {
          destId = transferDestAcct;
        }
        const dest = destId ? accounts.find(a=>a.id===destId) : null;
        if(dest) {
          const linkedId = Date.now()+'_'+Math.random().toString(36).slice(2,8);
          txn.linkedTxnId = linkedId;
          paired.push({
            ...txn,
            id: linkedId,
            linkedTxnId: txn.id,
            accountId: dest.id,
            amount: -txn.amount, // reverse: outflow on source = inflow on dest
            description: txn.description + ' (paired)',
            cleanName: txn.cleanName.replace(/Transfer to .+/, 'Transfer from ' + (accounts.find(a=>a.id===selectedAccount)?.name||'Other')),
          });
        }
        delete txn._autoTransferDest; // clean up temp flag before saving
      }
    }

    setTransactions(prev=>[...prev,...all,...paired]);
    const pairMsg = paired.length > 0 ? ` (${paired.length} paired transfers created)` : '';
    showToast(`✅ Imported ${all.length} transactions${pairMsg}`);
    setCsv(''); setPreview(null); setParsedData(null);
  };

  // File upload handler
  const handleFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setCsv(text);
      parseRaw(text);
    };
    reader.readAsText(file);
    // Reset so same file can be re-selected
    e.target.value = '';
  };

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header'},
      h('h2',null,'📥 Import Transactions', h(InfoPill,{text:'Import bank transactions by pasting from Excel/CSV or uploading a file. The system auto-matches payees to your rules and categories.'})),
      h('p',null,'Paste data from Excel or upload a bank CSV file. Columns are auto-detected.')
    ),

    h('div',{className:'import-layout',style:{display:'flex',gap:20,alignItems:'flex-start',flexWrap:'wrap'}},
      // Left: Main import area
      h('div',{style:{flex:2,minWidth:340}},

        // Mode toggle
        h('div',{style:{display:'flex',gap:8,marginBottom:16}},
          h('button',{className:'btn'+(importMode==='paste'?' primary':''),onClick:()=>setImportMode('paste')},'📋 Paste Data'),
          h('button',{className:'btn'+(importMode==='file'?' primary':''),onClick:()=>setImportMode('file')},'📂 Upload File')
        ),

        // Account selector
        h('div',{className:'card',style:{marginBottom:16,padding:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},

                h('span',{style:{fontWeight:600,color:t.amount>=0?'var(--green)':'var(--text)'}}, (t.amount>=0?'+':'')+fmt(t.amount))
              ))
            )
          ),
          preview.unmatched.length>0 && h('div',null,
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
              h('div',{style:{fontSize:12,fontWeight:600,color:'var(--yellow)'}},'⚠️ Unmatched ('+preview.unmatched.length+') — Translate below to create rules'),
              preview.unmatched.length>1 && h('button',{className:'btn sm',onClick:()=>{
                // Skip all — leave as uncategorized
                showToast('All unmatched will import as "Uncategorized"');
              }},'Skip All')
            ),
            h('div',{style:{border:'1px solid rgba(232,160,32,0.3)',borderRadius:8,background:'rgba(232,160,32,0.05)',overflow:'hidden',maxHeight:350,overflowY:'auto'}},
              preview.unmatched.map((t,i)=>h(UnmatchedRow,{key:t.id, txn:t, index:i, categories, setCategories, showToast,
                onResolve:(keyword, cleanName, category) => {
                  // Save rule to dictionary
                  const cat = catMap[category];
                  const kw = keyword.toUpperCase();
                  setDictionary(prev=>{
                    if(prev.find(d=>d.keyword.toUpperCase()===kw)) return prev;
                    return [...prev, {keyword:kw, cleanName, category}];
                  });
                  // Apply to ALL unmatched transactions that contain this keyword (normalize both sides)
                  const kwNorm = normalizeForMatch(kw);
                  setPreview(prev=>{
                    const nowMatched = [];
                    const stillUnmatched = [];
                    for(const u of prev.unmatched) {
                      if(normalizeForMatch(u.description).includes(kwNorm)) {
                        nowMatched.push({...u, cleanName, category, group:cat?.group||'Other', catType:cat?.catType||'discretionary'});
                      } else {
                        stillUnmatched.push(u);
                      }
                    }
                    const count = nowMatched.length;
                    return {
                      ...prev,
                      matched:[...prev.matched, ...nowMatched],
                      unmatched:stillUnmatched
                    };
                  });
                  showToast('✅ Rule saved: '+keyword+' → '+category+' (applied to all matches)');
                },
                onSkip:() => {}
              }))
            ),
            h('p',{style:{fontSize:11,color:'var(--yellow)',marginTop:6}},'💡 Translate each payee to auto-create rules, or import as-is and fix later on the Transactions page.')

            h('p',null,'Duplicates are auto-skipped')
          )
        )
      )
    )
  );
}

// ── Transactions Page ───────────────────────────────────
function TransactionsPage({transactions, setTransactions, catMap, accounts, setAccounts}) {
  const [filter, setFilter] = useState('');
  const [acctFilter, setAcctFilter] = useState('all');
  const [sortCol, setSortCol] = useState('date');
  const [sortDir, setSortDir] = useState(-1);
  const [editId, setEditId] = useState(null);
  const [editCat, setEditCat] = useState('');
  const [editPayeeId, setEditPayeeId] = useState(null);
  const [editPayeeName, setEditPayeeName] = useState('');
  const [showReconcile, setShowReconcile] = useState(false);
  const [reconcileDate, setReconcileDate] = useState('');
  const [showAddTxn, setShowAddTxn] = useState(false);
  const [newTxn, setNewTxn] = useState({date:'',description:'',amount:'',category:'',accountId:''});

  const resetNewTxn = () => { setNewTxn({date:'',description:'',amount:'',category:'',accountId:''}); setShowAddTxn(false); };

  const saveNewTxn = () => {
    const {date,description,amount,category,accountId} = newTxn;
    if(!date||!description||!amount||!accountId) return;
    const cat = catMap[category];
    const txn = {
      id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
      date, description: description.trim(),
      amount: +amount,
      cleanName: description.trim(),
      category: category || 'Uncategorized',
      group: cat?.group || 'Other',
      catType: cat?.catType || 'discretionary',
      accountId
    };
    setTransactions(prev=>[...prev, txn]);
    resetNewTxn();
  };

  const acctMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a;}); return m;
  },[accounts]);

  // Check if a transaction is reconciled based on its account's reconciledThrough date
  const isReconciled = useCallback((t)=>{
    const acct = acctMap[t.accountId];
    if(!acct || !acct.reconciledThrough) return false;
    return safeDate(t.date) <= safeDate(acct.reconciledThrough);
  },[acctMap]);

  // Reconcile: set the reconciledThrough date on the selected account
  const doReconcile = ()=>{
    if(!reconcileDate || acctFilter==='all') return;
    setAccounts(prev=>prev.map(a=>a.id===acctFilter?{...a, reconciledThrough:reconcileDate}:a));
    setShowReconcile(false);
    setReconcileDate('');
  };

  // Build a map of starting balances from accounts
  const startBalMap = useMemo(()=>{
    const m = {}; accounts.forEach(a=>{m[a.id]=a.startingBalance||0;}); return m;
  },[accounts]);

  // Compute running balance for all transactions sorted by date (oldest first), per account
  const runningBalMap = useMemo(()=>{
    const dateSorted = [...transactions].sort((a,b)=>safeDate(a.date)-safeDate(b.date));
    const accBal = {};
    const balMap = {};
    dateSorted.forEach(t=>{
      if(!(t.accountId in accBal)) accBal[t.accountId] = startBalMap[t.accountId]||0;
      accBal[t.accountId] += t.amount;
      balMap[t.id] = accBal[t.accountId];
    });
    return balMap;
  },[transactions, startBalMap]);

  const sorted = useMemo(()=>{
    let arr = [...transactions];
    if(acctFilter!=='all') arr = arr.filter(t=>t.accountId===acctFilter);
    if(filter) {
      const f = filter.toLowerCase();
      arr = arr.filter(t=>t.cleanName.toLowerCase().includes(f)||t.description.toLowerCase().includes(f)||t.category.toLowerCase().includes(f));
    }
    arr.sort((a,b)=>{
      if(sortCol==='date') return (safeDate(a.date)-safeDate(b.date))*sortDir;
      if(sortCol==='amount') return (a.amount-b.amount)*sortDir;
      return (a[sortCol]||'').localeCompare(b[sortCol]||'')*sortDir;
    });
    return arr;
  },[transactions,filter,acctFilter,sortCol,sortDir]);

  const toggleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d*-1);
    else { setSortCol(col); setSortDir(-1); }
  };

  const delTxn = (id) => {
    const txn = transactions.find(t=>t.id===id);
    if(txn && isReconciled(txn)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to delete it?')) return;
    }
    setTransactions(prev=>prev.filter(t=>t.id!==id));
  };

  const startEditCat = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its category?')) return;
    }
    setEditId(t.id); setEditCat(t.category);
  };

  const saveCat = (id) => {
    if(!editCat) return;
    const cat = catMap[editCat];
    setTransactions(prev=>prev.map(t=>t.id===id?{...t, category:editCat, group:cat?.group||'Other', catType:cat?.catType||'discretionary'}:t));
    setEditId(null); setEditCat('');
  };

  const startEditPayee = (t) => {
    if(isReconciled(t)) {
      if(!confirm('This transaction is reconciled. Are you sure you want to change its payee?')) return;
    }
    setEditPayeeId(t.id); setEditPayeeName(t.cleanName);
  };

  const savePayee = (id) => {
    if(!editPayeeName.trim()) return;
    setTransactions(prev=>prev.map(t=>t.id===id?{...t, cleanName:editPayeeName.trim()}:t));
    setEditPayeeId(null); setEditPayeeName('');
  };

  const nonTransfer = transactions.filter(t=>t.catType!=='transfer');
  const expenses = nonTransfer.filter(t=>t.amount<0);
  const income = nonTransfer.filter(t=>t.amount>=0);
  const totalExp = expenses.reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalInc = income.reduce((s,t)=>s+t.amount,0);
  const transfers = transactions.filter(t=>t.catType==='transfer' && t.amount<0);
  const totalXfer = transfers.reduce((s,t)=>s+Math.abs(t.amount),0);

  return h('div',{className:'animate-in'},
    h('div',{className:'page-header',style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
      h('div',null,

                h('th',{onClick:()=>toggleSort('amount'), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSort('amount');}}, tabIndex:0, role:'columnheader', 'aria-sort':sortCol==='amount'?(sortDir>0?'ascending':'descending'):'none', style:{cursor:'pointer'}},'Amount'+(sortCol==='amount'?(sortDir>0?' ↑':' ↓'):'')),

                        )
                  ),
                  h('td',null,
                    editId===t.id
                      ? h('div',{style:{display:'flex',gap:4}},
                          h('select',{className:'input',value:editCat,onChange:e=>setEditCat(e.target.value),style:{fontSize:12,padding:'3px 6px'}},
                            h('option',{value:''},'Select...'),
                            Object.keys(catMap).sort((a,b)=>a.localeCompare(b)).map(c=>h('option',{key:c,value:c},c))
                          ),
                          h('button',{className:'btn sm',onClick:()=>saveCat(t.id)},'✓'),
                          h('button',{className:'btn sm',onClick:()=>setEditId(null)},'✗')
                        )
                      : h('span',{onClick:()=>startEditCat(t), onKeyDown:e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();startEditCat(t);}}, tabIndex:0, role:'button', style:{cursor:'pointer'},title:'Click to change'},
                          t.category,
                          t.category==='Uncategorized' && h('span',{style:{color:'var(--yellow)',marginLeft:4,fontSize:11}},'⚠')
                        )
                  ),

                  h('td',{style:{fontWeight:600,fontSize:12,color:(runningBalMap[t.id]||0)>=0?'var(--green)':'var(--red)'}}, (runningBalMap[t.id]<0?'-':'')+fmt(runningBalMap[t.id]||0)),
                  h('td',null, h('button',{className:'table del-btn',onClick:()=>delTxn(t.id)},'×'))
                );
              }))
            ),
            sorted.length>200 && h('div',{style:{background:'rgba(80,144,232,0.1)',border:'1px solid rgba(80,144,232,0.2)',borderRadius:8,padding:'8px 14px',margin:'12px 0',fontSize:12,color:'var(--blue)',display:'flex',alignItems:'center',gap:8}},
              h('span',null,'📋'), 'Showing first 200 of '+sorted.length+' transactions. Use filters above to narrow results.'
            )
          )

    // Reconciled-through info bar

      borderRadius:8, display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13
    }},
      h('span',null, '✓ ', h('strong',null,acctMap[acctFilter].name), ' reconciled through ', h('strong',null, fmtDate(acctMap[acctFilter].reconciledThrough))),
      h('button',{className:'btn sm', onClick:()=>{
        if(confirm('Clear reconciliation date for '+acctMap[acctFilter].name+'?')) {
          setAccounts(prev=>prev.map(a=>a.id===acctFilter?{...a, reconciledThrough:null}:a));
        }

    ),

    // Add Transaction modal
    showAddTxn && h(Modal, {onClose:resetNewTxn},
      h('h3',null, '➕ Add Transaction'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('div',{style:{display:'flex',gap:10}},
          h('div',{style:{flex:1}},

            h('input',{id:'txn-date',className:'input',type:'date',value:newTxn.date,onChange:e=>setNewTxn(p=>({...p,date:e.target.value})),style:{width:'100%'}})

        ),

            h('label',{htmlFor:'txn-account',style:{fontSize:12,color:'var(--card-text2)',display:'block',marginBottom:4}},'Account'),
            h('select',{id:'txn-account',className:'input',value:newTxn.accountId,onChange:e=>setNewTxn(p=>({...p,accountId:e.target.value})),style:{width:'100%'}},

              accounts.map(a=>h('option',{key:a.id,value:a.id},a.name))

    showReconcile && h(Modal, {onClose:()=>setShowReconcile(false)},

          h('strong',null, acctMap[acctFilter]?.name || 'this account'), '.'
        ),
