<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' width='512' height='512'>
  <defs>
    <linearGradient id='sg' x1='0' y1='0' x2='0.3' y2='1'>
      <stop offset='0%' stop-color='#1a2870'/>
      <stop offset='40%' stop-color='#0c1445'/>
      <stop offset='100%' stop-color='#080e30'/>
    </linearGradient>
    <pattern id='st' x='0' y='0' width='8' height='8' patternUnits='userSpaceOnUse'>
      <line x1='0' y1='0' x2='8' y2='8' stroke='#7ec8e3' stroke-width='0.3' opacity='0.08'/>
      <line x1='8' y1='0' x2='0' y2='8' stroke='#7ec8e3' stroke-width='0.3' opacity='0.08'/>
    </pattern>
    <linearGradient id='se' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#7ec8e3'/>
      <stop offset='50%' stop-color='#5ba8c8'/>
      <stop offset='100%' stop-color='#3a8ab0'/>
    </linearGradient>
    <path id='ba' d='M15,85 Q50,108 85,85' fill='none'/>
  </defs>
  <rect width='512' height='512' rx='64' fill='#0c1445'/>
  <g transform='translate(36,16) scale(4.4)'>
    <!-- Shield -->
    <path d='M4,12Q4,4 12,4L88,4Q96,4 96,12L96,60Q96,85 50,112Q4,85 4,60Z' fill='url(#sg)' stroke='url(#se)' stroke-width='2.5'/>
    <path d='M4,12Q4,4 12,4L88,4Q96,4 96,12L96,60Q96,85 50,112Q4,85 4,60Z' fill='url(#st)'/>
    <!-- Inner border -->
    <path d='M12,18Q12,12 18,12L82,12Q88,12 88,18L88,56Q88,78 50,102Q12,78 12,56Z' fill='none' stroke='#7ec8e3' stroke-width='0.8' opacity='0.2'/>
    <!-- AMBIT -->
    <text x='50' y='20' text-anchor='middle' fill='#f0c050' font-size='11' font-weight='700' font-family='Arial' letter-spacing='4' opacity='0.9'>AMBIT</text>
    <line x1='22' y1='24' x2='78' y2='24' stroke='#f0c050' stroke-width='0.5' opacity='0.4'/>
    <!-- Compass needles -->
    <polygon points='50,26 55,50 50,55 45,50' fill='#e87820'/>
    <polygon points='50,88 45,60 50,55 55,60' fill='#f0c050'/>
    <polygon points='90,55 55,50 50,55 55,60' fill='#e87820' opacity='0.85'/>
    <polygon points='10,55 45,60 50,55 45,50' fill='#f0c050' opacity='0.85'/>
    <!-- Center pivot -->
    <circle cx='50' cy='55' r='5' fill='#b05810'/>
    <circle cx='50' cy='55' r='2.5' fill='#8a4510'/>
    <!-- 3D embossed A -->
    <text x='52' y='72' text-anchor='middle' fill='#000000' font-size='52' font-weight='800' font-family='Arial' opacity='0.4'>A</text>
    <text x='48.5' y='69.5' text-anchor='middle' fill='#ffffff' font-size='52' font-weight='800' font-family='Arial' opacity='0.2'>A</text>
    <text x='50' y='71' text-anchor='middle' fill='#7ec8e3' font-size='52' font-weight='800' font-family='Arial'>A</text>
    <!-- BUDGET curved -->
    <text fill='#7ec8e3' font-size='9' font-weight='600' font-family='Arial' letter-spacing='2' opacity='0.8'>
      <textPath href='#ba' startOffset='50%' text-anchor='middle'>BUDGET</textPath>
    </text>
    <!-- Corner rivets -->
    <circle cx='16' cy='16' r='2.5' fill='#3a8ab0' opacity='0.5'/>
    <circle cx='84' cy='16' r='2.5' fill='#3a8ab0' opacity='0.5'/>
    <circle cx='16' cy='16' r='1' fill='#7ec8e3' opacity='0.3'/>
    <circle cx='84' cy='16' r='1' fill='#7ec8e3' opacity='0.3'/>
